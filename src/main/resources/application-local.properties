# local profile settings

# ── Thymeleaf: 파일시스템에서 직접 읽기 (classpath 아님)
# classpath: 는 build/resources/main(컴파일 결과)을 보기 때문에
# 소스 수정 후 새로고침만으로는 반영 안 됨. file: 로 직접 참조.
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.thymeleaf.cache=false

# ── Static 리소스: 파일시스템 우선 (JS/CSS 새로고침 즉시 반영)
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# ── DevTools: Java 클래스 변경 시만 재시작, HTML/JS/CSS는 재시작 없이 즉시 반영
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.exclude=templates/**,static/**,public/**,META-INF/resources/**

logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.com.coresolution.csm=DEBUG

# local 실행이지만, DB는 환경변수로 dev/prod/local 아무 곳이나 붙을 수 있게 구성

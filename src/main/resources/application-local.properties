# local profile settings
# 기본은 classpath로 두고, 필요 시 환경변수로 file: 경로를 오버라이드
spring.thymeleaf.prefix=${SPRING_THYMELEAF_PREFIX:classpath:/templates/}
spring.thymeleaf.cache=false

spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=false

logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.com.coresolution.csm=DEBUG

# local 실행이지만, DB는 환경변수로 dev/prod/local 아무 곳이나 붙을 수 있게 구성
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${LOCAL_DB_HOST:49.247.42.59}:${LOCAL_DB_PORT:3306}/${LOCAL_DB_NAME:csm}?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${LOCAL_DB_USERNAME:csdev}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${LOCAL_DB_PASSWORD:Core0220!_!@@}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always


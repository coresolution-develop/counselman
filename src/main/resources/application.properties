# 기본 프로파일: 서버/배포 환경 안전값(dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.application.name=csm

# 공통 서버 설정
server.port=8081
server.servlet.context-path=/csm
# idle 30분. 단, 백그라운드 폴링(notice/popup 60s 등)이 lastAccessedTime을 갱신해
# idle 타임아웃을 사실상 무력화한다 → 절대 수명 캡 별도 검토 필요(보고서 참고).
server.servlet.session.timeout=1800
server.forward-headers-strategy=framework

# [1단계] Graceful shutdown — 종료 시 처리 중이던 요청을 끊지 않고 마무리
# (내장 Tomcat에서 완전 동작. 외장 Tomcat WAR 배포 시 커넥터 드레이닝은
#  Tomcat shutdown.sh + 밸런서 drain[3·4단계]이 실제 레버다 — 보고서 참고)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# [2단계] 세션 외부화(JDBC)는 배포 환경(dev/prod) 프로파일에만 설정한다.
# local은 인메모리 유지(DDL 없이 부팅 가능). 적용 전 DDL 선행 필수:
#   scripts/spring-session-mysql.sql (SPRING_SESSION, SPRING_SESSION_ATTRIBUTES)

# 전사 링크 허브 — 개인화 회원 가입코드(자가가입 시 검증). 비우면 코드 검증 생략(완전 오픈, 비권장).
hub.signup.code=${HUB_SIGNUP_CODE:core}

# 업로드
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.counsel.audio.base-dir=${COUNSEL_AUDIO_BASE_DIR:${user.home}/csm-audio}
app.counsel.file.base-dir=${COUNSEL_FILE_BASE_DIR:${user.home}/csm-counsel-files}
# 리스트 항목설정 모달/리스트에서 숨길 컬럼명(콤마 구분)
app.counsel.list.hidden-columns=cs_idx,cs_col_01_hash,created_at,updated_at

# CLOVA Speech
ncp.clova.invoke-url=${NCP_CLOVA_INVOKE_URL:}
ncp.clova.secret-key=${NCP_CLOVA_SECRET_KEY:}
ncp.clova.grpc-url=${NCP_CLOVA_GRPC_URL:clovaspeech-gw.ncloud.com:50051}

# OpenAI GPT 요약
openai.api.base-url=https://api.openai.com/v1
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=gpt-4.1-mini

# 템플릿 공통
spring.thymeleaf.suffix=.html

# 관리자 부서코드
app.admin.sub-code=CORE

# 외부에서 접근 가능한 CSM 절대 URL (비밀번호 재설정 링크 등 메일/SMS 본문에 포함)
# 빈 값이면 요청 헤더(X-Forwarded-Host) 기반 자동 감지로 폴백. 운영에선 반드시 명시.
csm.base-url=${CSM_BASE_URL:}

# Kakao OAuth2 (챗봇 사용자 로그인)
# 운영용 별도 앱을 사용할 경우 KAKAO_CLIENT_ID / KAKAO_CLIENT_SECRET env 로 override.
# default 값은 dev/local 공용 앱. redirect-uri는 Kakao 콘솔에 사전 등록 필요.
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:5883a827f75fb4420a4b4121c33946ee}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:BivNUBivFL9g5l0DG53qp4QMSbZPUlPP}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id


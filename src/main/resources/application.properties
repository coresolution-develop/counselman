# 기본 프로파일: 서버/배포 환경 안전값(dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.application.name=csm

# 공통 서버 설정
server.port=8081
server.servlet.context-path=/csm
server.servlet.session.timeout=0
server.forward-headers-strategy=framework

# 업로드
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.counsel.audio.base-dir=${COUNSEL_AUDIO_BASE_DIR:${user.home}/csm-audio}
app.counsel.file.base-dir=${COUNSEL_FILE_BASE_DIR:${user.home}/csm-counsel-files}
# 리스트 항목설정 모달/리스트에서 숨길 컬럼명(콤마 구분)
app.counsel.list.hidden-columns=cs_idx,cs_col_01_hash,created_at,updated_at

# CLOVA Speech (하드코딩)
ncp.clova.invoke-url=https://clovaspeech-gw.ncloud.com/external/v1/15053/a6d46d2b8d57c0a31b12d7f727bbaa39966ac5cba16e4ec8197ee33ffd9b1f94
ncp.clova.secret-key=59520bd6af694f3a9abed1567b4ad7e4
ncp.clova.grpc-url=clovaspeech-gw.ncloud.com:50051

# OpenAI GPT 요약
openai.api.base-url=https://api.openai.com/v1
openai.api.key=
openai.api.model=gpt-4.1-mini

# 템플릿 공통
spring.thymeleaf.suffix=.html

# 관리자 부서코드
app.admin.sub-code=CORE

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Mail
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:false}

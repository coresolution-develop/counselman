<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="turbo-visit-control" content="reload" />
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <meta name="ctx" th:content="@{/}"/>
  <meta name="chat-token" th:content="${chatToken}"/>
  <title>채팅 관리 | 카운셀맨</title>

  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <style>
    [x-cloak] { display: none !important; }

    /* 남은 뷰포트 높이를 chat 패널이 채우도록 flex 체인 설정 (이 페이지에만 적용) */
    body.chat-admin-page .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: 0;
    }
    body.chat-admin-page .page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: none;
    }

    .page-wrap {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
      background: #fff;
    }

    /* 채팅방 목록 패널 */
    .room-panel {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .room-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .room-panel-header h3 { font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; }
    .btn-notif {
      border: none; background: none; cursor: pointer;
      padding: 4px; border-radius: 6px; display: flex; align-items: center;
      color: var(--text-tertiary); font-size: 11px; gap: 3px;
      transition: background .1s;
    }
    .btn-notif:hover { background: var(--gray-100); }
    .btn-notif.granted { color: var(--brand-600); }
    .btn-notif.denied  { color: #ef4444; }
    .badge {
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 10px;
      padding: 2px 7px;
      min-width: 20px;
      text-align: center;
    }
    .room-list { flex: 1; overflow-y: auto; }
    .room-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background .1s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .room-item:hover { background: var(--gray-50); }
    .room-item.selected { background: color-mix(in oklab, var(--brand-500) 8%, transparent); }
    .room-item.new-blink { animation: blink 1s ease-in-out 3; }
    .room-item.closed-room { opacity: .5; }
    .room-item.closed-room:hover { opacity: .75; }
    @keyframes blink { 0%,100% { background: #fff; } 50% { background: #fef9c3; } }
    .room-item-top { display: flex; align-items: center; justify-content: space-between; }
    .room-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .room-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .status-WAITING { background: #fef9c3; color: #92400e; }
    .status-ACTIVE  { background: #d1fae5; color: #065f46; }
    .status-CLOSED  { background: #f3f4f6; color: #6b7280; }
    .room-time { font-size: 12px; color: var(--text-tertiary); }
    .empty-rooms { text-align: center; color: var(--text-tertiary); font-size: 13px; padding: 40px 16px; }

    /* 채팅 영역 */
    .chat-area {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #f8f9fb;
    }
    .chat-top-bar {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-top-bar h4 { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .chat-top-bar .sub { font-size: 12px; color: var(--text-secondary); }
    .btn-join {
      background: var(--brand-600, #1a2332);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-join:hover { opacity: .85; }
    .btn-close-room {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-close-room:hover { opacity: .85; }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg { display: flex; flex-direction: column; max-width: 65%; }
    .msg.user { align-self: flex-start; align-items: flex-start; }
    .msg.counselor { align-self: flex-end; align-items: flex-end; }
    .msg.system { align-self: center; align-items: center; max-width: 80%; }
    .msg-name { font-size: 11px; color: var(--text-tertiary); margin-bottom: 3px; }
    .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg.user .msg-bubble { background: #e0e7ff; color: #1e1b4b; border-radius: 14px 14px 14px 4px; }
    .msg.counselor .msg-bubble { background: var(--brand-700, #1a2332); color: #fff; border-radius: 14px 14px 4px 14px; }
    .msg.system .msg-bubble { background: #e8f4f8; color: #4b6a8a; font-size: 12px; text-align: center; border-radius: 8px; }

    .input-area {
      padding: 12px 20px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 10px;
      background: #fff;
    }
    .msg-input {
      flex: 1;
      border: 1.5px solid var(--border-default);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      height: 44px;
    }
    .msg-input:focus { border-color: var(--brand-400, #1a2332); }
    .btn-send {
      background: var(--brand-600, #1a2332);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-send:hover { opacity: .85; }
    .placeholder-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      font-size: 14px;
    }
  </style>
</head>
<body class="chat-admin-page">
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="Chat Management"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     :data-layout="$store.app.layout"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page" x-data="chatAdminPage()" x-init="init()">

      <!-- Page header -->
      <div class="page__header">
        <div>
          <h1 class="page__title">관리자 설정</h1>
          <p class="page__subtitle">사용자와 역할을 관리하고 시스템 권한을 제어합니다</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" role="tablist">
        <a class="tab" th:href="@{/users}" role="tab">
          <svg><use href="#i-users"/></svg>
          사용자 관리
        </a>
        <a class="tab" th:href="@{/roles}" role="tab">
          <svg><use href="#i-shield"/></svg>
          역할 관리
        </a>
        <a class="tab" th:href="@{/access}" role="tab">
          <svg><use href="#i-key"/></svg>
          CSM 접근 권한
        </a>
        <a class="tab" th:href="@{/counsel/log-settings}" role="tab">
          <svg><use href="#i-sliders"/></svg>
          상담일지관리
        </a>
        <a class="tab" th:href="@{/room-board/manage}" role="tab">
          <svg><use href="#i-bed"/></svg>
          병실현황판 관리
        </a>
        <a class="tab" th:href="@{/faq-manage}" role="tab">
          <svg><use href="#i-chat"/></svg>
          FAQ 관리
        </a>
        <button class="tab is-active" role="tab" aria-selected="true">
          <svg><use href="#i-send"/></svg>
          채팅 관리
        </button>
      </div>

      <!-- 채팅 레이아웃 -->
      <div class="page-wrap">

        <!-- 채팅방 목록 -->
        <div class="room-panel">
          <div class="room-panel-header">
            <h3>상담 목록</h3>
            <button class="btn-notif"
                    :class="notifPermission"
                    @click="requestNotifPermission()"
                    :title="notifPermission === 'granted' ? '알림 허용됨' : notifPermission === 'denied' ? '알림 차단됨 (브라우저 설정에서 해제)' : '알림 허용 요청'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
              <span x-text="notifPermission === 'granted' ? '알림 ON' : notifPermission === 'denied' ? '차단됨' : '알림'"></span>
            </button>
            <span class="badge" x-show="waitingCount > 0" x-text="waitingCount" x-cloak></span>
          </div>
          <div class="room-list">
            <div class="empty-rooms" x-show="rooms.length === 0">
              대기 중인 상담이 없습니다.
            </div>
            <template x-for="room in rooms" :key="room.id">
              <div class="room-item"
                   :class="{ selected: selectedRoom && selectedRoom.id === room.id, 'new-blink': room._new, 'closed-room': room.status === 'CLOSED' }"
                   @click="selectRoom(room)">
                <div class="room-item-top">
                  <span class="room-name" x-text="room.kakao_nickname"></span>
                  <span class="room-status" :class="'status-' + room.status" x-text="statusLabel(room.status)"></span>
                </div>
                <span class="room-time" x-text="formatTime(room.created_at)"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- 채팅 영역 -->
        <div class="chat-area">

          <!-- 선택된 방 없을 때 -->
          <div class="placeholder-area" x-show="!selectedRoom">
            왼쪽 목록에서 상담을 선택해 주세요.
          </div>

          <!-- 선택된 방 있을 때 -->
          <template x-if="selectedRoom">
            <div style="display:flex;flex-direction:column;flex:1;min-height:0;">
              <div class="chat-top-bar">
                <div>
                  <h4 x-text="selectedRoom.kakao_nickname + ' 님'"></h4>
                  <div class="sub" x-text="'상담방 #' + selectedRoom.id + ' · ' + statusLabel(selectedRoom.status)"></div>
                </div>
                <div style="display:flex;gap:8px">
                  <button class="btn-join"
                          x-show="selectedRoom.status === 'WAITING'"
                          @click="joinRoom()">연결 수락</button>
                  <button class="btn-close-room"
                          x-show="selectedRoom.status === 'ACTIVE'"
                          @click="closeRoom()">상담 종료</button>
                </div>
              </div>

              <div class="messages-area" x-ref="msgArea">
                <template x-for="(msg, idx) in messages" :key="idx">
                  <div class="msg" :class="msgClass(msg)">
                    <div class="msg-name" x-show="msg.type === 'MESSAGE'" x-text="msg.senderName"></div>
                    <div class="msg-bubble" x-text="msg.content || msg.text"></div>
                  </div>
                </template>
              </div>

              <div class="input-area" x-show="selectedRoom.status === 'ACTIVE'">
                <textarea
                  class="msg-input"
                  placeholder="메시지를 입력하세요..."
                  x-model="inputText"
                  @compositionstart="composing = true"
                  @compositionend="composing = false"
                  @keydown.enter.prevent="sendMessage($event)"
                  rows="1"></textarea>
                <button class="btn-send" @click="sendMessage()">전송</button>
              </div>
            </div>
          </template>

        </div>
      </div>

    </div>
  </main>
</div>

<!-- Scripts -->
<script th:src="@{/assets/js/app.js}"></script>
<script th:src="@{/assets/js/chrome.js}" data-page="admin" th:attr="data-ctx=@{/}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
  document.addEventListener('turbo:load', () => {
    MPChrome.mount({ parent: '관리자', current: '채팅 관리' });
  }, { once: true });
</script>
<script data-turbo-eval="false" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@7.3.0/dist/turbo.es2017-umd.js"></script>
<script data-turbo-eval="false" defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<script>
const CTX = (document.querySelector('meta[name=ctx]')?.content || '/').replace(/\/$/, '');

function chatAdminPage() {
  return {
    token: '',
    counselorId: null,
    counselorName: '',
    rooms: [],
    selectedRoom: null,
    messages: [],
    inputText: '',
    composing: false,
    stompClient: null,
    pollTimer: null,
    _roomSub: null,
    notifPermission: 'default',

    get waitingCount() {
      return this.rooms.filter(r => r.status === 'WAITING').length;
    },

    async init() {
      const infoRes = await fetch(CTX + '/api/me').catch(() => null);
      if (infoRes && infoRes.ok) {
        const info = await infoRes.json();
        this.counselorId = info.userId;
        this.counselorName = info.name || info.id || '상담사';
      }

      this.token = document.querySelector('meta[name="chat-token"]')?.content || '';
      if (!this.token) {
        alert('소속 기관 정보를 확인할 수 없습니다. 다시 로그인해주세요.');
        return;
      }

      // 알림 권한 상태 초기화
      if ('Notification' in window) {
        this.notifPermission = Notification.permission;
        if (Notification.permission === 'default') {
          // 페이지 로드 시 조용히 권한 요청 (사용자 제스처 불필요 시 시도)
          Notification.requestPermission().then(p => { this.notifPermission = p; });
        }
      }

      await this.loadRooms();
      this.connectAdminWebSocket();
      this.pollTimer = setInterval(() => this.loadRooms(), 10000);
    },

    async requestNotifPermission() {
      if (!('Notification' in window)) { alert('이 브라우저는 알림을 지원하지 않습니다.'); return; }
      if (Notification.permission === 'denied') {
        alert('알림이 차단되어 있습니다. 브라우저 주소창의 자물쇠 아이콘 → 알림 허용으로 변경해 주세요.');
        return;
      }
      const p = await Notification.requestPermission();
      this.notifPermission = p;
    },

    showNotification(title, body, roomId) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      const notif = new Notification(title, {
        body,
        icon: CTX + '/img/logo.png',
        tag: 'csm-chat-' + (roomId || Date.now()),
        renotify: true,
      });
      notif.onclick = () => {
        window.focus();
        if (roomId != null) {
          const room = this.rooms.find(r => String(r.id) === String(roomId));
          if (room) this.selectRoom(room);
        }
        notif.close();
      };
    },

    async loadRooms() {
      const res = await fetch(CTX + '/api/chat/rooms');
      const data = await res.json();
      const prev = new Set(this.rooms.map(r => r.id));
      this.rooms = data.map(r => ({ ...r, _new: !prev.has(r.id) && r.status === 'WAITING' }));
    },

    connectAdminWebSocket() {
      const sock = new SockJS(CTX + '/ws/chat');
      this.stompClient = Stomp.over(sock);
      this.stompClient.debug = null;
      this.stompClient.connect({}, () => {
        this.stompClient.subscribe('/topic/admin/rooms/' + this.token, (frame) => {
          const msg = JSON.parse(frame.body);
          if (msg.type === 'NEW_ROOM') {
            this.loadRooms();
            this.showNotification(
              '새 채팅 상담 요청',
              (msg.nickname || '고객') + '님이 채팅 상담을 요청했습니다.',
              msg.roomId
            );
          } else if (msg.type === 'NEW_COUNSEL') {
            this.showNotification(
              '새 상담 접수',
              (msg.name || '고객') + '님이 챗봇으로 상담을 접수했습니다.'
            );
          }
        });
      });
    },

    async selectRoom(room) {
      this.selectedRoom = room;
      this.messages = [];

      const res = await fetch(CTX + '/api/chat/room/' + room.id + '/messages?t=' + this.token);
      const data = await res.json();
      this.messages = data.map(m => ({
        type: 'MESSAGE',
        senderType: m.sender_type,
        senderName: m.sender_name,
        content: m.content
      }));

      if (this._roomSub) this._roomSub.unsubscribe();
      if (this.stompClient && this.stompClient.connected) {
        this._roomSub = this.stompClient.subscribe('/topic/chat/' + this.token + '/' + room.id, (frame) => {
          const msg = JSON.parse(frame.body);
          if (msg.type === 'MESSAGE') {
            this.messages.push(msg);
            this.$nextTick(() => this.scrollBottom());
          }
        });
      }

      this.$nextTick(() => this.scrollBottom());
    },

    async joinRoom() {
      if (!this.selectedRoom) return;
      await fetch(CTX + '/api/chat/room/' + this.selectedRoom.id + '/join'
        + '?counselorId=' + (this.counselorId || 0)
        + '&counselorName=' + encodeURIComponent(this.counselorName),
        { method: 'PUT' });
      this.selectedRoom.status = 'ACTIVE';
      this.loadRooms();
    },

    async closeRoom() {
      if (!this.selectedRoom) return;
      await fetch(CTX + '/api/chat/room/' + this.selectedRoom.id + '/close',
        { method: 'PUT' });
      this.selectedRoom.status = 'CLOSED';
      this.loadRooms();
    },

    sendMessage(event) {
      if (event?.isComposing || this.composing) return;
      if (!this.inputText.trim() || !this.stompClient || !this.selectedRoom) return;
      const content = this.inputText.trim();
      this.stompClient.send('/app/chat/' + this.selectedRoom.id + '/send', {}, JSON.stringify({
        token: this.token,
        senderType: 'COUNSELOR',
        senderName: this.counselorName,
        content
      }));
      this.inputText = '';
    },

    msgClass(msg) {
      if (msg.type === 'SYSTEM') return 'system';
      return msg.senderType === 'USER' ? 'user' : 'counselor';
    },

    statusLabel(s) {
      return { WAITING: '대기', ACTIVE: '상담중', CLOSED: '종료' }[s] || s;
    },

    formatTime(dt) {
      if (!dt) return '';
      return new Date(dt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    },

    scrollBottom() {
      const el = this.$refs.msgArea;
      if (el) el.scrollTop = el.scrollHeight;
    }
  };
}
</script>
</body>
</html>

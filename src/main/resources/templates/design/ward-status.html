<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediPlat · 병실현황판</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/datepicker.css}" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <style>
    [x-cloak] { display: none !important; }

    .ws-wrap { padding: 20px; }

    /* ===== Hero ===== */
    .ws-hero {
      background: linear-gradient(135deg, var(--brand-700) 0%, var(--brand-500) 100%);
      border-radius: var(--radius-lg);
      padding: 20px 26px;
      color: #fff;
      display: flex; align-items: center; gap: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    .ws-hero__title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .ws-hero__meta { font-size: 12px; opacity: .8; margin-top: 3px; font-variant-numeric: tabular-nums; }
    .ws-hero__actions { margin-left: auto; display: flex; gap: 8px; }
    .ws-hero__btn {
      padding: 8px 16px; border-radius: 8px; font-size: 12.5px; font-weight: 600;
      background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.25);
      cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none;
    }
    .ws-hero__btn:hover { background: rgba(255,255,255,.22); }
    .ws-hero__btn--solid { background: #fff; color: var(--brand-700); border-color: #fff; }
    .ws-hero__btn--solid:hover { background: #f8f9fb; }

    /* ===== Stat cards ===== */
    .ws-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px 0; }
    @media (max-width: 900px) { .ws-stats { grid-template-columns: repeat(2, 1fr); } }
    .ws-stat {
      background: #fff;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 18px 22px;
      display: flex; flex-direction: column; gap: 4px;
      position: relative; overflow: hidden;
    }
    .ws-stat::before {
      content: ""; position: absolute; inset: 0 0 auto 0; height: 3px;
      background: linear-gradient(90deg, var(--brand-500), transparent);
    }
    .ws-stat__label { font-size: 12px; color: var(--text-tertiary); font-weight: 600; letter-spacing: .02em; }
    .ws-stat__value { font-size: 30px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    .ws-stat__sub { font-size: 11px; color: var(--text-tertiary); }
    .ws-stat.is-highlight .ws-stat__value { color: var(--brand-600); }
    .ws-stat.is-warn .ws-stat__value { color: #f59e0b; }

    /* ===== Filters ===== */
    .ws-filters {
      background: #fff;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .ws-filters__label { font-size: 12px; color: var(--text-tertiary); font-weight: 600; margin-right: 4px; }
    .ws-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-default);
      font-size: 12.5px; color: var(--text-secondary);
      background: #fff;
      cursor: pointer;
      transition: all .14s;
      user-select: none;
    }
    .ws-chip:hover { border-color: var(--brand-300); color: var(--text-primary); }
    .ws-chip.is-on {
      background: color-mix(in oklab, var(--brand-500) 10%, #fff);
      border-color: var(--brand-500);
      color: var(--brand-700);
      font-weight: 600;
    }
    .ws-chip__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-300); }
    .ws-chip.is-on .ws-chip__dot { background: var(--brand-500); }

    .ws-filters .spacer { flex: 1; }
    .ws-reset {
      padding: 6px 12px; border-radius: 6px; font-size: 12px; color: var(--text-tertiary);
      background: transparent; border: 1px solid var(--border-subtle); cursor: pointer;
    }
    .ws-reset:hover { color: var(--text-primary); border-color: var(--border-default); }

    /* ===== Ward section ===== */
    .ws-ward {
      background: #fff;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .ws-ward__head {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      background: linear-gradient(180deg, var(--gray-50), #fff);
      border-bottom: 1px solid var(--border-subtle);
      flex-wrap: wrap;
    }
    .ws-ward__title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; display: inline-flex; align-items: center; gap: 8px; }
    .ws-ward__badge {
      padding: 2px 8px; border-radius: 6px;
      background: color-mix(in oklab, var(--brand-500) 10%, #fff);
      color: var(--brand-700);
      font-size: 11px; font-weight: 600;
      border: 1px solid color-mix(in oklab, var(--brand-500) 22%, transparent);
    }
    .ws-ward__mini { display: flex; gap: 14px; flex-wrap: wrap; }
    .ws-ward__mini span { font-size: 12.5px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
    .ws-ward__mini b { font-weight: 700; color: var(--text-primary); }

    /* ===== Table ===== */
    .ws-table { width: 100%; border-collapse: collapse; }
    .ws-table thead th {
      background: var(--gray-50);
      font-size: 11px; font-weight: 600; color: var(--text-tertiary);
      text-align: left; padding: 10px 12px;
      border-bottom: 1px solid var(--border-default);
      text-transform: uppercase; letter-spacing: .04em;
      white-space: nowrap;
    }
    .ws-table tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 12.5px;
      color: var(--text-primary);
      vertical-align: middle;
    }
    .ws-table tbody tr:hover { background: color-mix(in oklab, var(--brand-500) 3%, #fff); }
    .ws-table tbody tr.is-disabled { opacity: 0.5; }

    /* Bed id cell */
    .ws-bed {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 72px; padding: 6px 10px;
      border-radius: 999px;
      background: color-mix(in oklab, var(--brand-500) 12%, #fff);
      color: var(--brand-700);
      font-weight: 700; font-size: 12px;
      border: 1px solid color-mix(in oklab, var(--brand-500) 22%, transparent);
    }
    .ws-bed__sub { display: block; font-size: 10px; font-weight: 500; margin-top: 1px; opacity: .75; }

    .ws-available {
      color: var(--brand-600);
      font-weight: 600;
    }
    .ws-available.is-full { color: #ef4444; }

    .ws-tag {
      display: inline-block;
      padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
      background: var(--gray-100);
      color: var(--text-secondary);
      margin-right: 4px;
    }

    /* Bed slots: fixed row of placeholder cells for each bed */
    .ws-beds {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 68px;
      gap: 6px;
    }
    /* 기본 = 빈 병상 (입원 가능) → 녹색으로 강조 */
    .ws-bed-slot {
      height: 44px;
      border-radius: 6px;
      border: 1px solid color-mix(in oklab, var(--brand-500) 30%, transparent);
      background: color-mix(in oklab, var(--brand-500) 12%, #fff);
      display: flex; align-items: center; justify-content: center;
      font-size: 11.5px; color: var(--brand-700);
      font-weight: 600;
      position: relative;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 6px;
    }
    /* 재원 중 — 흰색/중립 */
    .ws-bed-slot.is-filled {
      background: var(--gray-100);
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      font-weight: 500;
    }
    /* 입원예약 — 연한 앰버 */
    .ws-bed-slot.is-reserved {
      background: #fef9c3;
      border: 1px solid #fde047;
      color: #854d0e;
      font-weight: 500;
    }
    .ws-bed-slot__num {
      position: absolute; top: 2px; left: 4px;
      font-size: 9px; color: var(--text-tertiary); font-weight: 600;
    }
    .ws-bed-slot.is-filled .ws-bed-slot__num { color: var(--text-tertiary); }
    .ws-bed-slot.is-reserved .ws-bed-slot__num { color: #a16207; }

    /* (unused — kept for popup mode only) */
    .ws-select-btn {
      padding: 7px 14px;
      border-radius: 8px;
      background: var(--brand-500);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border: 0;
      cursor: pointer;
      transition: all .14s;
      white-space: nowrap;
    }
    .ws-select-btn:hover { background: var(--brand-600); transform: translateY(-1px); }
    .ws-select-btn:disabled { background: var(--gray-200); color: var(--text-tertiary); cursor: not-allowed; transform: none; }
    .ws-select-btn--ghost { background: transparent; color: var(--brand-700); border: 1px solid var(--brand-500); }
    .ws-select-btn--ghost:hover { background: color-mix(in oklab, var(--brand-500) 8%, #fff); }
  </style>
</head>
<body>
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="Ward Status"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
  <div class="ws-wrap" x-data="wardStatus()" x-init="init()">

    <!-- Hero -->
    <div class="ws-hero">
      <div>
        <div class="ws-hero__title">병실현황판</div>
        <div class="ws-hero__meta">기준일 <span x-text="now"></span></div>
      </div>
      <div class="ws-hero__actions">
        <button type="button" class="ws-hero__btn" @click="location.reload()" x-show="!popupMode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          최신 현황
        </button>
        <a th:href="@{/admin/room-board}" class="ws-hero__btn" x-show="!popupMode && canManage">관리 화면</a>
        <button type="button" class="ws-hero__btn ws-hero__btn--solid" @click="closePage()" x-show="popupMode">닫기</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="ws-stats">
      <div class="ws-stat">
        <div class="ws-stat__label">허가병상수</div>
        <div class="ws-stat__value" x-text="totals.licensed"></div>
        <div class="ws-stat__sub">병동 전체 합계</div>
      </div>
      <div class="ws-stat is-highlight">
        <div class="ws-stat__label">재원 환자 수</div>
        <div class="ws-stat__value" x-text="totals.occupied"></div>
        <div class="ws-stat__sub">현재 재원중</div>
      </div>
      <div class="ws-stat is-warn">
        <div class="ws-stat__label">입원 가능 수</div>
        <div class="ws-stat__value" x-text="totals.available"></div>
        <div class="ws-stat__sub">즉시 입원 가능</div>
      </div>
      <div class="ws-stat">
        <div class="ws-stat__label">가동률</div>
        <div class="ws-stat__value"><span x-text="totals.occupancy"></span>%</div>
        <div class="ws-stat__sub">재원 / 허가</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="ws-filters">
      <span class="ws-filters__label">상태 필터</span>
      <template x-for="f in filters" :key="f.key">
        <label class="ws-chip" :class="{ 'is-on': f.on }" @click="f.on = !f.on">
          <span class="ws-chip__dot"></span>
          <span x-text="f.label"></span>
        </label>
      </template>
      <label class="ws-chip" :class="{ 'is-on': onlyAvailable }" @click="onlyAvailable = !onlyAvailable" style="margin-left:8px;">
        <span class="ws-chip__dot"></span>
        <span>입원 가능 병실만</span>
      </label>
      <div class="spacer"></div>
      <button class="ws-reset" @click="resetFilters()">필터 초기화</button>
    </div>

    <!-- Wards -->
    <template x-for="ward in filteredWards" :key="ward.id">
      <section class="ws-ward">
        <div class="ws-ward__head">
          <div class="ws-ward__title">
            <span x-text="ward.name"></span>
            <span class="ws-ward__badge">병동 현황</span>
          </div>
          <div class="ws-ward__mini" style="margin-left:auto;">
            <span>허가병상 <b x-text="ward.licensed"></b></span>
            <span>재원환자 <b x-text="ward.occupied"></b></span>
            <span>입원 가능 <b class="ws-available" x-text="ward.available"></b></span>
            <span>가동률 <b x-text="ward.occupancy + '%'"></b></span>
          </div>
        </div>

        <div style="overflow-x:auto;">
          <table class="ws-table">
            <thead>
              <tr>
                <th>병실</th>
                <th>허가병상수</th>
                <th>성별</th>
                <th>재원자 수</th>
                <th>입원 T.O</th>
                <th>가동률</th>
                <th>간병 형태</th>
                <th>예약 환자수</th>
                <th>입원 예정일</th>
                <th>상태구분</th>
                <th>재원환자 명단</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="room in ward.rooms" :key="room.id">
                <tr :class="{ 'is-disabled': room.available === 0 }">
                  <td>
                    <span class="ws-bed">
                      <span x-text="room.id"></span>
                    </span>
                    <span class="ws-bed__sub" style="display:block;margin-top:3px;padding-left:4px;color:var(--text-tertiary);font-size:11px;" x-text="'(' + room.capacity + '인실)'"></span>
                  </td>
                  <td x-text="room.capacity + '병실'"></td>
                  <td x-text="room.gender || '—'"></td>
                  <td x-text="room.occupied + '명'"></td>
                  <td>
                    <span :class="room.available === 0 ? 'ws-available is-full' : 'ws-available'" x-text="room.available + '명 ' + (room.available === 0 ? '만실' : '입원 가능!')"></span>
                  </td>
                  <td x-text="room.occupancy + '%'"></td>
                  <td>
                    <template x-for="t in room.care"><span class="ws-tag" x-text="t"></span></template>
                  </td>
                  <td x-text="room.reserved + '명'"></td>
                  <td x-text="room.admitDate || '—'"></td>
                  <td x-text="room.careType || '—'"></td>
                  <td>
                    <div class="ws-beds">
                      <template x-for="i in room.capacity" :key="i">
                        <div class="ws-bed-slot"
                             :class="{ 'is-filled': room.patients[i-1], 'is-reserved': !room.patients[i-1] && i <= room.occupied + room.reserved }">
                          <span class="ws-bed-slot__num" x-text="i"></span>
                          <span x-text="room.patients[i-1] || ''"></span>
                        </div>
                      </template>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </section>
    </template>
  </div><!-- .ws-wrap -->
  </main>
</div><!-- .app -->

<script th:inline="javascript">
/*<![CDATA[*/
function wardStatus() {
  const ctx = location.pathname.startsWith('/csm/') ? '/csm' : '';

  const _board      = /*[[${board}]]*/ null;
  const _canManage  = /*[[${canManageRoomBoard}]]*/ false;

  function mapRoom(r, wi) {
    const care = [];
    if (r.statusDiaper) care.push('기저귀');
    if (r.statusOxygen)  care.push('산소');
    if (r.statusSuction) care.push('석션');
    if (r.statusWalk)    care.push('보행');
    const cap = r.licensedBeds || 0;
    const occ = r.occupiedCount || 0;
    const res = r.reservationCount || 0;
    return {
      id:        r.roomName    || '',
      capacity:  cap,
      occupied:  occ,
      reserved:  res,
      available: r.availableCount != null ? r.availableCount : Math.max(0, cap - occ - res),
      occupancy: cap > 0 ? Math.round((occ / cap) * 100) : 0,
      care,
      patients:  r.patientSlots || [],
      gender:    r.genderSummary || '',
      admitDate: r.reservationNames || '',
      careType:  r.careType || '',
      note:      r.note || '',
    };
  }

  function mapWard(w, idx) {
    return {
      id:       'w' + idx,
      name:     w.wardName    || '',
      licensed: w.licensedBeds  || 0,
      occupied: w.occupiedBeds  || 0,
      available:w.availableBeds || 0,
      occupancy:Math.round(w.occupancyRate || 0),
      rooms:    (w.rooms || []).map((r, ri) => mapRoom(r, ri)),
    };
  }

  const _wards = _board ? (_board.wards || []).map(mapWard) : [];
  const _now   = _board
    ? ((_board.snapshotDate || '') + ' ' + (_board.snapshotTime || '')).trim()
    : new Date().toISOString().slice(0, 16).replace('T', ' ');

  return {
    wards: _wards,
    canManage: _canManage,
    popupMode: new URLSearchParams(location.search).get('popup') === '1',
    now: _now,
    filters: [
      { key: 'diaper',  label: '기저귀', on: false },
      { key: 'oxygen',  label: '산소',   on: false },
      { key: 'suction', label: '석션',   on: false },
      { key: 'walk',    label: '보행',   on: false },
    ],
    onlyAvailable: false,

    init() {},

    get totals() {
      const L = this.wards.reduce((s, w) => s + w.licensed, 0);
      const O = this.wards.reduce((s, w) => s + w.occupied, 0);
      const A = this.wards.reduce((s, w) => s + w.available, 0);
      return { licensed: L, occupied: O, available: A, occupancy: L > 0 ? Math.round((O / L) * 100) : 0 };
    },

    get filteredWards() {
      const activeKeys = this.filters.filter(f => f.on).map(f => f.key);
      const labelMap = { diaper: '기저귀', oxygen: '산소', suction: '석션', walk: '보행' };
      let wards = this.wards;
      if (activeKeys.length) {
        wards = wards.map(w => ({
          ...w,
          rooms: w.rooms.filter(r => activeKeys.every(k => r.care.includes(labelMap[k]))),
        })).filter(w => w.rooms.length > 0);
      }
      if (this.onlyAvailable) {
        wards = wards.map(w => ({
          ...w,
          rooms: w.rooms.filter(r => r.available > 0),
        })).filter(w => w.rooms.length > 0);
      }
      return wards;
    },

    resetFilters() {
      this.filters.forEach(f => f.on = false);
      this.onlyAvailable = false;
    },

    closePage() {
      if (this.popupMode) { window.close(); return; }
      window.location.href = ctx + '/room-board';
    },

    selectRoom(ward, room) {
      if (!room || room.available <= 0) return;
      const roomName = room.id || '';
      const bedName = roomName ? `${roomName}-${room.occupied + room.reserved + 1}bed` : '';
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            type: 'csm-room-board-select',
            wardName: ward?.name || '',
            roomName,
            bedName,
          }, window.location.origin);
        }
      } catch (_) {}
      if (this.popupMode) window.close();
    },
  };
}
/*]]>*/
</script>
<script th:src="@{/assets/js/app.js}"></script>
<script th:src="@{/assets/js/datepicker.js}"></script>
<script th:src="@{/assets/js/chrome.js}" data-page="ward" th:attr="data-ctx=@{/}"></script>
<script>
  document.addEventListener('alpine:init', () => {
    MPChrome.mount({ parent: '상담 업무', current: '병실현황판' });
  });
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>

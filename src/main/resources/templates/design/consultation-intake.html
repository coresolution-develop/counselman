<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediPlat · 상담 접수</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/role-management.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/datepicker.css}" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>
<body>
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="Consultation Intake"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page" x-data="intakePage()" x-init="initSelected()">
      <div class="page__header">
        <div>
          <h1 class="page__title">상담 접수</h1>
          <p class="page__subtitle">신규 상담 접수를 우선순위대로 관리하고 입원상담으로 바로 연계합니다</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-row">
        <div class="stat-card stat-card--brand">
          <div class="stat-card__label"><span class="dot"></span>전체</div>
          <div class="stat-card__value" x-text="count('all')"></div>
          <div class="stat-card__trend" x-text="'P1 긴급 ' + rows.filter(r => r.prio == 1).length + '건'"></div>
        </div>
        <div class="stat-card stat-card--warn">
          <div class="stat-card__label"><span class="dot"></span>접수 대기</div>
          <div class="stat-card__value" x-text="count('receive')"></div>
          <div class="stat-card__trend" x-text="'P1 ' + rows.filter(r => r.status === '접수' && r.prio == 1).length + '건 포함'"></div>
        </div>
        <div class="stat-card stat-card--info">
          <div class="stat-card__label"><span class="dot"></span>입원상담 변환</div>
          <div class="stat-card__value" x-text="count('linked')"></div>
          <div class="stat-card__trend" x-text="rows.length ? '전환율 ' + Math.round(count('linked') / rows.length * 100) + '%' : '전환율 —'"></div>
        </div>
        <div class="stat-card stat-card--danger">
          <div class="stat-card__label"><span class="dot"></span>취소</div>
          <div class="stat-card__value" x-text="count('cancel')"></div>
          <div class="stat-card__trend">이번 주</div>
        </div>
      </div>

      <!-- Split layout: queue + form -->
      <div style="display:grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start;">

        <!-- Queue -->
        <div>
          <div class="toolbar">
            <div class="filter-pills">
              <button class="pill" :class="{'is-active': filter==='all'}" @click="filter='all'">전체 <span class="pill__count" x-text="count('all')"></span></button>
              <button class="pill" :class="{'is-active': filter==='receive'}" @click="filter='receive'">접수 <span class="pill__count" x-text="count('receive')"></span></button>
              <button class="pill" :class="{'is-active': filter==='linked'}" @click="filter='linked'">입원상담 연계 <span class="pill__count" x-text="count('linked')"></span></button>
              <button class="pill" :class="{'is-active': filter==='cancel'}" @click="filter='cancel'">취소 <span class="pill__count" x-text="count('cancel')"></span></button>
            </div>
            <div class="toolbar__spacer"></div>
            <button class="btn-xs"><svg><use href="#i-refresh"/></svg>새로고침</button>
          </div>

          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>환자명</th><th>접수 시간</th><th>접수자</th>
                  <th class="col-center">우선순위</th><th>상태</th><th class="col-center">연계</th>
                  <th class="col-right">작업</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="r in filtered" :key="r.id">
                  <tr>
                    <td>
                      <div style="font-weight:600;" x-text="r.name"></div>
                      <div style="font-size:11px; color: var(--text-tertiary); font-variant-numeric: tabular-nums;" x-text="r.phone"></div>
                    </td>
                    <td class="col-num" x-text="r.time"></td>
                    <td x-text="r.by"></td>
                    <td class="col-center"><span class="prio" :class="'prio--' + r.prio" x-text="'P' + r.prio"></span></td>
                    <td><span class="status" :class="'status--' + r.statusType" x-text="r.status"></span></td>
                    <td class="col-center" x-text="r.link || '—'" style="color: var(--text-tertiary);"></td>
                    <td class="col-right">
                      <div class="row-actions" style="justify-content:flex-end;">
                        <button class="btn-xs" @click="editRow(r)">수정</button>
                        <button class="btn-xs btn-xs--brand" x-show="r.statusType === 'receive'" @click="linkRow(r.id)"><svg><use href="#i-bed"/></svg>입원상담 이관</button>
                        <button class="btn-xs btn-xs--danger" x-show="r.statusType !== 'cancel'" @click="cancelRow(r.id)">취소</button>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Registration form -->
        <div class="side-form">
          <div class="side-form__title" x-text="form.editId ? '상담 접수 수정' : '상담 접수 등록'"></div>
          <div class="side-form__grid">
            <div class="field full">
              <label class="field__label">환자명</label>
              <input type="text" class="input" placeholder="홍길동" x-model="form.name" />
            </div>
            <div class="field">
              <label class="field__label">연락처</label>
              <input type="text" class="input" placeholder="010-0000-0000" x-model="form.phone" />
            </div>
            <div class="field">
              <label class="field__label">보호자명</label>
              <input type="text" class="input" placeholder="보호자 이름" x-model="form.guardian" />
            </div>
            <div class="field">
              <label class="field__label">우선순위</label>
              <select class="select" x-model="form.prio">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>
            <div class="field">
              <label class="field__label">상태</label>
              <select class="select" x-model="form.status">
                <option>접수</option><option>진행</option><option>완료</option><option>취소</option>
              </select>
            </div>
            <div class="field full">
              <label class="field__label">접수 시간</label>
              <input type="datetime-local" class="input" x-model="form.time" />
            </div>
            <div class="field full">
              <label class="field__label">접수자 메모</label>
              <input type="text" class="input" placeholder="접수자 메모" x-model="form.note" />
            </div>
            <div class="field full">
              <label class="field__label">문의내용</label>
              <textarea class="textarea" placeholder="문의 내용 또는 상담 메모를 입력하세요" x-model="form.inquiry"></textarea>
            </div>
          </div>
          <div class="side-form__footer">
            <button class="btn btn--ghost" @click="reset()">신규입력</button>
            <button class="btn btn--primary" @click="save()"><svg><use href="#i-check"/></svg>접수 저장</button>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script th:inline="javascript">
function intakePage() {
  const pad = n => String(n).padStart(2,'0');
  const ctx = (/*[[@{/}]]*/ '/').replace(/\/$/, '');
  const csrf = () => ({
    token:  document.querySelector('meta[name="_csrf"]')?.content || '',
    header: document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN',
  });
  const statusTypeMap = { '접수':'receive', '입원상담 연계':'done', '취소':'cancel' };

  function nowLocal() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function blankForm() {
    return { editId: null, name:'', phone:'', guardian:'', prio:'3', status:'접수', time: nowLocal(), note:'', inquiry:'' };
  }
  function formatPhone(v) {
    const d = (v || '').replace(/\D/g, '');
    if (d.length === 11) return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
    if (d.length === 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
    return v || '';
  }
  function postForm(url, params) {
    const c = csrf();
    return fetch(ctx + url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', [c.header]: c.token },
      body: new URLSearchParams(params),
    }).then(r => r.json());
  }

  return {
    selectedId: /*[[${selectedId}]]*/ 0,
    filter: 'receive',
    loading: false,
    form: blankForm(),
    rows: /*[[${rows}]]*/ [],

    get filtered() {
      if (this.filter === 'all')     return this.rows;
      if (this.filter === 'receive') return this.rows.filter(r => r.status === '접수');
      if (this.filter === 'linked')  return this.rows.filter(r => r.status === '입원상담 연계');
      if (this.filter === 'cancel')  return this.rows.filter(r => r.status === '취소');
      return this.rows;
    },
    count(f) {
      if (f === 'all')     return this.rows.length;
      if (f === 'receive') return this.rows.filter(r => r.status === '접수').length;
      if (f === 'linked')  return this.rows.filter(r => r.status === '입원상담 연계').length;
      if (f === 'cancel')  return this.rows.filter(r => r.status === '취소').length;
      return 0;
    },

    async save() {
      this.loading = true;
      try {
        this.form.phone = formatPhone(this.form.phone);
        const params = {
          patientName:  this.form.name,
          patientPhone: this.form.phone,
          guardianName: this.form.guardian,
          callSummary:  this.form.note,
          priority:     this.form.prio,
          reservedAt:   this.form.time.replace('T', ' ') + ':00',
          status:       this.form.status,
        };
        if (this.form.editId) params.id = this.form.editId;
        const data = await postForm('/counsel/intake/save', params);
        if (!data.ok) { alert(data.error || '저장 실패'); return; }
        if (this.form.editId) {
          const r = this.rows.find(r => r.id === this.form.editId);
          if (r) Object.assign(r, { name: this.form.name, phone: this.form.phone,
            guardian: this.form.guardian, prio: Number(this.form.prio),
            status: this.form.status, statusType: statusTypeMap[this.form.status] || 'receive',
            note: this.form.note });
        } else {
          const d = new Date();
          this.rows.unshift({ id: data.id, name: this.form.name, phone: this.form.phone,
            guardian: this.form.guardian, note: this.form.note,
            time: `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`,
            by: '', prio: Number(this.form.prio),
            status: this.form.status, statusType: statusTypeMap[this.form.status] || 'receive', link: '' });
        }
        this.form = blankForm();
      } finally { this.loading = false; }
    },

    async cancelRow(id) {
      if (!confirm('취소하시겠습니까?')) return;
      const data = await postForm('/counsel/intake/status', { reservationId: id, status: 'CANCELLED' });
      if (!data.ok) { alert(data.error || '취소 실패'); return; }
      const r = this.rows.find(r => r.id === id);
      if (r) { r.status = '취소'; r.statusType = 'cancel'; r.link = ''; }
    },

    async linkRow(id) {
      if (!confirm('입원상담으로 이관하시겠습니까?')) return;
      const data = await postForm('/counsel/intake/status', { reservationId: id, status: 'COMPLETED' });
      if (!data.ok) { alert(data.error || '이관 실패'); return; }
      const r = this.rows.find(r => r.id === id);
      if (r) { r.status = '입원상담 연계'; r.statusType = 'done'; r.link = '입원상담'; }
    },

    editRow(r) {
      this.form = { editId: r.id, name: r.name, phone: r.phone || '', guardian: r.guardian || '',
        prio: String(r.prio), status: r.status, time: nowLocal(), note: r.note || '', inquiry: '' };
    },
    initSelected() {
      if (!this.selectedId) return;
      const r = this.rows.find(r => r.id === this.selectedId);
      if (r) { this.editRow(r); this.filter = 'all'; }
    },
    reset() { this.form = blankForm(); },
  };
}
</script>

<script th:src="@{/assets/js/app.js}"></script>
<script th:src="@{/assets/js/datepicker.js}"></script>
<script th:src="@{/assets/js/chrome.js}" data-page="reception" th:attr="data-ctx=@{/}"></script>
<script>
  document.addEventListener('turbo:load', () => { MPChrome.mount({ parent: '상담 업무', current: '상담 접수' }); }, { once: true });
</script>
<script data-turbo-eval="false" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@7.3.0/dist/turbo.es2017-umd.js"></script>
<script data-turbo-eval="false" defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>

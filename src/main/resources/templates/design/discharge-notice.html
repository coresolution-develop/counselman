<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediPlat · 퇴원예고</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <style>
    .dn-grid { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
    .dn-panel { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); overflow: hidden; }
    .dn-panel__head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 18px; background:var(--gray-50); border-bottom:1px solid var(--border-subtle); }
    .dn-panel__title { font-size:13px; font-weight:700; color:var(--text-primary); }
    .dn-panel__hint { font-size:11px; color:var(--text-tertiary); }
    .dn-panel__body { padding:18px; }
    .dn-form { display:grid; gap:12px; }
    .dn-form .select, .dn-form .input, .dn-form .textarea { font-size:12px; }
    .dn-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:4px; }
    .dn-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .dn-toolbar__spacer { flex:1; }
    .dn-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:var(--radius-full); font-size:11px; font-weight:700; }
    .dn-badge::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
    .dn-badge--planned { background:#fffbeb; color:#92400e; }
    .dn-badge--done { background:#ecfdf5; color:#047857; }
    .dn-badge--cancel { background:#f3f4f6; color:#6b7280; }
    .dn-availability { font-weight:700; color:var(--brand-700); }
    .dn-availability.is-muted { color:var(--text-tertiary); }
    .dn-empty { padding:42px 20px; text-align:center; color:var(--text-tertiary); font-size:13px; }
    .dn-patient-option { display:flex; flex-direction:column; }
    .dn-note { max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-secondary); }
    @media (max-width: 1040px) { .dn-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="Discharge Notice"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>
  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page">
      <div class="page__header">
        <div>
          <h1 class="page__title">퇴원예고</h1>
          <p class="page__subtitle">퇴원 예정 병상을 확인하고 당일 오후 입원 가능 여부를 관리합니다</p>
        </div>
        <div style="display:flex;gap:8px;">
          <a class="btn btn--outline" th:href="@{/room-board}"><svg><use href="#i-bed"/></svg>병실현황판</a>
          <a class="btn btn--outline" th:href="@{/counsel/admission-reservation}"><svg><use href="#i-calendar"/></svg>입원예약관리</a>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-card stat-card--brand">
          <div class="stat-card__label"><span class="dot"></span>퇴원예정</div>
          <div class="stat-card__value" th:text="${plannedCount}">0</div>
          <div class="stat-card__trend">선택일 기준</div>
        </div>
        <div class="stat-card stat-card--info">
          <div class="stat-card__label"><span class="dot"></span>오후 입원 가능</div>
          <div class="stat-card__value" th:text="${afternoonAvailableCount}">0</div>
          <div class="stat-card__trend">오전 퇴원 예정 병상</div>
        </div>
        <div class="stat-card stat-card--gray">
          <div class="stat-card__label"><span class="dot"></span>퇴원완료</div>
          <div class="stat-card__value" th:text="${completedCount}">0</div>
          <div class="stat-card__trend">입원 가능 처리</div>
        </div>
      </div>

      <div class="dn-grid">
        <section class="dn-panel">
          <div class="dn-panel__head">
            <div class="dn-panel__title">퇴원예고 목록</div>
            <div class="dn-panel__hint" th:text="|${targetDate} 기준|">오늘 기준</div>
          </div>
          <div class="dn-panel__body">
            <form class="dn-toolbar" method="get" th:action="@{/room-board/discharge-notice}">
              <label class="field__label" for="date">조회일</label>
              <input id="date" class="input" style="width:160px;" type="date" name="date" th:value="${targetDate}">
              <button class="btn btn--outline" type="submit"><svg><use href="#i-search"/></svg>조회</button>
              <div class="dn-toolbar__spacer"></div>
            </form>

            <div class="table-wrap" style="border-radius:var(--radius-lg);">
              <table class="table">
                <thead>
                <tr>
                  <th>병실</th>
                  <th>환자명</th>
                  <th>퇴원예정</th>
                  <th>상태</th>
                  <th>입원 가능 판단</th>
                  <th>비고</th>
                  <th class="col-right" th:if="${canManageRoomBoard}">처리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="n : ${notices}">
                  <td>
                    <strong th:text="${n.room_name}">301호</strong>
                    <span class="field__hint" th:if="${n.ward_name != null and n.ward_name != ''}" th:text="| · ${n.ward_name}|"> · 3병동</span>
                  </td>
                  <td th:text="${n.patient_name}">홍길동</td>
                  <td>
                    <span th:text="${n.discharge_date}">2026-04-27</span>
                    <span th:text="| ${n.timeLabel}|"> 오전</span>
                  </td>
                  <td>
                    <span class="dn-badge"
                          th:classappend="${n.status == 'COMPLETED' ? ' dn-badge--done' : (n.status == 'CANCELLED' ? ' dn-badge--cancel' : ' dn-badge--planned')}"
                          th:text="${n.statusLabel}">퇴원예정</span>
                  </td>
                  <td>
                    <span class="dn-availability"
                          th:classappend="${n.availabilityLabel == '익일 입원 권장' or n.availabilityLabel == '병상 변동 없음'} ? ' is-muted' : ''"
                          th:text="${n.availabilityLabel}">오후 입원 가능</span>
                  </td>
                  <td><div class="dn-note" th:text="${n.note}">비고</div></td>
                  <td class="col-right" th:if="${canManageRoomBoard}">
                    <form method="post" th:action="@{/room-board/discharge-notice/status}" style="display:inline-flex; gap:6px;">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                      <input type="hidden" name="noticeId" th:value="${n.rbdn_id}">
                      <input type="hidden" name="date" th:value="${targetDate}">
                      <button class="btn btn--outline" type="submit" name="status" value="COMPLETED">완료</button>
                      <button class="btn btn--ghost" type="submit" name="status" value="CANCELLED">취소</button>
                    </form>
                  </td>
                </tr>
                </tbody>
              </table>
              <div class="dn-empty" th:if="${#lists.isEmpty(notices)}">선택한 날짜의 퇴원예고가 없습니다.</div>
            </div>
          </div>
        </section>

        <aside class="dn-panel">
          <div class="dn-panel__head">
            <div class="dn-panel__title">퇴원예고 등록</div>
            <div class="dn-panel__hint">최신 병실 스냅샷 기준</div>
          </div>
          <div class="dn-panel__body">
            <div class="dn-empty" th:if="${!canManageRoomBoard}">병실현황판 관리 권한이 있어야 등록할 수 있습니다.</div>
            <form class="dn-form" method="post" th:if="${canManageRoomBoard}" th:action="@{/room-board/discharge-notice/save}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <div class="field">
                <label class="field__label" for="rbpId">재원 환자</label>
                <select id="rbpId" class="select" name="rbpId" required>
                  <option value="">환자를 선택하세요</option>
                  <option th:each="p : ${currentPatients}"
                          th:value="${p.rbp_id}"
                          th:text="${p.room_name + ' · ' + p.patient_name + (p.ward_name != null and p.ward_name != '' ? ' · ' + p.ward_name : '')}">
                    301호 · 홍길동
                  </option>
                </select>
                <div class="field__hint">병실현황판에 업로드된 최신 스냅샷의 환자 목록입니다.</div>
              </div>
              <div class="field">
                <label class="field__label" for="dischargeDate">퇴원 예정일</label>
                <input id="dischargeDate" class="input" type="date" name="dischargeDate" th:value="${targetDate}" required>
              </div>
              <div class="field">
                <label class="field__label" for="dischargeTime">퇴원 시간대</label>
                <select id="dischargeTime" class="select" name="dischargeTime">
                  <option value="AM">오전 퇴원 · 당일 오후 입원 가능</option>
                  <option value="PM">오후 퇴원 · 익일 입원 권장</option>
                </select>
              </div>
              <div class="field">
                <label class="field__label" for="note">비고</label>
                <textarea id="note" class="textarea" name="note" rows="4" placeholder="퇴원 사유, 이송 일정, 보호자 확인 내용"></textarea>
              </div>
              <div class="dn-actions">
                <button class="btn btn--primary" type="submit"><svg><use href="#i-plus"/></svg>등록</button>
              </div>
            </form>
          </div>
        </aside>
      </div>
    </div>
  </main>
</div>

<script th:src="@{/assets/js/app.js}"></script>
<script th:src="@{/assets/js/chrome.js}" data-page="discharge" th:attr="data-ctx=@{/}"></script>
<script>
  document.addEventListener('turbo:load', () => { MPChrome.mount({ parent: '상담 업무', current: '퇴원예고' }); }, { once: true });
</script>
<script data-turbo-eval="false" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@7.3.0/dist/turbo.es2017-umd.js"></script>
<script data-turbo-eval="false" defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediPlat · 상담리스트</title>
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/role-management.css" />
  <link rel="stylesheet" href="assets/css/tweaks.css" />
</head>
<body>
<script src="assets/js/sprite.js"></script>

<div class="app"
     data-screen-label="Consultation List"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page" x-data="listPage()">
      <div class="page__header">
        <div>
          <h1 class="page__title">상담리스트</h1>
          <p class="page__subtitle">우선순위 대기 상담과 전체 상담 기록을 관리합니다</p>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn--outline"><svg><use href="#i-download"/></svg>엑셀 내보내기</button>
          <button class="btn btn--primary"><svg><use href="#i-plus"/></svg>신규 상담</button>
        </div>
      </div>

      <!-- Search bar -->
      <div class="search-bar">
        <select class="select"><option>전체기간</option><option>오늘</option><option>이번주</option><option>이번달</option></select>
        <input type="date" class="input" value="2026-04-16" />
        <span class="search-bar__to">—</span>
        <input type="date" class="input" value="2026-04-23" />
        <select class="select"><option>전체 상태</option><option>접수</option><option>진행중</option><option>완료</option></select>
        <select class="select"><option>전체 경로</option><option>전화</option><option>방문</option><option>홈페이지</option></select>
        <input type="text" class="input" placeholder="환자명, 보호자명, 전화번호, 상담내용 검색" />
        <label class="search-bar__check"><input type="checkbox" checked />완료 합계 포함</label>
        <button class="btn btn--primary" style="height:34px;"><svg><use href="#i-search"/></svg>검색</button>
      </div>

      <!-- Priority queue -->
      <div class="section-head">
        <span class="section-head__title">상담 접수 대기</span>
        <span class="badge badge--warn">우선순위순</span>
        <span class="section-head__hint" x-text="queue.length + '건 대기'"></span>
        <div style="flex:1"></div>
        <button class="btn-xs"><svg><use href="#i-refresh"/></svg>새로고침</button>
        <button class="btn-xs btn-xs--brand">접수 관리</button>
      </div>

      <div class="queue">
        <template x-for="(q, i) in queue" :key="q.id">
          <div class="queue-card">
            <div class="queue-card__head">
              <span class="prio" :class="'prio--' + q.prio" x-text="'P' + q.prio"></span>
              <span class="queue-card__name" x-text="q.name"></span>
            </div>
            <div class="queue-card__phone" x-text="q.phone"></div>
            <div class="queue-card__time" x-text="q.time"></div>
            <div class="queue-card__actions">
              <button class="btn-xs btn-xs--brand" style="flex:1;justify-content:center;">상세보기</button>
            </div>
          </div>
        </template>
      </div>

      <!-- Records table -->
      <div class="section-head">
        <span class="section-head__title">상담 기록 목록</span>
        <span class="section-head__hint" x-text="records.length + '건'"></span>
        <div style="flex:1"></div>
        <div class="filter-pills">
          <button class="pill is-active">전체 <span class="pill__count">12</span></button>
          <button class="pill">오늘</button>
          <button class="pill">미완료</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" /></th>
              <th>상담일</th><th>환자명</th><th>잠재고객</th><th>보호자전화번호</th>
              <th>상담유입경로</th><th>연락처</th><th>보호자명</th><th class="col-center">관계</th>
              <th>상담결과</th><th>상담자</th><th>상병명</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="r in records" :key="r.id">
              <tr :class="{ 'is-selected': r.selected }">
                <td><input type="checkbox" :checked="r.selected" /></td>
                <td class="col-num" x-text="r.date"></td>
                <td>
                  <div class="av">
                    <span x-text="r.patient"></span>
                    <template x-if="r.tag"><span class="av__circle" :style="{ background: r.tagColor }" x-text="r.tag"></span></template>
                  </div>
                </td>
                <td>
                  <template x-if="r.lead"><span class="av__circle" :style="{ background: r.leadColor, width:'18px', height:'18px', fontSize:'9px' }" x-text="r.lead"></span></template>
                </td>
                <td class="col-num" x-text="r.phone"></td>
                <td x-text="r.route || '—'"></td>
                <td x-text="r.contact || '—'"></td>
                <td x-text="r.guardian || '—'"></td>
                <td class="col-center" x-text="r.rel || '—'"></td>
                <td><span class="status" :class="'status--' + r.statusType" x-text="r.status"></span></td>
                <td x-text="r.counselor"></td>
                <td>
                  <template x-for="(t, i) in (r.tags || [])" :key="i">
                    <span class="tag-chip" x-text="t"></span>
                  </template>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Footer bar -->
      <div class="footer-bar">
        <button class="btn btn--ghost">환자정보삭제</button>
        <button class="btn btn--outline"><svg><use href="#i-send"/></svg>일괄 문자 보내기</button>
        <button class="btn btn--outline">상담 접수</button>
        <button class="btn btn--primary"><svg><use href="#i-plus"/></svg>신규상담</button>
      </div>

    </div>
  </main>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/chrome.js" data-page="list"></script>
<script>
  document.addEventListener('alpine:init', () => { MPChrome.mount({ parent: '상담 업무', current: '상담리스트' }); });
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>

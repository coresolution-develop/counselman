<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediPlat · 공지사항</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/role-management.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/datepicker.css}" />
</head>
<body>
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="Notices"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page">
      <div class="page__header">
        <div>
          <h1 class="page__title">공지사항</h1>
          <p class="page__subtitle">내부 공지와 시스템 점검 안내를 모아 봅니다</p>
        </div>
        <button class="btn btn--primary"><svg><use href="#i-plus"/></svg>공지 작성</button>
      </div>

      <!-- Stats -->
      <div class="stat-row">
        <div class="stat-card stat-card--brand">
          <div class="stat-card__label"><span class="dot"></span>전체 공지</div>
          <div class="stat-card__value">2</div>
        </div>
        <div class="stat-card stat-card--gray">
          <div class="stat-card__label"><span class="dot"></span>미게시 공지</div>
          <div class="stat-card__value">0</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="filter-pills">
          <button class="pill is-active">전체</button>
          <button class="pill">고정</button>
          <button class="pill">적용 <span class="pill__count">2</span></button>
          <button class="pill">임시저장</button>
        </div>
        <div class="toolbar__spacer"></div>
        <div class="header__search" style="height:34px; min-width:240px;">
          <svg><use href="#i-search"/></svg>
          <input type="text" placeholder="제목 검색" />
        </div>
      </div>

      <!-- Feed -->
      <div class="notice-feed">
        <div class="notice-item is-pinned">
          <div class="notice-item__head">
            <div class="notice-item__tags">
              <span class="tag tag--applied">적용</span>
              <span class="tag tag--fixed">고정</span>
            </div>
            <span class="notice-item__title">tt</span>
            <span class="notice-item__time">2026-04-14 17:46:48</span>
            <button class="btn-xs"><svg><use href="#i-edit"/></svg></button>
          </div>
          <div class="notice-item__body">tt</div>
        </div>

        <div class="notice-item">
          <div class="notice-item__head">
            <div class="notice-item__tags">
              <span class="tag tag--applied">적용</span>
            </div>
            <span class="notice-item__title">안녕 하세요. 4월 22일 10시에 사용교육이 있을 예정입니다.</span>
            <span class="notice-item__time">2026-04-23 00:25:36</span>
            <button class="btn-xs"><svg><use href="#i-edit"/></svg></button>
          </div>
          <div class="notice-item__body">PM 이세요 4월 22일 10시 사용교육이 있을 예정입니다.</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script th:src="@{/assets/js/app.js}"></script>
<script th:src="@{/assets/js/datepicker.js}"></script>
<script th:src="@{/assets/js/chrome.js}" data-page="notice" th:attr="data-ctx=@{/}"></script>
<script>
  document.addEventListener('alpine:init', () => { MPChrome.mount({ parent: '상담 업무', current: '공지사항' }); });
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="_csrf"        th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>MediPlat · 사용자 관리</title>

  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/role-management.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/datepicker.css}" />
  <style>
    /* ===== User Management – scoped styles ===== */
    .um-grid { display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 20px; align-items: start; }
    @media (max-width: 1180px) { .um-grid { grid-template-columns: 1fr; } }

    .um-hero {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 20px;
      padding: 22px 24px;
      border-radius: var(--radius-lg);
      background:
        radial-gradient(1200px 200px at 90% 0%, color-mix(in oklab, var(--brand-500) 10%, transparent), transparent 60%),
        linear-gradient(180deg, #fff 0%, var(--gray-50) 100%);
      border: 1px solid var(--border-default);
      overflow: hidden;
    }
    .um-hero__eyebrow { font-size: 11px; font-weight: 600; color: var(--brand-700); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .um-hero__title { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.015em; margin-bottom: 4px; }
    .um-hero__sub { font-size: 13px; color: var(--text-secondary); }
    .um-hero__stats { display: flex; gap: 10px; }
    .um-chip { min-width: 72px; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border-default); background: #fff; text-align: center; }
    .um-chip--brand { background: color-mix(in oklab, var(--brand-500) 8%, #fff); border-color: color-mix(in oklab, var(--brand-500) 25%, var(--border-default)); }
    .um-chip--mute { background: var(--gray-50); }
    .um-chip__val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-primary); letter-spacing: -0.02em; }
    .um-chip--brand .um-chip__val { color: var(--brand-700); }
    .um-chip__lbl { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    .um-toolbar { display: flex; align-items: center; gap: 10px; margin: 16px 0 10px; flex-wrap: wrap; }
    .um-search { flex: 1; min-width: 260px; position: relative; }
    .um-search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text-tertiary); }
    .um-search input { width: 100%; height: 38px; padding: 0 14px 0 36px; border: 1px solid var(--border-default); border-radius: 10px; background: #fff; font-size: 13px; transition: all .15s; }
    .um-search input:focus { border-color: var(--brand-400); box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand-500) 14%, transparent); outline: none; }

    .um-list {
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      background: #fff;
      overflow: hidden;
    }
    .um-list__head {
      display: grid;
      grid-template-columns: minmax(160px, 2fr) minmax(110px, 1.6fr) minmax(88px, 1fr) minmax(0, 1.6fr) 110px 40px;
      gap: 12px;
      padding: 12px 18px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: .05em;
      background: var(--gray-50);
      border-bottom: 1px solid var(--border-default);
    }
    .um-row {
      display: grid;
      grid-template-columns: minmax(160px, 2fr) minmax(110px, 1.6fr) minmax(88px, 1fr) minmax(0, 1.6fr) 110px 40px;
      gap: 12px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background .12s;
    }
    @media (max-width: 880px) {
      .um-list__head, .um-row { grid-template-columns: minmax(140px, 2fr) minmax(0, 1.2fr) 88px 100px 30px; }
      .um-list__head > :nth-child(4), .um-row > .um-email { display: none; }
    }
    .um-row:last-child { border-bottom: 0; }
    .um-row:hover { background: var(--gray-50); }
    .um-row.is-active { background: color-mix(in oklab, var(--brand-500) 6%, transparent); }
    .um-row.is-active::before { content:""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--brand-500); }
    .um-row { position: relative; }

    .um-user { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .um-avatar { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 14px; flex: 0 0 auto; box-shadow: inset 0 0 0 1px rgba(255,255,255,.25); }
    .um-user__meta { min-width: 0; }
    .um-user__name { font-weight: 600; font-size: 13.5px; color: var(--text-primary); letter-spacing: -0.01em; }
    .um-user__id { font-size: 11px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }

    .um-dept { font-size: 13px; color: var(--text-primary); }
    .um-dept__rank { display: block; font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .um-email { font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .um-role { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: -0.005em; }
    .um-role--admin    { background: #fef3c7; color: #92400e; }
    .um-role--super    { background: #ede9fe; color: #6d28d9; }
    .um-role--staff    { background: #dbeafe; color: #1e40af; }
    .um-role--counsel  { background: color-mix(in oklab, var(--brand-500) 14%, #fff); color: var(--brand-700); }

    .um-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
    .um-status::before { content: ""; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .um-status--active::before { background: var(--success, #10b981); box-shadow: 0 0 0 3px color-mix(in oklab, var(--success, #10b981) 20%, transparent); }
    .um-status--active { color: var(--success, #10b981); }
    .um-status--pause::before  { background: #f59e0b; }
    .um-status--pause { color: #b45309; }
    .um-status--off::before    { background: var(--gray-400); }
    .um-status--off { color: var(--text-tertiary); }

    .um-more { justify-self: end; width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; border: 1px solid transparent; color: var(--text-tertiary); }
    .um-more:hover { background: #fff; border-color: var(--border-default); color: var(--text-primary); }

    /* ===== Detail side panel ===== */
    .um-side {
      position: sticky;
      top: 16px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      background: #fff;
      overflow: hidden;
    }
    .um-side__cover {
      position: relative;
      padding: 22px 22px 18px;
      background: linear-gradient(135deg, color-mix(in oklab, var(--brand-500) 92%, #000) 0%, var(--brand-500) 60%, color-mix(in oklab, var(--brand-500) 70%, #22d3ee) 100%);
      color: #fff;
    }
    .um-side__cover::after { content:""; position: absolute; inset: 0; background: radial-gradient(400px 200px at 100% 0%, rgba(255,255,255,.2), transparent 55%); pointer-events:none; }
    .um-side__avatar { width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center; font-size: 22px; font-weight: 700; background: rgba(255,255,255,.22); border: 2px solid rgba(255,255,255,.4); backdrop-filter: blur(4px); }
    .um-side__name { margin-top: 14px; font-size: 20px; font-weight: 700; letter-spacing: -0.015em; display: flex; align-items: center; gap: 8px; }
    .um-side__name .badge { background: rgba(255,255,255,.2); color: #fff; }
    .um-side__id { font-size: 12px; opacity: .85; margin-top: 2px; font-variant-numeric: tabular-nums; }

    .um-side__body { padding: 18px 22px 22px; }
    .um-field { display: grid; grid-template-columns: 88px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px dashed var(--border-subtle); align-items: start; }
    .um-field:last-of-type { border-bottom: 0; }
    .um-field__label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; padding-top: 2px; }
    .um-field__value { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .um-field__value .sub { display: block; font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin-top: 2px; font-variant-numeric: tabular-nums; }

    .um-side__perms { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .um-side__perm { padding: 4px 9px; border-radius: 6px; background: var(--gray-100); font-size: 11px; color: var(--text-secondary); }

    .um-side__actions { display: flex; gap: 8px; padding: 14px 22px; background: var(--gray-50); border-top: 1px solid var(--border-subtle); }
    .um-side__actions .btn { flex: 1; justify-content: center; }

    /* status filter tabs */
    .um-tabs { display: flex; gap: 4px; padding: 4px; background: var(--gray-100); border-radius: 10px; }
    .um-tabs button { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-secondary); background: transparent; transition: all .12s; }
    .um-tabs button.is-active { background: #fff; color: var(--text-primary); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .um-tabs .count { font-variant-numeric: tabular-nums; opacity: .6; margin-left: 4px; }

    .um-empty { padding: 48px 24px; text-align: center; color: var(--text-tertiary); font-size: 13px; }

    /* ===== Modals ===== */
    .um-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45); backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .um-modal {
      background: #fff; border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,.22);
      width: 100%; max-width: 520px;
      overflow: hidden;
    }
    .um-modal--sm { max-width: 380px; }
    .um-modal__head {
      display: flex; align-items: center; gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .um-modal__head-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: grid; place-items: center;
      background: color-mix(in oklab, var(--brand-500) 10%, #fff);
      color: var(--brand-600);
    }
    .um-modal__head-icon svg { width: 20px; height: 20px; }
    .um-modal__title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .um-modal__body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .um-modal__footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 24px; background: var(--gray-50); border-top: 1px solid var(--border-subtle); }

    .um-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .um-form-group { display: flex; flex-direction: column; gap: 5px; }
    .um-form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .um-form-group input, .um-form-group select { height: 38px; padding: 0 12px; border: 1px solid var(--border-default); border-radius: 8px; font-size: 13px; background: #fff; transition: all .15s; }
    .um-form-group input:focus, .um-form-group select:focus { border-color: var(--brand-400); box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand-500) 14%, transparent); outline: none; }
    .um-form-group--full { grid-column: 1 / -1; }
    .um-form-err { font-size: 12px; color: #ef4444; padding: 8px 12px; border-radius: 8px; background: #fef2f2; border: 1px solid #fecaca; }

    .um-pw-box { background: var(--gray-50); border: 1px dashed var(--border-default); border-radius: 10px; padding: 16px; text-align: center; }
    .um-pw-box__label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
    .um-pw-box__value { font-size: 22px; font-weight: 700; font-family: monospace; letter-spacing: .12em; color: var(--text-primary); }
    .um-pw-box__copy { margin-top: 10px; font-size: 12px; color: var(--brand-600); cursor: pointer; }
  </style>
</head>
<body>
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="User Management"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page" x-data="userMgmt()">

      <!-- Page header -->
      <div class="page__header">
        <div>
          <h1 class="page__title">관리자 설정</h1>
          <p class="page__subtitle">사용자와 역할을 관리하고 시스템 권한을 제어합니다</p>
        </div>
      </div>

      <!-- Admin sub-tabs -->
      <div class="tabs" role="tablist">
        <button class="tab is-active" role="tab" aria-selected="true">
          <svg><use href="#i-users"/></svg>
          사용자 관리
        </button>
        <a class="tab" th:href="@{/roles}" role="tab">
          <svg><use href="#i-shield"/></svg>
          역할 관리
        </a>
        <a class="tab" th:href="@{/access}" role="tab">
          <svg><use href="#i-key"/></svg>
          CSM 접근 권한
        </a>
        <a class="tab" th:href="@{/admin/room-board}" role="tab">
          <svg><use href="#i-bed"/></svg>
          병실현황판 관리
        </a>
      </div>

      <!-- Loading skeleton -->
      <template x-if="loading">
        <div style="padding:48px;text-align:center;color:var(--text-tertiary);font-size:13px;">
          <svg style="width:20px;height:20px;animation:spin 1s linear infinite;margin-bottom:8px;display:block;margin-inline:auto"><use href="#i-refresh"/></svg>
          불러오는 중...
        </div>
      </template>

      <div x-show="!loading">

      <!-- Hero -->
      <div class="um-hero">
        <div>
          <div class="um-hero__eyebrow">관리자 설정</div>
          <h1 class="um-hero__title">사용자 관리</h1>
          <p class="um-hero__sub">기관의 사용자 계정과 역할 · 상태를 한 곳에서 관리합니다</p>
        </div>
        <div class="um-hero__stats">
          <div class="um-chip"><div class="um-chip__val" x-text="users.length"></div><div class="um-chip__lbl">전체</div></div>
          <div class="um-chip um-chip--brand"><div class="um-chip__val" x-text="users.filter(u=>u.status==='active').length"></div><div class="um-chip__lbl">사용중</div></div>
          <div class="um-chip um-chip--mute"><div class="um-chip__val" x-text="users.filter(u=>u.status!=='active').length"></div><div class="um-chip__lbl">사용중지</div></div>
        </div>
        <button class="btn btn--primary" style="height:40px;" @click="openAdd()">
          <svg><use href="#i-user-plus"/></svg>
          새 사용자
        </button>
      </div>

      <!-- Toolbar -->
      <div class="um-toolbar">
        <div class="um-tabs">
          <button :class="{'is-active': tab==='all'}" @click="tab='all'">전체<span class="count" x-text="users.length"></span></button>
          <button :class="{'is-active': tab==='active'}" @click="tab='active'">사용중<span class="count" x-text="users.filter(u=>u.status==='active').length"></span></button>
          <button :class="{'is-active': tab==='pause'}" @click="tab='pause'">일시정지<span class="count" x-text="users.filter(u=>u.status==='pause').length"></span></button>
          <button :class="{'is-active': tab==='off'}" @click="tab='off'">사용중지<span class="count" x-text="users.filter(u=>u.status==='off').length"></span></button>
        </div>
        <select class="select" x-model="roleFilter" style="height:38px;">
          <option value="">전체 역할</option>
          <template x-for="r in dbRoles" :key="r.role_id">
            <option :value="String(r.role_id)" x-text="r.role_name"></option>
          </template>
        </select>
        <div class="um-search">
          <svg><use href="#i-search"/></svg>
          <input type="text" placeholder="이름, 사번, 이메일로 검색" x-model="q" />
        </div>
      </div>

      <!-- Split: list + detail -->
      <div class="um-grid">

        <div>
          <div class="um-list">
            <div class="um-list__head">
              <div>사용자</div>
              <div>부서 · 직급</div>
              <div>역할</div>
              <div>이메일</div>
              <div>상태</div>
              <div></div>
            </div>

            <template x-for="u in visible" :key="u.id">
              <div class="um-row" :class="{ 'is-active': selected === u.id }" @click="selected = u.id">
                <div class="um-user">
                  <span class="um-avatar" :style="{ background: u.color }" x-text="u.initial"></span>
                  <div class="um-user__meta">
                    <div class="um-user__name" x-text="u.name"></div>
                    <div class="um-user__id" x-text="u.employeeId"></div>
                  </div>
                </div>
                <div class="um-dept">
                  <span x-text="u.dept"></span>
                  <span class="um-dept__rank" x-text="u.rank"></span>
                </div>
                <div>
                  <span class="um-role" :class="'um-role--' + u.role" x-text="roleLabel(u.role)"></span>
                </div>
                <div class="um-email" x-text="u.email"></div>
                <div>
                  <span class="um-status" :class="'um-status--' + u.status" x-text="statusLabel(u.status)"></span>
                </div>
                <button class="um-more" aria-label="more" @click.stop>
                  <svg><use href="#i-chevron-right"/></svg>
                </button>
              </div>
            </template>

            <template x-if="visible.length === 0">
              <div class="um-empty">검색 결과가 없습니다</div>
            </template>
          </div>
        </div>

        <!-- Detail side panel -->
        <aside class="um-side" x-show="current">
          <div class="um-side__cover">
            <div class="um-side__avatar" x-text="current?.initial"></div>
            <div class="um-side__name">
              <span x-text="current?.name"></span>
              <span class="badge" x-text="roleLabel(current?.role)"></span>
            </div>
            <div class="um-side__id" x-text="(current?.employeeId || '') + ' · ' + (current?.dept || '')"></div>
          </div>
          <div class="um-side__body">
            <div class="um-field">
              <span class="um-field__label">이메일</span>
              <span class="um-field__value" x-text="current?.email || '—'"></span>
            </div>
            <div class="um-field">
              <span class="um-field__label">부서</span>
              <span class="um-field__value">
                <span x-text="current?.dept || '—'"></span>
                <span class="sub" x-text="current?.rank"></span>
              </span>
            </div>
            <div class="um-field">
              <span class="um-field__label">전화</span>
              <span class="um-field__value" x-text="current?.phone || '—'"></span>
            </div>
            <div class="um-field">
              <span class="um-field__label">상태</span>
              <span class="um-field__value">
                <span class="um-status" :class="'um-status--' + current?.status" x-text="statusLabel(current?.status)"></span>
              </span>
            </div>
            <div class="um-field">
              <span class="um-field__label">역할</span>
              <div class="um-field__value">
                <template x-if="userRoles.length === 0">
                  <span style="color:var(--text-tertiary)">—</span>
                </template>
                <div class="um-side__perms">
                  <template x-for="r in userRoles" :key="r.role_id">
                    <span class="um-side__perm" x-text="r.role_name"></span>
                  </template>
                </div>
              </div>
            </div>
          </div>
          <div class="um-side__actions">
            <button class="btn btn--outline" @click="openResetPw()">
              <svg><use href="#i-refresh"/></svg>비밀번호 초기화
            </button>
            <button class="btn btn--primary" @click="openEdit()">
              <svg><use href="#i-edit"/></svg>정보 수정
            </button>
          </div>
        </aside>

      </div>

      <!-- ====== Add User Modal ====== -->
      <div class="um-overlay" x-show="showAdd" x-cloak @click.self="showAdd=false" style="display:none">
        <div class="um-modal">
          <div class="um-modal__head">
            <div class="um-modal__head-icon"><svg><use href="#i-user-plus"/></svg></div>
            <div class="um-modal__title">새 사용자 추가</div>
          </div>
          <div class="um-modal__body">
            <template x-if="addError">
              <div class="um-form-err" x-text="addError"></div>
            </template>
            <div class="um-form-row">
              <div class="um-form-group">
                <label>이름 <span style="color:#ef4444">*</span></label>
                <input type="text" x-model="addForm.name" placeholder="홍길동" />
              </div>
              <div class="um-form-group">
                <label>아이디 <span style="color:#ef4444">*</span></label>
                <input type="text" x-model="addForm.loginId" placeholder="user123" autocomplete="off"/>
              </div>
            </div>
            <div class="um-form-row">
              <div class="um-form-group">
                <label>비밀번호 <span style="color:#ef4444">*</span></label>
                <input type="password" x-model="addForm.password" placeholder="••••••••" autocomplete="new-password"/>
              </div>
              <div class="um-form-group">
                <label>역할</label>
                <select x-model="addForm.roleId">
                  <option :value="null">역할 없음</option>
                  <template x-for="r in dbRoles" :key="r.role_id">
                    <option :value="r.role_id" x-text="r.role_name"></option>
                  </template>
                </select>
              </div>
            </div>
            <div class="um-form-row">
              <div class="um-form-group">
                <label>부서</label>
                <input type="text" x-model="addForm.dept" placeholder="상담팀" />
              </div>
              <div class="um-form-group">
                <label>직급</label>
                <input type="text" x-model="addForm.rank" placeholder="팀장" />
              </div>
            </div>
            <div class="um-form-row">
              <div class="um-form-group">
                <label>이메일</label>
                <input type="email" x-model="addForm.email" placeholder="user@example.com" />
              </div>
              <div class="um-form-group">
                <label>연락처</label>
                <input type="tel" x-model="addForm.phone" placeholder="010-0000-0000" />
              </div>
            </div>
          </div>
          <div class="um-modal__footer">
            <button class="btn btn--outline" @click="showAdd=false" :disabled="addLoading">취소</button>
            <button class="btn btn--primary" @click="submitAdd()" :disabled="addLoading">
              <template x-if="addLoading"><svg style="width:14px;height:14px;animation:spin 1s linear infinite"><use href="#i-refresh"/></svg></template>
              사용자 추가
            </button>
          </div>
        </div>
      </div>

      <!-- ====== Edit User Modal ====== -->
      <div class="um-overlay" x-show="showEdit" x-cloak @click.self="showEdit=false" style="display:none">
        <div class="um-modal">
          <div class="um-modal__head">
            <div class="um-modal__head-icon"><svg><use href="#i-edit"/></svg></div>
            <div class="um-modal__title">사용자 정보 수정</div>
          </div>
          <div class="um-modal__body">
            <div class="um-form-row">
              <div class="um-form-group">
                <label>이름</label>
                <input type="text" x-model="editForm.name" />
              </div>
              <div class="um-form-group">
                <label>역할</label>
                <select x-model="editForm.roleId">
                  <option :value="null">변경 없음</option>
                  <template x-for="r in dbRoles" :key="r.role_id">
                    <option :value="r.role_id" x-text="r.role_name"></option>
                  </template>
                </select>
              </div>
            </div>
            <div class="um-form-row">
              <div class="um-form-group">
                <label>부서</label>
                <input type="text" x-model="editForm.dept" />
              </div>
              <div class="um-form-group">
                <label>직급</label>
                <input type="text" x-model="editForm.rank" />
              </div>
            </div>
            <div class="um-form-row">
              <div class="um-form-group">
                <label>이메일</label>
                <input type="email" x-model="editForm.email" />
              </div>
              <div class="um-form-group">
                <label>연락처</label>
                <input type="tel" x-model="editForm.phone" />
              </div>
            </div>
            <div class="um-form-row">
              <div class="um-form-group">
                <label>상태</label>
                <select x-model="editForm.status">
                  <option value="y">사용중</option>
                  <option value="n">사용중지</option>
                </select>
              </div>
            </div>
          </div>
          <div class="um-modal__footer">
            <button class="btn btn--outline" @click="showEdit=false" :disabled="editLoading">취소</button>
            <button class="btn btn--primary" @click="submitEdit()" :disabled="editLoading">저장</button>
          </div>
        </div>
      </div>

      <!-- ====== Reset Password Modal ====== -->
      <div class="um-overlay" x-show="showResetPw" x-cloak @click.self="if(!tempPw) showResetPw=false" style="display:none">
        <div class="um-modal um-modal--sm">
          <div class="um-modal__head">
            <div class="um-modal__head-icon"><svg><use href="#i-refresh"/></svg></div>
            <div class="um-modal__title">비밀번호 초기화</div>
          </div>
          <div class="um-modal__body">
            <template x-if="!tempPw">
              <div style="font-size:13px;color:var(--text-secondary);line-height:1.6">
                <strong x-text="current?.name"></strong> 님의 비밀번호를 초기화하고 임시 비밀번호를 발급합니다.<br/>
                계속하시겠습니까?
              </div>
            </template>
            <template x-if="tempPw">
              <div>
                <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">임시 비밀번호가 발급되었습니다. 사용자에게 전달해 주세요.</div>
                <div class="um-pw-box">
                  <div class="um-pw-box__label">임시 비밀번호</div>
                  <div class="um-pw-box__value" x-text="tempPw"></div>
                  <div class="um-pw-box__copy" @click="copyTempPw()">클립보드에 복사</div>
                </div>
              </div>
            </template>
          </div>
          <div class="um-modal__footer">
            <template x-if="!tempPw">
              <button class="btn btn--outline" @click="showResetPw=false">취소</button>
            </template>
            <template x-if="!tempPw">
              <button class="btn btn--primary" @click="confirmResetPw()" :disabled="resetPwLoading">초기화</button>
            </template>
            <template x-if="tempPw">
              <button class="btn btn--primary" @click="showResetPw=false; tempPw=null">닫기</button>
            </template>
          </div>
        </div>
      </div>

      </div><!-- /x-show="!loading" -->

    </div>
  </main>
</div>

<script th:inline="javascript">
var _users = /*[[${usersJson}]]*/ '[]';
var _ctx   = /*[[@{/}]]*/ '/';

function userMgmt() {
  const dbUsers = (() => { try { return JSON.parse(_users); } catch(e) { return []; } })();

  function csrfHeaders() {
    const token  = document.querySelector('meta[name="_csrf"]')?.content;
    const header = document.querySelector('meta[name="_csrf_header"]')?.content;
    return (token && header) ? { [header]: token } : {};
  }

  return {
    loading: true,
    q: '', tab: 'all', roleFilter: '', selected: null,
    users: dbUsers,

    // DB에서 로드한 역할 목록
    dbRoles: [],
    // 선택된 사용자의 RBAC 역할 목록
    userRoles: [],

    // Add modal
    showAdd: false,
    addForm: { name:'', loginId:'', password:'', orgName:'', dept:'', rank:'', email:'', phone:'', roleId: null },
    addLoading: false,
    addError: '',

    // Edit modal
    showEdit: false,
    editForm: { name:'', dept:'', rank:'', email:'', phone:'', status:'y', roleId: null },
    editLoading: false,

    // Reset PW modal
    showResetPw: false,
    resetPwLoading: false,
    tempPw: null,

    async init() {
      try {
        await this.loadDbRoles();
        if (this.users.length) this.selected = this.users[0].id;
        if (this.selected) await this.loadUserRoles(this.selected);
      } finally {
        this.loading = false;
      }
      this.$watch('selected', async (id) => {
        if (id) await this.loadUserRoles(id);
        else this.userRoles = [];
      });
    },

    // ─── DB 역할 로드 ────────────────────────────
    async loadDbRoles() {
      try {
        const res = await fetch(_ctx + 'api/roles');
        if (res.ok) this.dbRoles = await res.json();
      } catch(e) {}
    },

    async loadUserRoles(userId) {
      try {
        const res = await fetch(_ctx + 'api/roles/user/' + userId);
        if (res.ok) this.userRoles = await res.json();
        else this.userRoles = [];
      } catch(e) { this.userRoles = []; }
    },

    get current() { return this.users.find(u => u.id === this.selected) || null; },
    get visible() {
      const q = this.q.trim().toLowerCase();
      return this.users.filter(u => {
        if (this.tab !== 'all' && u.status !== this.tab) return false;
        if (this.roleFilter && u.role !== this.roleFilter) return false;
        if (!q) return true;
        return (u.name + ' ' + u.email + ' ' + u.employeeId + ' ' + (u.dept||'')).toLowerCase().includes(q);
      });
    },

    roleLabel(r)   { return ({ admin:'관리자', super:'슈퍼바이저', staff:'실무진', counsel:'상담사' })[r] || r || ''; },
    statusLabel(s) { return ({ active:'사용중', pause:'일시정지', off:'사용중지' })[s] || ''; },

    // ─── Add user ─────────────────────────────
    openAdd() {
      const firstRoleId = this.dbRoles.length ? this.dbRoles[0].role_id : null;
      this.addForm = { name:'', loginId:'', password:'', orgName:'', dept:'', rank:'', email:'', phone:'', roleId: firstRoleId };
      this.addError = '';
      this.showAdd = true;
    },
    async submitAdd() {
      if (!this.addForm.name.trim() || !this.addForm.loginId.trim() || !this.addForm.password.trim()) {
        this.addError = '이름, 아이디, 비밀번호는 필수입니다.';
        return;
      }
      this.addLoading = true; this.addError = '';
      try {
        const res = await fetch(_ctx + 'api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...csrfHeaders() },
          body: JSON.stringify(this.addForm)
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { this.showAdd = false; window.location.reload(); }
        else this.addError = data.error || '사용자 추가에 실패했습니다.';
      } catch(e) {
        this.addError = '서버 오류가 발생했습니다.';
      } finally {
        this.addLoading = false;
      }
    },

    // ─── Edit user ─────────────────────────────
    openEdit() {
      if (!this.current) return;
      // 현재 배정된 첫 번째 역할의 role_id를 기본값으로
      const currentRoleId = this.userRoles.length ? this.userRoles[0].role_id : null;
      this.editForm = {
        name:   this.current.name   || '',
        dept:   this.current.dept   || '',
        rank:   this.current.rank   || '',
        email:  this.current.email  || '',
        phone:  this.current.phone  || '',
        status: this.current.status === 'active' ? 'y' : 'n',
        roleId: currentRoleId,
      };
      this.showEdit = true;
    },
    async submitEdit() {
      if (!this.current) return;
      this.editLoading = true;
      try {
        const res = await fetch(_ctx + 'api/users/' + this.current.id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', ...csrfHeaders() },
          body: JSON.stringify(this.editForm)
        });
        if (res.ok) { this.showEdit = false; window.location.reload(); }
      } finally {
        this.editLoading = false;
      }
    },

    // ─── Reset password ────────────────────────
    openResetPw() { this.tempPw = null; this.showResetPw = true; },
    async confirmResetPw() {
      if (!this.current) return;
      this.resetPwLoading = true;
      try {
        const res = await fetch(_ctx + 'api/users/' + this.current.id + '/reset-password', {
          method: 'POST',
          headers: csrfHeaders()
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) this.tempPw = data.tempPassword;
      } finally {
        this.resetPwLoading = false;
      }
    },
    copyTempPw() {
      if (this.tempPw) navigator.clipboard?.writeText(this.tempPw);
    },
  };
}
</script>

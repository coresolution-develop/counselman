<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>MediPlat · 서류관리</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/role-management.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <style>
    [x-cloak] { display: none !important; }

    /* ── 탭 ── */
    .doc-tabs {
      display: flex;
      border-bottom: 2px solid var(--border-default);
      margin-bottom: 20px;
    }
    .doc-tab {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      background: none;
      transition: color .15s, border-color .15s;
    }
    .doc-tab.is-active { color: var(--brand); border-bottom-color: var(--brand); }
    .doc-tab:hover:not(.is-active) { color: var(--text-primary); }

    /* ── 서약서 목록 ── */
    .doc-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .doc-toolbar .input { min-width: 280px; }
    .doc-summary {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      color: var(--text-secondary); font-size: 13px;
    }
    .doc-table-wrap { background: var(--surface); border: 1px solid var(--border-default); overflow: auto; }
    .doc-table th, .doc-table td { white-space: nowrap; vertical-align: middle; }
    .doc-patient { display: flex; flex-direction: column; gap: 2px; }
    .doc-patient strong { color: var(--text-primary); font-size: 13px; }
    .doc-patient span { color: var(--text-tertiary); font-size: 11px; }
    .doc-empty {
      padding: 48px 16px; text-align: center; color: var(--text-tertiary);
      background: var(--surface); border: 1px dashed var(--border-default);
    }

    /* ── 템플릿 관리 ── */
    .tpl-layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 800px) { .tpl-layout { grid-template-columns: 1fr; } }

    .tpl-sidebar { display: flex; flex-direction: column; gap: 10px; }
    .tpl-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: .06em; margin-top: 4px;
    }
    .tpl-preset-btn {
      display: block; width: 100%; text-align: left;
      padding: 9px 12px; border: 1px solid var(--border-default);
      border-radius: 6px; background: var(--surface);
      font-size: 13px; color: var(--text-primary); cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .tpl-preset-btn:hover { border-color: var(--brand); background: var(--surface-raised); }
    .tpl-preset-btn.is-muted { color: var(--text-tertiary); }

    .tpl-saved-list { display: flex; flex-direction: column; gap: 6px; }
    .tpl-saved-item {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; border: 1px solid var(--border-default);
      border-radius: 6px; background: var(--surface); font-size: 13px;
    }
    .tpl-saved-item.is-active { border-color: var(--brand); }
    .tpl-saved-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tpl-active-badge {
      font-size: 10px; padding: 1px 5px; border-radius: 4px;
      background: var(--brand); color: #fff; flex-shrink: 0;
    }

    .tpl-editor-panel { display: flex; flex-direction: column; gap: 12px; }

    /* ── 서류 종류 행 ── */
    .tpl-doctype-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--border-default);
      border-radius: 6px; flex-wrap: wrap;
    }
    .tpl-doctype-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
    .tpl-doctype-pills { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
    .tpl-doctype-pill {
      padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border-default); background: #fff; color: #374151;
      cursor: pointer; transition: background .12s, border-color .12s, color .12s;
    }
    .tpl-doctype-pill:hover { border-color: var(--brand); color: var(--brand); }
    .tpl-doctype-pill.is-active {
      background: #16a34a; border-color: #16a34a; color: #fff;
    }
    .tpl-doctype-custom { display: flex; align-items: center; gap: 4px; }
    .tpl-doctype-custom .input { height: 28px; font-size: 12px; padding: 0 8px; width: 130px; }

    .tpl-name-row { display: flex; align-items: center; gap: 8px; }
    .tpl-name-row .input { flex: 1; }
    /* ── TipTap 리치 에디터 ── */
    .tiptap-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
      padding: 6px 8px;
      border: 1px solid var(--border-default); border-bottom: 0;
      border-radius: 6px 6px 0 0; background: var(--surface);
    }
    .tiptap-tool-btn {
      height: 28px; min-width: 28px; padding: 0 8px;
      border: 1px solid transparent; border-radius: 4px;
      background: none; font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .tiptap-tool-btn:hover { background: var(--surface-raised); border-color: var(--border-default); }
    .tiptap-tool-btn.is-active { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
    .tiptap-tool-sep { width: 1px; height: 20px; background: var(--border-default); margin: 0 2px; flex-shrink: 0; }
    .tiptap-tool-select {
      height: 28px; padding: 0 6px; font-size: 12px;
      border: 1px solid var(--border-default); border-radius: 4px; background: #fff;
    }
    .tiptap-tool-color { height: 28px; width: 36px; padding: 2px; border: 1px solid var(--border-default); border-radius: 4px; cursor: pointer; }
    .tiptap-field-btn {
      height: 28px; padding: 0 10px; border-radius: 4px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      color: #1d4ed8; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .tiptap-field-btn:hover { background: #dbeafe; }
    .tiptap-field-menu {
      position: absolute; z-index: 200; background: #fff;
      border: 1px solid var(--border-default); border-radius: 6px;
      padding: 4px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
      min-width: 180px; top: 32px; left: 0;
    }
    .tiptap-field-menu-item {
      display: block; width: 100%; text-align: left; padding: 6px 10px;
      font-size: 13px; border: none; background: none; cursor: pointer; border-radius: 4px;
    }
    .tiptap-field-menu-item:hover { background: #f1f5f9; }
    .tiptap-editor-wrap {
      border: 1px solid var(--border-default); border-radius: 0 0 6px 6px;
      overflow-y: auto; max-height: 72vh;
      background: #f3f4f6; padding: 24px;
    }
    .ProseMirror {
      width: 794px; margin: 0 auto; background: #fff;
      padding: 60px 72px; min-height: 1040px;
      box-shadow: 0 1px 8px rgba(15,23,42,.12);
      font-size: 12pt; line-height: 1.8;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont,
                   'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      color: #222; outline: none;
    }
    .ProseMirror h1 { font-size: 18pt; font-weight: 700; margin: 0.4em 0; }
    .ProseMirror h2 { font-size: 15pt; font-weight: 700; margin: 0.4em 0; }
    .ProseMirror h3 { font-size: 13pt; font-weight: 600; margin: 0.3em 0; }
    .ProseMirror p { margin: 0 0 0.4em; }
    .ProseMirror table { border-collapse: collapse; width: 100%; margin: 8px 0; table-layout: fixed; }
    .ProseMirror table td, .ProseMirror table th {
      border: 1px solid #c7c7c7; padding: 8px 10px;
      vertical-align: top; min-width: 48px; position: relative;
    }
    .ProseMirror table th { background: #fafafa; font-weight: 600; text-align: center; }
    .ProseMirror .selectedCell::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(37,99,235,.12); pointer-events: none;
    }
    .tpl-save-row { display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
    .tpl-hint { font-size: 12px; color: var(--text-tertiary); flex: 1; }
    .tiptap-field-chip {
      display: inline-block; padding: 1px 8px; border-radius: 12px;
      background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd;
      font-size: 11px; font-weight: 600; white-space: nowrap;
      vertical-align: middle; user-select: none; cursor: default;
    }

    .tpl-toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #fff; border: 1px solid var(--border-default);
      border-radius: 8px; padding: 12px 18px; font-size: 13px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 9999;
    }
    .tpl-toast.is-success { border-color: #10b981; color: #065f46; }
    .tpl-toast.is-error   { border-color: #ef4444; color: #991b1b; }
  </style>
</head>
<body>
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="Document Management"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>
  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page" x-data="docPageState()">
      <div class="page__header">
        <div>
          <h1 class="page__title">서류관리</h1>
          <p class="page__subtitle">입원서약서와 상담 문서의 작성 상태를 확인하고 연결합니다</p>
        </div>
        <button class="btn btn--primary" @click="openNewPledge()">
          <svg><use href="#i-edit"/></svg> 입원서약서 작성
        </button>
      </div>

      <!-- ── 탭 + 탭 패널 ── -->
      <div id="docPage">

        <div class="doc-tabs">
          <button class="doc-tab" :class="{ 'is-active': tab === 'list' }" @click="tab = 'list'">서약서 목록</button>
          <button class="doc-tab" :class="{ 'is-active': tab === 'template' }" @click="switchToTemplate()">템플릿 관리</button>
        </div>

        <!-- 서약서 목록 -->
        <div x-show="tab === 'list'" x-cloak>
          <form class="doc-toolbar" th:action="@{/documents}" method="get">
            <input class="input" type="text" name="q" th:value="${keyword}" placeholder="환자명, 보호자명, 연락처, 상담번호 검색" />
            <button class="btn btn--primary" type="submit"><svg><use href="#i-search"/></svg>검색</button>
            <a class="btn btn--outline" th:href="@{/documents}">초기화</a>
          </form>

          <div class="doc-summary">
            <span class="badge badge--brand">입원서약서</span>
            <span th:text="${#lists.size(rows)} + '건'">0건</span>
            <span th:if="${keyword != null and !#strings.isEmpty(keyword)}" th:text="'검색어: ' + ${keyword}"></span>
          </div>

          <div class="doc-table-wrap" th:if="${rows != null and !#lists.isEmpty(rows)}">
            <table class="table doc-table">
              <thead>
                <tr>
                  <th>문서</th>
                  <th>환자</th>
                  <th>보호자/연락처</th>
                  <th>상태</th>
                  <th>서명일</th>
                  <th>최근 수정</th>
                  <th>상담자</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="row : ${rows}">
                  <td><span class="badge badge--gray" th:text="${row.documentType}">입원서약서</span></td>
                  <td>
                    <div class="doc-patient">
                      <strong th:text="${#strings.isEmpty(row.patientName) ? '(이름 없음)' : row.patientName}">환자명</strong>
                      <span th:if="${row.linked}"
                            th:text="${'상담번호 ' + row.csIdx + (#strings.isEmpty(row.birth) ? '' : ' · ' + row.birth)}">상담번호</span>
                      <span th:unless="${row.linked}"
                            th:text="${'미연결 문서' + (#strings.isEmpty(row.birth) ? '' : ' · ' + row.birth)}">미연결 문서</span>
                    </div>
                  </td>
                  <td>
                    <div class="doc-patient">
                      <strong th:text="${#strings.isEmpty(row.guardianName) ? '-' : row.guardianName}">보호자</strong>
                      <span th:text="${#strings.isEmpty(row.guardianPhone) ? '-' : row.guardianPhone}">연락처</span>
                    </div>
                  </td>
                  <td>
                    <span class="status"
                          th:classappend="${row.status == '서명완료' ? ' status--done' : ' status--pending'}"
                          th:text="${row.status}">상태</span>
                  </td>
                  <td th:text="${#strings.isEmpty(row.signedAt) ? '-' : row.signedAt}">-</td>
                  <td th:text="${#strings.isEmpty(row.updatedAt) ? '-' : row.updatedAt}">-</td>
                  <td th:text="${#strings.isEmpty(row.counselor) ? '-' : row.counselor}">-</td>
                  <td>
                    <a class="btn-xs btn-xs--brand"
                       th:href="@{/counsel/admission-pledge(csIdx=${row.csIdx}, returnUrl=${documentsReturnUrl})}">열기</a>
                    <a class="btn-xs"
                       th:if="${row.linked}"
                       th:href="@{/counsel/inpatient(cs_idx=${row.csIdx})}">상담 보기</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="doc-empty" th:if="${rows == null or #lists.isEmpty(rows)}">
            조건에 맞는 입원서약서가 없습니다.
          </div>
        </div>

        <!-- 템플릿 관리 -->
        <div x-show="tab === 'template'" x-cloak>
          <div class="tpl-layout">

            <!-- 왼쪽 사이드바 -->
            <div class="tpl-sidebar">
              <p class="tpl-section-title">프리셋</p>
              <button class="tpl-preset-btn" @click="loadPreset()">📋 표준 서약서 (기본)</button>

              <p class="tpl-section-title">저장된 템플릿 <span x-text="'(' + docType + ')'"></span></p>
              <div class="tpl-saved-list">
                <p class="tpl-hint" x-show="filteredTemplates().length === 0">이 서류 종류의 템플릿이 없습니다.</p>
                <template x-for="t in filteredTemplates()" :key="t.id">
                  <div class="tpl-saved-item" :class="{ 'is-active': String(t.is_active) === 'Y' }">
                    <span class="tpl-saved-name" x-text="t.template_name"></span>
                    <span class="tpl-active-badge" x-show="String(t.is_active) === 'Y'">사용중</span>
                    <button class="btn-xs btn-xs--brand" @click="editTemplate(t)" title="이 템플릿 편집">편집</button>
                    <button class="btn-xs" @click="activateTemplate(t.id)"
                            x-show="String(t.is_active) !== 'Y'" title="이 템플릿 적용">적용</button>
                    <button class="btn-xs btn-xs--danger" @click="deleteTemplate(t.id)" title="삭제">삭제</button>
                  </div>
                </template>
              </div>

              <div x-show="filteredTemplates().some(t => String(t.is_active) === 'Y')" style="margin-top:4px;">
                <button class="tpl-preset-btn is-muted" @click="deactivateAll()">↩ 기본값으로 초기화</button>
              </div>
            </div>

            <!-- 오른쪽 에디터 -->
            <div class="tpl-editor-panel">
              <!-- 서류 종류 선택 -->
              <div class="tpl-doctype-row">
                <span class="tpl-doctype-label">서류 종류</span>
                <div class="tpl-doctype-pills">
                  <template x-for="type in allDocTypes" :key="type">
                    <button type="button" class="tpl-doctype-pill"
                            :class="{ 'is-active': docType === type }"
                            @click="switchDocType(type)" x-text="type"></button>
                  </template>
                </div>
                <div class="tpl-doctype-custom">
                  <input class="input" type="text" x-model="customDocType"
                         placeholder="직접 입력 후 Enter" maxlength="30"
                         @keydown.enter.prevent="addCustomDocType()" />
                  <button type="button" class="btn btn--outline" style="height:28px;font-size:12px;padding:0 8px;"
                          @click="addCustomDocType()">추가</button>
                </div>
              </div>

              <div class="tpl-name-row">
                <input class="input" type="text" x-model="editingName"
                       placeholder="템플릿 이름 (예: 2025년 개정판)" maxlength="100" />
              </div>

              <!-- TipTap 툴바 -->
              <div class="tiptap-toolbar" role="toolbar" aria-label="서약서 템플릿 도구">
                <button type="button" class="tiptap-tool-btn" :class="{ 'is-active': marks.bold }" @mousedown.prevent="cmd('bold')" title="굵게">B</button>
                <button type="button" class="tiptap-tool-btn" :class="{ 'is-active': marks.italic }" @mousedown.prevent="cmd('italic')" title="기울임"><em>I</em></button>
                <button type="button" class="tiptap-tool-btn" :class="{ 'is-active': marks.underline }" @mousedown.prevent="cmd('underline')" title="밑줄"><u>U</u></button>
                <div class="tiptap-tool-sep"></div>
                <select class="tiptap-tool-select" @change="setHeading(+$event.target.value)" :value="headingLevel">
                  <option value="0">본문</option>
                  <option value="1">제목 1</option>
                  <option value="2">제목 2</option>
                  <option value="3">제목 3</option>
                </select>
                <div class="tiptap-tool-sep"></div>
                <button type="button" class="tiptap-tool-btn" :class="{ 'is-active': textAlign === 'left' }" @mousedown.prevent="cmd('alignLeft')" title="왼쪽 정렬">&#8676;</button>
                <button type="button" class="tiptap-tool-btn" :class="{ 'is-active': textAlign === 'center' }" @mousedown.prevent="cmd('alignCenter')" title="가운데 정렬">&#8803;</button>
                <button type="button" class="tiptap-tool-btn" :class="{ 'is-active': textAlign === 'right' }" @mousedown.prevent="cmd('alignRight')" title="오른쪽 정렬">&#8677;</button>
                <div class="tiptap-tool-sep"></div>
                <input type="color" class="tiptap-tool-color" x-model="textColor" @change="setTextColor(textColor)" title="글자 색상" />
                <div class="tiptap-tool-sep"></div>
                <button type="button" class="tiptap-tool-btn" @mousedown.prevent="insertTable()" title="표 삽입">⊞ 표</button>
                <div class="tiptap-tool-sep"></div>
                <div style="position:relative;">
                  <button type="button" class="tiptap-field-btn" @mousedown.prevent="showFieldMenu = !showFieldMenu">+ 필드 삽입</button>
                  <div class="tiptap-field-menu" x-show="showFieldMenu" @click.outside="showFieldMenu = false" x-cloak>
                    <template x-for="f in fieldList" :key="f.key">
                      <button type="button" class="tiptap-field-menu-item" @mousedown.prevent="insertField(f)" x-text="f.label"></button>
                    </template>
                  </div>
                </div>
              </div>

              <!-- TipTap 에디터 -->
              <div class="tiptap-editor-wrap">
                <div id="tiptapEditor"></div>
              </div>

              <div class="tpl-save-row">
                <p class="tpl-hint">서약서 내용을 자유롭게 작성하세요. <strong>+ 필드 삽입</strong>으로 환자명·병실 등 자동입력 항목을 추가할 수 있습니다.</p>
                <button class="btn btn--outline" @click="saveAsNew()">새 템플릿으로 저장</button>
                <button class="btn btn--primary" :disabled="saving" @click="saveTemplate()">
                  <span x-show="saving">저장 중…</span>
                  <span x-show="!saving" x-text="editingId ? '수정 후 적용' : '저장 및 적용'"></span>
                </button>
              </div>
            </div>
          </div>

          <!-- 토스트 알림 -->
          <div class="tpl-toast" x-show="toast.visible" x-transition
               :class="toast.ok ? 'is-success' : 'is-error'"
               x-text="toast.message">
          </div>
        </div>

      </div><!-- /#docPage -->
    </div>
  </main>
</div>

<script th:inline="javascript">
  var _pledgeTemplates = /*[[${pledgeTemplates}]]*/ [];
  var _pledgeDocTypes = /*[[${pledgeDocTypes}]]*/ [];
  var _defaultPledgeTemplateContent = /*[[${defaultPledgeTemplateContent}]]*/ '';
</script>
<script th:src="@{/assets/js/app.js}"></script>
<script th:src="@{/assets/js/chrome.js}" data-page="documents" th:attr="data-ctx=@{/}"></script>
<script>
  document.addEventListener('turbo:load', () => { MPChrome.mount({ parent: '상담 업무', current: '서류관리' }); }, { once: true });
</script>
<script data-turbo-eval="false" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@7.3.0/dist/turbo.es2017-umd.js"></script>
<script data-turbo-eval="false" defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<script>
var _PREDEFINED_DOC_TYPES = ['입원서약서', '간병계약서', '동의서', '기타'];

var _TIPTAP_FIELDS = [
  { key: 'patient_name',          label: '환자명' },
  { key: 'patient_birth',         label: '생년월일' },
  { key: 'patient_phone',         label: '환자 연락처' },
  { key: 'room',                  label: '병실' },
  { key: 'chart_no',              label: '차트번호' },
  { key: 'guardian_name',         label: '주보호자 성명' },
  { key: 'guardian_phone',        label: '주보호자 연락처' },
  { key: 'guardian_relation',     label: '주보호자 관계' },
  { key: 'guardian_addr',         label: '주보호자 주소' },
  { key: 'sub_guardian_name',     label: '부보호자 성명' },
  { key: 'sub_guardian_phone',    label: '부보호자 연락처' },
  { key: 'sub_guardian_relation', label: '부보호자 관계' },
  { key: 'sub_guardian_addr',     label: '부보호자 주소' },
  { key: 'signed_at',             label: '서명일시' },
];

function docPageState() {
  var _editorInstance = null; // NOT reactive — must stay outside Alpine's proxy
  return {
    tab: location.hash === '#template' ? 'template' : 'list',
    templates: Array.isArray(_pledgeTemplates) ? _pledgeTemplates : [],
    docType: '입원서약서',
    allDocTypes: (function () {
      var result = [..._PREDEFINED_DOC_TYPES];
      var seen = new Set(result.map(function (p) { return p.normalize('NFC'); }));
      (Array.isArray(_pledgeTemplates) ? _pledgeTemplates : []).forEach(function (t) {
        var dt = (t.doc_type || '').trim().normalize('NFC');
        if (dt && !seen.has(dt)) { seen.add(dt); result.push(t.doc_type.trim()); }
      });
      return result;
    })(),
    customDocType: '',
    editingId: null,
    editingName: '',
    saving: false,
    marks: {},
    headingLevel: 0,
    textAlign: 'left',
    textColor: '#222222',
    showFieldMenu: false,
    fieldList: _TIPTAP_FIELDS,
    toast: { visible: false, ok: true, message: '' },
    _onTiptapReady: null,
    _onMessage: null,

    init() {
      this.$watch('tab', val => {
        if (val === 'template') this.$nextTick(() => this._initEditor());
      });
      if (this.tab === 'template') {
        this.$nextTick(() => this._initEditor());
      }
      this._onTiptapReady = () => {
        if (this.tab === 'template') this._initEditor();
      };
      this._onMessage = (e) => {
        if (e.data?.type === 'csm-admission-pledge') {
          window.location.reload();
        }
      };
      window.addEventListener('tiptap:ready', this._onTiptapReady);
      window.addEventListener('message', this._onMessage);
    },

    destroy() {
      if (this._onTiptapReady) window.removeEventListener('tiptap:ready', this._onTiptapReady);
      if (this._onMessage) window.removeEventListener('message', this._onMessage);
      if (_editorInstance) { _editorInstance.destroy(); _editorInstance = null; }
    },

    openNewPledge() {
      var ctx = this._ctx();
      var url = ctx + '/counsel/admission-pledge?standalone=true';
      var popup = window.open(url, 'csmAdmissionPledge',
        'width=1400,height=920,scrollbars=yes,resizable=yes,toolbar=no,menubar=no,location=no,status=no');
      if (!popup) {
        window.location.href = url + '&returnUrl=' + encodeURIComponent(ctx + '/documents');
      }
    },

    switchToTemplate() {
      history.replaceState(null, '', '#template');
      this.tab = 'template';
    },

    filteredTemplates() {
      return this.templates.filter(t => (t.doc_type || '입원서약서') === this.docType);
    },

    switchDocType(type) {
      if (this.docType === type) return;
      this.docType = type;
      if (!_editorInstance) return;
      var active = this.filteredTemplates().find(t => String(t.is_active) === 'Y');
      if (active) {
        this.editingId = active.id;
        this.editingName = active.template_name || '';
        this._loadEditorContent(active.content || '');
      } else {
        this.editingId = null;
        this.editingName = '';
        this._loadEditorContent(this.docType === '입원서약서' ? (_defaultPledgeTemplateContent || '') : '');
      }
    },

    addCustomDocType() {
      var name = this.customDocType.trim();
      if (!name || name.length > 30) return;
      if (!this.allDocTypes.includes(name)) {
        this.allDocTypes = [...this.allDocTypes, name];
      }
      this.customDocType = '';
      this.switchDocType(name);
    },

    _ctx() {
      return (document.querySelector('[data-ctx]')?.dataset.ctx || '/').replace(/\/$/, '');
    },

    _csrf() {
      return document.querySelector('meta[name="_csrf"]')?.content || '';
    },

    _csrfHeader() {
      return document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
    },

    _initEditor() {
      if (_editorInstance) return;
      var el = document.getElementById('tiptapEditor');
      if (!el || !window._TipTapEditor) return;
      var self = this;
      var active = this.filteredTemplates().find(t => String(t.is_active) === 'Y');
      var initialContent = active
        ? (active.content || '')
        : (this.docType === '입원서약서' ? (_defaultPledgeTemplateContent || '') : '');
      if (active) {
        this.editingId = active.id;
        this.editingName = active.template_name || '';
      }
      _editorInstance = window._TipTapEditor.create(el, {
        content: initialContent,
        onUpdate() { self._syncMarks(); },
        onSelectionUpdate() { self._syncMarks(); },
      });
    },

    _syncMarks() {
      if (!_editorInstance) return;
      this.marks = {
        bold:      _editorInstance.isActive('bold'),
        italic:    _editorInstance.isActive('italic'),
        underline: _editorInstance.isActive('underline'),
      };
      this.headingLevel = [1,2,3].find(n => _editorInstance.isActive('heading', { level: n })) || 0;
      this.textAlign = ['left','center','right','justify'].find(a => _editorInstance.isActive({ textAlign: a })) || 'left';
    },

    cmd(name) {
      if (!_editorInstance) return;
      var ed = _editorInstance;
      setTimeout(() => {
        if (!ed || ed.isDestroyed) return;
        var chain = ed.chain();
        if (name === 'bold')             chain.toggleBold();
        else if (name === 'italic')      chain.toggleItalic();
        else if (name === 'underline')   chain.toggleUnderline();
        else if (name === 'alignLeft')   chain.setTextAlign('left');
        else if (name === 'alignCenter') chain.setTextAlign('center');
        else if (name === 'alignRight')  chain.setTextAlign('right');
        chain.run();
        ed.view.focus();
        this._syncMarks();
      }, 0);
    },

    setHeading(level) {
      if (!_editorInstance) return;
      var ed = _editorInstance;
      setTimeout(() => {
        if (!ed || ed.isDestroyed) return;
        var chain = ed.chain();
        if (level === 0) chain.setParagraph();
        else chain.toggleHeading({ level });
        chain.run();
        ed.view.focus();
        this._syncMarks();
      }, 0);
    },

    setTextColor(color) {
      if (!_editorInstance) return;
      var ed = _editorInstance;
      setTimeout(() => {
        if (!ed || ed.isDestroyed) return;
        ed.chain().setColor(color).run();
        ed.view.focus();
      }, 0);
    },

    insertTable() {
      if (!_editorInstance) return;
      var ed = _editorInstance;
      setTimeout(() => {
        if (!ed || ed.isDestroyed) return;
        ed.chain().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run();
        ed.view.focus();
      }, 0);
    },

    insertField(f) {
      if (!_editorInstance) return;
      var key = f.key;
      var label = f.label;
      this.showFieldMenu = false;
      setTimeout(() => {
        if (!_editorInstance || _editorInstance.isDestroyed) return;
        _editorInstance.commands.insertContent({ type: 'fieldChip', attrs: { fieldKey: key, label: label } });
      }, 0);
    },

    _loadEditorContent(html) {
      if (!_editorInstance) return;
      var ed = _editorInstance;
      var content = String(html || '').trim();
      setTimeout(() => {
        if (!ed || ed.isDestroyed) return;
        if (!content) { ed.commands.setContent('<p></p>'); return; }
        if (content.includes('doc-free-layout') || content.includes('doc-free-element')) {
          var tmp = document.createElement('div');
          tmp.innerHTML = content;
          var text = (tmp.innerText || tmp.textContent || '').trim();
          ed.commands.setContent('<p>' + text.replace(/\n+/g, '</p><p>') + '</p>');
          return;
        }
        ed.commands.setContent(content);
      }, 0);
    },

    _getEditorContent() {
      return _editorInstance ? _editorInstance.getHTML() : '';
    },

    loadPreset() {
      if (!_editorInstance) return;
      var label = this.docType === '입원서약서' ? '표준 서약서 내용' : '빈 캔버스';
      if (!confirm('현재 편집 중인 내용을 ' + label + '으로 교체할까요?')) return;
      this._loadEditorContent(this.docType === '입원서약서' ? (_defaultPledgeTemplateContent || '') : '');
      this.editingId = null;
      this.editingName = this.docType === '입원서약서' ? '표준 서약서' : '';
    },

    editTemplate(t) {
      this.editingId = t.id;
      this.editingName = t.template_name || '';
      this._loadEditorContent(t.content || '');
    },

    saveAsNew() {
      this.editingId = null;
      this.saveTemplate();
    },

    async saveTemplate() {
      if (!_editorInstance) return;
      var content = this._getEditorContent();
      if (!content || content === '<p></p>') {
        this.showToast(false, '내용을 입력해 주세요.');
        return;
      }
      this.saving = true;
      try {
        var payload = {
          id: this.editingId || null,
          name: this.editingName.trim() || '사용자 정의',
          content,
          docType: this.docType,
          activate: true
        };
        var res = await fetch(this._ctx() + '/api/pledge-templates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', [this._csrfHeader()]: this._csrf() },
          credentials: 'same-origin',
          body: JSON.stringify(payload)
        });
        var data = await res.json();
        if (data.ok) {
          this.editingId = data.id;
          this._applyTemplates(data.templates, data.docTypes);
          if (!Array.isArray(data.templates)) await this._reloadTemplates();
          this._syncEditorWithTemplate(data.id);
          this.showToast(true, '저장되었습니다. 서약서에 즉시 적용됩니다.');
        } else {
          this.showToast(false, data.error || '저장 실패');
        }
      } catch {
        this.showToast(false, '서버 오류가 발생했습니다.');
      } finally {
        this.saving = false;
      }
    },

    async activateTemplate(id) {
      try {
        var res = await fetch(this._ctx() + '/api/pledge-templates/' + id + '/activate', {
          method: 'PUT',
          headers: { [this._csrfHeader()]: this._csrf() },
          credentials: 'same-origin'
        });
        var data = await res.json();
        if (data.ok) {
          this._applyTemplates(data.templates, data.docTypes);
          if (!Array.isArray(data.templates)) await this._reloadTemplates();
          this._syncEditorWithTemplate(id);
          this.showToast(true, '서약서 템플릿이 적용되었습니다.');
        } else {
          this.showToast(false, data.error || '적용 실패');
        }
      } catch {
        this.showToast(false, '서버 오류가 발생했습니다.');
      }
    },

    async deactivateAll() {
      var label = this.docType === '입원서약서' ? '표준 서약서 기본값' : '빈 캔버스';
      if (!confirm('"' + this.docType + '" 템플릿을 모두 비활성화하고 ' + label + '으로 초기화할까요?')) return;
      try {
        var res = await fetch(
          this._ctx() + '/api/pledge-templates/deactivate-all?docType=' + encodeURIComponent(this.docType), {
          method: 'POST',
          headers: { [this._csrfHeader()]: this._csrf() },
          credentials: 'same-origin'
        });
        var data = await res.json().catch(() => ({}));
        this._applyTemplates(data.templates, data.docTypes);
        if (!Array.isArray(data.templates)) await this._reloadTemplates();
        this.editingId = null;
        this.editingName = this.docType === '입원서약서' ? '표준 서약서' : '';
        this._loadEditorContent(this.docType === '입원서약서' ? (_defaultPledgeTemplateContent || '') : '');
        this.showToast(true, '기본값으로 초기화되었습니다.');
      } catch {
        this.showToast(false, '서버 오류가 발생했습니다.');
      }
    },

    async deleteTemplate(id) {
      if (!confirm('이 템플릿을 삭제할까요?')) return;
      try {
        var res = await fetch(this._ctx() + '/api/pledge-templates/' + id, {
          method: 'DELETE',
          headers: { [this._csrfHeader()]: this._csrf() },
          credentials: 'same-origin'
        });
        var data = await res.json();
        if (data.ok) {
          var wasEditing = String(this.editingId || '') === String(id);
          this._applyTemplates(data.templates, data.docTypes);
          if (!Array.isArray(data.templates)) await this._reloadTemplates();
          if (wasEditing) this._syncEditorWithActiveOrDefault();
          this.showToast(true, '삭제되었습니다.');
        } else {
          this.showToast(false, data.error || '삭제 실패');
        }
      } catch {
        this.showToast(false, '서버 오류가 발생했습니다.');
      }
    },

    async _reloadTemplates() {
      try {
        var res = await fetch(this._ctx() + '/api/pledge-templates', {
          credentials: 'same-origin',
          headers: { [this._csrfHeader()]: this._csrf() }
        });
        var data = await res.json();
        if (data.ok) this._applyTemplates(data.templates, data.docTypes);
      } catch {}
    },

    _applyTemplates(templates, docTypes) {
      if (!Array.isArray(templates)) return;
      this.templates = templates;
      var seen = new Set(this.allDocTypes.map(function (t) { return t.normalize('NFC'); }));
      templates.forEach((t) => {
        var dt = (t.doc_type || '').trim();
        if (dt && !seen.has(dt.normalize('NFC'))) {
          seen.add(dt.normalize('NFC'));
          this.allDocTypes = [...this.allDocTypes, dt];
        }
      });
    },

    _syncEditorWithTemplate(id) {
      var target = this.templates.find(t => String(t.id) === String(id));
      if (!target) return;
      this.editingId = target.id;
      this.editingName = target.template_name || '';
      this._loadEditorContent(target.content || '');
    },

    _syncEditorWithActiveOrDefault() {
      var active = this.filteredTemplates().find(t => String(t.is_active) === 'Y');
      if (active) { this._syncEditorWithTemplate(active.id); return; }
      this.editingId = null;
      this.editingName = this.docType === '입원서약서' ? '표준 서약서' : '';
      this._loadEditorContent(this.docType === '입원서약서' ? (_defaultPledgeTemplateContent || '') : '');
    },

    showToast(ok, message) {
      this.toast = { visible: true, ok, message };
      setTimeout(() => { this.toast.visible = false; }, 3000);
    },
  };
}
</script>
<script type="module" data-turbo-eval="false">
import { Editor } from 'https://esm.sh/@tiptap/core@2.11.5';
import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.11.5';
import Underline from 'https://esm.sh/@tiptap/extension-underline@2.11.5';
import TextStyle from 'https://esm.sh/@tiptap/extension-text-style@2.11.5';
import { Color } from 'https://esm.sh/@tiptap/extension-color@2.11.5';
import TextAlign from 'https://esm.sh/@tiptap/extension-text-align@2.11.5';
import Table from 'https://esm.sh/@tiptap/extension-table@2.11.5';
import TableRow from 'https://esm.sh/@tiptap/extension-table-row@2.11.5';
import TableCell from 'https://esm.sh/@tiptap/extension-table-cell@2.11.5';
import TableHeader from 'https://esm.sh/@tiptap/extension-table-header@2.11.5';
import { Node, mergeAttributes } from 'https://esm.sh/@tiptap/core@2.11.5';

const FieldChip = Node.create({
  name: 'fieldChip',
  group: 'inline',
  inline: true,
  atom: true,
  addAttributes() {
    return {
      fieldKey: { default: '' },
      label:    { default: '' },
    };
  },
  parseHTML() {
    return [{ tag: 'span[data-field-key]' }];
  },
  renderHTML({ node }) {
    return ['span', {
      'data-field-key': node.attrs.fieldKey,
      class: 'tiptap-field-chip',
      contenteditable: 'false',
    }, '{{' + node.attrs.label + '}}'];
  },
});

window._TipTapEditor = {
  create(el, { content, onUpdate, onSelectionUpdate }) {
    return new Editor({
      element: el,
      content: content || '',
      extensions: [
        StarterKit,
        Underline,
        TextStyle,
        Color,
        TextAlign.configure({ types: ['heading', 'paragraph'] }),
        Table.configure({ resizable: true }),
        TableRow,
        TableCell,
        TableHeader,
        FieldChip,
      ],
      onUpdate,
      onSelectionUpdate,
    });
  },
};
window.dispatchEvent(new Event('tiptap:ready'));
</script>
</body>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>서비스 링크</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <style>
    :root {
      --lh-bg: #f6f7f9;
      --lh-card: #fff;
      --lh-border: #e5e7eb;
      --lh-text: #111827;
      --lh-muted: #6b7280;
      --lh-brand: #0b8f6f;
      --lh-brand-dark: #067257;
      --lh-danger: #dc2626;
      --lh-link-columns: 2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--lh-bg);
      color: var(--lh-text);
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
    }
    .lh-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    .lh-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 18px;
    }
    .lh-title { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 0; }
    .lh-subtitle { margin: 8px 0 0; color: var(--lh-muted); font-size: 14px; }
    .lh-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }
    .lh-panel {
      background: var(--lh-card);
      border: 1px solid var(--lh-border);
      border-radius: 8px;
      overflow: hidden;
    }
    .lh-panel__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--lh-border);
      font-size: 14px;
      font-weight: 800;
    }
    .lh-view-options {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .lh-view-options__label {
      color: var(--lh-muted);
      font-size: 12px;
      font-weight: 700;
    }
    .lh-view-options__select {
      width: 86px;
      height: 30px;
      border: 1px solid var(--lh-border);
      border-radius: 7px;
      background: #fff;
      color: var(--lh-text);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }
    .lh-list {
      display: grid;
      grid-template-columns: repeat(var(--lh-link-columns), minmax(0, 1fr));
      gap: 12px;
      padding: 16px;
    }
    .lh-groups {
      display: grid;
      gap: 18px;
      padding: 16px;
    }
    .lh-category {
      display: grid;
      gap: 10px;
    }
    .lh-category + .lh-category {
      padding-top: 18px;
      border-top: 1px solid var(--lh-border);
    }
    .lh-category__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .lh-category__title {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .lh-category__count {
      flex: 0 0 auto;
      color: var(--lh-muted);
      font-size: 12px;
      font-weight: 700;
    }
    .lh-category .lh-list {
      padding: 0;
    }
    .lh-link {
      display: grid;
      gap: 8px;
      min-height: 132px;
      padding: 16px;
      border: 1px solid var(--lh-border);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: #fff;
      transition: border-color .14s, box-shadow .14s, transform .14s;
    }
    .lh-link:hover {
      border-color: color-mix(in oklab, var(--lh-brand) 45%, var(--lh-border));
      box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
      transform: translateY(-1px);
    }
    .lh-link__top { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
    .lh-link__title { font-size: 16px; font-weight: 800; line-height: 1.35; overflow-wrap: anywhere; }
    .lh-link__category {
      flex: 0 0 auto;
      max-width: 96px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 3px 7px;
      border-radius: 999px;
      background: #ecfdf5;
      color: var(--lh-brand-dark);
      font-size: 11px;
      font-weight: 700;
    }
    .lh-link__desc {
      min-height: 36px;
      color: var(--lh-muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .lh-link__url {
      color: var(--lh-brand-dark);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lh-empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--lh-muted);
      font-size: 14px;
    }
    .lh-form {
      display: grid;
      gap: 12px;
      padding: 16px;
    }
    .lh-field { display: grid; gap: 6px; }
    .lh-label { font-size: 12px; font-weight: 700; color: #374151; }
    .lh-input, .lh-textarea {
      width: 100%;
      border: 1px solid var(--lh-border);
      border-radius: 7px;
      background: #fff;
      color: var(--lh-text);
      font: inherit;
      font-size: 13px;
    }
    .lh-input { height: 36px; padding: 0 10px; }
    .lh-textarea { min-height: 74px; resize: vertical; padding: 9px 10px; }
    .lh-input:focus, .lh-textarea:focus {
      outline: none;
      border-color: var(--lh-brand);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--lh-brand) 16%, transparent);
    }
    .lh-actions { display: flex; gap: 8px; justify-content: end; align-items: center; }
    .lh-btn {
      height: 36px;
      padding: 0 13px;
      border: 1px solid transparent;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }
    .lh-btn--primary { background: var(--lh-brand); color: #fff; }
    .lh-btn--primary:hover { background: var(--lh-brand-dark); }
    .lh-btn--danger { background: #fff; color: var(--lh-danger); border-color: #fecaca; }
    .lh-btn--danger:hover { background: #fef2f2; }
    .lh-section-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--lh-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 14px 16px 8px;
      border-top: 1px solid var(--lh-border);
    }
    .lh-cat-list {
      display: grid;
      gap: 6px;
      padding: 0 16px 14px;
    }
    .lh-cat-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 64px;
      gap: 8px;
      align-items: center;
    }
    .lh-cat-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lh-cat-order {
      height: 32px;
      padding: 0 8px;
      border: 1px solid var(--lh-border);
      border-radius: 6px;
      font: inherit;
      font-size: 13px;
      text-align: center;
      width: 100%;
    }
    .lh-cat-order:focus {
      outline: none;
      border-color: var(--lh-brand);
    }
    .lh-manage-list {
      display: grid;
      gap: 8px;
      padding: 0 16px 16px;
    }
    .lh-manage-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      padding: 10px;
      border: 1px solid var(--lh-border);
      border-radius: 7px;
      background: #fafafa;
    }
    .lh-manage-edit {
      min-width: 0;
    }
    .lh-manage-edit summary {
      cursor: pointer;
      list-style: none;
    }
    .lh-manage-edit summary::-webkit-details-marker { display: none; }
    .lh-manage-title {
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lh-edit-form {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .lh-edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .lh-edit-grid .lh-field--wide {
      grid-column: 1 / -1;
    }
    .lh-alert {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
    }
    .lh-alert--ok { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .lh-alert--err { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .lh-btn--ghost { background: #fff; color: var(--lh-muted); border-color: var(--lh-border); }
    .lh-btn--ghost:hover { background: #f9fafb; }
    .lh-delete-wrap { display: flex; flex-direction: column; gap: 6px; }
    .lh-delete-confirm { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .lh-delete-confirm[hidden] { display: none; }
    .lh-actions--panel { padding: 0 16px 14px; }
    .lh-manage-edit > summary:focus-visible {
      outline: 2px solid var(--lh-brand);
      outline-offset: 2px;
      border-radius: 4px;
    }
    .lh-manage-search { padding: 10px 16px 4px; }
    .lh-manage-groups { display: grid; gap: 8px; padding: 8px 16px 16px; }
    .lh-manage-group { border: 1px solid var(--lh-border); border-radius: 7px; overflow: hidden; }
    .lh-manage-group__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      background: #f9fafb;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      list-style: none;
      user-select: none;
    }
    .lh-manage-group__head::-webkit-details-marker { display: none; }
    .lh-manage-group__head:focus-visible {
      outline: 2px solid var(--lh-brand);
      outline-offset: -2px;
    }
    .lh-manage-group .lh-manage-list { padding: 8px; }
    @media (max-width: 900px) {
      .lh-head { align-items: start; flex-direction: column; }
      .lh-grid { grid-template-columns: 1fr; }
      .lh-shell { width: min(100% - 24px, 720px); padding-top: 20px; }
    }
    @media (max-width: 640px) {
      :root { --lh-link-columns: 1; }
      .lh-list { grid-template-columns: 1fr; }
      .lh-panel__head { align-items: start; flex-direction: column; }
      .lh-view-options { margin-left: 0; }
    }
  </style>
</head>
<body>
  <main class="lh-shell">
    <header class="lh-head">
      <div>
        <h1 class="lh-title">서비스 링크</h1>
        <p class="lh-subtitle">회사에서 운영하는 사이트를 한 곳에서 바로 열 수 있습니다.</p>
      </div>
    </header>

    <div th:if="${linkMessage}" class="lh-alert lh-alert--ok" th:text="${linkMessage}"></div>
    <div th:if="${linkError}" class="lh-alert lh-alert--err" th:text="${linkError}"></div>

    <section class="lh-grid">
      <div class="lh-panel">
        <div class="lh-panel__head">
          <span>바로가기</span>
          <label class="lh-view-options">
            <span class="lh-view-options__label">한 줄 표시</span>
            <select class="lh-view-options__select" id="linkColumnSelect" aria-label="한 줄에 표시할 링크 개수">
              <option value="1">1개</option>
              <option value="2">2개</option>
              <option value="3">3개</option>
              <option value="4">4개</option>
            </select>
          </label>
        </div>
        <div class="lh-empty" th:if="${links == null or #lists.isEmpty(links)}">등록된 링크가 없습니다.</div>
        <div class="lh-groups" th:if="${linkGroups != null and !linkGroups.isEmpty()}">
          <section class="lh-category" th:each="entry : ${linkGroups}">
            <div class="lh-category__head">
              <h2 class="lh-category__title" th:text="${entry.key}">분류</h2>
              <span class="lh-category__count" th:text="|${#lists.size(entry.value)}개|">0개</span>
            </div>
            <div class="lh-list">
              <a class="lh-link" th:each="link : ${entry.value}" th:href="${link.url}" target="_blank" rel="noopener noreferrer"
                 th:aria-label="|${link.title} 열기|">
                <span class="lh-link__top">
                  <span class="lh-link__title" th:text="${link.title}">서비스명</span>
                  <span class="lh-link__category" th:if="${link.category != null and !#strings.isEmpty(link.category)}" th:text="${link.category}">분류</span>
                </span>
                <span class="lh-link__desc" th:text="${link.description}">설명</span>
                <span class="lh-link__url" th:text="${link.url}" aria-hidden="true">https://example.com</span>
              </a>
            </div>
          </section>
        </div>
      </div>

      <aside class="lh-panel">
        <div class="lh-panel__head">링크 관리</div>
        <form class="lh-form" th:action="@{/admin/company-links}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <label class="lh-field">
            <span class="lh-label">이름</span>
            <input class="lh-input" type="text" name="title" maxlength="100" required placeholder="예: 상담 CRM" />
          </label>
          <label class="lh-field">
            <span class="lh-label">URL</span>
            <input class="lh-input" type="url" name="url" maxlength="500" required placeholder="https://example.com" />
          </label>
          <label class="lh-field">
            <span class="lh-label">분류</span>
            <input class="lh-input" type="text" name="category" maxlength="80" placeholder="예: 운영" />
          </label>
          <label class="lh-field">
            <span class="lh-label">정렬 순서</span>
            <input class="lh-input" type="number" name="sortOrder" min="0" max="9999" value="0" />
          </label>
          <label class="lh-field">
            <span class="lh-label">설명</span>
            <textarea class="lh-textarea" name="description" maxlength="500" placeholder="간단한 설명"></textarea>
          </label>
          <div class="lh-actions">
            <button class="lh-btn lh-btn--primary" type="submit">추가</button>
          </div>
        </form>

        <!-- 분류 순서 관리 -->
        <div th:if="${categories != null and !categories.isEmpty()}">
          <div class="lh-section-title">분류 순서</div>
          <div class="lh-cat-list" id="catOrderList">
            <div class="lh-cat-row" th:each="cat : ${categories}">
              <span class="lh-cat-name" th:text="${cat.category_name} ?: '(미분류)'">분류명</span>
              <input class="lh-cat-order" type="number" min="0" max="9999"
                     th:value="${cat.sort_order}"
                     th:data-cat="${cat.category_name}" />
            </div>
          </div>
          <div class="lh-actions lh-actions--panel">
            <span id="catOrderMsg" style="font-size:12px;color:var(--lh-brand);display:none;">저장됐습니다.</span>
            <button class="lh-btn lh-btn--primary" type="button"
                    th:data-url="@{/admin/company-links/category-order}"
                    onclick="saveCategoryOrder(this)">순서 저장</button>
          </div>
        </div>

        <div class="lh-manage-search" th:if="${links != null and !#lists.isEmpty(links)}">
          <input class="lh-input" type="search" id="manageSearch" placeholder="이름 또는 분류 검색" autocomplete="off" aria-label="링크 검색" />
        </div>

        <div class="lh-manage-groups" th:if="${linkGroups != null and !linkGroups.isEmpty()}">
          <details class="lh-manage-group" th:each="entry : ${linkGroups}" open>
            <summary class="lh-manage-group__head">
              <span th:text="${entry.key}">분류</span>
              <span class="lh-category__count" th:text="|${#lists.size(entry.value)}개|">0개</span>
            </summary>
            <div class="lh-manage-list">
              <div class="lh-manage-row" th:each="link : ${entry.value}">
                <details class="lh-manage-edit">
                  <summary>
                    <div class="lh-manage-title" th:text="${link.title}">서비스명</div>
                  </summary>
                  <form class="lh-edit-form" th:action="@{/admin/company-links/{id}(id=${link.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="lh-edit-grid">
                      <label class="lh-field">
                        <span class="lh-label">이름</span>
                        <input class="lh-input" type="text" name="title" maxlength="100" required th:value="${link.title}" />
                      </label>
                      <label class="lh-field">
                        <span class="lh-label">분류</span>
                        <input class="lh-input" type="text" name="category" maxlength="80" th:value="${link.category}" />
                      </label>
                      <label class="lh-field lh-field--wide">
                        <span class="lh-label">URL</span>
                        <input class="lh-input" type="url" name="url" maxlength="500" required th:value="${link.url}" />
                      </label>
                      <label class="lh-field">
                        <span class="lh-label">정렬 순서</span>
                        <input class="lh-input" type="number" name="sortOrder" min="0" max="9999" th:value="${link.sortOrder}" />
                      </label>
                      <label class="lh-field lh-field--wide">
                        <span class="lh-label">설명</span>
                        <textarea class="lh-textarea" name="description" maxlength="500" th:text="${link.description}"></textarea>
                      </label>
                    </div>
                    <div class="lh-actions">
                      <button class="lh-btn lh-btn--primary" type="submit">수정</button>
                    </div>
                  </form>
                </details>
                <div class="lh-delete-wrap">
                  <button class="lh-btn lh-btn--danger" type="button"
                          onclick="this.hidden=true;this.nextElementSibling.hidden=false">삭제</button>
                  <form class="lh-delete-confirm" th:action="@{/admin/company-links/{id}/delete(id=${link.id})}" method="post" hidden>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="lh-btn lh-btn--danger" type="submit">확인</button>
                    <button class="lh-btn lh-btn--ghost" type="button"
                            onclick="this.closest('.lh-delete-confirm').hidden=true;this.closest('.lh-delete-confirm').previousElementSibling.hidden=false">취소</button>
                  </form>
                </div>
              </div>
            </div>
          </details>
        </div>
      </aside>
    </section>
  </main>
  <script>
    (() => {
      const storageKey = "companyLinks.columns";
      const select = document.getElementById("linkColumnSelect");
      const root = document.documentElement;
      const allowedColumns = new Set(["1", "2", "3", "4"]);

      const applyColumns = (value) => {
        const columns = allowedColumns.has(value) ? value : "2";
        root.style.setProperty("--lh-link-columns", columns);
        if (select) {
          select.value = columns;
        }
      };

      try {
        applyColumns(localStorage.getItem(storageKey) || "2");
      } catch (error) {
        applyColumns("2");
      }

      if (select) {
        select.addEventListener("change", () => {
          applyColumns(select.value);
          try {
            localStorage.setItem(storageKey, select.value);
          } catch (error) {
            // localStorage may be unavailable in restricted browser modes.
          }
        });
      }
    })();

    (() => {
      const input = document.getElementById('manageSearch');
      if (!input) return;
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        document.querySelectorAll('.lh-manage-group').forEach(group => {
          let groupVisible = false;
          group.querySelectorAll('.lh-manage-row').forEach(row => {
            const match = !q || row.textContent.toLowerCase().includes(q);
            row.hidden = !match;
            if (match) groupVisible = true;
          });
          group.hidden = !groupVisible;
          if (q) group.open = true;
        });
      });
    })();

    async function saveCategoryOrder(btn) {
      const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';
      const url = btn ? btn.dataset.url : '/admin/company-links/category-order';
      const inputs = document.querySelectorAll('#catOrderList .lh-cat-order');
      const params = new URLSearchParams({ _csrf: csrfToken });
      inputs.forEach(input => {
        const cat = input.dataset.cat;
        if (cat) params.append('cat_' + cat, input.value || '0');
      });
      const msg = document.getElementById('catOrderMsg');
      try {
        const res = await fetch(url, { method: 'POST', body: params });
        const data = await res.json();
        if (data.ok) {
          if (msg) { msg.style.display = 'inline'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
          location.reload();
        } else {
          alert('저장 실패: ' + (data.msg || ''));
        }
      } catch (e) {
        alert('저장 중 오류: ' + e.message);
      }
    }
  </script>
</body>
</html>

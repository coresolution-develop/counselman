<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="_csrf"        th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>MediPlat · 상담리스트</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/role-management.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/tweaks.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/datepicker.css}" />
  <style>
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50%       { opacity: .55; }
    }
    /* 일괄 SMS 모달 */
    .bulk-sms-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; z-index: 9000;
    }
    .bulk-sms-modal {
      background: #fff; border-radius: 12px; width: 480px; max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.18); display: flex; flex-direction: column;
    }
    .bulk-sms-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border-default, #e5e7eb);
    }
    .bulk-sms-title { font-weight: 700; font-size: 16px; }
    .bulk-sms-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #6b7280; }
    .bulk-sms-body  { padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; max-height: 60vh; }
    .bulk-sms-section { display: flex; flex-direction: column; gap: 6px; }
    .bulk-sms-label { font-size: 13px; font-weight: 600; color: #374151; }
    .bulk-sms-label-row { display: flex; align-items: center; justify-content: space-between; }
    .bulk-sms-select { height: 34px; border: 1px solid #d1d5db; border-radius: 6px; padding: 0 8px; font-size: 14px; }
    .bulk-sms-recipients { display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto;
      border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; }
    .bulk-recipient-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    .bulk-recv-name  { font-weight: 600; color: #111827; }
    .bulk-recv-phone { color: #6b7280; }
    .bulk-no-phone   { font-size: 13px; color: #9ca3af; text-align: center; padding: 12px 0; }
    .bulk-sms-textarea { width: 100%; box-sizing: border-box; height: 100px; border: 1px solid #d1d5db;
      border-radius: 6px; padding: 8px; font-size: 14px; resize: vertical; }
    .bulk-sms-bytecount { font-size: 12px; color: #6b7280; }
    .bulk-sms-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px;
      border-top: 1px solid #e5e7eb; }
    .bulk-sms-cancel-btn { padding: 7px 18px; border-radius: 6px; border: 1px solid #d1d5db;
      background: #fff; cursor: pointer; font-size: 14px; }
    .bulk-sms-send-btn { padding: 7px 18px; border-radius: 6px; border: none;
      background: var(--brand-500, #3b82f6); color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; }
    .bulk-sms-send-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── 항목 설정 모달 ── */
    .col-settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; z-index: 9100;
    }
    .col-settings-modal {
      background: #fff; border-radius: 12px; width: 420px; max-width: 96vw;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .col-settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border-default, #e5e7eb);
      font-weight: 700; font-size: 15px;
    }
    .col-settings-header button {
      background: none; border: none; font-size: 18px; cursor: pointer; color: #6b7280;
    }
    .col-settings-body {
      display: flex; flex-direction: column; gap: 12px;
      padding: 16px 20px; overflow-y: auto; flex: 1;
    }
    .col-settings-side { display: flex; flex-direction: column; gap: 6px; }
    .col-settings-side-label {
      font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase;
      letter-spacing: .04em;
    }
    .col-settings-list {
      min-height: 80px; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 6px; list-style: none; margin: 0;
      display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start;
    }
    #visibleCols { border-color: #b2d9be; background: #f7fdf9; }
    .col-settings-item {
      padding: 6px 12px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 999px;
      font-size: 13px; cursor: grab; user-select: none; transition: background .1s, border-color .1s;
      white-space: nowrap;
    }
    .col-settings-item:hover { background: #f0f9f4; border-color: #b2d9be; }
    #visibleCols .col-settings-item { background: #eaf7ef; border-color: #a8d5b8; }
    #visibleCols .col-settings-item:hover { background: #d4eedd; }
    .col-settings-item.sortable-ghost { opacity: 0.4; background: #dff0e8; }
    .col-settings-hint {
      font-size: 11px; color: #9ca3af; margin-top: 2px;
    }
    .col-settings-footer {
      display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
    }
    .col-settings-footer .btn--ghost { margin-right: auto; }

    /* ── 체크박스 ── */
    .table input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--brand-500); cursor: pointer; vertical-align: middle;
    }

    /* ── 상담기록 섹션: 상단 도달 시 sticky 고정, 테이블이 나머지 높이 채움 ── */
    .list-sticky-section {
      position: sticky;
      top: 0;
      height: calc(100vh - var(--header-height, 64px));
      display: flex;
      flex-direction: column;
      background: var(--page-bg, #f3f4f6);
      padding-top: 8px;
    }
    .list-sticky-section .table-wrap {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: auto;
    }
    .list-sticky-section .footer-bar {
      position: static !important;
      flex-shrink: 0;
      margin-top: 8px;
    }

    /* ── 좌측 고정 (freeze) ── */
    .table thead th.col-frozen { background: var(--gray-50); }
    .table tbody td.col-frozen { position: sticky; z-index: 1; background: var(--surface, #fff); transition: background var(--dur-fast) var(--ease-smooth); }
    /* 선택된 행의 고정 셀 배경색 */
    .table tbody tr.is-selected td.col-frozen { background: var(--brand-50, #ecfdf5); }
    /* hover 시 고정 셀 배경색 */
    .table tbody tr:hover td.col-frozen { background: var(--brand-50); }
    .table tbody tr.is-selected:hover td.col-frozen { background: var(--brand-50, #ecfdf5); }
    .table thead th.col-frozen-last,
    .table tbody td.col-frozen-last { box-shadow: 2px 0 6px -1px rgba(0,0,0,.10); }

    /* ── 핀 버튼 ── */
    .col-settings-item { display: flex; align-items: center; gap: 6px; }
    .col-settings-item__label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pin-btn {
      flex-shrink: 0; background: none; border: none; padding: 2px 3px; cursor: pointer;
      color: #d1d5db; line-height: 1; border-radius: 3px; transition: color .15s;
    }
    .pin-btn:hover { color: var(--brand-600, #059669); }
    .pin-btn--active { color: var(--brand-500, #10b981); }

    /* ── 월별 캘린더 ── */
    .calendar-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-default, #e5e7eb);
      background: var(--surface, #fff);
      overflow: hidden;
    }
    .calendar-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-default, #e5e7eb);
      background: var(--gray-50, #f9fafb);
    }
    .calendar-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary, #111827);
    }
    .calendar-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .calendar-nav .btn-xs {
      min-width: 34px;
      justify-content: center;
    }
    .calendar-nav .btn-xs svg {
      display: none;
    }
    .calendar-nav__text {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 10px;
      font-size: 16px;
      line-height: 1;
      font-weight: 900;
    }
    .calendar-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-auto-rows: minmax(118px, 1fr);
      overflow: auto;
    }
    .calendar-weekday,
    .calendar-day {
      border-right: 1px solid var(--border-default, #e5e7eb);
      border-bottom: 1px solid var(--border-default, #e5e7eb);
    }
    .calendar-weekday {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 8px 10px;
      background: var(--gray-50, #f9fafb);
      color: var(--text-secondary, #6b7280);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }
    .calendar-day {
      position: relative;
      min-width: 0;
      padding: 8px;
      background: var(--surface, #fff);
      overflow: visible;
    }
    .calendar-day.is-muted { background: var(--gray-50, #f9fafb); color: var(--text-tertiary, #9ca3af); }
    .calendar-day.is-today { background: color-mix(in oklab, var(--brand-500, #10b981) 7%, #fff); }
    .calendar-day__num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin-bottom: 6px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .calendar-day.is-today .calendar-day__num {
      background: var(--brand-500, #10b981);
      color: #fff;
    }
    .calendar-count-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 10px;
      padding: 8px 6px;
      border: 1px solid color-mix(in oklab, var(--brand-500, #10b981) 24%, transparent);
      border-radius: 6px;
      background: color-mix(in oklab, var(--brand-500, #10b981) 8%, #fff);
      color: var(--brand-700, #047857);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .calendar-count-btn:hover,
    .calendar-count-btn:focus-visible {
      border-color: var(--brand-500, #10b981);
      background: color-mix(in oklab, var(--brand-500, #10b981) 13%, #fff);
      outline: none;
    }
    .calendar-empty {
      margin-top: 12px;
      color: var(--text-tertiary, #9ca3af);
      font-size: 11px;
    }
    .calendar-popover {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 42px;
      z-index: 20;
      display: none;
      min-width: 220px;
      max-height: 280px;
      padding: 8px;
      border: 1px solid var(--border-default, #e5e7eb);
      border-radius: 8px;
      background: var(--surface, #fff);
      box-shadow: 0 12px 30px rgba(15, 23, 42, .18);
      overflow-y: auto;
    }
    .calendar-day:hover .calendar-popover,
    .calendar-day:focus-within .calendar-popover,
    .calendar-day.is-open .calendar-popover {
      display: block;
    }
    .calendar-popover__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--text-secondary, #6b7280);
      font-size: 11px;
      font-weight: 800;
    }
    .calendar-event {
      width: 100%;
      display: block;
      margin-top: 4px;
      padding: 5px 6px;
      border: 1px solid color-mix(in oklab, var(--brand-500, #10b981) 18%, transparent);
      border-radius: 6px;
      background: color-mix(in oklab, var(--brand-500, #10b981) 6%, #fff);
      color: var(--text-primary, #111827);
      font-size: 12px;
      line-height: 1.25;
      text-align: left;
      cursor: pointer;
    }
    .calendar-event:hover { border-color: var(--brand-500, #10b981); background: color-mix(in oklab, var(--brand-500, #10b981) 10%, #fff); }
    .calendar-event__name,
    .calendar-event__meta {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .calendar-event__name { font-weight: 700; }
    .calendar-event__meta { margin-top: 2px; color: var(--text-secondary, #6b7280); font-size: 11px; }
    .search-bar__filter-toggle,
    .mobile-action-fab {
      display: none;
    }

    /* 상담리스트 모바일 보강: 공용 컴포넌트 CSS 영향 없이 이 화면에만 적용 */
    @media (max-width: 768px) {
      .app[data-screen-label="Consultation List"] {
        overflow-x: hidden;
      }
      .app[data-screen-label="Consultation List"] .main {
        padding: 16px;
      }
      .app[data-screen-label="Consultation List"] .page {
        max-width: 100%;
      }
      .app[data-screen-label="Consultation List"] .page__header,
      .app[data-screen-label="Consultation List"] .section-head {
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .app[data-screen-label="Consultation List"] .search-bar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .app[data-screen-label="Consultation List"] .search-bar__to {
        display: none;
      }
      .app[data-screen-label="Consultation List"] .queue {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .app[data-screen-label="Consultation List"] .list-sticky-section {
        position: static;
        height: auto;
        min-height: 0;
      }
      .app[data-screen-label="Consultation List"] .list-sticky-section .table-wrap {
        max-width: 100%;
        overflow-x: auto;
      }
      .app[data-screen-label="Consultation List"] .table {
        min-width: 720px;
      }
      .app[data-screen-label="Consultation List"] .calendar-grid {
        grid-template-columns: repeat(7, minmax(0, 1fr));
        grid-auto-rows: minmax(92px, auto);
        overflow-x: hidden;
      }
      .app[data-screen-label="Consultation List"] .calendar-day {
        min-width: 0;
      }
    }

    @media (max-width: 480px) {
      .app[data-screen-label="Consultation List"] .main {
        padding: 12px;
      }
      .app[data-screen-label="Consultation List"] .page__title {
        font-size: 22px;
      }
      .app[data-screen-label="Consultation List"] .page__subtitle {
        font-size: 12px;
      }
      .app[data-screen-label="Consultation List"] .search-bar {
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 8px;
        padding: 0;
        margin: 6px 0 16px;
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
      .app[data-screen-label="Consultation List"] .search-bar .input,
      .app[data-screen-label="Consultation List"] .search-bar .select,
      .app[data-screen-label="Consultation List"] .search-bar .btn {
        height: 44px !important;
        min-height: 44px;
        font-size: 16px;
      }
      .app[data-screen-label="Consultation List"] .search-bar__keyword {
        min-width: 0;
        background: var(--surface, #fff);
        border-radius: 10px;
      }
      .app[data-screen-label="Consultation List"] .search-bar__filter-toggle {
        display: inline-flex;
        width: 58px;
        padding: 0;
        justify-content: center;
        white-space: nowrap;
        border-radius: 10px;
      }
      .app[data-screen-label="Consultation List"] .search-bar__submit {
        width: 44px;
        padding: 0;
        justify-content: center;
      }
      .app[data-screen-label="Consultation List"] .search-bar__submit span {
        display: none;
      }
      .app[data-screen-label="Consultation List"] .search-bar__advanced,
      .app[data-screen-label="Consultation List"] select.search-bar__advanced,
      .app[data-screen-label="Consultation List"] input.search-bar__advanced,
      .app[data-screen-label="Consultation List"] label.search-bar__advanced,
      .app[data-screen-label="Consultation List"] span.search-bar__advanced,
      .app[data-screen-label="Consultation List"] .search-bar:not(.is-expanded) .mp-dp-input,
      .app[data-screen-label="Consultation List"] .search-bar:not(.is-expanded) .search-bar__advanced {
        display: none !important;
        grid-column: 1 / -1;
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded {
        grid-template-columns: 1fr;
        padding: 10px;
        background: var(--surface, #fff);
        border: 1px solid var(--border-subtle, #e5e7eb);
        border-radius: 12px;
        box-shadow: var(--shadow-xs);
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .search-bar__advanced {
        display: flex !important;
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .mp-dp-input {
        display: inline-flex !important;
        grid-column: 1 / -1;
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .search-bar__to {
        display: none !important;
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded select.search-bar__advanced,
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded input.search-bar__advanced {
        display: block !important;
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .search-bar__keyword,
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .search-bar__filter-toggle,
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .search-bar__submit {
        grid-column: 1 / -1;
        width: 100%;
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .search-bar__submit {
        padding: 0 14px;
      }
      .app[data-screen-label="Consultation List"] .search-bar.is-expanded .search-bar__submit span {
        display: inline;
      }
      .app[data-screen-label="Consultation List"] .search-bar__check {
        min-height: 44px;
        align-items: center;
      }
      .app[data-screen-label="Consultation List"] .filter-pills {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .app[data-screen-label="Consultation List"] .pill,
      .app[data-screen-label="Consultation List"] .btn-xs,
      .app[data-screen-label="Consultation List"] .btn {
        min-height: 44px;
      }
      .app[data-screen-label="Consultation List"] .queue {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .app[data-screen-label="Consultation List"] .queue-card {
        min-width: 0;
        padding: 12px;
        border-radius: 10px;
        box-shadow: none;
      }
      .app[data-screen-label="Consultation List"] .queue-card__actions .btn-xs {
        width: 100%;
      }
      .app[data-screen-label="Consultation List"] .queue-card:active,
      .app[data-screen-label="Consultation List"] .pill:active,
      .app[data-screen-label="Consultation List"] .btn-xs:active,
      .app[data-screen-label="Consultation List"] .btn:active {
        transform: scale(.98);
      }
      .app[data-screen-label="Consultation List"] .calendar-toolbar,
      .app[data-screen-label="Consultation List"] .bulk-sms-footer,
      .app[data-screen-label="Consultation List"] .col-settings-footer {
        flex-wrap: wrap;
      }
      .app[data-screen-label="Consultation List"] .calendar-toolbar {
        align-items: center;
        gap: 6px;
      }
      .app[data-screen-label="Consultation List"] .calendar-nav {
        order: 2;
        width: 100%;
        justify-content: space-between;
      }
      .app[data-screen-label="Consultation List"] .calendar-title {
        order: 1;
        flex: 1;
        font-size: 14px;
      }
      .app[data-screen-label="Consultation List"] .calendar-toolbar .section-head__hint {
        order: 1;
      }
      .app[data-screen-label="Consultation List"] .calendar-grid {
        grid-auto-rows: minmax(70px, auto);
      }
      .app[data-screen-label="Consultation List"] .calendar-weekday {
        padding: 6px 2px;
        font-size: 11px;
      }
      .app[data-screen-label="Consultation List"] .calendar-day {
        padding: 5px 3px;
        overflow: hidden;
      }
      .app[data-screen-label="Consultation List"] .calendar-day__num {
        width: 22px;
        height: 22px;
        margin-bottom: 2px;
        font-size: 11px;
      }
      .app[data-screen-label="Consultation List"] .calendar-count-btn {
        margin-top: 4px;
        padding: 4px 2px;
        min-height: 32px;
        font-size: 10px;
        line-height: 1.2;
      }
      .app[data-screen-label="Consultation List"] .calendar-empty {
        margin-top: 6px;
        font-size: 10px;
      }
      .app[data-screen-label="Consultation List"] .bulk-sms-footer button,
      .app[data-screen-label="Consultation List"] .col-settings-footer button {
        flex: 1 1 100%;
        justify-content: center;
      }
      .app[data-screen-label="Consultation List"] .footer-bar {
        display: none;
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab {
        position: fixed;
        right: 16px;
        bottom: calc(16px + env(safe-area-inset-bottom));
        z-index: 55;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab__menu {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab__action,
      .app[data-screen-label="Consultation List"] .mobile-action-fab__toggle {
        min-height: 44px;
        border: 1px solid var(--border-primary, #d8e2ef);
        box-shadow: var(--shadow-lg);
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab__action {
        justify-content: center;
        min-width: 116px;
        background: var(--bg-primary, #fff);
        color: var(--text-primary, #111827);
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab__action.btn--primary {
        background: var(--brand-500, #10b981);
        border-color: var(--brand-500, #10b981);
        color: #fff;
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab__toggle {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        background: var(--brand-500, #10b981);
        color: #fff;
        justify-content: center;
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab__toggle svg {
        transition: transform var(--dur-fast, 120ms);
      }
      .app[data-screen-label="Consultation List"] .mobile-action-fab.is-open .mobile-action-fab__toggle svg {
        transform: rotate(45deg);
      }
      .app[data-screen-label="Consultation List"] .bulk-sms-modal,
      .app[data-screen-label="Consultation List"] .col-settings-modal {
        width: calc(100vw - 24px);
        max-width: calc(100vw - 24px);
        max-height: calc(100dvh - 24px);
      }
      .app[data-screen-label="Consultation List"] .bulk-sms-select,
      .app[data-screen-label="Consultation List"] .bulk-sms-textarea {
        font-size: 16px;
      }
      .app[data-screen-label="Consultation List"] .calendar-popover {
        position: fixed;
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
        min-width: 0;
        max-height: 50dvh;
      }
    }
  </style>
</head>
<body>
<script th:src="@{/assets/js/sprite.js}"></script>

<div class="app"
     data-screen-label="Consultation List"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <main class="main">
    <div class="page" x-data="listPage()">
      <div class="page__header">
        <div>
          <h1 class="page__title">상담리스트</h1>
          <p class="page__subtitle">우선순위 대기 상담과 전체 상담 기록을 관리합니다</p>
        </div>
      </div>

      <!-- Search bar -->
      <form class="search-bar" :class="{ 'is-expanded': mobileFilterOpen }" th:action="@{/counsel/list}" method="get" @submit.prevent="submitSearch($event)">
        <select class="select search-bar__advanced" name="dateRange" id="dateRangeSelect">
          <option value="all"    th:selected="${cri != null and cri.dateRange == 'all'}">전체기간</option>
          <option value="10"     th:selected="${cri == null or cri.dateRange == '10' or cri.dateRange == ''}">최근 10일</option>
          <option value="30"     th:selected="${cri != null and cri.dateRange == '30'}">최근 30일</option>
          <option value="90"     th:selected="${cri != null and cri.dateRange == '90'}">최근 90일</option>
          <option value="custom" th:selected="${cri != null and cri.dateRange == 'custom'}">직접 선택</option>
        </select>
        <input type="date" class="input search-bar__advanced" id="startDateInput" name="startDate"
               th:value="${cri != null and cri.dateRange == 'custom' ? cri.startDate : ''}" />
        <span class="search-bar__to search-bar__advanced">—</span>
        <input type="date" class="input search-bar__advanced" id="endDateInput" name="endDate"
               th:value="${cri != null and cri.dateRange == 'custom' ? cri.endDate : ''}" />
        <select class="select search-bar__advanced" name="status">
          <option value="all" th:selected="${cri == null or #strings.isEmpty(cri.status) or cri.status == 'all'}">전체 상태</option>
          <option th:each="s : ${statusOptions}" th:value="${s}" th:text="${s}"
                  th:selected="${cri != null and cri.status == s}"></option>
        </select>
        <select class="select search-bar__advanced" name="pathType">
          <option value="all" th:selected="${cri == null or #strings.isEmpty(cri.pathType) or cri.pathType == 'all'}">전체 경로</option>
          <option th:each="p : ${pathTypeOptions}" th:value="${p}" th:text="${p}"
                  th:selected="${cri != null and cri.pathType == p}"></option>
        </select>
        <select class="select search-bar__advanced" name="searchType" id="searchTypeSelect">
          <option value="patient"   th:selected="${cri == null or #strings.isEmpty(cri.searchType) or cri.searchType == 'patient'}">환자명</option>
          <option value="guardian"  th:selected="${cri != null and cri.searchType == 'guardian'}">보호자명</option>
          <option value="phone"     th:selected="${cri != null and cri.searchType == 'phone'}">전화번호</option>
          <option value="counselor" th:selected="${cri != null and cri.searchType == 'counselor'}">상담자</option>
          <option value="content"   th:selected="${cri != null and cri.searchType == 'content'}">상담내용</option>
        </select>
        <input type="text" class="input search-bar__keyword" name="keyword" id="keywordInput"
               th:value="${cri != null ? cri.keyword : ''}"
               placeholder="검색어를 입력하세요" />
        <label class="search-bar__check search-bar__advanced">
          <input type="checkbox" name="end" value="on"
                 th:checked="${cri == null or cri.end == 'on'}" />완료 합계 포함
        </label>
        <button type="button" class="btn btn--outline search-bar__filter-toggle" @click="mobileFilterOpen = !mobileFilterOpen" :aria-expanded="String(mobileFilterOpen)">필터</button>
        <button type="submit" class="btn btn--primary search-bar__submit" style="height:34px;"><svg><use href="#i-search"/></svg><span>검색</span></button>
      </form>

      <!-- Priority queue -->
      <div class="section-head">
        <span class="section-head__title">상담 접수 대기</span>
        <span class="badge badge--warn">우선순위순</span>
        <span class="section-head__hint" x-text="queue.length + '건 대기'"></span>
        <div style="flex:1"></div>
        <button type="button" class="btn-xs" :disabled="queueLoading" @click="refreshQueue()">
          <svg><use href="#i-refresh"/></svg><span x-text="queueLoading ? '새로고침 중' : '새로고침'"></span>
        </button>
        <button type="button" class="btn-xs btn-xs--brand" @click="visit('/counsel/intake')">접수 관리</button>
      </div>

      <div class="queue">
        <template x-for="(q, i) in queue" :key="q.id">
          <div class="queue-card" style="cursor:pointer;"
               :style="q.beingWorkedOn ? 'border-color: var(--brand-400); background: color-mix(in oklab, var(--brand-500) 4%, #fff);' : ''"
               @click="visit('/counsel/inpatient?reservationId=' + q.id)">
            <div class="queue-card__head">
              <span class="prio" :class="'prio--' + q.prio" x-text="'P' + q.prio"></span>
              <span class="queue-card__name" x-text="q.name || '(이름 없음)'"></span>
              <span x-show="q.beingWorkedOn"
                style="margin-left:auto;font-size:10px;font-weight:700;color:var(--brand-600);
                       background:color-mix(in oklab,var(--brand-500) 12%,#fff);
                       border:1px solid color-mix(in oklab,var(--brand-500) 30%,transparent);
                       padding:2px 6px;border-radius:999px;animation:pulse-soft 2s infinite;">상담중</span>
            </div>
            <div class="queue-card__phone">
              <span x-show="q.phone" x-text="q.phone"></span>
              <span x-show="!q.phone" style="color:var(--text-tertiary);font-style:italic;">연락처 없음</span>
            </div>
            <div class="queue-card__time" x-text="q.time"></div>
            <div x-show="q.note" class="queue-card__note" x-text="q.note"></div>
            <div class="queue-card__actions">
              <button class="btn-xs btn-xs--brand" style="flex:1;justify-content:center;"
                @click.stop="visit('/counsel/intake?reservationId=' + q.id)">상세보기</button>
            </div>
          </div>
        </template>
      </div>

      <!-- Records table -->
      <div class="list-sticky-section">
      <div class="section-head">
        <span class="section-head__title">상담 기록 목록</span>
        <span class="section-head__hint" x-text="filtered.length + '건'"></span>
        <div style="flex:1"></div>
        <div class="filter-pills">
          <button class="pill" :class="{ 'is-active': activeFilter === 'all' }" @click="setFilter('all')">
            전체 <span class="pill__count" x-text="allRecords.length"></span>
          </button>
          <button class="pill" :class="{ 'is-active': activeFilter === 'today' }" @click="setFilter('today')">
            오늘 <span class="pill__count" x-text="todayCount"></span>
          </button>
          <button class="pill" :class="{ 'is-active': activeFilter === 'incomplete' }" @click="setFilter('incomplete')">
            미완료 <span class="pill__count" x-text="incompleteCount"></span>
          </button>
        </div>
        <button class="btn-xs" @click="settingsOpen = true" title="리스트 항목 설정" style="margin-left:8px;">
          <svg width="14" height="14"><use href="#i-settings"/></svg>항목 설정
        </button>
        <button type="button" class="btn-xs btn-xs--brand" @click="toggleRecordView()">
          <span x-text="viewMode === 'calendar' ? '목록 보기' : '월별 캘린더'"></span>
        </button>
      </div>

      <div class="table-wrap" x-show="viewMode === 'table'">
        <table class="table">
          <thead>
            <tr>
              <th class="col-check">
                <input type="checkbox" :checked="allChecked" @change="toggleAll($event.target.checked)" />
              </th>
              <th th:each="col : ${orderItems}"
                  th:attr="data-col=${col['column_name'] != null ? col['column_name'] : col['coulmn']}"
                  th:text="${col['column_comment'] != null and not #strings.isEmpty(col['column_comment']) ? col['column_comment'] : (col['column_name'] != null ? col['column_name'] : col['coulmn'])}">
              </th>
            </tr>
          </thead>
          <tbody>
            <template x-for="r in filtered" :key="r.cs_idx">
              <tr :class="{ 'is-selected': selectedIds.has(r.cs_idx) }" style="cursor:pointer;"
                  @dblclick="visit('/counsel/inpatient?cs_idx=' + r.cs_idx)">
                <td @click.stop>
                  <input type="checkbox" :checked="selectedIds.has(r.cs_idx)"
                         @change="toggleRow(r.cs_idx)" />
                </td>
                <template x-for="col in columns" :key="col.column_name || col.coulmn">
                  <td x-html="renderCell(r, col.column_name || col.coulmn)"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <div class="calendar-panel" x-show="viewMode === 'calendar'" x-cloak>
        <div class="calendar-toolbar">
          <div class="calendar-nav">
            <button type="button" class="btn-xs" @click="moveCalendarMonth(-1)" aria-label="이전 달">
              <svg><use href="#i-chevron-left"/></svg>
              <span class="calendar-nav__text" aria-hidden="true">‹</span>
            </button>
            <button type="button" class="btn-xs" @click="setCalendarToday()">오늘</button>
            <button type="button" class="btn-xs" @click="moveCalendarMonth(1)" aria-label="다음 달">
              <svg><use href="#i-chevron-right"/></svg>
              <span class="calendar-nav__text" aria-hidden="true">›</span>
            </button>
          </div>
          <div class="calendar-title" x-text="calendarTitle"></div>
          <div class="section-head__hint" x-text="calendarMonthCount + '건'"></div>
        </div>
        <div class="calendar-grid">
          <template x-for="day in calendarWeekdays" :key="day">
            <div class="calendar-weekday" x-text="day"></div>
          </template>
          <template x-for="day in calendarDays" :key="day.date">
            <div class="calendar-day"
                 :class="{ 'is-muted': !day.inMonth, 'is-today': day.isToday, 'is-open': activeCalendarDate === day.date }"
                 @mouseenter="openCalendarDay(day)"
                 @mouseleave="closeCalendarDay(day)"
                 @keydown.escape="activeCalendarDate = ''">
              <span class="calendar-day__num" x-text="day.day"></span>
              <template x-if="day.records.length > 0">
                <button type="button"
                        class="calendar-count-btn"
                        @click.stop="toggleCalendarDay(day)"
                        @focus="openCalendarDay(day)"
                        :aria-expanded="String(activeCalendarDate === day.date)"
                        x-text="'상담 ' + day.records.length + '건'"></button>
              </template>
              <div class="calendar-empty" x-show="day.records.length === 0">-</div>
              <div class="calendar-popover" x-show="day.records.length > 0" @click.stop>
                <div class="calendar-popover__head">
                  <span x-text="calendarDayLabel(day.date)"></span>
                  <span x-text="day.records.length + '건'"></span>
                </div>
                <template x-for="record in day.records" :key="record.cs_idx">
                  <button type="button" class="calendar-event" @click="visit('/counsel/inpatient?cs_idx=' + record.cs_idx)">
                    <span class="calendar-event__name" x-text="calendarRecordTitle(record)"></span>
                    <span class="calendar-event__meta" x-text="calendarRecordMeta(record)"></span>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Footer bar -->
      <div class="footer-bar">
        <button class="btn btn--ghost" @click="deleteSelected()">환자정보삭제</button>
        <button class="btn btn--outline" @click="openBulkSms()">
          <svg><use href="#i-send"/></svg>일괄 문자 보내기
        </button>
        <a th:href="@{/counsel/intake}" class="btn btn--outline" @click.prevent="visit('/counsel/intake')">상담 접수</a>
        <a th:href="@{/counsel/inpatient}" class="btn btn--primary" @click.prevent="visit('/counsel/inpatient')"><svg><use href="#i-plus"/></svg>신규상담</a>
      </div>
      </div><!-- /list-sticky-section -->

      <div class="mobile-action-fab" :class="{ 'is-open': mobileActionsOpen }" @keydown.escape.window="mobileActionsOpen = false">
        <div class="mobile-action-fab__menu" x-show="mobileActionsOpen" x-transition @click.outside="mobileActionsOpen = false">
          <a th:href="@{/counsel/intake}" class="btn btn--outline mobile-action-fab__action" @click.prevent="visit('/counsel/intake')">상담접수</a>
          <a th:href="@{/counsel/inpatient}" class="btn btn--primary mobile-action-fab__action" @click.prevent="visit('/counsel/inpatient')">신규상담</a>
        </div>
        <button type="button"
                class="btn mobile-action-fab__toggle"
                aria-label="상담 작업 열기"
                :aria-expanded="String(mobileActionsOpen)"
                @click="mobileActionsOpen = !mobileActionsOpen">
          <svg><use href="#i-plus"/></svg>
        </button>
      </div>

      <!-- 일괄 문자 보내기 모달 -->
      <div class="bulk-sms-overlay" x-show="bulkSmsOpen" x-cloak @click.self="bulkSmsOpen = false">
        <div class="bulk-sms-modal" @click.stop>
          <div class="bulk-sms-header">
            <span class="bulk-sms-title">일괄 문자 보내기</span>
            <button type="button" class="bulk-sms-close" @click="bulkSmsOpen = false">✕</button>
          </div>
          <div class="bulk-sms-body">
            <div class="bulk-sms-section">
              <label class="bulk-sms-label">발신번호</label>
              <select class="bulk-sms-select" x-model="bulkFrom">
                <option value="">발신번호 선택</option>
                <template x-for="opt in phOptions" :key="opt.value">
                  <option :value="opt.value" x-text="opt.text"></option>
                </template>
              </select>
            </div>
            <div class="bulk-sms-section">
              <div class="bulk-sms-label-row">
                <label class="bulk-sms-label">수신자</label>
                <label style="font-size:12px;cursor:pointer;">
                  <input type="checkbox" x-model="bulkSelectAll" @change="toggleBulkAll($event.target.checked)" /> 전체 선택
                </label>
              </div>
              <div class="bulk-sms-recipients">
                <template x-if="bulkRecipients.length === 0">
                  <p class="bulk-no-phone">선택한 행에 보호자 연락처가 없습니다.</p>
                </template>
                <template x-for="(r, i) in bulkRecipients" :key="i">
                  <label class="bulk-recipient-row">
                    <input type="checkbox" x-model="r.checked" />
                    <span class="bulk-recv-name" x-text="r.name"></span>
                    <span class="bulk-recv-phone" x-text="r.phone"></span>
                  </label>
                </template>
              </div>
            </div>
            <div class="bulk-sms-section">
              <label class="bulk-sms-label">메시지</label>
              <textarea class="bulk-sms-textarea" x-model="bulkMsg" @input="updateBulkBytes()"
                        placeholder="문자 내용을 입력하세요."></textarea>
              <div class="bulk-sms-bytecount">
                <span x-text="bulkByteInfo" :style="bulkOverLimit ? 'color:red' : ''"></span>
              </div>
            </div>
          </div>
          <div class="bulk-sms-footer">
            <button type="button" class="bulk-sms-cancel-btn" @click="bulkSmsOpen = false">취소</button>
            <button type="button" class="bulk-sms-send-btn" :disabled="bulkSending" @click="sendBulkSms()">
              <span x-text="bulkSending ? '전송중...' : '전송'"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- ── 항목 설정 모달 ── -->
      <div class="col-settings-overlay" x-show="settingsOpen" x-cloak @click.self="settingsOpen = false">
        <div class="col-settings-modal" @click.stop>
          <div class="col-settings-header">
            <span>리스트 항목 설정</span>
            <button type="button" @click="settingsOpen = false">✕</button>
          </div>
          <div class="col-settings-body">
            <div class="col-settings-side">
              <div class="col-settings-side-label">보여질 항목</div>
              <p class="col-settings-hint">클릭하면 아래로 이동합니다. 드래그로 순서를 바꿀 수 있습니다.</p>
              <ul id="visibleCols" class="col-settings-list">
                <li th:each="col : ${orderItems}"
                    th:attr="data-column=${col['column_name'] != null ? col['column_name'] : col['coulmn']},
                             data-comment=${col['column_comment'] != null and not #strings.isEmpty(col['column_comment']) ? col['column_comment'] : (col['column_name'] != null ? col['column_name'] : col['coulmn'])}"
                    class="col-settings-item" draggable="true"
                    th:text="${col['column_comment'] != null and not #strings.isEmpty(col['column_comment']) ? col['column_comment'] : (col['column_name'] != null ? col['column_name'] : col['coulmn'])}">
                </li>
              </ul>
            </div>
            <div class="col-settings-side">
              <div class="col-settings-side-label">가려질 항목</div>
              <p class="col-settings-hint">클릭하면 위로 이동합니다.</p>
              <ul id="hiddenCols" class="col-settings-list">
                <li th:each="col : ${innerContentItems}"
                    th:attr="data-column=${col['column_name'] != null ? col['column_name'] : col['coulmn']},
                             data-comment=${col['column_comment'] != null and not #strings.isEmpty(col['column_comment']) ? col['column_comment'] : (col['column_name'] != null ? col['column_name'] : col['coulmn'])}"
                    class="col-settings-item" draggable="true"
                    th:text="${col['column_comment'] != null and not #strings.isEmpty(col['column_comment']) ? col['column_comment'] : (col['column_name'] != null ? col['column_name'] : col['coulmn'])}">
                </li>
              </ul>
            </div>
          </div>
          <div class="col-settings-footer">
            <button type="button" class="btn btn--ghost" @click="moveAllToHidden()">모두 비우기</button>
            <button type="button" class="btn btn--outline" @click="settingsOpen = false">닫기</button>
            <button type="button" class="btn btn--primary" :disabled="saving" @click="saveSettings()" x-text="saving ? '저장 중...' : '저장'"></button>
          </div>
        </div>
      </div>

    </div><!-- .page -->
  </main>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
function listPage() {
  const ctx     = (/*[[@{/}]]*/ '/').replace(/\/$/, '');
  const records = /*[[${recordItems}]]*/ [];
  const phOpts  = /*[[${phOptions}]]*/ [];
  const columns = /*[[${orderItems}]]*/ [];
  const today   = new Date().toISOString().slice(0, 10);

  // ── 유틸 ──
  function esc(v) {
    return String(v == null ? '' : v)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  const STATUS_MAP = {
    '입원완료':'admitted','입원예약':'reserved','접수':'receive',
    '진행중':'progress','완료':'done','취소':'cancel','상담중':'progress','미완료':'pending'
  };
  const LEAD_COLOR = { A:'#e74c3c', B:'#e67e22', C:'#3498db' };

  function renderStatusBadge(v) {
    const s = String(v || '').trim();
    if (!s) return '';
    return `<span class="status status--${STATUS_MAP[s] || 'pending'}">${esc(s)}</span>`;
  }
  function renderLeadBadge(v) {
    const r = String(v || '').trim().toUpperCase();
    if (!['A','B','C'].includes(r)) return '';
    return `<span class="av__circle" style="background:${LEAD_COLOR[r]};width:18px;height:18px;font-size:9px;">${r}</span>`;
  }

  return {
    ctx,
    queue:        /*[[${queueItems}]]*/ [],
    queueLoading: false,
    allRecords:   records,
    filtered:     records,
    activeFilter: 'all',
    viewMode:     'table',
    calendarMonth: today.slice(0, 7),
    calendarWeekdays: ['일', '월', '화', '수', '목', '금', '토'],
    activeCalendarDate: '',
    mobileFilterOpen: false,
    mobileActionsOpen: false,
    selectedIds:  new Set(),
    columns,
    phOptions:    phOpts,
    saving:       false,

    init() {
      this.$nextTick(() => {
        if (typeof window.applyFreezePositions === 'function') window.applyFreezePositions();
        this.refreshQueue({ silent: true });
      });
      this._refreshOnPageShow = () => this.refreshQueue({ silent: true });
      this._refreshOnFocus = () => this.refreshQueue({ silent: true });
      this._refreshOnVisibility = () => {
        if (!document.hidden) this.refreshQueue({ silent: true });
      };
      window.addEventListener('pageshow', this._refreshOnPageShow);
      window.addEventListener('focus', this._refreshOnFocus);
      document.addEventListener('visibilitychange', this._refreshOnVisibility);
      this._queueRefreshTimer = setInterval(() => {
        if (!document.hidden) this.refreshQueue({ silent: true });
      }, 15000);
    },

    destroy() {
      window.removeEventListener('pageshow', this._refreshOnPageShow);
      window.removeEventListener('focus', this._refreshOnFocus);
      document.removeEventListener('visibilitychange', this._refreshOnVisibility);
      clearInterval(this._queueRefreshTimer);
    },

    visit(path) {
      const url = path && path.startsWith('http')
        ? path
        : (path && this.ctx && path.startsWith(this.ctx + '/') ? path : this.ctx + path);
      if (window.Turbo && typeof window.Turbo.visit === 'function') {
        window.Turbo.visit(url);
      } else {
        window.location.href = url;
      }
    },

    submitSearch(event) {
      const form = event?.target;
      if (!form) return;
      const params = new URLSearchParams(new FormData(form));
      if (params.get('dateRange') !== 'custom') {
        params.delete('startDate');
        params.delete('endDate');
      }
      const action = form.getAttribute('action') || (this.ctx + '/counsel/list');
      this.visit(action + '?' + params.toString());
    },

    async refreshQueue(options = {}) {
      if (this.queueLoading) return;
      this.queueLoading = true;
      try {
        const res = await fetch(this.ctx + '/counsel/list/reservations?requestType=json', {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          credentials: 'same-origin'
        });
        const body = await res.json().catch(() => ({}));
        if (res.redirected || res.url.includes('/login') || res.status === 401 || res.status === 403 || body.success === false) {
          this.visit('/login');
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        this.queue = Array.isArray(body.queueItems) ? body.queueItems : [];
      } catch (e) {
        console.error('Reservation queue refresh failed:', e);
        if (!options.silent) {
          alert('상담 접수 대기 목록을 새로고침하지 못했습니다.');
        }
      } finally {
        this.queueLoading = false;
      }
    },

    // pill 카운트
    get todayCount()      { return this.allRecords.filter(r => (r['cs_col_16'] || '').slice(0,10) === today).length; },
    get incompleteCount() { return this.allRecords.filter(r => String(r['cs_col_19'] || '') !== '입원완료').length; },
    get calendarTitle() {
      const [year, month] = this.calendarMonth.split('-').map(Number);
      return `${year}년 ${month}월`;
    },
    get calendarMonthCount() {
      return this.filtered.filter(r => this.getRecordDate(r).slice(0, 7) === this.calendarMonth).length;
    },
    get calendarDays() {
      const [year, month] = this.calendarMonth.split('-').map(Number);
      const first = new Date(year, month - 1, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());

      const days = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const date = this.formatCalendarDate(d);
        days.push({
          date,
          day: d.getDate(),
          inMonth: d.getMonth() === month - 1,
          isToday: date === today,
          records: this.filtered.filter(r => this.getRecordDate(r) === date),
        });
      }
      return days;
    },

    get allChecked() {
      return this.filtered.length > 0 && this.filtered.every(r => this.selectedIds.has(r.cs_idx));
    },

    setFilter(f) {
      this.activeFilter = f;
      if (f === 'today')           this.filtered = this.allRecords.filter(r => (r['cs_col_16'] || '').slice(0,10) === today);
      else if (f === 'incomplete') this.filtered = this.allRecords.filter(r => String(r['cs_col_19'] || '') !== '입원완료');
      else                         this.filtered = this.allRecords;
      this.selectedIds = new Set();
    },

    toggleRow(id) {
      const next = new Set(this.selectedIds);
      if (next.has(id)) next.delete(id); else next.add(id);
      this.selectedIds = next;
    },

    toggleAll(checked) {
      this.selectedIds = checked ? new Set(this.filtered.map(r => r.cs_idx)) : new Set();
    },

    toggleRecordView() {
      this.viewMode = this.viewMode === 'calendar' ? 'table' : 'calendar';
      this.activeCalendarDate = '';
    },

    formatCalendarDate(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    },

    getRecordDate(record) {
      const raw = String(record?.cs_col_16 || record?.csCol16 || record?.counselDate || '').trim();
      const matched = raw.match(/\d{4}-\d{2}-\d{2}/);
      return matched ? matched[0] : '';
    },

    moveCalendarMonth(delta) {
      const [year, month] = this.calendarMonth.split('-').map(Number);
      const next = new Date(year, month - 1 + delta, 1);
      this.calendarMonth = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
      this.activeCalendarDate = '';
    },

    setCalendarToday() {
      this.calendarMonth = today.slice(0, 7);
      this.activeCalendarDate = '';
    },

    openCalendarDay(day) {
      if (day.records.length > 0) {
        this.activeCalendarDate = day.date;
      }
    },

    closeCalendarDay(day) {
      if (this.activeCalendarDate === day.date) {
        this.activeCalendarDate = '';
      }
    },

    toggleCalendarDay(day) {
      if (day.records.length === 0) return;
      this.activeCalendarDate = this.activeCalendarDate === day.date ? '' : day.date;
    },

    calendarDayLabel(date) {
      const [year, month, day] = String(date || '').split('-');
      if (!year || !month || !day) return '';
      return `${Number(month)}월 ${Number(day)}일`;
    },

    calendarRecordTitle(record) {
      return String(record?.cs_col_01 || record?.name || '(이름 없음)');
    },

    calendarRecordMeta(record) {
      const status = String(record?.cs_col_19 || '').trim();
      const counselor = String(record?.cs_col_17 || '').trim();
      return [status, counselor].filter(Boolean).join(' · ') || '상담 기록';
    },

    // ── 셀 렌더링 ──
    renderCell(r, colName) {
      if (!colName) return '';
      const clean = colName.replace(/\[\]$/, '');
      // 상태 배지
      if (clean === 'cs_col_19') return renderStatusBadge(r[colName] ?? r[clean]);
      // 잠재고객 배지
      if (clean === 'cs_col_09') return renderLeadBadge(r[colName] ?? r[clean]);
      // 환자명 + 잠재고객 배지
      if (clean === 'cs_col_01') {
        const name = esc(r[colName] ?? r[clean] ?? '');
        const lead = renderLeadBadge(r['cs_col_09']);
        return `<div class="av"><span>${name}</span>${lead}</div>`;
      }
      // 보호자 배열 컬럼
      const gs = Array.isArray(r.guardians) ? r.guardians : [];
      if (clean === 'cs_col_13') return gs.map(g => `<p>${esc(g.name || '')}</p>`).join('') || esc(r[colName] ?? '');
      if (clean === 'cs_col_14') return gs.map(g => `<p>${esc(g.relationship || '')}</p>`).join('') || esc(r[colName] ?? '');
      if (clean === 'cs_col_15') return gs.map(g => `<p>${esc(g.contact_number || '')}</p>`).join('') || esc(r[colName] ?? '');
      // 상병명 (배열)
      if (clean === 'cs_col_11') {
        const val = r[colName] ?? r[clean];
        if (Array.isArray(val)) return val.map(v => `<span class="tag-chip">${esc(v)}</span>`).join('');
        return esc(val ?? '');
      }
      // 기본
      const val = r[colName] ?? r[clean];
      if (val == null || val === '') return '—';
      if (Array.isArray(val)) return val.map(v => esc(String(v))).join(', ');
      return esc(String(val));
    },

    // ── 환자정보 삭제 ──
    async deleteSelected() {
      if (this.selectedIds.size === 0) { alert('삭제할 항목을 선택해주세요.'); return; }
      if (!confirm(`${this.selectedIds.size}건을 삭제합니다. 복구가 불가능합니다. 계속하시겠습니까?`)) return;
      const csrf       = document.querySelector('meta[name="_csrf"]')?.content || '';
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
      const ids = Array.from(this.selectedIds);
      const results = await Promise.all(ids.map(id =>
        fetch(ctx + '/counsel/delete/' + id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', [csrfHeader]: csrf },
          credentials: 'same-origin'
        }).then(r => r.ok ? r.json() : Promise.reject())
          .then(res => ({ id, ok: res.result === '1' }))
          .catch(() => ({ id, ok: false }))
      ));
      const failed = results.filter(r => !r.ok).length;
      if (failed === 0) {
        alert(`${ids.length}건 삭제 완료`);
      } else {
        alert(`삭제 완료: ${ids.length - failed}건, 실패: ${failed}건`);
      }
      window.location.reload();
    },

    // ── 일괄 문자 ──
    bulkSmsOpen:    false,
    bulkFrom:       '',
    bulkMsg:        '',
    bulkByteInfo:   '0 / 90 byte (SMS)',
    bulkOverLimit:  false,
    bulkSending:    false,
    bulkSelectAll:  true,
    bulkRecipients: [],

    openBulkSms() {
      if (this.selectedIds.size === 0) { alert('문자를 보낼 대상을 선택해주세요.'); return; }
      this.bulkRecipients = [];
      this.filtered.filter(r => this.selectedIds.has(r.cs_idx)).forEach(r => {
        const name = r['cs_col_01'] || '';
        const gs   = Array.isArray(r.guardians) ? r.guardians : [];
        if (gs.length > 0) {
          gs.forEach(g => {
            const phone = (g.contact_number || '').trim();
            if (phone) this.bulkRecipients.push({ name, phone, checked: true });
          });
        } else {
          const phone = String(r['cs_col_15'] || '').trim();
          if (phone) this.bulkRecipients.push({ name, phone, checked: true });
        }
      });
      this.bulkSelectAll = true;
      this.bulkMsg = '';
      this.updateBulkBytes();
      this.bulkSmsOpen = true;
    },

    toggleBulkAll(checked) { this.bulkRecipients.forEach(r => { r.checked = checked; }); },

    calcBytes(text) {
      let b = 0;
      for (let i = 0; i < text.length; i++) b += text.charCodeAt(i) > 127 ? 2 : 1;
      return b;
    },

    updateBulkBytes() {
      const bytes = this.calcBytes(this.bulkMsg);
      const max   = bytes > 90 ? 2000 : 90;
      const type  = bytes > 90 ? 'LMS' : 'SMS';
      this.bulkByteInfo  = `${bytes} / ${max} byte (${type})`;
      this.bulkOverLimit = bytes > max;
    },

    async sendBulkSms() {
      if (!this.bulkFrom) { alert('발신번호를 선택해주세요.'); return; }
      const msg = this.bulkMsg.trim();
      if (!msg) { alert('메시지를 입력해주세요.'); return; }
      const targets = this.bulkRecipients.filter(r => r.checked);
      if (targets.length === 0) { alert('수신자를 선택해주세요.'); return; }
      if (this.bulkOverLimit) { alert('메시지 최대 byte를 초과했습니다.'); return; }

      this.bulkSending = true;
      const csrf       = document.querySelector('meta[name="_csrf"]')?.content || '';
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
      const now  = new Date();
      const pad  = n => String(n).padStart(2, '0');
      const base = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate())
                 + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
      const bytes    = this.calcBytes(msg);
      const sendType = bytes > 90 ? 'lms' : 'sms';

      const results = await Promise.all(targets.map((t, i) => {
        const payload = {
          refkey: base + String(i).padStart(3, '0'),
          type:   sendType,
          from:   this.bulkFrom,
          to:     t.phone.replace(/-/g, ''),
          content: sendType === 'lms'
            ? { lms: { subject: msg.substring(0, 20), message: msg } }
            : { sms: { message: msg } }
        };
        return fetch(ctx + '/api/external/sendSMS', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', [csrfHeader]: csrf },
          body: JSON.stringify(payload),
          credentials: 'same-origin'
        }).then(r => r.json()).then(res => ({ ok: res?.description === 'success' }))
          .catch(() => ({ ok: false }));
      }));

      this.bulkSending = false;
      const failed = results.filter(r => !r.ok).length;
      if (failed === 0) {
        alert(`${targets.length}건 전송 완료`);
        this.bulkSmsOpen = false;
      } else {
        alert(`전송 완료: ${results.length - failed}건\n실패: ${failed}건`);
      }
    },

    // ── 항목 설정 모달 ──
    settingsOpen: false,

    moveAllToHidden() {
      const hidden  = document.getElementById('hiddenCols');
      const visible = document.getElementById('visibleCols');
      if (!hidden || !visible) return;
      while (visible.firstChild) hidden.appendChild(visible.firstChild);
    },

    async saveSettings() {
      const visible = document.getElementById('visibleCols');
      const hidden  = document.getElementById('hiddenCols');
      if (!visible || !hidden) return;

      const data = [];
      const visibleColSet = new Set();
      Array.from(visible.children).forEach((li, idx) => {
        const col = li.getAttribute('data-column');
        if (!col || col === 'null') return;
        visibleColSet.add(col);
        data.push({
          column:  col,
          comment: (li.getAttribute('data-comment') || '').substring(0, 50),
          turn:    idx + 1,
          viewYn:  'y'
        });
      });
      Array.from(hidden.children).forEach(li => {
        const col = li.getAttribute('data-column');
        if (!col || col === 'null') return;
        data.push({
          column:  col,
          comment: (li.getAttribute('data-comment') || '').substring(0, 50),
          turn:    null,
          viewYn:  'n'
        });
      });

      // 좌측 고정 상태를 localStorage에 저장 (표시 항목 중 핀된 것만)
      const pinned = window._pinnedCols ? Array.from(window._pinnedCols).filter(c => visibleColSet.has(c)) : [];
      localStorage.setItem('csm-frozen-cols', JSON.stringify(pinned));

      const csrf       = document.querySelector('meta[name="_csrf"]')?.content || '';
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
      this.saving = true;

      try {
        console.log('[ListSetting] sending', data.length, 'items:', data.map(d => d.column + '(' + d.viewYn + ')'));
        const res = await fetch(this.ctx + '/counsel/ListSetting', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', [csrfHeader]: csrf },
          credentials: 'same-origin',
          body: JSON.stringify(data)
        });
        const body = await res.text().catch(() => '');
        console.log('[ListSetting] response', res.status, res.redirected, body);
        if (res.redirected || res.url.includes('/login') || res.status === 401 || res.status === 403) {
          alert('세션이 만료되었습니다. 다시 로그인해주세요.');
          window.location.href = this.ctx + '/login';
          return;
        }
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${body}`);
        }
        window.location.reload();
      } catch (e) {
        console.error('ListSetting error:', e);
        alert('설정 저장 중 오류가 발생했습니다: ' + e.message);
      } finally {
        this.saving = false;
      }
    }
  };
}
/*]]>*/

<script>
  document.addEventListener('turbo:load', () => { MPChrome.mount({ parent: '상담 업무', current: '상담리스트' }); }, { once: true });

<script data-turbo-eval="false" src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script>
  document.addEventListener('turbo:load', function () {
    var visibleEl = document.getElementById('visibleCols');
    var hiddenEl  = document.getElementById('hiddenCols');
    if (!visibleEl || !hiddenEl) return;

    // ── 좌측 고정 (pin/freeze) ──
    var savedFrozen = [];
    try { savedFrozen = JSON.parse(localStorage.getItem('csm-frozen-cols') || '[]'); } catch (e) {}
    window._pinnedCols = new Set(savedFrozen);

    var PIN_ICON = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17z"/></svg>';

    function makePinBtn(col) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'pin-btn' + (window._pinnedCols.has(col) ? ' pin-btn--active' : '');
      btn.title = '좌측 고정';
      btn.innerHTML = PIN_ICON;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (window._pinnedCols.has(col)) {
          window._pinnedCols.delete(col);
          btn.classList.remove('pin-btn--active');
        } else {
          window._pinnedCols.add(col);
          btn.classList.add('pin-btn--active');
        }
      });
      return btn;
    }

    function addPinButtons() {
      Array.from(visibleEl.querySelectorAll('.col-settings-item')).forEach(function (li) {
        if (li.querySelector('.pin-btn')) return;
        var col = li.getAttribute('data-column');
        if (!col) return;
        if (!li.querySelector('.col-settings-item__label')) {
          var text = li.textContent.trim();
          li.textContent = '';
          var span = document.createElement('span');
          span.className = 'col-settings-item__label';
          span.textContent = text;
          li.appendChild(span);
        }
        li.appendChild(makePinBtn(col));
      });
    }

    addPinButtons();
    new MutationObserver(addPinButtons).observe(visibleEl, { childList: true });

    // freeze 적용 함수 (전역 노출 — Alpine init()에서도 호출)
    window.applyFreezePositions = function () {
      var frozenSet = window._pinnedCols || new Set();
      var ths = Array.from(document.querySelectorAll('.table thead tr th'));

      ths.forEach(function (th) {
        th.classList.remove('col-frozen', 'col-frozen-last');
        th.style.removeProperty('left');
        th.style.removeProperty('z-index');
      });
      document.querySelectorAll('.table tbody td.col-frozen').forEach(function (td) {
        td.classList.remove('col-frozen', 'col-frozen-last');
        td.style.removeProperty('position');
        td.style.removeProperty('left');
        td.style.removeProperty('z-index');
      });

      if (!frozenSet.size) return;

      // 왼쪽부터 차례대로 누적 너비를 계산해 left 값 결정
      var cumulativeLeft = 0;
      var frozenInfo = [];
      ths.forEach(function (th, idx) {
        var col = th.getAttribute('data-col');
        // 체크박스 컬럼(col-check)은 항상 고정
        var shouldFreeze = th.classList.contains('col-check') || (col && frozenSet.has(col));
        if (shouldFreeze) {
          th.classList.add('col-frozen');
          th.style.left = cumulativeLeft + 'px';
          th.style.zIndex = '3';
          frozenInfo.push({ idx: idx, left: cumulativeLeft });
          cumulativeLeft += th.offsetWidth;
        }
      });

      // 마지막 고정 컬럼에 구분선 클래스 추가
      if (frozenInfo.length) {
        var lastIdx = frozenInfo[frozenInfo.length - 1].idx;
        ths[lastIdx].classList.add('col-frozen-last');
      }

      document.querySelectorAll('.table tbody tr').forEach(function (tr) {
        var tds = tr.querySelectorAll('td');
        frozenInfo.forEach(function (fi, i) {
          var td = tds[fi.idx];
          if (td) {
            td.classList.add('col-frozen');
            td.style.left = fi.left + 'px';
            if (i === frozenInfo.length - 1) td.classList.add('col-frozen-last');
          }
        });
      });
    };

    // 클릭으로 이동 (핀 버튼 클릭 제외)
    visibleEl.addEventListener('click', function (e) {
      if (e.target.closest('.pin-btn')) return;
      var li = e.target.closest('.col-settings-item');
      if (li) hiddenEl.appendChild(li);
    });
    hiddenEl.addEventListener('click', function (e) {
      var li = e.target.closest('.col-settings-item');
      if (li) visibleEl.appendChild(li);
    });

    // 드래그 (Sortable이 로드된 경우에만)
    if (typeof Sortable !== 'undefined') {
      var shared = { group: { name: 'cols', pull: true, put: true }, animation: 150, ghostClass: 'sortable-ghost' };
      new Sortable(visibleEl, shared);
      new Sortable(hiddenEl, shared);
    }
  });
</script>

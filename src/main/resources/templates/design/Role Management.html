<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediPlat · 역할 관리</title>

  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/role-management.css" />
  <link rel="stylesheet" href="assets/css/tweaks.css" />
</head>
<body>

    <symbol id="i-briefcase" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></symbol>
    <symbol id="i-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></symbol>

    <symbol id="i-sliders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></symbol>

</svg>

<div class="app"
     data-screen-label="Role Management"
     :data-sidebar="$store.app.sidebarCollapsed ? 'collapsed' : 'expanded'"
     :data-variation="$store.app.variation"
     :data-layout="$store.app.layout"
     x-data>

  <div id="slot-sidebar"></div>
  <div id="slot-header"></div>

  <!-- ============ Main ============ -->
  <main class="main">
    <div class="page" x-data="roleManager()">

      <!-- Page header -->
      <div class="page__header">
        <div>
          <h1 class="page__title">관리자 설정</h1>
          <p class="page__subtitle">사용자와 역할을 관리하고 시스템 권한을 제어합니다</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" role="tablist">
        <button class="tab" role="tab">
          <svg><use href="#i-users"/></svg>
          사용자 관리
        </button>
        <button class="tab is-active" role="tab" aria-selected="true">
          <svg><use href="#i-key"/></svg>
          역할 관리
        </button>
      </div>

      <!-- Split shell -->
      <div class="role-shell" style="container-type: inline-size;">

        <!-- ===== Role list ===== -->
        <aside class="panel">
          <div class="panel__header">
            <span class="panel__title">역할 목록</span>
            <span class="panel__count" x-text="roles.length + '개'">6개</span>
          </div>
          <div class="panel__body">
            <ul class="role-list" role="tablist">
              <template x-for="r in roles" :key="r.id">
                <li class="role-item"
                    :class="{ 'is-active': activeRole === r.id }"
                    @click="selectRole(r.id)">
                  <div class="role-item__icon">
                    <svg><use :href="'#i-' + r.icon"></use></svg>
                  </div>
                  <div>
                    <div class="role-item__name" x-text="r.name"></div>
                    <div class="role-item__meta" x-text="r.meta"></div>
                  </div>
                  <svg class="role-item__chevron"><use href="#i-chevron-right"/></svg>
                </li>
              </template>
            </ul>
            <button class="role-list__add">
              <svg><use href="#i-plus"/></svg>
              새 역할 만들기
            </button>
          </div>
        </aside>

        <!-- ===== Detail ===== -->
        <section class="role-detail">

          <!-- Hero banner -->
          <div class="role-hero" :key="activeRole" style="view-transition-name: role-hero;">
            <div class="role-hero__icon">
              <svg><use :href="'#i-' + current.icon"></use></svg>
            </div>
            <div class="role-hero__meta">
              <div class="role-hero__eyebrow">역할 세부 설정</div>
              <div class="role-hero__name">
                <span x-text="current.name"></span>
                <span class="badge badge--brand">활성</span>
              </div>
              <div class="role-hero__desc" x-text="current.desc"></div>
            </div>
            <div class="role-hero__stats">
              <div class="role-stat">
                <div class="role-stat__value" x-text="current.selected.length"></div>
                <div class="role-stat__label">권한 수</div>
              </div>
              <div class="role-stat">
                <div class="role-stat__value" x-text="current.users.length"></div>
                <div class="role-stat__label">할당 인원</div>
              </div>
            </div>
            <div class="role-actions">
              <button class="btn btn--ghost" title="복제">
                <svg><use href="#i-copy"/></svg>
                복제
              </button>
              <button class="btn btn--outline">
                <svg><use href="#i-edit"/></svg>
                이름 변경
              </button>
            </div>
          </div>

          <!-- Permissions panel -->
          <div class="panel">
            <div class="panel__header">
              <span class="panel__title">권한 설정</span>
              <span class="panel__count">
                <span x-text="current.selected.length"></span> / <span x-text="totalPerms"></span>
              </span>
              <div style="flex:1"></div>
              <div class="perm-panel__search">
                <svg><use href="#i-search"/></svg>
                <input type="text" placeholder="권한 검색" x-model="search" />
              </div>
            </div>

            <template x-for="g in groups" :key="g.id">
              <div class="perm-group" x-show="filteredItems(g).length > 0">
                <div class="perm-group__header">
                  <span class="perm-group__title" x-text="g.label"></span>
                  <span class="perm-group__count">
                    <span x-text="groupCount(g.id)"></span>/<span x-text="g.items.length"></span>
                  </span>
                  <button class="perm-group__toggle-all" @click="toggleGroup(g.id)">
                    전체 <span x-text="g.items.every(i=>has(i.id)) ? '해제' : '선택'"></span>
                  </button>
                </div>
                <div class="perm-grid">
                  <template x-for="p in filteredItems(g)" :key="p.id">
                    <label class="perm-card">
                      <input type="checkbox"
                             :checked="has(p.id)"
                             @change="toggle(p.id)" />
                      <span class="perm-card__check">
                        <svg><use href="#i-check"/></svg>
                      </span>
                      <span class="perm-card__icon">
                        <svg><use :href="'#i-' + p.icon"></use></svg>
                      </span>
                      <span class="perm-card__body">
                        <span class="perm-card__label" x-text="p.name"></span>
                        <span class="perm-card__desc" x-text="p.desc"></span>
                      </span>
                    </label>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <!-- Assigned users -->
          <div class="panel users-panel">
            <div class="panel__header">
              <span class="panel__title">이 역할의 사용자</span>
              <span class="panel__count" x-text="current.users.length + '명'"></span>
            </div>
            <div class="users-panel__body">
              <template x-if="current.users.length === 0">
                <div class="users-empty">할당된 사용자가 없습니다</div>
              </template>
              <template x-if="current.users.length > 0">
                <div class="users-chips">
                  <template x-for="u in current.users" :key="u.id">
                    <div class="user-chip">
                      <div class="user-chip__avatar" :style="{ background: u.color }" x-text="u.name.charAt(0)"></div>
                      <span x-text="u.name"></span>
                      <span class="user-chip__id" x-text="'(' + u.id + ')'"></span>
                      <button class="user-chip__remove" aria-label="제거">
                        <svg><use href="#i-x"/></svg>
                      </button>
                    </div>
                  </template>
                </div>
              </template>
              <button class="user-add">
                <svg><use href="#i-plus"/></svg>
                사용자 추가
              </button>
            </div>
          </div>

          <!-- Save bar (appears when dirty) -->
          <template x-if="dirty">
            <div class="save-bar">
              <div class="save-bar__dot"></div>
              <div class="save-bar__msg">
                <strong x-text="current.name"></strong> 역할에 저장되지 않은 변경사항이 있습니다
              </div>
              <button class="save-bar__btn-ghost" @click="dirty = false">되돌리기</button>
              <button class="save-bar__btn-save" @click="save()">변경사항 저장</button>
            </div>
          </template>

        </section>
      </div>

    </div>
  </main>

  <!-- ============ Tweaks ============ -->
  <button class="tweaks-fab" @click="$store.app.tweaksOpen = !$store.app.tweaksOpen"
          :data-tweaks-open="$store.app.tweaksOpen">
    <svg><use href="#i-sliders"/></svg>
  </button>
  <div class="tweaks-panel" :data-tweaks-open="$store.app.tweaksOpen"
       x-bind:style="$store.app.tweaksOpen ? 'display:block' : 'display:none'">
    <h3>디자인 변형</h3>
    <p>세 가지 톤을 실시간으로 전환해 비교해 보세요.</p>

    <div class="tweak-row">
      <label class="tweak-row__label">컬러 테마</label>
      <div class="tweak-segments">
        <button class="tweak-seg" :class="{'is-active': $store.app.variation === 'default'}" @click="$store.app.setVariation('default')">Classic</button>
        <button class="tweak-seg" :class="{'is-active': $store.app.variation === 'fresh'}" @click="$store.app.setVariation('fresh')">Fresh</button>
        <button class="tweak-seg" :class="{'is-active': $store.app.variation === 'executive'}" @click="$store.app.setVariation('executive')">Executive</button>
      </div>
    </div>

    <div class="tweak-row">
      <label class="tweak-row__label">권한 레이아웃</label>
      <div class="tweak-segments">
        <button class="tweak-seg" :class="{'is-active': $store.app.layout === 'grid'}" @click="$store.app.setLayout('grid')">카드 그리드</button>
        <button class="tweak-seg" :class="{'is-active': $store.app.layout === 'list'}" @click="$store.app.setLayout('list')">세로 리스트</button>
        <button class="tweak-seg" :class="{'is-active': $store.app.layout === 'compact'}" @click="$store.app.setLayout('compact')">컴팩트</button>
      </div>
    </div>

    <div class="tweak-row">
      <label class="tweak-row__label">사이드바</label>
      <div class="tweak-segments">
        <button class="tweak-seg" :class="{'is-active': !$store.app.sidebarCollapsed}" @click="if($store.app.sidebarCollapsed) $store.app.toggleSidebar()">펼침</button>
        <button class="tweak-seg" :class="{'is-active': $store.app.sidebarCollapsed}" @click="if(!$store.app.sidebarCollapsed) $store.app.toggleSidebar()">접힘</button>
      </div>
    </div>
  </div>

</div>

<!-- Editor defaults for host persistence -->
<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "variation": "default",
    "layout": "grid",
    "sidebarCollapsed": false
  }/*EDITMODE-END*/;
</script>

<script src="assets/js/sprite.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/chrome.js" data-page="admin"></script>
<script>
  document.addEventListener('alpine:init', () => { MPChrome.mount({ parent: '관리자', current: '역할 관리' }); });
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

</body>
</html>

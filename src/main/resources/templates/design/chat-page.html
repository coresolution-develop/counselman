<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="ctx" th:content="@{/}"/>
  <title th:text="${instName != null and !instName.isEmpty()} ? '상담 | ' + ${instName} : '상담'">상담</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <style>
    [x-cloak] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Pretendard Variable', 'Noto Sans KR', system-ui, sans-serif;
      font-size: 16px;
      color: #1a2332;
      background: #f4f6f9;
    }

    /* ── App shell ── */
    .app {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* ── Header ── */
    .chat-header {
      flex-shrink: 0;
      background: #1a2332;
      color: #fff;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 10;
    }
    .chat-header__left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header h1 {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }
    .btn-faq-toggle {
      display: none;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      min-height: 36px;
    }
    .chat-header__right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }
    .user-nickname {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn-logout {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      min-height: 36px;
      display: flex;
      align-items: center;
    }
    .btn-logout:hover { background: rgba(255,255,255,.25); }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    /* ── FAQ 패널 ── */
    .faq-panel {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .faq-panel__header {
      flex-shrink: 0;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f3f4f6;
    }
    .faq-panel__title {
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 12px;
    }
    .cat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .cat-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      min-height: 32px;
    }
    .cat-btn.active {
      background: #1a2332;
      color: #fff;
      border-color: #1a2332;
    }
    .faq-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .faq-item { border-bottom: 1px solid #f3f4f6; }
    .faq-q {
      width: 100%;
      text-align: left;
      padding: 12px 20px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: #1a2332;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.5;
    }
    .faq-q:hover { background: #f9fafb; }
    .faq-arrow {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: #9ca3af;
      transition: transform .2s;
      margin-top: 2px;
    }
    .faq-q.open .faq-arrow { transform: rotate(180deg); }
    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height .25s ease, padding .2s;
      font-size: 14px;
      color: #374151;
      line-height: 1.7;
      white-space: pre-wrap;
      padding: 0 20px;
    }
    .faq-a.open { max-height: 400px; padding: 0 20px 14px; }
    .faq-empty {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      padding: 32px 20px;
    }

    /* ── 채팅 패널 ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    /* ── 로그인 화면 ── */
    .login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      max-width: 360px;
      width: 100%;
    }
    .login-card .icon {
      width: 64px;
      height: 64px;
      background: #f0f4f8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .login-card .icon svg { width: 32px; height: 32px; color: #1a2332; }
    .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .login-card p { font-size: 15px; color: #6b7280; margin-bottom: 28px; line-height: 1.7; }
    .btn-kakao {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #FEE500;
      color: #191919;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      text-decoration: none;
      min-height: 52px;
    }
    .btn-kakao:hover { opacity: .9; }
    .btn-kakao svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── 상담 선택 화면 ── */
    .consult-home {
      flex: 1;
      overflow-y: auto;
      padding: 48px 20px;
      background: #f4f6f9;
    }
    .consult-home__inner {
      width: min(960px, 100%);
      margin: 0 auto;
    }
    .consult-home__eyebrow {
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 10px;
    }
    .consult-home h2 {
      font-size: 28px;
      line-height: 1.35;
      font-weight: 800;
      color: #1a2332;
      margin-bottom: 10px;
    }
    .consult-home__desc {
      font-size: 15px;
      line-height: 1.7;
      color: #6b7280;
      margin-bottom: 28px;
    }
    .consult-menu {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .consult-card {
      min-height: 220px;
      padding: 24px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      transition: border-color .15s, box-shadow .15s, transform .15s;
    }
    .consult-card:hover,
    .consult-card:focus {
      border-color: #1a2332;
      box-shadow: 0 8px 24px rgba(26,35,50,.10);
      transform: translateY(-2px);
      outline: none;
    }
    .consult-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #eef2f7;
      color: #1a2332;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .consult-card__icon svg {
      width: 24px;
      height: 24px;
    }
    .consult-card h3 {
      font-size: 19px;
      font-weight: 800;
      color: #1a2332;
      margin-bottom: 8px;
    }
    .consult-card p {
      font-size: 14px;
      line-height: 1.65;
      color: #6b7280;
      margin-bottom: 20px;
    }
    .consult-card__cta {
      margin-top: auto;
      font-size: 14px;
      font-weight: 700;
      color: #1a2332;
    }

    /* ── 상담 접수 폼 ── */
    .reception-screen {
      flex: 1;
      overflow-y: auto;
      padding: 32px 20px;
      background: #f4f6f9;
    }
    .reception-shell {
      width: min(720px, 100%);
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    .reception-head {
      padding: 22px 24px;
      border-bottom: 1px solid #eef0f3;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .reception-head h2 {
      font-size: 22px;
      line-height: 1.35;
      font-weight: 800;
      color: #1a2332;
      margin-bottom: 6px;
    }
    .reception-head p {
      font-size: 14px;
      line-height: 1.6;
      color: #6b7280;
    }
    .reception-form {
      padding: 24px;
      display: grid;
      gap: 18px;
    }
    .form-field {
      display: grid;
      gap: 8px;
    }
    .form-field label {
      font-size: 14px;
      font-weight: 700;
      color: #1a2332;
    }
    .form-input,
    .form-textarea {
      width: 100%;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus,
    .form-textarea:focus { border-color: #1a2332; }
    .form-textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.55;
    }
    .form-error {
      font-size: 13px;
      color: #dc2626;
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 4px;
    }
    .btn-secondary,
    .btn-primary {
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-height: 42px;
    }
    .btn-secondary {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
    }
    .btn-primary {
      border: 1px solid #1a2332;
      background: #1a2332;
      color: #fff;
    }
    .btn-primary:disabled {
      border-color: #d1d5db;
      background: #d1d5db;
      cursor: default;
    }
    .reception-done {
      padding: 44px 24px;
      text-align: center;
    }
    .reception-done h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .reception-done p {
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    /* ── 상태 바 ── */
    .status-bar {
      flex-shrink: 0;
      padding: 8px 20px;
      background: #f8f9fb;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #6b7280;
      min-height: 36px;
    }
    .status-bar__main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .btn-home {
      margin-left: auto;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 28px;
    }
    .btn-home:hover { border-color: #1a2332; color: #1a2332; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.waiting {
      background: #f59e0b;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .status-dot.active { background: #10b981; }
    .status-dot.closed { background: #9ca3af; }
    .status-dot.idle { background: #d1d5db; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    /* ── 메시지 영역 ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    /* 웰컴 카드 */
    .welcome-card {
      align-self: center;
      text-align: center;
      padding: 32px 24px;
      max-width: 320px;
      margin-top: auto;
    }
    .welcome-card .icon {
      width: 56px;
      height: 56px;
      background: #f0f4f8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .welcome-card .icon svg { width: 28px; height: 28px; color: #1a2332; }
    .welcome-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .welcome-card p { font-size: 14px; color: #6b7280; line-height: 1.7; }

    /* 메시지 버블 */
    .msg { display: flex; flex-direction: column; max-width: 72%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.counselor { align-self: flex-start; align-items: flex-start; }
    .msg.system { align-self: center; align-items: center; max-width: 90%; }
    .msg-name { font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #1a2332;
      color: #fff;
      border-radius: 16px 16px 4px 16px;
    }
    .msg.counselor .msg-bubble {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px 16px 16px 4px;
    }
    .msg.system .msg-bubble {
      background: #e8f4f8;
      color: #4b6a8a;
      font-size: 13px;
      text-align: center;
      border-radius: 8px;
      padding: 8px 16px;
    }

    /* ── 입력 영역 ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid #e5e7eb;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .input-area__row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color .15s;
    }
    .chat-input:focus { border-color: #1a2332; }
    .chat-input:disabled { background: #f9fafb; color: #9ca3af; }
    .btn-send {
      background: #1a2332;
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, opacity .15s;
    }
    .btn-send:disabled { background: #d1d5db; cursor: default; }
    .btn-send svg { width: 20px; height: 20px; }
    .closed-notice {
      flex-shrink: 0;
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
      text-align: center;
      font-size: 14px;
      color: #9ca3af;
    }

    /* ── 모바일 FAQ 오버레이 ── */
    .faq-overlay-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 50;
    }
    .faq-overlay-bg.open { display: block; }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .faq-panel {
        position: fixed;
        top: 56px;
        left: 0;
        bottom: 0;
        width: 85vw;
        max-width: 320px;
        z-index: 60;
        transform: translateX(-100%);
        transition: transform .25s ease;
        border-right: none;
        box-shadow: 4px 0 24px rgba(0,0,0,.15);
      }
      .faq-panel.open { transform: translateX(0); }
      .btn-faq-toggle { display: flex; }
      .msg { max-width: 85%; }
      .chat-header h1 {
        display: block;
        font-size: 14px;
      }
      .chat-header h1.chat-header__title--compact { display: none; }
      .user-nickname { display: none; }
      .chat-header__right { gap: 6px; }
      .btn-logout { padding: 6px 10px; }
    }

    @media (min-width: 768px) {
      .faq-overlay-bg { display: none !important; }
    }

    .msg.bot { align-self: flex-start; align-items: flex-start; }
    .msg.bot .msg-bubble {
      background: #f0f4f8;
      border: 1px solid #d1d5db;
      border-radius: 16px 16px 16px 4px;
    }
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0;
    }
    .quick-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid #1a2332;
      background: #fff;
      color: #1a2332;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      min-height: 36px;
    }
    .quick-btn:hover { background: #1a2332; color: #fff; }
    .quick-btn--primary { background: #1a2332; color: #fff; }
    .quick-btn--primary:hover { opacity: .85; }

    @media (max-width: 900px) {
      .consult-menu { grid-template-columns: 1fr; }
      .consult-card { min-height: auto; }
    }

    @media (max-width: 767px) {
      .reception-screen { padding: 16px; }
      .reception-head {
        flex-direction: column;
        padding: 20px;
      }
      .reception-form { padding: 20px; }
      .form-actions { flex-direction: column-reverse; }
      .btn-secondary,
      .btn-primary { width: 100%; }
    }
  </style>
</head>
<body>
<div class="app" x-data="chatApp()" x-init="init()" x-cloak>

  <!-- ── Header ── -->
  <header class="chat-header">
    <div class="chat-header__left">
      <button class="btn-faq-toggle" x-show="currentView === 'chat'" @click="faqOpen = !faqOpen" :aria-expanded="faqOpen">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
        </svg>
        자주 묻는 질문
      </button>
      <h1 :class="{ 'chat-header__title--compact': currentView === 'chat' }"
          th:text="${instName != null and !instName.isEmpty()} ? ${instName} + ' 상담' : '상담'">상담</h1>
    </div>
    <div class="chat-header__right" x-show="user.loggedIn">
      <img class="user-avatar" :src="user.thumbnail || (CTX + '/img/default-avatar.svg')" :alt="user.nickname"
           onerror="this.src=CTX+'/img/default-avatar.svg'">
      <span class="user-nickname" x-text="user.nickname + ' 님'"></span>
      <a :href="CTX + '/logout?returnTo=chat&t=' + encodeURIComponent(token)" class="btn-logout">로그아웃</a>
    </div>
  </header>

  <!-- 모바일 FAQ 오버레이 배경 -->
  <div class="faq-overlay-bg" :class="{ open: faqOpen && currentView === 'chat' }" @click="faqOpen = false"></div>

  <div class="main-content">

    <!-- ── FAQ 패널 ── -->
    <aside class="faq-panel" :class="{ open: faqOpen }" x-show="user.loggedIn && currentView === 'chat'">
      <div class="faq-panel__header">
        <div class="faq-panel__title">자주 묻는 질문</div>
        <div class="cat-tabs">
          <button class="cat-btn" :class="{ active: activeCategory === '' }" @click="setCategory('')">전체</button>
          <template x-for="cat in categories" :key="cat">
            <button class="cat-btn" :class="{ active: activeCategory === cat }"
                    @click="setCategory(cat)" x-text="cat"></button>
          </template>
        </div>
      </div>
      <div class="faq-list">
        <template x-for="faq in filteredFaqs" :key="faq.id">
          <div class="faq-item">
            <button class="faq-q" :class="{ open: faq._open }" @click="faq._open = !faq._open">
              <span x-text="faq.question"></span>
              <svg class="faq-arrow" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
              </svg>
            </button>
            <div class="faq-a" :class="{ open: faq._open }" x-text="faq.answer"></div>
          </div>
        </template>
        <p class="faq-empty" x-show="filteredFaqs.length === 0">해당하는 질문이 없습니다.</p>
      </div>
    </aside>

    <!-- ── 채팅 패널 ── -->
    <div class="chat-panel">

      <!-- 로그인 전 -->
      <div class="login-screen" x-show="!user.loggedIn">
        <div class="login-card">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
          </div>
          <h2>상담 서비스</h2>
          <p>카카오 로그인 후<br>상담사와 직접 채팅하실 수 있습니다.</p>
          <a class="btn-kakao" :href="kakaoLoginUrl()">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.697 1.613 5.065 4.05 6.47L5.1 21l4.5-2.7c.78.15 1.59.225 2.4.225 5.523 0 10-3.477 10-7.725C22 6.477 17.523 3 12 3z"/>
            </svg>
            카카오로 시작하기
          </a>
        </div>
      </div>

      <!-- 상담 선택 -->
      <template x-if="user.loggedIn && currentView === 'home'">
        <section class="consult-home">
          <div class="consult-home__inner">
            <div class="consult-home__eyebrow">CONSULTATION</div>
            <h2>필요한 상담 방식을 선택해 주세요</h2>
            <p class="consult-home__desc">FAQ 기반 온라인 상담부터 상담 접수, 상담사 연결까지 원하는 방식으로 바로 시작할 수 있습니다.</p>

            <div class="consult-menu">
              <button class="consult-card" type="button" @click="openOnlineConsultation()">
                <span class="consult-card__icon">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H8l-5 4V6c0-1.1.9-2 2-2zm2 4v2h12V8H6zm0 4v2h8v-2H6z"/>
                  </svg>
                </span>
                <h3>온라인 상담</h3>
                <p>궁금한 내용을 입력하면 관련 FAQ를 먼저 안내하고, 필요 시 상담사 연결로 이어집니다.</p>
                <span class="consult-card__cta">질문 시작하기</span>
              </button>

              <button class="consult-card" type="button" @click="openCounselReception()">
                <span class="consult-card__icon">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M7 2h10c1.1 0 2 .9 2 2v16c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2zm1 5h8V5H8v2zm0 4h8V9H8v2zm0 4h5v-2H8v2z"/>
                  </svg>
                </span>
                <h3>상담접수</h3>
                <p>성함, 연락처, 상담 내용을 남기면 담당 상담사가 확인 후 연락드립니다.</p>
                <span class="consult-card__cta">접수 작성하기</span>
              </button>

              <button class="consult-card" type="button" @click="openCounselorConnection()">
                <span class="consult-card__icon">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-3.3 0-6 1.7-6 3.8V20h12v-2.2c0-2.1-2.7-3.8-6-3.8zm7-3h2V9h-2V7h-2v2h-2v2h2v2h2v-2z"/>
                  </svg>
                </span>
                <h3>상담사연결</h3>
                <p>상담사와 바로 대화를 시작하고 싶을 때 연결 대기열로 이동합니다.</p>
                <span class="consult-card__cta">바로 연결하기</span>
              </button>
            </div>
          </div>
        </section>
      </template>

      <!-- 상담 접수 폼 -->
      <template x-if="user.loggedIn && currentView === 'reception'">
        <section class="reception-screen">
          <div class="reception-shell">
            <template x-if="!counselSubmitted">
              <div>
                <div class="reception-head">
                  <div>
                    <h2>상담접수</h2>
                    <p>상담에 필요한 정보를 남겨주시면 담당 상담사가 확인 후 연락드립니다.</p>
                  </div>
                  <button class="btn-secondary" type="button" @click="returnHome()">상담 선택</button>
                </div>

                <form class="reception-form" @submit.prevent="submitCounselForm()">
                  <div class="form-field">
                    <label for="counsel-name">성함</label>
                    <input id="counsel-name"
                           class="form-input"
                           type="text"
                           x-model.trim="counselForm.name"
                           placeholder="성함을 입력해 주세요"
                           autocomplete="name">
                    <p class="form-error" x-show="counselErrors.name" x-text="counselErrors.name"></p>
                  </div>

                  <div class="form-field">
                    <label for="counsel-phone">연락처</label>
                    <input id="counsel-phone"
                           class="form-input"
                           type="tel"
                           x-model.trim="counselForm.phone"
                           placeholder="010-1234-5678"
                           autocomplete="tel">
                    <p class="form-error" x-show="counselErrors.phone" x-text="counselErrors.phone"></p>
                  </div>

                  <div class="form-field">
                    <label for="counsel-content">상담 내용</label>
                    <textarea id="counsel-content"
                              class="form-textarea"
                              x-model.trim="counselForm.content"
                              placeholder="상담이 필요한 내용을 입력해 주세요"></textarea>
                    <p class="form-error" x-show="counselErrors.content" x-text="counselErrors.content"></p>
                  </div>

                  <p class="form-error" x-show="counselErrors.submit" x-text="counselErrors.submit"></p>

                  <div class="form-actions">
                    <button class="btn-secondary" type="button" @click="resetCounselForm()">초기화</button>
                    <button class="btn-primary" type="submit" :disabled="counselSubmitting">
                      <span x-text="counselSubmitting ? '접수 중...' : '상담 접수하기'"></span>
                    </button>
                  </div>
                </form>
              </div>
            </template>

            <template x-if="counselSubmitted">
              <div class="reception-done">
                <h2>상담 접수가 완료되었습니다</h2>
                <p>담당 상담사가 접수 내용을 확인한 뒤 연락드릴 예정입니다.</p>
                <div class="form-actions" style="justify-content:center;">
                  <button class="btn-secondary" type="button" @click="returnHome()">상담 선택</button>
                  <button class="btn-primary" type="button" @click="openOnlineConsultation()">온라인 상담으로 이동</button>
                </div>
              </div>
            </template>
          </div>
        </section>
      </template>

      <!-- 로그인 후 채팅 -->
      <template x-if="user.loggedIn && currentView === 'chat'">
        <div style="display:flex;flex-direction:column;flex:1;min-height:0;">

          <!-- 상태 바 -->
          <div class="status-bar">
            <span class="status-bar__main">
              <span class="status-dot" :class="roomStatus.toLowerCase()"></span>
              <span x-text="statusText"></span>
            </span>
            <button class="btn-home" type="button" @click="returnHome()">상담 선택</button>
          </div>

          <!-- 메시지 영역 -->
          <div class="messages-area" x-ref="msgArea">

            <!-- 웰컴 카드 (메시지 없을 때) -->
            <div class="welcome-card" x-show="messages.length === 0">
              <div class="icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                </svg>
              </div>
              <h3>무엇이든 물어보세요</h3>
              <p>궁금한 내용을 입력하시면 FAQ로 안내해 드립니다.<br>필요하시면 상담사 연결도 도와드립니다.</p>
              <div class="quick-actions" style="justify-content: center; margin-top: 20px;">
                <button class="quick-btn quick-btn--primary" @click="openCounselReception()">상담 접수하기</button>
              </div>
            </div>

            <!-- 메시지 목록 -->
            <template x-for="(msg, idx) in messages" :key="idx">
              <div class="msg"
                   :class="msg.senderType === 'USER' ? 'user' : (msg.type === 'SYSTEM' ? 'system' : (msg.senderType === 'BOT' ? 'bot' : 'counselor'))">
                <div class="msg-name"
                     x-show="msg.senderType !== 'USER' && msg.type !== 'SYSTEM'"
                     x-text="msg.senderName"></div>
                <div class="msg-bubble" style="white-space: pre-line;" x-text="msg.content || msg.text"></div>
                <div class="quick-actions" x-show="msg.actions && msg.actions.length > 0">
                  <template x-for="action in (msg.actions || [])" :key="action">
                    <button class="quick-btn" @click="handleAction(action)" x-text="action"></button>
                  </template>
                </div>
              </div>
            </template>

          </div>

          <!-- 입력 영역 (CLOSED가 아닐 때) -->
          <div class="input-area" x-show="roomStatus !== 'CLOSED'">
            <div class="input-area__row">
              <textarea
                class="chat-input"
                placeholder="메시지를 입력하세요..."
                x-model="input"
                :disabled="sending"
                @keydown.enter.prevent="sendMessage($event)"
                @compositionstart="composing = true"
                @compositionend="composing = false"
                rows="1"
                x-ref="inputEl"></textarea>
              <button class="btn-send"
                      :disabled="!input.trim() || sending"
                      @click="sendMessage()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- 상담 종료 안내 -->
          <div class="closed-notice" x-show="roomStatus === 'CLOSED'">
            상담이 종료되었습니다. 추가 문의가 있으시면 새로고침 후 다시 문의해 주세요.
          </div>

        </div>
      </template>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>

<script>
const CTX = (document.querySelector('meta[name=ctx]')?.content || '/').replace(/\/$/, '');

function chatApp() {
  return {
    token: '',
    user: { loggedIn: false, nickname: '', thumbnail: '' },
    faqs: [],
    categories: [],
    activeCategory: '',
    faqOpen: false,
    currentView: 'home', // home | chat | reception

    messages: [],
    input: '',
    composing: false,
    sending: false,
    botStep: null,  // null | 'name' | 'phone' | 'content' | 'confirm' | 'done'
    botData: { name: '', phone: '', content: '' },
    counselForm: { name: '', phone: '', content: '' },
    counselErrors: {},
    counselSubmitting: false,
    counselSubmitted: false,
    _pendingFirstMessage: null,

    roomId: null,
    roomStatus: 'IDLE',   // IDLE | WAITING | ACTIVE | CLOSED
    stompClient: null,
    _pendingMessages: [],
    _statusPollTimer: null,

    get statusText() {
      if (this.roomStatus === 'IDLE')    return '질문을 입력하시면 안내해 드립니다';
      if (this.roomStatus === 'WAITING') return '상담사 연결 대기 중...';
      if (this.roomStatus === 'ACTIVE')  return '상담사와 연결되었습니다';
      if (this.roomStatus === 'CLOSED')  return '상담 종료';
      return '';
    },

    kakaoLoginUrl() {
      sessionStorage.setItem('chat_token', this.token);
      return CTX + '/oauth2/authorization/kakao';
    },

    async init() {
      const params = new URLSearchParams(location.search);
      this.token = params.get('t') || sessionStorage.getItem('chat_token') || '';
      if (this.token) sessionStorage.setItem('chat_token', this.token);
      if (!this.token) {
        console.warn('chat-page: no chat token in URL');
      }

      this.loadFaqs();
      const res = await fetch(CTX + '/api/chat/me').catch(() => null);
      if (res && res.ok) {
        this.user = await res.json();
        if (this.user.loggedIn) {
          await this.resumeRoom();
        }
      }

      // Keyboard handling for iOS Safari and Android Chrome:
      // - iOS: keyboard scrolls the visual viewport (offsetTop changes)
      // - Android: keyboard shrinks the visual viewport (height changes, offsetTop stays 0)
      // We reposition the fixed .app to match the visual viewport exactly in both cases.
      if (window.visualViewport) {
        const onVV = () => {
          const vv = window.visualViewport;
          const app = document.querySelector('.app');
          if (app) {
            app.style.top = vv.offsetTop + 'px';
            app.style.left = vv.offsetLeft + 'px';
            app.style.width = vv.width + 'px';
            app.style.height = vv.height + 'px';
            app.style.right = 'auto';
            app.style.bottom = 'auto';
          }
          this.$nextTick(() => this.scrollBottom());
        };
        window.visualViewport.addEventListener('resize', onVV);
        window.visualViewport.addEventListener('scroll', onVV);
        onVV();
      }
    },

    async resumeRoom() {
      const res = await fetch(CTX + '/api/chat/room/my?t=' + this.token).catch(() => null);
      if (!res || !res.ok) return;
      const data = await res.json();
      if (!data.id) return;

      this.roomId = typeof data.id === 'number' ? data.id : Number(data.id);
      this.roomStatus = data.status;
      this.currentView = 'chat';

      const msgRes = await fetch(CTX + '/api/chat/room/' + this.roomId + '/messages?t=' + this.token).catch(() => null);
      if (msgRes && msgRes.ok) {
        const rows = await msgRes.json();
        this.messages = rows.map(m => ({
          senderType: m.sender_type,
          senderName: m.sender_name,
          content: m.content
        }));
      }

      this.connectStomp();
      this.$nextTick(() => this.scrollBottom());
    },

    async loadFaqs() {
      const res = await fetch(CTX + '/api/chat/faqs?t=' + this.token).catch(() => null);
      if (!res || !res.ok) return;
      const data = await res.json();
      this.faqs = (Array.isArray(data) ? data : []).map(f => ({ ...f, _open: false }));
      const catSet = new Set(this.faqs.map(f => f.category).filter(Boolean));
      this.categories = [...catSet];
    },

    setCategory(cat) {
      this.activeCategory = cat;
    },

    get filteredFaqs() {
      if (!this.activeCategory) return this.faqs;
      return this.faqs.filter(f => f.category === this.activeCategory);
    },

    openOnlineConsultation() {
      this.currentView = 'chat';
      this.faqOpen = false;
      this.$nextTick(() => this.$refs.inputEl?.focus());
    },

    openCounselReception() {
      this.currentView = 'reception';
      this.faqOpen = false;
      if (this.counselSubmitted) {
        this.counselForm = { name: '', phone: '', content: '' };
        this.counselErrors = {};
        this.counselSubmitted = false;
      }
      this.$nextTick(() => document.getElementById('counsel-name')?.focus());
    },

    async openCounselorConnection() {
      this.currentView = 'chat';
      this.faqOpen = false;
      if (this.roomId) {
        this.$nextTick(() => this.scrollBottom());
        return;
      }
      if (!this.roomId) {
        this.messages.push({ type: 'SYSTEM', text: '상담사 연결을 요청합니다.' });
      }
      this.$nextTick(() => this.scrollBottom());
      await this.connectToCounselor();
    },

    returnHome() {
      this.currentView = 'home';
      this.faqOpen = false;
    },

    async sendMessage(event) {
      if (event?.isComposing || this.composing) return;
      const content = this.input.trim();
      if (!content || this.sending) return;

      // Intercept bot consultation flow
      if (this.botStep && this.botStep !== 'confirm' && this.botStep !== 'done') {
        this.input = '';
        this.messages.push({ senderType: 'USER', senderName: this.user.nickname, content });
        this.$nextTick(() => this.scrollBottom());
        await this.handleBotInput(content);
        return;
      }

      this.input = '';
      this.messages.push({ senderType: 'USER', senderName: this.user.nickname, content });
      this.$nextTick(() => this.scrollBottom());

      // FAQ search before connecting to counselor
      if (!this.roomId && !this.botStep) {
        this._pendingFirstMessage = content;
        const matched = this.searchFaqs(content);
        if (matched.length > 0) {
          const faqText = matched.slice(0, 3).map((f, i) => `Q. ${f.question}\nA. ${f.answer}`).join('\n\n');
          this.messages.push({
            senderType: 'BOT', senderName: '상담봇',
            content: `관련 FAQ를 찾았어요:\n\n${faqText}`,
            actions: ['도움이 됐어요', '상담사에게 연결']
          });
        } else {
          this.messages.push({
            senderType: 'BOT', senderName: '상담봇',
            content: '관련 내용을 찾지 못했어요. 상담사에게 연결해 드릴까요?',
            actions: ['상담사에게 연결', '상담 접수하기']
          });
        }
        this.$nextTick(() => this.scrollBottom());
        return;
      }

      this._sendViaStomp(content);
    },

    searchFaqs(query) {
      if (!query || !this.faqs.length) return [];
      const tokens = query.toLowerCase().split(/\s+/).filter(t => t.length > 0);
      return this.faqs.filter(f => {
        const text = ((f.question || '') + ' ' + (f.answer || '') + ' ' + (f.category || '')).toLowerCase();
        return tokens.some(t => text.includes(t));
      });
    },

    async connectToCounselor() {
      this.currentView = 'chat';
      this.sending = true;
      try {
        const res = await fetch(CTX + '/api/chat/room?t=' + this.token, { method: 'POST' });
        const data = await res.json();
        this.roomId = data.roomId;
        this.roomStatus = 'WAITING';
        this.connectStomp();
      } catch {
        this.messages.push({ type: 'SYSTEM', text: '연결에 실패했습니다. 잠시 후 다시 시도해 주세요.' });
        this.sending = false;
        this.$nextTick(() => this.scrollBottom());
        return;
      }
      this.sending = false;
      if (this._pendingFirstMessage) {
        this._sendViaStomp(this._pendingFirstMessage);
        this._pendingFirstMessage = null;
      }
    },

    async handleAction(action) {
      if (action === '상담사에게 연결') {
        await this.connectToCounselor();
      } else if (action === '도움이 됐어요') {
        this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '도움이 되었다니 다행이에요. 추가 문의가 있으시면 언제든지 질문해 주세요.' });
        this._pendingFirstMessage = null;
        this.$nextTick(() => this.scrollBottom());
      } else if (action === '상담 접수하기') {
        this._pendingFirstMessage = null;
        this.openCounselReception();
      } else {
        // confirmCounsel actions: '접수하기', '다시 입력'
        await this.confirmCounsel(action);
      }
    },

    _sendViaStomp(content) {
      if (!this.stompClient || !this.stompClient.connected) {
        this._pendingMessages.push(content);
        return;
      }
      this.stompClient.send('/app/chat/' + this.roomId + '/send', {}, JSON.stringify({
        token: this.token,
        senderType: 'USER',
        senderName: this.user.nickname,
        content
      }));
    },

    connectStomp() {
      if (this.stompClient) return;
      const sock = new SockJS(CTX + '/ws/chat');
      this.stompClient = Stomp.over(sock);
      this.stompClient.debug = null;
      this.stompClient.connect({}, () => {
        this.stompClient.subscribe('/topic/chat/' + this.token + '/' + this.roomId, (frame) => {
          const msg = JSON.parse(frame.body);
          if (msg.type === 'COUNSELOR_JOINED') {
            this._clearStatusPoll();
            this.roomStatus = 'ACTIVE';
            this.messages.push({ type: 'SYSTEM', text: msg.counselorName + ' 상담사가 연결되었습니다.' });
          } else if (msg.type === 'ROOM_CLOSED') {
            this._clearStatusPoll();
            this.roomStatus = 'CLOSED';
            this.messages.push({ type: 'SYSTEM', text: '상담이 종료되었습니다.' });
          } else if (msg.type === 'MESSAGE' && msg.senderType !== 'USER') {
            this.messages.push(msg);
          }
          this.$nextTick(() => this.scrollBottom());
        });

        this._pendingMessages.forEach(c => this._sendViaStomp(c));
        this._pendingMessages = [];
        this._startStatusPoll();
      });
    },

    _startStatusPoll() {
      if (this._statusPollTimer) return;
      this._statusPollTimer = setInterval(async () => {
        if (this.roomStatus !== 'WAITING') { this._clearStatusPoll(); return; }
        try {
          const res = await fetch(CTX + '/api/chat/room/' + this.roomId + '/status?t=' + this.token);
          if (!res.ok) return;
          const data = await res.json();
          if (data.status === 'ACTIVE' && this.roomStatus === 'WAITING') {
            this._clearStatusPoll();
            this.roomStatus = 'ACTIVE';
            this.messages.push({ type: 'SYSTEM', text: '상담사가 연결되었습니다.' });
            this.$nextTick(() => this.scrollBottom());
          } else if (data.status === 'CLOSED') {
            this._clearStatusPoll();
            this.roomStatus = 'CLOSED';
            this.messages.push({ type: 'SYSTEM', text: '상담이 종료되었습니다.' });
            this.$nextTick(() => this.scrollBottom());
          }
        } catch { /* ignore */ }
      }, 3000);
    },

    _clearStatusPoll() {
      if (this._statusPollTimer) { clearInterval(this._statusPollTimer); this._statusPollTimer = null; }
    },

    resetCounselForm() {
      this.counselForm = { name: '', phone: '', content: '' };
      this.counselErrors = {};
      this.counselSubmitted = false;
      this.$nextTick(() => document.getElementById('counsel-name')?.focus());
    },

    validateCounselForm() {
      const errors = {};
      if (!this.counselForm.name.trim()) {
        errors.name = '성함을 입력해 주세요.';
      }
      if (!/^01[0-9]-\d{3,4}-\d{4}$/.test(this.counselForm.phone.trim())) {
        errors.phone = '연락처는 010-1234-5678 형식으로 입력해 주세요.';
      }
      if (!this.counselForm.content.trim()) {
        errors.content = '상담 내용을 입력해 주세요.';
      }
      this.counselErrors = errors;
      return Object.keys(errors).length === 0;
    },

    async submitCounselForm() {
      if (this.counselSubmitting || !this.validateCounselForm()) return;
      this.counselSubmitting = true;
      this.counselErrors = {};
      try {
        const fd = new FormData();
        fd.append('t', this.token);
        fd.append('name', this.counselForm.name.trim());
        fd.append('phone', this.counselForm.phone.trim());
        fd.append('content', this.counselForm.content.trim());
        const res = await fetch(CTX + '/api/chat/counsel', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.ok) {
          this.counselSubmitted = true;
          this.counselForm = { name: '', phone: '', content: '' };
        } else {
          this.counselErrors = { submit: '접수 중 오류가 발생했습니다. 다시 시도해 주세요.' };
        }
      } catch {
        this.counselErrors = { submit: '접수 중 오류가 발생했습니다. 다시 시도해 주세요.' };
      } finally {
        this.counselSubmitting = false;
      }
    },

    startCounselFlow() {
      this.openCounselReception();
    },

    async handleBotInput(content) {
      if (this.botStep === 'name') {
        this.botData.name = content;
        this.botStep = 'phone';
        this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '연락처를 입력해주세요. (예: 010-1234-5678)' });
      } else if (this.botStep === 'phone') {
        if (!/^01[0-9]-\d{3,4}-\d{4}$/.test(content.trim())) {
          this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '올바른 연락처 형식이 아닙니다. 예: 010-1234-5678 형식으로 입력해주세요.' });
        } else {
          this.botData.phone = content.trim();
          this.botStep = 'content';
          this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '상담 내용을 입력해주세요.' });
        }
      } else if (this.botStep === 'content') {
        this.botData.content = content;
        this.botStep = 'confirm';
        this.messages.push({
          senderType: 'BOT', senderName: '상담봇',
          content: `아래 내용으로 접수할까요?\n이름: ${this.botData.name}\n연락처: ${this.botData.phone}\n내용: ${this.botData.content}`,
          actions: ['접수하기', '다시 입력']
        });
      }
      this.$nextTick(() => this.scrollBottom());
    },

    async confirmCounsel(action) {
      if (action === '다시 입력') {
        this.botStep = 'name';
        this.botData = { name: '', phone: '', content: '' };
        this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '다시 입력해주세요. 성함을 알려주세요.' });
        this.$nextTick(() => this.scrollBottom());
        return;
      }
      try {
        const fd = new FormData();
        fd.append('t', this.token);
        fd.append('name', this.botData.name);
        fd.append('phone', this.botData.phone);
        fd.append('content', this.botData.content);
        const res = await fetch(CTX + '/api/chat/counsel', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.ok) {
          this.botStep = 'done';
          this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '상담 접수가 완료되었습니다. 담당 상담사가 연락드릴 예정입니다.' });
        } else {
          this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '접수 중 오류가 발생했습니다. 다시 시도해주세요.' });
        }
      } catch {
        this.messages.push({ senderType: 'BOT', senderName: '상담봇', content: '접수 중 오류가 발생했습니다. 다시 시도해주세요.' });
      }
      this.$nextTick(() => this.scrollBottom());
    },

    scrollBottom() {
      const el = this.$refs.msgArea;
      if (el) el.scrollTop = el.scrollHeight;
    }
  };
}
</script>

</html>

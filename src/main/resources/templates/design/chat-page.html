<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>상담 챗봇 | 효사랑가족요양병원</title>
  <link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard Variable', 'Noto Sans KR', system-ui, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      color: #1a2332;
    }

    /* ── Header ── */
    .chat-header {
      background: #1a2332;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .chat-header h1 { font-size: 16px; font-weight: 600; }
    .chat-header .user-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .chat-header .user-info img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .btn-logout {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── Layout ── */
    .page-body { max-width: 800px; margin: 0 auto; padding: 24px 16px 100px; }

    /* ── Login Box ── */
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .login-box .icon { font-size: 48px; margin-bottom: 16px; }
    .login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .login-box p { font-size: 14px; color: #6b7280; margin-bottom: 28px; line-height: 1.6; }
    .btn-kakao {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #FEE500;
      color: #191919;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      text-decoration: none;
    }
    .btn-kakao:hover { opacity: .9; }
    .btn-kakao svg { width: 20px; height: 20px; }

    /* ── FAQ Section ── */
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a2332;
      margin: 24px 0 12px;
    }
    .category-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .cat-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .cat-btn.active {
      background: #1a2332;
      color: #fff;
      border-color: #1a2332;
    }

    .faq-list { display: flex; flex-direction: column; gap: 8px; }
    .faq-item {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .faq-q {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      color: #1a2332;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .faq-q .arrow {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      transition: transform .2s;
      color: #9ca3af;
    }
    .faq-q.open .arrow { transform: rotate(180deg); }
    .faq-a {
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height .25s ease, padding .25s;
      font-size: 13px;
      color: #374151;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .faq-a.open {
      max-height: 600px;
      padding: 0 16px 14px;
    }

    /* ── 상담사 연결 FAB ── */
    .fab-connect {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1a2332, #2d4a7a);
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(26,35,50,.4);
      transition: transform .15s, box-shadow .15s;
      z-index: 200;
    }
    .fab-connect:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 6px 24px rgba(26,35,50,.5); }
    .fab-connect svg { width: 20px; height: 20px; }

    /* ── 채팅 모달 ── */
    .chat-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .chat-modal {
      background: #fff;
      width: 100%;
      max-width: 480px;
      height: 70vh;
      border-radius: 20px 20px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    @media (min-width: 640px) {
      .chat-overlay { align-items: center; }
      .chat-modal { height: 580px; border-radius: 20px; }
    }
    .chat-modal-header {
      padding: 16px 20px;
      background: #1a2332;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-modal-header .title { font-size: 15px; font-weight: 700; }
    .chat-modal-header .status { font-size: 12px; opacity: .75; }
    .btn-close-chat {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 4px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f8f9fb;
    }
    .msg { display: flex; flex-direction: column; max-width: 75%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.counselor { align-self: flex-start; align-items: flex-start; }
    .msg.system { align-self: center; align-items: center; max-width: 90%; }
    .msg-name { font-size: 11px; color: #9ca3af; margin-bottom: 3px; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user .msg-bubble { background: #1a2332; color: #fff; border-radius: 16px 16px 4px 16px; }
    .msg.counselor .msg-bubble { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px 16px 16px 4px; }
    .msg.system .msg-bubble { background: #e8f4f8; color: #4b6a8a; font-size: 12px; text-align: center; border-radius: 8px; }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      background: #fff;
    }
    .chat-input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      resize: none;
      height: 44px;
      font-family: inherit;
    }
    .chat-input:focus { border-color: #1a2332; }
    .btn-send {
      background: #1a2332;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .waiting-banner {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 13px;
    }
    .waiting-banner .spinner {
      width: 24px; height: 24px;
      border: 3px solid #e5e7eb;
      border-top-color: #1a2332;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body x-data="chatApp()" x-init="init()">

  <!-- ── Header ── -->
  <header class="chat-header">
    <h1>효사랑가족요양병원 상담</h1>
    <div class="user-info" x-show="user.loggedIn">
      <img :src="user.thumbnail || CTX + '/img/default-avatar.png'" :alt="user.nickname" onerror="this.style.display='none'">
      <span x-text="user.nickname + ' 님'"></span>
      <a href="/logout" class="btn-logout">로그아웃</a>
    </div>
  </header>

  <div class="page-body">

    <!-- ── 로그인 전 ── -->
    <div class="login-box" x-show="!user.loggedIn" x-cloak>
      <div class="icon">💬</div>
      <h2>상담 서비스</h2>
      <p>카카오 로그인 후 자주 묻는 질문을 확인하거나<br>상담사와 직접 채팅하실 수 있습니다.</p>
      <a class="btn-kakao" :href="kakaoLoginUrl()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.697 1.613 5.065 4.05 6.47L5.1 21l4.5-2.7c.78.15 1.59.225 2.4.225 5.523 0 10-3.477 10-7.725C22 6.477 17.523 3 12 3z"/>
        </svg>
        카카오로 시작하기
      </a>
    </div>

    <!-- ── 로그인 후 ── -->
    <div x-show="user.loggedIn" x-cloak>

      <!-- FAQ -->
      <div class="section-title">자주 묻는 질문</div>
      <div class="category-tabs">
        <button class="cat-btn" :class="{ active: activeCategory === '' }" @click="setCategory('')">전체</button>
        <template x-for="cat in categories" :key="cat">
          <button class="cat-btn" :class="{ active: activeCategory === cat }" @click="setCategory(cat)" x-text="cat"></button>
        </template>
      </div>

      <div class="faq-list">
        <template x-for="faq in filteredFaqs" :key="faq.id">
          <div class="faq-item">
            <button class="faq-q" :class="{ open: faq._open }" @click="faq._open = !faq._open">
              <span x-text="faq.question"></span>
              <svg class="arrow" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
              </svg>
            </button>
            <div class="faq-a" :class="{ open: faq._open }" x-text="faq.answer"></div>
          </div>
        </template>
        <p x-show="filteredFaqs.length === 0" style="text-align:center;color:#9ca3af;font-size:13px;padding:24px 0;">해당하는 질문이 없습니다.</p>
      </div>
    </div>

  </div>

  <!-- ── 상담사 연결 FAB ── -->
  <button class="fab-connect" x-show="user.loggedIn && !chatOpen" @click="openChat()" x-cloak>
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    </svg>
    상담사 연결
  </button>

  <!-- ── 채팅 모달 ── -->
  <div class="chat-overlay" x-show="chatOpen" x-cloak @click.self="chatOpen = false">
    <div class="chat-modal">
      <div class="chat-modal-header">
        <div>
          <div class="title">실시간 상담</div>
          <div class="status" x-text="chatStatus"></div>
        </div>
        <button class="btn-close-chat" @click="chatOpen = false">
          <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>

      <div class="chat-messages" x-ref="msgArea">
        <!-- 대기 중 -->
        <div class="waiting-banner" x-show="roomStatus === 'WAITING'">
          <div class="spinner"></div>
          상담사 연결을 기다리는 중입니다...
        </div>
        <!-- 메시지 목록 -->
        <template x-for="(msg, idx) in messages" :key="idx">
          <div class="msg" :class="msgClass(msg)">
            <div class="msg-name" x-show="msg.type === 'MESSAGE'" x-text="msg.senderName"></div>
            <div class="msg-bubble" x-text="msg.content || msg.text"></div>
          </div>
        </template>
      </div>

      <div class="chat-input-area" x-show="roomStatus === 'ACTIVE'">
        <textarea
          class="chat-input"
          placeholder="메시지를 입력하세요..."
          x-model="inputText"
          @keydown.enter.prevent="sendMessage()"
          rows="1"></textarea>
        <button class="btn-send" @click="sendMessage()">전송</button>
      </div>
    </div>
  </div>

  <!-- ── Scripts ── -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <script th:inline="javascript">
  const CTX = /*[[${#request.contextPath}]]*/ "";
  function chatApp() {
    return {
      inst: '',
      user: { loggedIn: false, id: '', nickname: '', thumbnail: '' },
      faqs: [],
      categories: [],
      activeCategory: '',
      chatOpen: false,
      roomId: null,
      roomStatus: 'WAITING',
      chatStatus: '대기 중...',
      messages: [],
      inputText: '',
      stompClient: null,

      kakaoLoginUrl() {
        sessionStorage.setItem('chat_inst', this.inst);
        return '/csm/oauth2/authorization/kakao';
      },

      async init() {
        // inst 복원
        const params = new URLSearchParams(location.search);
        this.inst = params.get('inst') || sessionStorage.getItem('chat_inst') || 'FALH';
        sessionStorage.setItem('chat_inst', this.inst);

        // 로그인 상태 확인
        const res = await fetch(CTX + '/api/chat/me');
        this.user = await res.json();
        if (this.user.loggedIn) this.loadFaqs();
      },

      async loadFaqs() {
        const res = await fetch(CTX + '/api/faq?inst=' + this.inst + '&limit=200');
        const data = await res.json();
        this.faqs = (data.list || data || []).map(f => ({ ...f, _open: false }));
        const catSet = new Set(this.faqs.map(f => f.category));
        this.categories = [...catSet];
      },

      setCategory(cat) { this.activeCategory = cat; },

      get filteredFaqs() {
        if (!this.activeCategory) return this.faqs;
        return this.faqs.filter(f => f.category === this.activeCategory);
      },

      async openChat() {
        this.chatOpen = true;
        if (this.roomId) return;

        const res = await fetch(CTX + '/api/chat/room?inst=' + this.inst, { method: 'POST' });
        const data = await res.json();
        this.roomId = data.roomId;
        this.roomStatus = data.status;
        this.connectWebSocket();
      },

      connectWebSocket() {
        const sock = new SockJS(CTX + '/ws/chat');
        this.stompClient = Stomp.over(sock);
        this.stompClient.debug = null;
        this.stompClient.connect({}, () => {
          this.stompClient.subscribe('/topic/chat/' + this.roomId, (frame) => {
            const msg = JSON.parse(frame.body);
            if (msg.type === 'COUNSELOR_JOINED') {
              this.roomStatus = 'ACTIVE';
              this.chatStatus = msg.counselorName + ' 상담사가 연결되었습니다';
              this.addSystemMsg(msg.counselorName + ' 상담사가 연결되었습니다. 편하게 말씀해 주세요 😊');
            } else if (msg.type === 'MESSAGE') {
              this.messages.push(msg);
              this.$nextTick(() => this.scrollBottom());
            } else if (msg.type === 'ROOM_CLOSED') {
              this.roomStatus = 'CLOSED';
              this.chatStatus = '상담이 종료되었습니다';
              this.addSystemMsg('상담이 종료되었습니다. 이용해 주셔서 감사합니다.');
            }
          });
        });
      },

      sendMessage() {
        if (!this.inputText.trim() || !this.stompClient) return;
        const content = this.inputText.trim();
        this.stompClient.send('/app/chat/' + this.roomId + '/send', {}, JSON.stringify({
          inst: this.inst,
          senderType: 'USER',
          senderName: this.user.nickname,
          content
        }));
        this.inputText = '';
      },

      addSystemMsg(text) {
        this.messages.push({ type: 'SYSTEM', text });
        this.$nextTick(() => this.scrollBottom());
      },

      msgClass(msg) {
        if (msg.type === 'SYSTEM') return 'system';
        return msg.senderType === 'USER' ? 'user' : 'counselor';
      },

      scrollBottom() {
        const el = this.$refs.msgArea;
        if (el) el.scrollTop = el.scrollHeight;
      }
    };
  }
  </script>
</body>
</html>

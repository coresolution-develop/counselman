<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>서비스 링크 관리</title>
  <link rel="stylesheet" th:href="@{/assets/css/hub.css}" />
  <style>
    .adm-grid { display: grid; grid-template-columns: 340px minmax(0, 1fr); gap: 18px; align-items: start; }
    .adm-panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px;
      box-shadow: var(--card-shadow); overflow: hidden; }
    .adm-panel__head { padding: 14px 16px; border-bottom: 1px solid var(--card-border);
      font-size: 14px; font-weight: 800; color: var(--text-strong); }
    .lh-form { display: grid; gap: 12px; padding: 16px; }
    .lh-field { display: grid; gap: 6px; }
    .lh-label { font-size: 12px; font-weight: 700; color: var(--text-body); }
    .lh-input, .lh-textarea { width: 100%; border: 1px solid var(--card-border); border-radius: 9px;
      background: #fff; color: var(--text-body); font: inherit; font-size: 13px; }
    .lh-input { height: 38px; padding: 0 11px; }
    .lh-textarea { min-height: 74px; resize: vertical; padding: 9px 11px; }
    .lh-input:focus, .lh-textarea:focus { outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(36, 120, 192, 0.14); }
    .lh-actions { display: flex; gap: 8px; justify-content: end; align-items: center; }
    .lh-actions--panel { padding: 0 16px 14px; }
    .lh-btn { height: 38px; padding: 0 14px; border: 1px solid transparent; border-radius: 9px;
      font-size: 13px; font-weight: 800; cursor: pointer; }
    .lh-btn--primary { background: var(--accent); color: #fff; }
    .lh-btn--primary:hover { background: var(--accent-hover); }
    .lh-btn--danger { background: #fff; color: #c0392b; border-color: #f1c7c2; }
    .lh-btn--danger:hover { background: #fdecec; }
    .lh-btn--ghost { background: #fff; color: var(--text-muted); border-color: var(--card-border); }
    .lh-btn--ghost:hover { background: #f7fafe; }
    .lh-section-title { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .04em; padding: 14px 16px 8px; border-top: 1px solid var(--card-border); }
    .lh-cat-list { display: grid; gap: 6px; padding: 0 16px 14px; }
    .lh-cat-row { display: grid; grid-template-columns: minmax(0, 1fr) 64px; gap: 8px; align-items: center; }
    .lh-cat-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lh-cat-order { height: 32px; padding: 0 8px; border: 1px solid var(--card-border); border-radius: 7px;
      font: inherit; font-size: 13px; text-align: center; width: 100%; }
    .lh-cat-order:focus { outline: none; border-color: var(--accent); }
    .lh-category__count { color: var(--text-muted); font-size: 12px; font-weight: 700; }
    .lh-manage-search { padding: 12px 16px 4px; }
    .lh-manage-groups { display: grid; gap: 8px; padding: 10px 16px 16px; }
    .lh-manage-group { border: 1px solid var(--card-border); border-radius: 9px; overflow: hidden; }
    .lh-manage-group__head { display: flex; justify-content: space-between; align-items: center; padding: 10px 13px;
      background: #f4f8fd; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-strong);
      list-style: none; user-select: none; }
    .lh-manage-group__head::-webkit-details-marker { display: none; }
    .lh-manage-list { display: grid; gap: 8px; padding: 0 12px 12px; }
    .lh-manage-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: start;
      padding: 11px; border: 1px solid var(--card-border); border-radius: 9px; background: #fbfcfe; }
    .lh-manage-edit { min-width: 0; }
    .lh-manage-edit summary { cursor: pointer; list-style: none; }
    .lh-manage-edit summary::-webkit-details-marker { display: none; }
    .lh-manage-title { font-size: 13px; font-weight: 700; color: var(--text-strong); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lh-edit-form { display: grid; gap: 8px; margin-top: 10px; }
    .lh-edit-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .lh-edit-grid .lh-field--wide { grid-column: 1 / -1; }
    .lh-delete-wrap { display: flex; flex-direction: column; gap: 6px; }
    .lh-delete-confirm { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .lh-delete-confirm[hidden] { display: none; }
    .lh-empty { padding: 40px 16px; text-align: center; color: var(--text-muted); font-size: 14px; }
    @media (max-width: 860px) { .adm-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="hub-body">
  <div class="hub-layout">
    <div th:replace="~{hub/fragments/shell :: sidebar('admin', ${hubMember})}"></div>

    <main class="hub-content">
      <div class="hub-container">
        <header class="hub-pagehead">
          <h1 class="hub-pagehead__title">서비스 링크 관리</h1>
          <p class="hub-pagehead__sub">공용 링크를 추가·수정·삭제하고 분류 순서를 조정합니다.</p>
        </header>

        <div th:if="${linkMessage}" class="hub-alert hub-alert--ok" th:text="${linkMessage}"></div>
        <div th:if="${linkError}" class="hub-alert hub-alert--err" th:text="${linkError}"></div>

        <!--/* 공지 배너 관리: /links 상단에 뜨는 안내 문구. 메시지 비우거나 '노출' 끄면 숨김 */-->
        <section class="adm-panel" style="margin-bottom:18px;">
          <div class="adm-panel__head">공지 배너</div>
          <form class="lh-form" th:action="@{/admin/company-links/notice}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <label class="lh-field"><span class="lh-label">메시지 (비우면 배너 숨김)</span>
              <textarea class="lh-input" name="message" rows="2" maxlength="500" style="min-height:56px;resize:vertical;"
                        placeholder="예) EMR 점검 중입니다 (오늘 14:00까지)"
                        th:text="${notice != null ? notice.message : ''}"></textarea></label>
            <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;">
              <label class="lh-field" style="flex:1;min-width:160px;"><span class="lh-label">강조</span>
                <select class="lh-input" name="level">
                  <option value="info" th:selected="${notice == null or notice.level != 'warn'}">일반 (파랑)</option>
                  <option value="warn" th:selected="${notice != null and notice.level == 'warn'}">주의 (주황)</option>
                </select></label>
              <label class="lh-field" style="flex-direction:row;align-items:center;gap:8px;">
                <input type="checkbox" name="active" th:checked="${notice != null and notice.activeYn == 'Y'}" />
                <span class="lh-label" style="margin:0;">지금 노출</span></label>
            </div>
            <div class="lh-actions"><button type="submit" class="lh-btn lh-btn--primary">공지 저장</button></div>
          </form>
        </section>

        <section class="adm-grid">
          <aside class="adm-panel">
            <div class="adm-panel__head">링크 추가</div>
            <form class="lh-form" th:action="@{/admin/company-links}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <label class="lh-field"><span class="lh-label">이름</span>
                <input class="lh-input" type="text" name="title" maxlength="100" required placeholder="예: 상담 CRM" /></label>
              <label class="lh-field"><span class="lh-label">URL</span>
                <input class="lh-input" type="url" name="url" maxlength="500" required placeholder="https://example.com" /></label>
              <label class="lh-field"><span class="lh-label">분류</span>
                <input class="lh-input" type="text" name="category" maxlength="80" placeholder="예: 운영" /></label>
              <label class="lh-field"><span class="lh-label">정렬 순서</span>
                <input class="lh-input" type="number" name="sortOrder" min="0" max="9999" value="0" /></label>
              <label class="lh-field"><span class="lh-label">설명</span>
                <textarea class="lh-textarea" name="description" maxlength="500" placeholder="간단한 설명"></textarea></label>
              <div class="lh-actions"><button class="lh-btn lh-btn--primary" type="submit">추가</button></div>
            </form>

            <div th:if="${categories != null and !categories.isEmpty()}">
              <div class="lh-section-title">분류 순서</div>
              <div class="lh-cat-list" id="catOrderList">
                <div class="lh-cat-row" th:each="cat : ${categories}">
                  <span class="lh-cat-name" th:text="${cat.category_name} ?: '(미분류)'">분류명</span>
                  <input class="lh-cat-order" type="number" min="0" max="9999"
                         th:value="${cat.sort_order}" th:data-cat="${cat.category_name}" />
                </div>
              </div>
              <div class="lh-actions lh-actions--panel">
                <span id="catOrderMsg" style="font-size:12px;color:var(--accent);display:none;">저장됐습니다.</span>
                <button class="lh-btn lh-btn--primary" type="button"
                        th:data-url="@{/admin/company-links/category-order}"
                        onclick="saveCategoryOrder(this)">순서 저장</button>
              </div>
            </div>
          </aside>

          <div class="adm-panel">
            <div class="adm-panel__head">관리 목록</div>
            <div class="lh-manage-search" th:if="${links != null and !#lists.isEmpty(links)}">
              <input class="lh-input" type="search" id="manageSearch" placeholder="이름 또는 분류 검색" autocomplete="off" aria-label="링크 검색" />
            </div>
            <div class="lh-empty" th:if="${links == null or #lists.isEmpty(links)}">등록된 링크가 없습니다.</div>

            <div class="lh-manage-groups" th:if="${linkGroups != null and !linkGroups.isEmpty()}">
              <details class="lh-manage-group" th:each="entry : ${linkGroups}" open>
                <summary class="lh-manage-group__head">
                  <span th:text="${entry.key}">분류</span>
                  <span class="lh-category__count" th:text="|${#lists.size(entry.value)}개|">0개</span>
                </summary>
                <div class="lh-manage-list">
                  <div class="lh-manage-row" th:each="link : ${entry.value}">
                    <details class="lh-manage-edit">
                      <summary><div class="lh-manage-title" th:text="${link.title}">서비스명</div></summary>
                      <form class="lh-edit-form" th:action="@{/admin/company-links/{id}(id=${link.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="lh-edit-grid">
                          <label class="lh-field"><span class="lh-label">이름</span>
                            <input class="lh-input" type="text" name="title" maxlength="100" required th:value="${link.title}" /></label>
                          <label class="lh-field"><span class="lh-label">분류</span>
                            <input class="lh-input" type="text" name="category" maxlength="80" th:value="${link.category}" /></label>
                          <label class="lh-field lh-field--wide"><span class="lh-label">URL</span>
                            <input class="lh-input" type="url" name="url" maxlength="500" required th:value="${link.url}" /></label>
                          <label class="lh-field"><span class="lh-label">정렬 순서</span>
                            <input class="lh-input" type="number" name="sortOrder" min="0" max="9999" th:value="${link.sortOrder}" /></label>
                          <label class="lh-field lh-field--wide"><span class="lh-label">설명</span>
                            <textarea class="lh-textarea" name="description" maxlength="500" th:text="${link.description}"></textarea></label>
                        </div>
                        <div class="lh-actions"><button class="lh-btn lh-btn--primary" type="submit">수정</button></div>
                      </form>
                    </details>
                    <div class="lh-delete-wrap">
                      <button class="lh-btn lh-btn--danger" type="button"
                              onclick="this.hidden=true;this.nextElementSibling.hidden=false">삭제</button>
                      <form class="lh-delete-confirm" th:action="@{/admin/company-links/{id}/delete(id=${link.id})}" method="post" hidden>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="lh-btn lh-btn--danger" type="submit">확인</button>
                        <button class="lh-btn lh-btn--ghost" type="button"
                                onclick="this.closest('.lh-delete-confirm').hidden=true;this.closest('.lh-delete-confirm').previousElementSibling.hidden=false">취소</button>
                      </form>
                    </div>
                  </div>
                </div>
              </details>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script>
    (() => {
      const input = document.getElementById('manageSearch');
      if (!input) return;
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        document.querySelectorAll('.lh-manage-group').forEach(group => {
          let groupVisible = false;
          group.querySelectorAll('.lh-manage-row').forEach(row => {
            const match = !q || row.textContent.toLowerCase().includes(q);
            row.hidden = !match;
            if (match) groupVisible = true;
          });
          group.hidden = !groupVisible;
          if (q) group.open = true;
        });
      });
    })();

    async function saveCategoryOrder(btn) {
      const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';
      const url = btn ? btn.dataset.url : '/admin/company-links/category-order';
      const inputs = document.querySelectorAll('#catOrderList .lh-cat-order');
      const params = new URLSearchParams({ _csrf: csrfToken });
      inputs.forEach(input => {
        const cat = input.dataset.cat;
        if (cat) params.append('cat_' + cat, input.value || '0');
      });
      const msg = document.getElementById('catOrderMsg');
      try {
        const res = await fetch(url, { method: 'POST', body: params });
        const data = await res.json();
        if (data.ok) {
          if (msg) { msg.style.display = 'inline'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
          location.reload();
        } else {
          alert('저장 실패: ' + (data.msg || ''));
        }
      } catch (e) {
        alert('저장 중 오류: ' + e.message);
      }
    }
  </script>
</body>
</html>

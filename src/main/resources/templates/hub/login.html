<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 · 링크 허브</title>
  <link rel="stylesheet" th:href="@{/assets/css/hub.css}" />
  <style>
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 840px; display: grid; grid-template-columns: 1fr 1fr;
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 18px;
      box-shadow: var(--card-shadow); overflow: hidden; }
    .auth-brand { display: flex; flex-direction: column; justify-content: space-between; gap: 24px; padding: 36px 32px;
      background: linear-gradient(180deg, var(--sidebar-bg-top), var(--sidebar-bg-bottom)); color: #fff; }
    .auth-brand__logo { width: 44px; height: 44px; border-radius: 12px; background: rgba(255, 255, 255, 0.14);
      display: grid; place-items: center; }
    .auth-brand__title { font-size: 22px; font-weight: 800; line-height: 1.3; }
    .auth-brand__desc { color: #C4D6EC; font-size: 14px; line-height: 1.6; }
    .auth-main { padding: 38px 34px; }
    .auth-title { margin: 0 0 6px; font-size: 22px; font-weight: 800; color: var(--text-strong); }
    .auth-sub { margin: 0 0 22px; color: var(--text-muted); font-size: 13px; }
    .auth-field { margin-bottom: 15px; }
    .auth-field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--text-body); }
    .auth-remember { display: flex; align-items: center; gap: 8px; margin: 4px 0 4px; font-size: 14px; color: var(--text-body); }
    .auth-remember input { width: 16px; height: 16px; accent-color: var(--brand-blue); }
    .auth-note { margin: 0 0 18px; color: var(--text-muted); font-size: 12px; line-height: 1.5; }
    .auth-btn { width: 100%; justify-content: center; height: 46px; font-size: 15px; }
    .auth-err { margin: 0 0 16px; padding: 11px 13px; border-radius: 10px; background: #fdecec;
      color: #c0392b; font-size: 13px; border: 1px solid #f5c6c2; }
    .auth-alt { margin-top: 18px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .auth-alt a { color: var(--brand-blue); font-weight: 700; text-decoration: none; }
    .auth-alt a:hover { color: var(--brand-navy); }
    @media (max-width: 720px) {
      .auth-card { grid-template-columns: 1fr; max-width: 420px; }
      .auth-brand { flex-direction: row; align-items: center; gap: 14px; padding: 20px 24px; }
      .auth-brand__desc { display: none; }
    }
  </style>
</head>
<body class="hub-body">
  <main class="auth-shell">
    <section class="auth-card">
      <aside class="auth-brand">
        <span class="auth-brand__logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
          </svg>
        </span>
        <div>
          <div class="auth-brand__title">링크 허브</div>
          <p class="auth-brand__desc">회사 사이트를 한곳에서 열고, 즐겨찾기·개인 링크·최근 사용을 관리하세요.</p>
        </div>
      </aside>

      <div class="auth-main">
        <h1 class="auth-title">로그인</h1>
        <p class="auth-sub">개인 기능을 사용하려면 로그인하세요.</p>

        <div th:if="${loginError}" class="auth-err" th:text="${loginError}"></div>

        <form th:action="@{/hub/login}" method="post">
          <div class="auth-field">
            <label for="email">이메일</label>
            <input class="hub-input" type="email" id="email" name="email" th:value="${email}" autocomplete="username" required />
          </div>
          <div class="auth-field">
            <label for="password">비밀번호</label>
            <input class="hub-input" type="password" id="password" name="password" autocomplete="current-password" required />
          </div>
          <label class="auth-remember">
            <input type="checkbox" name="remember" value="on" />
            <span>이 기기 기억하기</span>
          </label>
          <p class="auth-note">공용 단말(POS·키오스크)에서는 사용하지 마세요. 개인 기기에서만 권장합니다.</p>
          <button type="submit" class="hub-btn hub-btn--primary auth-btn">로그인</button>
        </form>

        <p class="auth-alt">
          계정이 없으신가요? <a th:href="@{/hub/signup}">회원가입</a>
          · <a th:href="@{/links}">허브로 돌아가기</a>
        </p>
      </div>
    </section>
  </main>
</body>
</html>

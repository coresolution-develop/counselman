<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 · 서비스 링크</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <style>
    :root { --lh-brand: #0b8f6f; --lh-brand-dark: #067257; --lh-border: #e5e7eb; --lh-muted: #6b7280; --lh-danger: #dc2626; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f7f9; color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif; }
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 380px; background: #fff; border: 1px solid var(--lh-border);
      border-radius: 12px; padding: 28px 24px; }
    .auth-title { margin: 0 0 4px; font-size: 22px; font-weight: 800; }
    .auth-sub { margin: 0 0 20px; color: var(--lh-muted); font-size: 13px; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .auth-field input { width: 100%; height: 42px; padding: 0 12px; border: 1px solid var(--lh-border);
      border-radius: 8px; font-size: 15px; }
    .auth-field input:focus { outline: 2px solid var(--lh-brand); border-color: var(--lh-brand); }
    .auth-hint { margin: 6px 0 0; font-size: 12px; color: var(--lh-muted); }
    .auth-btn { width: 100%; height: 44px; border: 0; border-radius: 8px; background: var(--lh-brand);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .auth-btn:hover { background: var(--lh-brand-dark); }
    .auth-alt { margin-top: 16px; text-align: center; font-size: 13px; color: var(--lh-muted); }
    .auth-alt a { color: var(--lh-brand-dark); font-weight: 600; text-decoration: none; }
    .auth-err { margin: 0 0 16px; padding: 10px 12px; border-radius: 8px; background: #fef2f2;
      color: var(--lh-danger); font-size: 13px; }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1 class="auth-title">회원가입</h1>
      <p class="auth-sub">사내 가입코드로 가입할 수 있습니다.</p>

      <div th:if="${signupError}" class="auth-err" th:text="${signupError}"></div>

      <form th:action="@{/hub/signup}" method="post">
        <div class="auth-field">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" th:value="${email}" autocomplete="username" required />
        </div>
        <div class="auth-field">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" th:value="${name}" autocomplete="name" required />
        </div>
        <div class="auth-field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required />
        </div>
        <div class="auth-field">
          <label for="signupCode">가입코드</label>
          <input type="text" id="signupCode" name="signupCode" autocomplete="off" required />
        </div>
        <button type="submit" class="auth-btn">가입하기</button>
      </form>

      <p class="auth-alt">
        이미 계정이 있으신가요? <a th:href="@{/hub/login}">로그인</a>
        · <a th:href="@{/links}">허브로 돌아가기</a>
      </p>
    </section>
  </main>
</body>
</html>

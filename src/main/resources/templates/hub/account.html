<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>계정 설정 · 서비스 링크</title>
  <link rel="stylesheet" th:href="@{/assets/css/tokens.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
  <style>
    :root { --lh-brand: #0b8f6f; --lh-brand-dark: #067257; --lh-border: #e5e7eb; --lh-muted: #6b7280; --lh-danger: #dc2626; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f7f9; color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif; }
    .acc-shell { width: min(560px, calc(100% - 48px)); margin: 0 auto; padding: 32px 0 48px; }
    .acc-head { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 20px; }
    .acc-title { margin: 0; font-size: 24px; font-weight: 800; }
    .acc-sub { margin: 6px 0 0; color: var(--lh-muted); font-size: 14px; }
    .acc-btn { display: inline-flex; align-items: center; height: 34px; padding: 0 14px; border: 1px solid var(--lh-border);
      border-radius: 8px; background: #fff; color: #111827; font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; line-height: 1; }
    .acc-btn:hover { border-color: var(--lh-brand); color: var(--lh-brand-dark); }
    .acc-btn--brand { background: var(--lh-brand); border-color: var(--lh-brand); color: #fff; }
    .acc-btn--brand:hover { background: var(--lh-brand-dark); border-color: var(--lh-brand-dark); color: #fff; }
    .acc-alert { margin-bottom: 16px; padding: 10px 14px; border-radius: 8px; font-size: 14px; }
    .acc-alert--ok { background: #ecfdf5; color: var(--lh-brand-dark); }
    .acc-alert--err { background: #fef2f2; color: var(--lh-danger); }
    .acc-panel { background: #fff; border: 1px solid var(--lh-border); border-radius: 10px; padding: 20px; }
    .acc-panel__title { margin: 0 0 16px; font-size: 16px; font-weight: 700; }
    .acc-field { margin-bottom: 14px; }
    .acc-field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .acc-field input { width: 100%; height: 42px; padding: 0 12px; border: 1px solid var(--lh-border); border-radius: 8px; font-size: 15px; }
    .acc-field input:focus { outline: 2px solid var(--lh-brand); border-color: var(--lh-brand); }
    .acc-meta { color: var(--lh-muted); font-size: 13px; margin: 0 0 16px; }
  </style>
</head>
<body>
  <main class="acc-shell">
    <header class="acc-head">
      <div>
        <h1 class="acc-title">계정 설정</h1>
        <p class="acc-sub" th:text="${hubMember.email}">user@coresolution.kr</p>
      </div>
      <a class="acc-btn" th:href="@{/hub/me}">내 페이지로</a>
    </header>

    <div th:if="${accountMessage}" class="acc-alert acc-alert--ok" th:text="${accountMessage}"></div>
    <div th:if="${accountError}" class="acc-alert acc-alert--err" th:text="${accountError}"></div>

    <section class="acc-panel">
      <h2 class="acc-panel__title">비밀번호 변경</h2>
      <form th:action="@{/hub/me/account/password}" method="post">
        <div class="acc-field">
          <label for="currentPassword">현재 비밀번호</label>
          <input type="password" id="currentPassword" name="currentPassword" autocomplete="current-password" required />
        </div>
        <div class="acc-field">
          <label for="newPassword">새 비밀번호</label>
          <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required />
        </div>
        <button type="submit" class="acc-btn acc-btn--brand">변경하기</button>
      </form>
    </section>
  </main>
</body>
</html>

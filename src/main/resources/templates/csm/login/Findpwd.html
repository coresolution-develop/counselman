<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>비밀번호 찾기 · MediPlat</title>

  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
  <link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <style>
    :root {
      --cs-blue-900: #0b1f4a;
      --cs-blue-800: #112a5e;
      --cs-blue-700: #173a82;
      --cs-blue-600: #1d4ed8;
      --cs-blue-500: #2563eb;
      --cs-blue-400: #3b82f6;
      --cs-cyan-400: #38bdf8;

      --ink-900: #0f172a;
      --ink-700: #334155;
      --ink-600: #475569;
      --ink-500: #64748b;
      --ink-400: #94a3b8;
      --ink-300: #cbd5e1;
      --ink-200: #e2e8f0;
      --ink-100: #eef2f6;
      --ink-50:  #f8fafc;

      --danger:   #dc2626;
      --danger-bg:#fef2f2;
      --success:  #15803d;
      --success-bg:#f0fdf4;

      --radius-card:  18px;
      --radius-input: 10px;
      --shadow-card: 0 24px 48px -12px rgba(11,31,74,0.18), 0 8px 16px -4px rgba(11,31,74,0.06);

      --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--ink-900);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      background:
        radial-gradient(1200px 600px at 90% -10%, #d6f1ea 0%, transparent 60%),
        radial-gradient(900px 500px at -10% 110%, #e2ecff 0%, transparent 55%),
        linear-gradient(180deg, #f4f6fa 0%, #eef2f7 100%);
      min-height: 100%;
    }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; }
    input { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 36px 32px 28px;
    }
    .card__head { margin-bottom: 22px; }
    .card__head--center { text-align: center; }
    .card__eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      font-weight: 600;
      color: var(--cs-blue-700);
      text-transform: uppercase;
    }
    .card__title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 6px 0 6px;
      color: var(--ink-900);
    }
    .card__sub {
      font-size: 13px;
      color: var(--ink-500);
      line-height: 1.6;
      margin: 0;
    }
    .card__sub strong { color: var(--cs-blue-700); font-weight: 700; }

    .lf { display: flex; flex-direction: column; gap: 14px; }
    .lf__field { display: flex; flex-direction: column; gap: 7px; }
    .lf__label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-700);
      letter-spacing: -0.01em;
    }
    .lf__input-wrap {
      display: flex;
      align-items: center;
      padding: 0 14px;
      height: 46px;
      border-radius: var(--radius-input);
      background: var(--ink-50);
      border: 1.5px solid var(--ink-100);
      transition: border-color .14s, box-shadow .14s, background .14s;
    }
    .lf__input-wrap:hover { background: #fff; }
    .lf__input-wrap:focus-within {
      background: #fff;
      border-color: var(--cs-blue-500);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }
    .lf__input {
      flex: 1; min-width: 0;
      height: 100%;
      border: 0; outline: 0; background: transparent;
      font-size: 14px; color: var(--ink-900);
      letter-spacing: -0.01em;
    }
    .lf__input::placeholder { color: var(--ink-400); }

    /* Segmented control */
    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--ink-50);
      border: 1.5px solid var(--ink-100);
      border-radius: var(--radius-input);
      padding: 4px;
      gap: 4px;
    }
    .seg__opt {
      position: relative;
      display: block;
      cursor: pointer;
      user-select: none;
    }
    .seg__opt input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .seg__opt-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 38px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-600);
      border-radius: 8px;
      transition: all .14s;
    }
    .seg__opt:hover .seg__opt-inner { color: var(--ink-900); }
    .seg__opt input:checked + .seg__opt-inner {
      background: #fff;
      color: var(--cs-blue-700);
      box-shadow: 0 1px 2px rgba(11,31,74,.06), 0 1px 3px rgba(11,31,74,.08);
    }
    .seg__opt input:focus-visible + .seg__opt-inner {
      outline: 2px solid var(--cs-blue-500);
      outline-offset: 2px;
    }
    .seg__opt-inner svg { width: 14px; height: 14px; }

    /* Buttons */
    .btn-primary {
      width: 100%;
      height: 46px;
      border-radius: var(--radius-input);
      background: linear-gradient(180deg, var(--cs-blue-600), var(--cs-blue-700));
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      box-shadow: 0 6px 14px -4px rgba(37,99,235,.45);
      transition: transform .12s, box-shadow .14s, opacity .14s;
      margin-top: 6px;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -6px rgba(37,99,235,.55);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .link {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      color: var(--ink-600);
      text-align: center;
    }
    .link:hover { color: var(--cs-blue-600); text-decoration: underline; }

    /* Alerts */
    .alert {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 500;
      line-height: 1.5;
    }
    .alert--err { background: var(--danger-bg); border: 1px solid #fecaca; color: var(--danger); animation: shake .42s cubic-bezier(.36,.07,.19,.97) both; }
    .alert--ok  { background: var(--success-bg); border: 1px solid #bbf7d0; color: var(--success); }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-4px); }
      40%, 60% { transform: translateX(4px); }
    }

    /* Hint footer */
    .hint {
      margin-top: 24px;
      padding: 12px 14px;
      background: var(--ink-50);
      border: 1px solid var(--ink-100);
      border-radius: 12px;
      font-size: 12px;
      color: var(--ink-500);
      line-height: 1.6;
      text-align: center;
    }
    .hint strong { color: var(--ink-700); font-weight: 700; }

    /* OTP icon */
    .otp-icon {
      width: 56px; height: 56px;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #dbeafe, #bfdbfe);
      border-radius: 14px;
      color: var(--cs-blue-700);
    }
    .otp-phone { font-weight: 700; color: var(--cs-blue-700); font-variant-numeric: tabular-nums; }
    .otp-code-input {
      letter-spacing: .4em;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .card { padding: 28px 22px 22px; border-radius: 14px; }
      .card__title { font-size: 20px; }
      .card__sub { font-size: 12.5px; }
    }

    /* Spinner overlay */
    .spinner-overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,0.32);
      backdrop-filter: blur(2px);
      z-index: 50;
    }
    .spinner-overlay.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .alert--err { animation: none; }
      .btn-primary, .lf__input-wrap, .seg__opt-inner { transition: none; }
      .spinner { animation: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="card">

    <!-- Step 1: 사용자 식별 -->
    <div id="findForm">
      <div class="card__head">
        <div class="card__eyebrow">Password Reset</div>
        <h1 class="card__title">비밀번호 찾기</h1>
        <p class="card__sub">가입 시 등록한 정보로 본인을 인증하면<br>비밀번호를 재설정할 수 있습니다.</p>
      </div>

      <div class="lf">
        <div class="lf__field">
          <label class="lf__label" for="us_col_04">기관코드</label>
          <div class="lf__input-wrap">
            <input class="lf__input" type="text" name="us_col_04" id="us_col_04"
                   placeholder="예: FALH" autocomplete="organization">
          </div>
        </div>
        <div class="lf__field">
          <label class="lf__label" for="us_col_02">아이디</label>
          <div class="lf__input-wrap">
            <input class="lf__input" type="text" name="us_col_02" id="us_col_02"
                   placeholder="아이디" autocomplete="username">
          </div>
        </div>
        <div class="lf__field">
          <label class="lf__label" for="us_col_12">이름</label>
          <div class="lf__input-wrap">
            <input class="lf__input" type="text" name="us_col_12" id="us_col_12"
                   placeholder="이름" autocomplete="name" autofocus>
          </div>
        </div>

        <div class="lf__field" role="radiogroup" aria-label="인증 수단 선택">
          <label class="lf__label">인증 방법</label>
          <div class="seg">
            <label class="seg__opt">
              <input type="radio" name="channel" value="email" checked aria-label="이메일 링크로 인증">
              <span class="seg__opt-inner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="5" width="18" height="14" rx="2"/>
                  <path d="m3 7 9 6 9-6"/>
                </svg>
                이메일 링크
              </span>
            </label>
            <label class="seg__opt">
              <input type="radio" name="channel" value="sms" aria-label="SMS 인증번호로 인증">
              <span class="seg__opt-inner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="5" y="2" width="14" height="20" rx="2"/>
                  <line x1="12" y1="18" x2="12" y2="18.01"/>
                </svg>
                SMS 인증번호
              </span>
            </label>
          </div>
        </div>

        <div id="result" class="alert alert--err" style="display:none;" role="alert"></div>

        <button class="btn-primary" type="button" id="confirm">인증번호 받기</button>
        <a class="link" th:href="@{/login}">로그인으로 돌아가기</a>
      </div>
    </div>

    <!-- Step 2: OTP 입력 -->
    <div id="otpForm" style="display:none;">
      <div class="card__head card__head--center">
        <div class="otp-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2"/>
            <line x1="12" y1="18" x2="12" y2="18.01"/>
          </svg>
        </div>
        <h1 class="card__title">인증번호 확인</h1>
        <p class="card__sub">
          <span class="otp-phone" id="otpPhoneMask">***-****-****</span>로 전송된<br>
          6자리 인증번호를 입력해 주세요 (5분 이내)
        </p>
      </div>

      <div class="lf">
        <div class="lf__field">
          <label class="lf__label" for="otpCode">인증번호</label>
          <div class="lf__input-wrap">
            <input class="lf__input otp-code-input" type="text"
                   inputmode="numeric" maxlength="6" id="otpCode"
                   placeholder="······" autocomplete="one-time-code">
          </div>
        </div>

        <div id="otpResult" class="alert alert--err" style="display:none;" role="alert"></div>

        <button class="btn-primary" type="button" id="otpConfirm">인증번호 확인</button>
        <a class="link" href="javascript:void(0)" id="otpBack">처음으로 돌아가기</a>
      </div>
    </div>

    <div class="hint">
      인증이 어려우신 경우 <strong>소속 기관 관리자</strong>에게<br>
      비밀번호 초기화를 요청해 주세요.
    </div>

  </div>
</div>

<div id="spinner-overlay" class="spinner-overlay" aria-hidden="true">
  <div class="spinner" role="status" aria-label="잠시만 기다려주세요"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script th:src="@{/js/csm/login/Findpwd.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<title>관리자페이지 : SOSYGE EASY-CRM</title>
<meta property="og:title" content="상담관리시스템">
<meta property="og:type" content="website">
<meta property="og:url" content="http://csm.sosyge.net/csm/login">
<meta property="og:image" th:content="@{/icon/ev/core_icon_big.png}" content="/icon/ev/core_icon_big.png">
<meta property="og:description" content="병원상담관리시스템">
<link rel="shortcut icon" th:href="@{/icon/new/favicon-32.png}">
<link rel="apple-touch-icon" sizes="180x180" th:href="@{/icon/new/app-icon-180.png}">
<link rel="icon" sizes="192x192" th:href="@{/icon/new/app-icon-512.png}">
<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script th:src="@{/js/csm/core/admin/admin.js(v='20260518b')}"></script>
<link rel="stylesheet" th:href="@{/css/reset.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/style.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/header.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/cate.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/button.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/spinner.css}">
<link rel="stylesheet" th:href="@{/css/csm/core/admin/admin.css(v='20260518b')}">
<link rel="stylesheet" th:href="@{/css/csm/core/admin/style.css(v='20260518b')}">
<link rel="stylesheet" th:href="@{/css/csm/core/popup/popup.css}">
</head>
<body>
<div th:replace="~{csm/Include/layout :: header(info=${info})}"></div>
<div th:replace="~{csm/Include/layout :: nav_section2('admin', '', '', '')}"></div>
<div class="main">
  <div class="section">
    <div class="content-top">
      <div class="section-top">
        <div class="content-inner">
          <div class="inner-top">
            <div class="inner-section">
              <div class="inner-area">
                <span style="cursor:pointer; color: #06603A; font-weight: 500; font-size: 12px;"
                      onclick="location.href='/csm/core/admin'">기관 등록</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="content-mid">
      <div class="section-mid">
        <div class="smsTemplateDiv" style="width: 100%;" id="myTable">
          <div class="sms-history-grid">
            <div class="grid-header">
              <div>기관코드</div>
              <div>소속기관명</div>
              <div>사업자번호</div>
              <div>연락처(1)</div>
              <div>연락처(2)</div>
              <div>상태</div>
            </div>
          </div>
          <div class="grid-body">
            <div class="grid-row" th:if="${#lists.isEmpty(list)}">
              <div style="grid-column:1 / -1;">기관 데이터가 없습니다.</div>
            </div>
            <div class="grid-row" th:each="l : ${list}" th:if="${l != null}">
              <div th:text="${l != null ? l.id_col_03 : ''}"></div>
              <div th:text="${l != null ? l.id_col_02 : ''}"></div>
              <div th:text="${l != null ? l.id_col_09 : ''}"></div>
              <div th:text="${l != null ? l.id_col_06 : ''}"></div>
              <div th:text="${l != null ? l.id_col_07 : ''}"></div>
              <div>
                <span th:text="${l != null ? l.id_col_04 : ''}"></span>
                <input type="hidden" th:value="${l != null ? l.id_col_01 : ''}" id="id_col_01">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="section-bot">
        <div>
          <div class="search-status-area">
            <div>
              <span>검색수: <span class="count" th:text="|${instCount}건|"></span></span>
            </div>
            <div class="status-area">
              <div class="section-btn">
                <div class="btn counsel-btn" id="user-del">기관삭제</div>
                <div class="btn counsel-btn delBtn" id="user-modi">수정</div>
                <div class="btn counsel-btn schemaCheckBtn" id="inst-schema-check">테이블점검</div>
                <div class="btn counsel-btn schemaRepairBtn" id="inst-schema-repair">테이블복구</div>
                <div class="btn newBtn pop-btn counsel-btn" id="user-new" onclick="openInstPopup()">기관등록</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="inst-modal-overlay" id="instModifyModal" hidden>
  <div class="inst-modal" role="dialog" aria-modal="true" aria-labelledby="instModifyTitle">
    <div class="inst-modal__header">
      <h2 id="instModifyTitle">기관 정보를 수정해 주세요</h2>
      <button type="button" class="inst-modal__close" aria-label="닫기" data-close-modify>×</button>
    </div>
    <form id="instModifyForm" class="inst-modal__body" autocomplete="off">
      <div class="inst-modal__field">
        <label for="mod_id_col_02">기관명 <span class="req">*</span></label>
        <input type="text" id="mod_id_col_02" name="id_col_02" required>
      </div>
      <div class="inst-modal__field">
        <label for="mod_id_col_03">기관코드 <span class="req">*</span></label>
        <input type="text" id="mod_id_col_03" name="id_col_03" disabled>
      </div>
      <div class="inst-modal__field">
        <label for="mod_id_col_09">사업자등록번호 <span class="req">*</span></label>
        <input type="text" id="mod_id_col_09" name="id_col_09" required>
      </div>
      <div class="inst-modal__field">
        <label for="mod_id_col_06">연락처(1) <span class="req">*</span></label>
        <input type="text" id="mod_id_col_06" name="id_col_06" required>
      </div>
      <div class="inst-modal__field">
        <label for="mod_id_col_07">연락처(2)</label>
        <input type="text" id="mod_id_col_07" name="id_col_07">
      </div>
      <div class="inst-modal__field">
        <label for="mod_id_col_08">주소 <span class="req">*</span></label>
        <input type="text" id="mod_id_col_08" name="id_col_08" required>
      </div>
      <div class="inst-modal__field">
        <label for="mod_id_col_05">비고</label>
        <input type="text" id="mod_id_col_05" name="id_col_05">
      </div>
      <input type="hidden" id="mod_id_col_01" name="id_col_01">
    </form>
    <div class="inst-modal__footer">
      <button type="button" class="inst-modal__btn inst-modal__btn--cancel" data-close-modify>취소</button>
      <button type="button" class="inst-modal__btn inst-modal__btn--save" id="instModifySaveBtn">저장</button>
    </div>
  </div>
</div>
</body>
<script>
$('.menu1', $('.nav_section')).addClass('active');
</script>
</html>

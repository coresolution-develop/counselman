<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<title>상담일지관리 : SOSYGE EASY-CRM</title>
<link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
<link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
<link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">
<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<link rel="stylesheet" th:href="@{/css/reset.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/style.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/header.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/cate.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/button.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/spinner.css}">
<link rel="stylesheet" th:href="@{/css/csm/core/admin/admin.css}">
<link rel="stylesheet" th:href="@{/css/csm/core/admin/style.css}">
<link rel="stylesheet" th:href="@{/css/csm/core/admin/setting.css}">
<link rel="stylesheet" th:href="@{/css/csm/core/popup/popup.css}">
<style>
  .module-feature-panel {
    margin-top: 24px;
    border: 1px solid #dbe7df;
    border-radius: 14px;
    background: #fff;
    overflow: hidden;
  }

  .module-feature-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    background: linear-gradient(135deg, #05401E, #0b6b33);
    color: #fff;
  }

  .module-feature-title {
    font-size: 18px;
    font-weight: 700;
  }

  .module-feature-desc {
    margin-top: 6px;
    font-size: 13px;
    opacity: 0.88;
  }

  .module-feature-table-wrap {
    overflow-x: auto;
  }

  .module-feature-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 960px;
  }

  .module-feature-table thead th {
    padding: 14px 12px;
    background: #eef5f0;
    border-bottom: 1px solid #d9e7de;
    color: #0a512b;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
  }

  .module-feature-table tbody td {
    padding: 14px 12px;
    border-bottom: 1px solid #edf2ee;
    text-align: center;
    font-size: 13px;
    color: #24352b;
  }

  .module-feature-table tbody tr:hover {
    background: #fafdfb;
  }

  .module-inst-cell {
    text-align: left !important;
  }

  .module-inst-code {
    font-weight: 700;
    color: #05401E;
  }

  .module-inst-name {
    margin-top: 4px;
    color: #5f6f66;
    font-size: 12px;
  }

  .module-toggle-wrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .module-toggle {
    position: relative;
    width: 52px;
    height: 28px;
    display: inline-block;
  }

  .module-toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .module-slider {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: #c8d5cc;
    transition: .2s ease;
    cursor: pointer;
  }

  .module-slider::before {
    content: "";
    position: absolute;
    width: 22px;
    height: 22px;
    left: 3px;
    top: 3px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.18);
    transition: .2s ease;
  }

  .module-toggle input:checked + .module-slider {
    background: #0b6b33;
  }

  .module-toggle input:checked + .module-slider::before {
    transform: translateX(24px);
  }

  .module-toggle input:disabled + .module-slider {
    opacity: .65;
    cursor: wait;
  }

  .module-toggle-status {
    font-size: 12px;
    font-weight: 700;
    color: #0b6b33;
  }

  .module-toggle-status.is-disabled {
    color: #9b3b31;
  }

  .module-feature-empty {
    padding: 24px !important;
    color: #7a8b80;
  }

  /* ===== 템플릿 등록/수정 모달 리디자인 ===== */
  #template-modal {
    backdrop-filter: blur(2px);
    background: rgba(18, 27, 38, 0.44);
  }
  .template-modal-dialog {
    width: min(480px, calc(100vw - 32px)) !important;
    height: auto !important;
    border-radius: 14px !important;
    overflow: hidden;
    border: 1px solid #cfd9e2;
    box-shadow: 0 22px 44px rgba(18, 27, 38, 0.24), 0 3px 10px rgba(18, 27, 38, 0.16) !important;
  }
  .template-modal-head {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    height: 52px !important;
    padding: 0 18px !important;
    background: linear-gradient(135deg, #05401E 0%, #0b6b33 100%);
  }
  .template-modal-head .head-title {
    color: #fff !important;
    font-size: 15px !important;
    font-weight: 700 !important;
    letter-spacing: 0.2px;
  }
  .template-modal-x {
    width: 28px;
    height: 28px;
    border: none;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.14s;
  }
  .template-modal-x:hover {
    background: rgba(255,255,255,0.28);
  }
  .template-modal-body {
    height: auto !important;
    background: linear-gradient(180deg, #f8fafc 0%, #f1f5f8 100%) !important;
  }
  .template-modal-content {
    padding: 24px 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .template-form-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .template-label {
    font-size: 13px;
    font-weight: 700;
    color: #3f4f63;
  }
  .template-required {
    color: #c0392b;
    margin-left: 2px;
  }
  .template-input {
    width: 100%;
    height: 42px;
    padding: 0 12px;
    border: 1px solid #d2dbe4;
    border-radius: 8px;
    font-size: 14px;
    color: #2c3e35;
    background: #fbfdff;
    box-sizing: border-box;
    transition: border-color 0.16s, box-shadow 0.16s;
  }
  .template-input:focus {
    border-color: #0f7f51;
    box-shadow: 0 0 0 3px rgba(6, 96, 58, 0.12);
    outline: none;
  }
  .template-modal-foot {
    display: flex !important;
    justify-content: flex-end !important;
    align-items: center !important;
    gap: 8px;
    height: auto !important;
    padding: 14px 22px 18px !important;
    border-top: 1px solid #d9e1e8;
    background: #f6f9fb;
  }
  .template-btn {
    height: 38px;
    padding: 0 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }
  .template-btn-cancel {
    background: #fff;
    color: #5a6070;
    border: 1px solid #d4d9e4;
  }
  .template-btn-cancel:hover { background: #f4f6f9; }
  .template-btn-save {
    background: #06603A;
    color: #fff;
  }
  .template-btn-save:hover { background: #054e2f; }
</style>
</head>
<body>
<div th:replace="~{csm/Include/layout :: header(info=${info})}"></div>
<div th:replace="~{csm/Include/layout :: nav_section2('setting', '', '', '')}"></div>
<div class="main">
  <div class="section">
    <div class="content-top">
      <div class="section-top">
        <div class="content-inner">
          <div class="inner-top">
            <div class="inner-section">
              <div class="inner-area">
                <span style="cursor:pointer; color: #06603A; font-weight: 500; font-size: 12px;" onclick="location.href='/csm/core/setting'">템플릿 관리</span>
                |
                <span style="cursor:pointer; margin-left: 5px;" onclick="location.href='/csm/core/categorysetting'">상담일지양식 관리</span>
                |
                <span style="cursor:pointer; margin-left: 5px;" id="module-feature-tab">기능 모듈 관리</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="content-mid">
      <div class="section-mid">
        <div class="smsTemplateDiv" style="width: 100%;" id="myTable">
          <div class="sms-history-grid4">
            <div class="grid-header4">
              <div>템플릿명</div>
              <div>비고</div>
              <div>상태</div>
            </div>
          </div>
          <div class="grid-body4">
            <div class="grid-row4" th:if="${#lists.isEmpty(template)}">
              <div colspan="3">템플릿이 없습니다.</div>
            </div>
            <div class="grid-row4" th:each="t : ${template}" th:if="${t != null}" th:attr="data-template-idx=${t['idx']}">
              <div th:text="${t['name']}"></div>
              <div th:text="${t['description']}"></div>
              <div th:text="${#strings.equalsIgnoreCase((t['del_yn']?:'N').toString(),'Y') ? '비활성화' : '활성화'}"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="section-bot">
        <div class="search-status-area">
          <div><span>검색수 : <span class="count" th:text="|${instCount}건|"></span></span></div>
          <div class="status-area">
            <div class="section-btn">
              <div class="btn counsel-btn" id="user-del">탬플릿삭제</div>
              <div class="btn counsel-btn delBtn" id="user-modi">수정</div>
              <div class="section-btn btn newBtn pop-btn counsel-btn" id="user-new">템플릿등록</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-mid" id="module-feature-section">
        <div class="module-feature-panel">
          <div class="module-feature-head">
            <div>
              <div class="module-feature-title">기능 모듈 관리</div>
              <div class="module-feature-desc">최고 관리자가 기관별로 병실현황판, 녹음, 입원서약서, 파일 업로드 기능을 사용 또는 중지 상태로 제어합니다.</div>
            </div>
          </div>
          <div class="module-feature-table-wrap">
            <table class="module-feature-table">
              <thead>
              <tr>
                <th style="min-width:180px;">기관</th>
                <th th:each="feature : ${moduleFeatures}" th:text="${feature.label}">기능</th>
              </tr>
              </thead>
              <tbody>
              <tr th:if="${#lists.isEmpty(moduleFeatureRows)}">
                <td class="module-feature-empty" th:attr="colspan=${1 + #lists.size(moduleFeatures)}">기능 모듈을 제어할 기관이 없습니다.</td>
              </tr>
              <tr th:each="row : ${moduleFeatureRows}">
                <td class="module-inst-cell">
                  <div class="module-inst-code" th:text="${row.instCode}">inst</div>
                  <div class="module-inst-name" th:text="${row.instName}">기관명</div>
                </td>
                <td th:each="feature : ${moduleFeatures}"
                    th:with="enabled=${row.featureStates[feature.code]}">
                  <div class="module-toggle-wrap">
                    <label class="module-toggle">
                      <input type="checkbox"
                             class="module-feature-toggle"
                             th:attr="data-inst-code=${row.instCode},data-feature-code=${feature.code}"
                             th:checked="${enabled}">
                      <span class="module-slider"></span>
                    </label>
                    <span class="module-toggle-status"
                          th:classappend="${enabled} ? '' : ' is-disabled'"
                          th:text="${enabled} ? '사용' : '중지'">사용</span>
                  </div>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="popup-wrap" id="template-modal" style="display:none;">
  <div class="popup template-modal-dialog">
    <div class="popup-head template-modal-head">
      <span class="head-title" id="template-modal-title">템플릿 등록</span>
      <button type="button" class="template-modal-x"
              onclick="document.getElementById('template-cancel').click()">✕</button>
    </div>
    <div class="popup-body template-modal-body">
      <div class="template-modal-content">
        <div class="template-form-group">
          <label class="template-label" for="template-name">템플릿명 <span class="template-required">*</span></label>
          <input type="text" id="template-name" class="template-input" placeholder="템플릿명을 입력하세요">
        </div>
        <div class="template-form-group">
          <label class="template-label" for="template-desc">비고</label>
          <input type="text" id="template-desc" class="template-input" placeholder="비고를 입력하세요 (선택)">
        </div>
      </div>
    </div>
    <div class="popup-foot template-modal-foot">
      <button type="button" class="template-btn template-btn-cancel" id="template-cancel">취소</button>
      <button type="button" class="template-btn template-btn-save" id="template-save">저장</button>
    </div>
  </div>
</div>
<script th:src="@{/js/csm/core/admin/core-setting.js}"></script>
</body>
</html>

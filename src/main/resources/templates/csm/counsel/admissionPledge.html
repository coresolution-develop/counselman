<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-context-path" th:content="@{/}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>입원 서약서</title>
    <link rel="stylesheet" th:href="@{/css/csm/counsel/admissionPledge.css}">

    <style>
      @supports (-webkit-appearance: none) or (-moz-appearance: none) {
        .checkbox-wrapper-13 input[type=checkbox] {
          --active: #275EFE;
          --active-inner: #fff;
          --focus: 2px rgba(39, 94, 254, .3);
          --border: #BBC1E1;
          --border-hover: #275EFE;
          --background: #fff;
          --disabled: #F6F8FF;
          --disabled-inner: #E1E6F9;
          -webkit-appearance: none;
          -moz-appearance: none;
          height: 21px;
          width: 21px;
          outline: none;
          display: inline-block;
          vertical-align: top;
          position: relative;
          left: auto;
          margin: 0;
          cursor: pointer;
          border: 1px solid var(--bc, var(--border));
          background: var(--b, var(--background));
          transition: background 0.3s, border-color 0.3s, box-shadow 0.2s;
        }
        .checkbox-wrapper-13 input[type=checkbox]:after {
          content: "";
          display: block;
          left: 0;
          top: 0;
          position: absolute;
          transition: transform var(--d-t, 0.3s) var(--d-t-e, ease), opacity var(--d-o, 0.2s);
        }
        .checkbox-wrapper-13 input[type=checkbox]:checked {
          --b: var(--active);
          --bc: var(--active);
          --d-o: .3s;
          --d-t: .6s;
          --d-t-e: cubic-bezier(.2, .85, .32, 1.2);
        }
        .checkbox-wrapper-13 input[type=checkbox]:hover:not(:checked):not(:disabled) {
          --bc: var(--border-hover);
        }
        .checkbox-wrapper-13 input[type=checkbox]:focus {
          box-shadow: 0 0 0 var(--focus);
        }
        .checkbox-wrapper-13 input[type=checkbox]:not(.switch) {
          border-radius: 7px;
        }
        .checkbox-wrapper-13 input[type=checkbox]:not(.switch):after {
          width: 5px;
          height: 9px;
          border: 2px solid var(--active-inner);
          border-top: 0;
          border-left: 0;
          left: 7px;
          top: 4px;
          opacity: var(--o, 0);
          transform: rotate(var(--r, 20deg));
        }
        .checkbox-wrapper-13 input[type=checkbox]:not(.switch):checked {
          --o: 1;
          --r: 43deg;
        }
      }

      .checkbox-wrapper-13 * {
        box-sizing: inherit;
      }
      .checkbox-wrapper-13 *:before,
      .checkbox-wrapper-13 *:after {
        box-sizing: inherit;
      }
      span {
          line-height: 30px;
          margin-bottom: 5px;
      }
      .ap-terms-block p { line-height: 1.7; margin: 0 0 4px 0; word-break: keep-all; }
      .ap-terms-block p:empty { min-height: 0.5em; }
      .ap-terms-block strong { font-weight: 700; }
      .ap-terms-block table { width: 100%; border-collapse: collapse; margin: 8px 0; }
      .ap-terms-block table td, .ap-terms-block table th { border: 1px solid #c7c7c7; padding: 6px 10px; min-width: 40px; vertical-align: top; }
      .ap-terms-block table th { background-color: #fafafa; font-weight: 600; }
      .ap-terms-block h1 { text-align: center; font-size: 24pt; margin-bottom: 16px; }
      .ap-terms-block h2 { font-size: 16pt; margin: 16px 0 8px; }
      .ap-terms-block h3 { font-size: 14pt; margin: 12px 0 6px; }
      .ap-terms-block hr { border: none; border-top: 1px solid #c7c7c7; margin: 12px 0; }
      /* 신청인 서명줄은 문서 하단 고정 영역에서 별도 렌더링 */
      .ap-terms-block .ap-signer-section { display: none !important; }
      /* 템플릿 field chip이 활성화된 입력 요소 스타일 */
      .ap-terms-block .ap-field-input {
        border: none; border-bottom: 1px solid #aaa; background: transparent;
        font-size: inherit; font-family: inherit; outline: none; width: 200px;
      }
      .ap-terms-block .ap-field-textarea {
        border: none; border-bottom: 1px solid #aaa; background: transparent;
        font-size: inherit; font-family: inherit; outline: none;
        resize: none; width: 100%; display: block;
      }
      /* 라디오/체크박스 항상 클릭 가능하도록 보장 */
      input[type=radio],
      input[type=checkbox]:not(.checkbox-wrapper-13 input) {
        cursor: pointer;
        pointer-events: auto;
        position: relative;
        z-index: 1;
      }
    </style>
</head>
<body class="ap-body">
<main class="ap-page">
    <section class="ap-toolbar normal">
        <div class="checkbox-wrapper-13 ap-agree-wrap">
            <input id="ap_agree" type="checkbox"
                   th:checked="${admissionPledge != null and admissionPledge['agreed_yn'] == 'Y'}">
            <label for="ap_agree">위 내용을 확인했고 입원 연계에 동의합니다.</label>
        </div>
        <div class="ap-pen-controls">
            <label class="ap-pen-control">
                펜 색상
                <input type="color" id="ap_pen_color" value="#111827">
            </label>
            <label class="ap-pen-control">
                펜 굵기
                <input type="range" id="ap_pen_size" min="1" max="10" step="1" value="2">
                <span id="ap_pen_size_view">2px</span>
            </label>
        </div>
        <div class="ap-toolbar-actions">
            <button type="button" class="ap-btn ap-btn-gray" id="ap_ink_mode_toggle">전체 필기: OFF</button>
            <button type="button" class="ap-btn ap-btn-gray" id="ap_ink_clear">전체 필기 지우기</button>
        </div>
    </section>

    <div id="ap_document_stage" class="ap-document-stage">
        <section class="ap-paper" style="background-repeat: no-repeat;
            background-position: center 0;
            background-image: url('/img/background4.png');
            background-size: 1246px;
            min-width: 1280px;
            margin: 0 auto;">

            <input type="hidden" id="ap_signature_data"
                   th:value="${admissionPledge != null and admissionPledge['signature_data'] != null ? admissionPledge['signature_data'] : ''}">
            <input type="hidden" id="ap_page_ink_data"
                   th:value="${admissionPledge != null and admissionPledge['page_ink_data'] != null ? admissionPledge['page_ink_data'] : ''}">
            <input type="hidden" id="ap_signed_at"
                   th:value="${admissionPledge != null and admissionPledge['signed_at'] != null ? admissionPledge['signed_at'] : ''}">
            <textarea id="ap_pledge_text" class="ap-hidden-text"
                      th:text="${pledgeTemplateContent}"></textarea>

            <h1 style="text-align: center; font-size: 30pt; padding-top: 70px;" th:text="${docType}">입원서약서</h1>

            <div class="bold" style="font-size: 16pt; color:#303030; display: flex; align-items: start; margin: 0 auto; width: 966px;">※ 환자의 인적사항</div>
            <div style="text-align: center; margin-bottom: 20px;">
                <table border="1" style="border-collapse: collapse; text-align: center; width: 966px; margin-left: auto; margin-right: auto;" >
                    <tr>
                        <td class="normal" width="170px" height="56px">성명</td>
                        <td class="light" style="text-align: left;">
                            <input id="ap_patient_name" style="margin-left: 33px;" type="text" th:value="${patientName}">
                        </td>
                        <td class="normal" width="170px" height="56px">차트번호</td>
                        <td class="light" colspan="2" style="text-align: left;">
                            <input id="ap_chart_no" style="margin-left: 33px;" type="text" th:value="${chartNo}">
                        </td>
                    </tr>
                    <tr>
                        <td class="normal" height="56px">입원병실</td>
                        <td class="light" style="text-align: left;">
                            <input id="ap_room" style="margin-left: 33px;" type="text" th:value="${room}">
                        </td>
                        <td class="normal" height="56px">성별 </td>
                        <td class="light" style="cursor: pointer;">
                            <input type="radio" name="ap_gender" value="남성" id="ap_gender_m"
                                   th:checked="${gender == '남성' or gender == '남'}"><label for="ap_gender_m" style="cursor: pointer;">남</label>
                        </td>
                        <td class="light" style="cursor: pointer;">
                            <input type="radio" name="ap_gender" value="여성" id="ap_gender_f"
                                   th:checked="${gender == '여성' or gender == '여'}"><label for="ap_gender_f" style="cursor: pointer;">여</label>
                        </td>
                    </tr>
                    <tr>
                        <td class="normal" height="56px">생년월일</td>
                        <td class="light" style="text-align: left;">
                            <input id="ap_birth" style="margin-left: 33px;" type="text" th:value="${birth}">
                        </td>
                        <td class="normal" height="56px">전화</td>
                        <td class="light" colspan="2" style="text-align: left;">
                            <input id="ap_phone" style="margin-left: 33px;" type="text" th:value="${phone}">
                        </td>
                    </tr>
                </table>
            </div>

            <div class="light ap-terms-block" style="font-size:14pt; color:#222222; width:966px; margin: 0 auto;" th:utext="${pledgeTemplateContent}"></div>
            <br>


            <div style="position: relative;">
                <div class="normal" style="text-align: right; position: relative; z-index: 1; color: #222222; width: 966px; height: 42px; margin: 0 auto; display: flex; justify-content: flex-end; align-items: center;">
                    신청인 ( 관계 :
                    <input id="ap_signer_relation" style="width:175px;" type="text"
                           th:value="${admissionPledge != null and admissionPledge['signer_relation'] != null and !#strings.isEmpty(admissionPledge['signer_relation']) ? admissionPledge['signer_relation'] : '본인'}"/>) :
                    <input id="ap_signer_name" style="width:100px;" type="text"
                           th:value="${admissionPledge != null and admissionPledge['signer_name'] != null and !#strings.isEmpty(admissionPledge['signer_name']) ? admissionPledge['signer_name'] : patientName}"/>
                    &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;
                    <div style="display: inline-block; position: relative;" id="end" class="ap-sign-trigger" data-signature-key="primary">
                        ( 서&emsp;<img id="canvasImg" class="ap-sign-image ap-sign-image-final" src="" alt="신청인 서명">명 )
                    </div>
                </div>
            </div>
            <div class="ap-signed-at normal">서명일시: <span id="ap_signed_at_view"></span></div>
            <br><br><br><br>
        </section>
        <canvas id="ap_page_ink_canvas" aria-label="문서 전체 필기"></canvas>
        <img id="ap_page_ink_print_img" alt="문서 전체 필기 인쇄 레이어">
    </div>

    <div class="ap-action-row normal">
        <button type="button" class="ap-btn ap-btn-gray" id="ap_clear_signature">서명 전체 지우기</button>
        <button type="button" class="ap-btn ap-btn-gray" id="ap_cancel">취소</button>
        <button type="button" class="ap-btn ap-btn-gray" id="ap_print">인쇄</button>
        <button type="button" class="ap-btn ap-btn-primary" id="ap_apply">서명 완료 후 적용</button>
    </div>
</main>

<div id="ap_signature_modal" class="ap-sign-modal" aria-hidden="true">
    <div class="ap-sign-modal-body">
        <div class="ap-sign-modal-title" id="ap_signature_modal_title">서명</div>
        <div class="ap-sign-modal-desc">아래 공간에 서명하신 후 확인을 눌러 주세요.</div>
        <canvas id="ap_signature_modal_canvas" width="780" height="340"></canvas>
        <div class="ap-sign-modal-actions">
            <button type="button" class="ap-btn ap-btn-gray" id="ap_signature_modal_clear">지우기</button>
            <button type="button" class="ap-btn ap-btn-gray" id="ap_signature_modal_cancel">취소</button>
            <button type="button" class="ap-btn ap-btn-primary" id="ap_signature_modal_apply">확인</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
window.ADMISSION_PLEDGE_BOOTSTRAP = {
  csIdx: [[${csIdx}]],
  draftKey: [[${draftKey}]],
  returnUrl: [[${returnUrl}]],
  defaultAdmissionPledgeText: [[${defaultAdmissionPledgeText}]],
  admissionPledge: [[${admissionPledge}]]
};
</script>
<script th:src="@{/js/csm/counsel/admissionPledge.js}"></script>
<script>
(function () {
  var apData = ((window.ADMISSION_PLEDGE_BOOTSTRAP || {}).admissionPledge) || {};

  var CHIP_MAP = {
    guardian_name:         { id: 'ap_guardian_name',         type: 'text',     dataKey: 'guardian_name',         w: '200px' },
    guardian_relation:     { id: 'ap_guardian_relation',     type: 'text',     dataKey: 'guardian_relation',     w: '120px' },
    guardian_addr:         { id: 'ap_guardian_addr',         type: 'textarea', dataKey: 'guardian_addr' },
    guardian_phone:        { id: 'ap_guardian_phone',        type: 'text',     dataKey: 'guardian_phone',        w: '180px' },
    guardian_cost:         { id: 'ap_guardian_cost',         type: 'checkbox', dataKey: 'guardian_cost_yn',      label: '비용안내' },
    sub_guardian_name:     { id: 'ap_sub_guardian_name',     type: 'text',     dataKey: 'sub_guardian_name',     w: '200px' },
    sub_guardian_relation: { id: 'ap_sub_guardian_relation', type: 'text',     dataKey: 'sub_guardian_relation', w: '120px' },
    sub_guardian_addr:     { id: 'ap_sub_guardian_addr',     type: 'textarea', dataKey: 'sub_guardian_addr' },
    sub_guardian_phone:    { id: 'ap_sub_guardian_phone',    type: 'text',     dataKey: 'sub_guardian_phone',    w: '180px' },
    sub_guardian_cost:     { id: 'ap_sub_guardian_cost',     type: 'checkbox', dataKey: 'sub_guardian_cost_yn',  label: '비용안내' },
  };

  function activateFieldChips() {
    var block = document.querySelector('.ap-terms-block');
    if (!block) return;
    block.querySelectorAll('.tiptap-field-chip[data-field-key]').forEach(function (chip) {
      var key = chip.dataset.fieldKey;
      var cfg = CHIP_MAP[key];
      if (!cfg) return;
      var val = String(apData[cfg.dataKey] || '').trim();
      var el;
      if (cfg.type === 'checkbox') {
        var wrapper = document.createElement('div');
        wrapper.className = 'checkbox-wrapper-13';
        wrapper.style.cssText = 'display:inline-flex;align-items:center;margin-right:21px;';
        el = document.createElement('input');
        el.type = 'checkbox';
        el.className = 'normal';
        el.id = cfg.id;
        el.checked = val === 'Y';
        var lbl = document.createElement('label');
        lbl.htmlFor = cfg.id;
        lbl.textContent = cfg.label;
        wrapper.appendChild(el);
        wrapper.appendChild(lbl);
        chip.parentNode.replaceChild(wrapper, chip);
        return;
      } else if (cfg.type === 'textarea') {
        el = document.createElement('textarea');
        el.className = 'light ap-field-textarea';
        el.id = cfg.id;
        el.rows = 2;
        el.value = val;
      } else {
        el = document.createElement('input');
        el.type = 'text';
        el.className = 'light ap-field-input';
        el.id = cfg.id;
        if (cfg.w) el.style.width = cfg.w;
        el.value = val;
      }
      chip.parentNode.replaceChild(el, chip);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', activateFieldChips);
  } else {
    activateFieldChips();
  }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담리스트 : SOSYGE EASY-CRM</title>
    <meta property="og:title" content="상담관리시스템"> <!-- 공유시 사이트 이름 -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://49.247.42.59:8090/csm/login"> <!-- 공유시 입력될 URL -->
    <meta property="og:image" content="/icon/ev/core_icon_big.png" th:content="@{/icon/ev/core_icon_big.png}"> <!-- 공유시 노출 이미지 (최적 사이즈 : 800 x 400) -->
    <meta property="og:description" content="병원상담관리시스템"> <!-- 공유시 보여질 사이트 간략 소개 -->

    <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
    <link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/style.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
    <link rel="stylesheet" th:href="@{/css/csm/admin/admin.css}">
    <link rel="stylesheet" th:href="@{/css/csm/popup/listpopup.css}">
    <link rel="stylesheet" th:href="@{/css/csm/counsel/list.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/spinner.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/button.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/header.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/cate.css}">
    <link rel="stylesheet" th:href="@{/css/csm/counsel/list-modern.css(v='20260424a')}">
    <!-- MediPlat design system -->
    <link rel="stylesheet" th:href="@{/assets/css/tokens.css(v='20260424a')}">
    <link rel="stylesheet" th:href="@{/assets/css/layout.css(v='20260424a')}">
    <link rel="stylesheet" th:href="@{/assets/css/shell.css(v='20260424a')}">

    <style>
        #scrollDetector {
            height: 10px;
        }

        .arrow {
            display: inline-block;
            width: 0;
            height: 0;
            margin-left: 5px;
        }

        .up {
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 5px solid black;
        }

        .down {
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid black;
        }

        .sortable-ghost {
            opacity: 0.5;
            background-color: #f0f0f0;
        }

        /* ── 열 고정 핀 버튼 ── */
        .sortable-item {
            display: flex;
            align-items: center;
        }
        .col-pin-btn {
            display: none;
            flex-shrink: 0;
            margin-left: auto;
            padding: 2px 5px;
            background: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
            opacity: 0.28;
            transition: opacity 0.15s, background 0.15s;
        }
        #order .sortable-item .col-pin-btn { display: inline-flex; align-items: center; }
        .col-pin-btn:hover { opacity: 0.8; background: #eef7f0; }
        .sortable-item.is-pinned .col-pin-btn { opacity: 1; }
        .sortable-item.is-pinned {
            background: #eef7f0;
            border-color: #b2d9be;
            font-weight: 600;
        }

        .loading-spinner {
            border: 4px solid #06603A;
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 30px;
            height: 30px;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="counsel-list-modern">

    <th:block th:replace="~{csm/Include/layout :: csm_header(info=${info})}"></th:block>
    <th:block th:replace="~{csm/Include/layout :: csm_sidebar('list', ${endVar}, ${st}, ${kw})}"></th:block>
    <div class="main">
        <!-- 중앙 콘텐츠 -->
        <div class="section orb-deco">

            <!-- ── 검색/필터 바 (헤더에서 이동) ── -->
            <form id="searchForm" class="csm-search-bar" th:action="@{/counsel/list}" method="get">
                <select name="searchType" id="searchType" style="min-width:100px;">
                    <option value="patient"   th:selected="${cri == null or #strings.isEmpty(cri.searchType) or cri.searchType == 'patient'}">환자명</option>
                    <option value="guardian"  th:selected="${cri != null and cri.searchType == 'guardian'}">보호자명</option>
                    <option value="phone"     th:selected="${cri != null and cri.searchType == 'phone'}">전화번호</option>
                    <option value="counselor" th:selected="${cri != null and cri.searchType == 'counselor'}">상담자</option>
                    <option value="content"   th:selected="${cri != null and cri.searchType == 'content'}">상담내용</option>
                </select>

                <!-- 기간 선택 -->
                <select name="dateRange" id="dateRange" style="min-width:96px;">
                    <option th:value="all"    th:selected="${cri != null and cri.dateRange == 'all'}">전체기간</option>
                    <option th:value="10"     th:selected="${cri != null and cri.dateRange == '10'}">최근 10일</option>
                    <option th:value="30"     th:selected="${cri != null and cri.dateRange == '30'}">최근 30일</option>
                    <option th:value="90"     th:selected="${cri != null and cri.dateRange == '90'}">최근 90일</option>
                    <option th:value="custom" th:selected="${cri != null and cri.dateRange == 'custom'}">직접 선택</option>
                </select>

                <!-- 날짜 직접 선택 -->
                <div class="modern-date-range-inputs filter-item date-item" id="dateField">
                    <div class="sh-date-input-wrap">
                        <label class="visually-hidden" for="startDate">조회 시작일</label>
                        <input type="text" id="startDate" name="startDate" readonly style="cursor:pointer;"
                               th:value="${cri != null ? cri.startDate : ''}">
                        <button type="button" class="filter-cal-btn date-input-toggle" data-target="startDate" aria-label="시작일 선택">
                            <svg width="14" height="14" aria-hidden="true"><use href="#i-calendar"/></svg>
                        </button>
                    </div>
                    <span class="csm-search-bar__sep">~</span>
                    <div class="sh-date-input-wrap">
                        <label class="visually-hidden" for="endDate">조회 종료일</label>
                        <input type="text" id="endDate" name="endDate" readonly style="cursor:pointer;"
                               th:value="${cri != null ? cri.endDate : ''}">
                        <button type="button" class="filter-cal-btn date-input-toggle" data-target="endDate" aria-label="종료일 선택">
                            <svg width="14" height="14" aria-hidden="true"><use href="#i-calendar"/></svg>
                        </button>
                    </div>
                    <div class="sh-calendar" id="statusCalendar">
                        <div class="sh-cal-week">
                            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
                        </div>
                        <div class="sh-cal-head">
                            <button type="button" class="sh-cal-nav" id="calPrev" aria-label="이전달">
                                <svg width="14" height="14" aria-hidden="true"><use href="#i-chevron-left"/></svg>
                            </button>
                            <div class="sh-cal-title" id="calTitle"></div>
                            <button type="button" class="sh-cal-nav" id="calNext" aria-label="다음달">
                                <svg width="14" height="14" aria-hidden="true"><use href="#i-chevron-right"/></svg>
                            </button>
                        </div>
                        <div class="sh-cal-grid" id="calGrid"></div>
                    </div>
                </div>

                <!-- 상태 -->
                <select id="statusFilter" name="status" style="min-width:100px;">
                    <option value="all" th:selected="${cri == null or #strings.isEmpty(cri.status) or cri.status == 'all'}">전체 상태</option>
                    <option th:each="status : ${statusOptions}"
                            th:value="${status}" th:text="${status}"
                            th:selected="${cri != null and cri.status == status}">상태</option>
                </select>

                <!-- 경로 -->
                <select id="pathTypeFilter" name="pathType" style="min-width:100px;">
                    <option value="all" th:selected="${cri == null or #strings.isEmpty(cri.pathType) or cri.pathType == 'all'}">전체 경로</option>
                    <option th:each="path : ${pathTypeOptions}"
                            th:value="${path}" th:text="${path}"
                            th:selected="${cri != null and cri.pathType == path}">경로</option>
                </select>

                <!-- 키워드 -->
                <input id="keywordInput" name="keyword" type="text" class="csm-kw-input"
                       th:value="${cri != null ? cri.keyword : ''}"
                       placeholder="검색어를 입력하세요">

                <!-- 완료 항목 포함 -->
                <label class="csm-search-bar__check">
                    <input type="checkbox" name="end" id="end" th:checked="${cri != null and cri.end == 'on'}">
                    완료 항목 포함
                </label>

                <!-- 아이콘 버튼 + 검색 버튼 -->
                <button type="button" id="setting" class="csm-btn-icon toolbar-icon-btn list-setting-btn" aria-label="리스트 항목 설정 열기">
                    <svg width="14" height="14" aria-hidden="true"><use href="#i-settings"/></svg>
                </button>
                <button type="button" class="csm-btn-search listBtn" id="searchBtn">검색</button>
            </form>

            <!-- Page header -->
            <div class="cl-page-header">
                <div>
                    <h1 class="cl-page-title">상담리스트</h1>
                    <p class="cl-page-subtitle">우선순위 대기 상담과 전체 상담 기록을 관리합니다</p>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button type="button" class="cl-btn--outline">엑셀 내보내기</button>
                    <a class="cl-btn--primary" th:href="@{/counsel/new}">신규 상담</a>
                </div>
            </div>

            <section class="integrated-reservation-box">
                <div class="integrated-reservation-head cl-section-head">
                    <span class="cl-section-head__title">상담 접수 대기</span>
                    <span class="cl-badge cl-badge--warn">우선순위순</span>
                    <span class="cl-section-head__hint"
                          th:text="${reservedCounselReservations != null ? #lists.size(reservedCounselReservations) + '건 대기' : '0건 대기'}"></span>
                    <span class="cl-section-head__spacer"></span>
                    <button type="button"
                            class="cl-btn-xs reservation-toggle-btn"
                            id="reservationToggleBtn"
                            aria-expanded="true"
                            aria-controls="integratedReservationBody">접기</button>
                    <a class="cl-btn-xs cl-btn-xs--brand integrated-reservation-manage"
                       th:href="@{/counsel/reservation(status='RESERVED')}">접수 관리</a>
                </div>
                <div class="integrated-reservation-body" id="integratedReservationBody">
                    <div class="integrated-reservation-empty"
                         th:if="${reservedCounselReservations == null or #lists.isEmpty(reservedCounselReservations)}">
                        현재 대기 중인 상담 접수가 없습니다.
                    </div>
                    <div class="integrated-reservation-list cl-queue"
                         th:if="${reservedCounselReservations != null and !#lists.isEmpty(reservedCounselReservations)}">
                        <article class="integrated-reservation-item cl-queue-card" th:each="item : ${reservedCounselReservations}">
                            <div class="cl-queue-card__head">
                                <span class="cl-prio reservation-priority-badge"
                                      th:classappend="${'cl-prio--' + (item.priority != null ? item.priority : 3) + (item.priority != null and item.priority <= 2 ? ' high' : '')}"
                                      th:text="${'P' + (item.priority != null ? item.priority : 3)}">P3</span>
                                <span class="cl-queue-card__name" th:text="${item.patient_name}">홍길동</span>
                            </div>
                            <div class="cl-queue-card__phone"
                                 th:text="${#strings.isEmpty(item.patient_phone) ? '-' : item.patient_phone}">010-0000-0000</div>
                            <div class="cl-queue-card__time"
                                 th:text="${#strings.isEmpty(item.reserved_at) ? '접수시간 미정' : item.reserved_at}">2026-04-14 10:00:00</div>
                            <div class="cl-queue-card__actions reservation-actions">
                                <a class="cl-btn-xs cl-btn-xs--brand reservation-link-btn"
                                   th:href="@{/counsel/new(reservationId=${item.id})}">상담 작성</a>
                                <a class="cl-btn-xs reservation-link-btn ghost"
                                   th:href="@{/counsel/reservation(status='ALL', reservationId=${item.id})}">상세 보기</a>
                            </div>
                        </article>
                    </div>
                </div>
            </section>
            
            <section class="list-table-shell" aria-label="상담리스트">
                <div class="list-table-head cl-section-head">
                    <span class="cl-section-head__title">상담 기록 목록</span>
                    <span class="cl-section-head__hint" id="record-count"></span>
                </div>

                <div class="content-mid">
                    <div class="section-mid">
                        <table style="width:100%;" id="myTable">
                            <colgroup>
                                <col class="col1">
                                <col class="col2">
                                <col class="col3">
                                <col class="col4">
                                <col class="col5">
                                <col class="col6">
                                <col class="col7">
                                <col class="col8">
                                <col class="col9">
                                <col class="col10">
                                <col class="col11">
                                <col class="col12">
                                <col class="col13">
                                <col class="col14">
                                <col class="col15">
                                <col class="col16">
                                <col class="col17">
                                <col class="col18">
                            </colgroup>
                            <thead id="table-header"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                        <div id="scrollDetector"></div>
                    </div>

                    <div id="loading" style="display:none;text-align:center;margin-top:10px;">
                        <div class="lodaing-container" style="display:flex;justify-content:center;align-items:center;">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="section-bot">
                <div class="cl-footer-bar">
                    <button type="button" class="cl-btn--ghost" id="del-counsel">환자정보삭제</button>
                    <button type="button" class="cl-btn--outline" id="bulk-sms-btn">일괄 문자 보내기</button>
                    <button type="button" class="cl-btn--outline" id="new-reservation">상담 접수</button>
                    <button type="button" class="cl-btn--primary" id="new-counsel">신규상담</button>
                </div>
            </div>

        </div> <!-- /.section -->
    </div> <!-- /.main -->

    <!-- 일괄 문자 보내기 모달 -->
    <div id="bulkSmsModal" class="bulk-sms-overlay" style="display:none;">
        <div class="bulk-sms-modal">
            <div class="bulk-sms-header">
                <span class="bulk-sms-title">일괄 문자 보내기</span>
                <button type="button" id="bulkSmsClose" class="bulk-sms-close">✕</button>
            </div>
            <div class="bulk-sms-body">
                <!-- 발신번호 -->
                <div class="bulk-sms-section">
                    <label class="bulk-sms-label">발신번호</label>
                    <select id="bulkSmsFromPhone" class="bulk-sms-select">
                        <option value="">발신번호 선택</option>
                        <th:block th:if="${phOptions != null}">
                            <option th:each="opt : ${phOptions}" th:value="${opt.value}" th:text="${opt.text}"></option>
                        </th:block>
                    </select>
                </div>
                <!-- 수신자 -->
                <div class="bulk-sms-section">
                    <div class="bulk-sms-label-row">
                        <label class="bulk-sms-label">수신자</label>
                        <label class="bulk-sms-select-all-wrap">
                            <input type="checkbox" id="bulkSmsSelectAll" checked> 전체 선택
                        </label>
                    </div>
                    <div id="bulkSmsRecipients" class="bulk-sms-recipients"></div>
                </div>
                <!-- 메시지 -->
                <div class="bulk-sms-section">
                    <label class="bulk-sms-label">메시지</label>
                    <textarea id="bulkSmsMessage" class="bulk-sms-textarea" placeholder="문자 내용을 입력해주세요."></textarea>
                    <div class="bulk-sms-bytecount">
                        <span id="bulkSmsByteCount">0 / 90 byte</span>
                        <label class="bulk-sms-ad-wrap">
                            <input type="checkbox" id="bulkSmsAdCheck"> 광고문자(080 무료수신거부)
                        </label>
                    </div>
                </div>
            </div>
            <div class="bulk-sms-footer">
                <button type="button" id="bulkSmsCancel" class="bulk-sms-cancel-btn">취소</button>
                <button type="button" id="bulkSmsSend" class="bulk-sms-send-btn">전송</button>
            </div>
        </div>
    </div>

    <!-- 모달 -->
    <div class="popup-wrap" id="popup">
        <div class="popup">
            <div class="popup-head">
                <span class="head-title">리스트 항목 설정</span>
            </div>

            <form id="orderForm" style="width:100%;height:calc(100% - 85px)" th:action="@{/counsel/ListSetting}"
                method="post">

                <div class="popup-body">
                    <div class="body-content">
                        <div class="body-contentbox">
                            <div class="body-inner">

<div class="noneorder">
  <div class="noneorder-header"><span>가려질 항목</span></div>
  <ul id="inner-content" class="sortable-list">
    <th:block th:each="l : ${innerContentItems}">
      <th:block th:if="${l != null}">
        <li class="sortable-item" draggable="true"
            th:with="
              cn=${l['column_name'] != null ? l['column_name'] :
                  (l['COLUMN_NAME'] != null ? l['COLUMN_NAME'] :
                  (l['coulmn'] != null ? l['coulmn'] : l['COULMN']))},
              cc=${l['column_comment'] != null ? l['column_comment'] :
                  (l['COLUMN_COMMENT'] != null ? l['COLUMN_COMMENT'] :
                  (l['comment'] != null ? l['comment'] : l['COMMENT']))}"
            th:attr="data-column=${cn}, data-comment=${#strings.isEmpty(cc) ? cn : cc}">
          <span th:text="${#strings.isEmpty(cc) ? cn : cc}">label</span>
        </li>
      </th:block>
    </th:block>
  </ul>
</div>
<!-- 보여질 항목 -->
<div class="order">
  <div class="order-header"><span>보여질 항목</span></div>
  <ul id="order" class="sortable-list">
    <th:block th:each="l : ${orderItems}">
      <th:block th:if="${l != null}">
        <li class="sortable-item" draggable="true"
            th:with="
              cn=${l['column_name'] != null ? l['column_name'] :
                  (l['COLUMN_NAME'] != null ? l['COLUMN_NAME'] :
                  (l['coulmn'] != null ? l['coulmn'] : l['COULMN']))},
              cc=${l['column_comment'] != null ? l['column_comment'] :
                  (l['COLUMN_COMMENT'] != null ? l['COLUMN_COMMENT'] :
                  (l['comment'] != null ? l['comment'] : l['COMMENT']))},
              t=${l['turn'] != null ? l['turn'] : l['TURN']}"
            th:attr="data-column=${cn}, data-comment=${#strings.isEmpty(cc) ? cn : cc}, data-turn=${t}">
          <span th:text="${#strings.isEmpty(cc) ? cn : cc}">label</span>
        </li>
      </th:block>
    </th:block>
  </ul>
</div>

                            </div>
                        </div>
                    </div>
                </div>

                <div class="popup-foot">
                    <span class="btn listBtn close" id="close">닫기</span>
                    <div class="btn listBtn pink_btn2" id="removeOrder">모두 비우기</div>
                    <button type="button" class="btn listBtn modal_btn2" id="confirm">저장</button>
                </div>
            </form>
        </div>
    </div>

    <div id="spinner-overlay" style="display:none;">
        <div class="spinner-container">
            <div class="spinner"></div>
            <p>잠시만 기다려주세요</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js" integrity="sha512-zYXldzJsDrNKV+odAwFYiDXV2Cy37cwizT+NkuiPGsa9X1dOz04eHvUWVuxaJ299GvcJT31ug2zO4itXBjFx4w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script th:replace="~{csm/Include/layout :: scripts}"></script>
    <script th:src="@{/js/csm/counsel/list.js}"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병실현황판</title>
    <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/style.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/button.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/header.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/cate.css}">
    <style>
        body { background:#fbfbfb; }
        body.popup-mode { background:#f4f8f5; }
        .rb-wrap { padding:24px 28px 40px; }
        body:not(.popup-mode) .rb-wrap {
            padding: 90px 24px 48px;
            margin-left: 145px;
            width: calc(100% - 145px);
            max-width: 2560px;
            min-height: 100vh;
            box-sizing: border-box;
            background: linear-gradient(180deg, #eef6f0 0%, #f7faf8 240px, #fbfbfb 100%);
        }
        .rb-toolbar, .rb-summary-card, .rb-ward-card {
            background:#fff;
            border:1px solid #d6e6da;
            border-radius:16px;
            box-shadow: 0 12px 28px rgba(5, 64, 30, 0.06);
        }
        .rb-toolbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:16px;
            padding:22px 24px;
            margin-bottom:20px;
            background: linear-gradient(135deg, #05401E 0%, #0b6b33 100%);
            border-color: transparent;
            color:#f7fff9;
        }
        .rb-toolbar h1 { margin:0; font-size:26px; color:#fff; }
        .rb-toolbar p { margin:6px 0 0; color:rgba(247, 255, 249, 0.82); }
        .rb-summary { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:12px; margin-bottom:20px; }
        .rb-summary-card { padding:18px; }
        .rb-summary-label { font-size:13px; color:#4b6352; }
        .rb-summary-value { margin-top:10px; font-size:30px; font-weight:800; color:#05401E; }
        .rb-selected {
            background:#fff8e8;
            border:1px solid #f6d48b;
            border-radius:12px;
            padding:14px 16px;
            margin-bottom:18px;
            box-shadow: 0 10px 24px rgba(154, 103, 0, 0.06);
        }
        .rb-selected strong { color:#9a6700; }
        .rb-ward-card { margin-bottom:18px; overflow:hidden; }
        .rb-ward-header {
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:10px;
            padding:16px 18px;
            background:#f1f7f3;
            border-bottom:1px solid #e4efe6;
        }
        .rb-ward-head-left { display:flex; flex-direction:column; gap:10px; min-width:0; width:100%; }
        .rb-ward-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .rb-ward-header h2 { margin:0; font-size:22px; color:#05401E; letter-spacing:-0.2px; }
        .rb-ward-subtitle {
            display:inline-flex;
            align-items:center;
            font-size:12px;
            font-weight:700;
            color:#286146;
            background:#e4f2e8;
            border:1px solid #c5dfcd;
            border-radius:999px;
            padding:4px 10px;
        }
        .rb-ward-kpi-list { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .rb-ward-kpi {
            display:inline-flex;
            align-items:center;
            gap:6px;
            background:#fff;
            border:1px solid #cfe3d6;
            border-radius:10px;
            padding:5px 10px;
            color:#21563a;
            font-size:13px;
            line-height:1;
            white-space:nowrap;
        }
        .rb-ward-kpi-label { color:#4f6f5d; font-weight:700; }
        .rb-ward-kpi-value { font-size:16px; font-weight:800; color:#05401E; }
        .rb-table-wrap { overflow:auto; }
        .rb-table { width:100%; border-collapse:collapse; min-width:1400px; }
        .rb-table th, .rb-table td { border-bottom:1px solid #edf3ef; padding:10px 12px; font-size:13px; text-align:left; vertical-align:top; }
        .rb-table th {
            background:#f8fcf9;
            color:#1d5131;
            position:sticky;
            top:0;
            z-index:1;
            white-space:nowrap;
            word-break:keep-all;
        }
        .rb-badge {
            display:inline-block;
            border-radius:999px;
            padding:4px 10px;
            background:#eef7f0;
            color:#0b5a2a;
            font-size:12px;
            font-weight:700;
            border:1px solid #c8decf;
        }
        .rb-available-good { color:#067647; font-weight:700; }
        .rb-available-bad { color:#b42318; font-weight:700; }
        .rb-slot-grid {
            display:flex;
            flex-wrap:nowrap;
            gap:6px;
            min-width:max-content;
            white-space:nowrap;
        }
        .rb-slot {
            border:1px solid #d6e6da;
            border-radius:8px;
            padding:6px 8px;
            background:#fff;
            min-height:34px;
            min-width:84px;
            text-align:center;
        }
        .rb-slot-empty { color:#98a2b3; }
        .rb-slot-to {
            background:#ecfdf3;
            border-color:#b7ebcb;
        }
        .rb-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .rb-btn {
            border:none;
            border-radius:10px;
            padding:10px 14px;
            cursor:pointer;
            font-weight:700;
            font-size:14px;
            text-decoration:none;
        }
        .rb-btn-primary { background:linear-gradient(312deg, #05401E 20.34%, #005424 155.45%); color:#fff; }
        .rb-btn-light { background:#eef7f0; color:#0b5a2a; border:1px solid #c8decf; }
        .rb-toolbar .rb-btn-light { background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.22); }
        .rb-btn-select { padding:6px 10px; background:#ecfdf3; color:#067647; border:1px solid #b7ebcb; }
        .rb-mobile-nav {
            display: none;
        }
        @media (max-width: 1024px) { .rb-summary { grid-template-columns: repeat(2, minmax(0,1fr)); } }
        @media (max-width: 768px) {
            body.room-board-page .logo {
                padding-left: 14px;
            }
            body:not(.popup-mode) .rb-toolbar .rb-actions {
                display: none;
            }
            .rb-mobile-nav {
                position: sticky;
                top: 58px;
                z-index: 995;
                display: flex;
                gap: 8px;
                padding: 10px 12px;
                border-bottom: 1px solid #d8e7dd;
                background: rgba(244, 250, 246, 0.95);
                backdrop-filter: blur(4px);
            }
            .rb-mobile-nav a {
                flex: 1;
                min-width: 0;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 10px 8px;
                border-radius: 10px;
                border: 1px solid #c9dace;
                background: #fff;
                color: #1d5131;
                font-size: 12px;
                font-weight: 700;
                text-decoration: none;
            }
            .rb-mobile-nav a.is-active {
                background: linear-gradient(312deg, #05401E 20.34%, #005424 155.45%);
                color: #fff;
                border-color: transparent;
            }
            .rb-wrap { padding:16px; }
            body:not(.popup-mode) .rb-wrap {
                padding: 72px 16px 32px;
                margin-left: 0;
                width: 100%;
            }
            .rb-summary { grid-template-columns: repeat(2, minmax(0,1fr)) }
            .rb-toolbar { padding:18px 16px; }
            .rb-ward-kpi-list { gap:6px; }
            .rb-ward-kpi { padding:5px 8px; font-size:12px; }
            .rb-ward-kpi-value { font-size:14px; }
        }
    </style>
</head>
<body th:classappend="${popupMode} ? 'popup-mode' : ''" class="room-board-page">
<th:block th:unless="${popupMode}">
    <div th:replace="~{csm/Include/layout :: header(info=${info})}"></div>
    <div th:replace="~{csm/Include/layout :: nav_section2('roomboard', ${endVar}, ${st}, ${kw})}"></div>
    <nav class="rb-mobile-nav" aria-label="병실현황판 모바일 메뉴">
        <a th:href="@{/counsel/list(page=1, perPageNum=10, end='on', searchType='', keyword='')}">상담내역</a>
        <a class="is-active" th:href="@{/room-board}">병실현황판</a>
        <a th:if="${canManageRoomBoard}" th:href="@{/admin/room-board}">관리화면</a>
    </nav>
</th:block>

<div class="rb-wrap">
    <div class="rb-toolbar">
        <div>
            <h1>병실현황판</h1>
            <p th:text="|기준일 ${board.snapshotDate} ${#strings.isEmpty(board.snapshotTime) ? '' : board.snapshotTime}|">기준일</p>
        </div>
        <div class="rb-actions">
            <a th:if="${!popupMode}" class="rb-btn rb-btn-light" th:href="@{/room-board}">최신 현황</a>
            <a th:if="${canManageRoomBoard and !popupMode}" class="rb-btn rb-btn-light" th:href="@{/admin/room-board}">관리 화면</a>
            <button th:if="${popupMode}" type="button" class="rb-btn rb-btn-light" onclick="window.close()">닫기</button>
        </div>
    </div>

    <div class="rb-selected" th:if="${popupMode and (!#strings.isEmpty(selectedPatientName) or !#strings.isEmpty(selectedGender))}">
        <strong>입원상담 선택 대상</strong>
        <span th:text="${selectedPatientName}"></span>
        <span th:if="${!#strings.isEmpty(selectedGender)}" th:text="| / 성별 ${selectedGender}|"></span>
        <span th:if="${!#strings.isEmpty(selectedExpectedDate)}" th:text="| / 예정일 ${selectedExpectedDate}|"></span>
    </div>

    <div class="rb-summary">
        <div class="rb-summary-card">
            <div class="rb-summary-label">허가병상수</div>
            <div class="rb-summary-value" th:text="${board.totalLicensedBeds}">0</div>
        </div>
        <div class="rb-summary-card">
            <div class="rb-summary-label">재원환자 수</div>
            <div class="rb-summary-value" th:text="${board.totalOccupiedBeds}">0</div>
        </div>
        <div class="rb-summary-card">
            <div class="rb-summary-label">입원 가능 수</div>
            <div class="rb-summary-value" th:text="${board.totalAvailableBeds}">0</div>
        </div>
        <div class="rb-summary-card">
            <div class="rb-summary-label">전체 가동률</div>
            <div class="rb-summary-value" th:text="|${board.totalOccupancyRate}%|">0%</div>
        </div>
    </div>

    <div class="rb-ward-card" th:each="ward : ${board.wards}">
        <div class="rb-ward-header">
            <div class="rb-ward-head-left">
                <div class="rb-ward-title-row">
                    <h2 th:text="${ward.wardName}">1병동</h2>
                    <span class="rb-ward-subtitle">병동 현황</span>
                </div>
                <div class="rb-ward-kpi-list">
                    <span class="rb-ward-kpi">
                        <span class="rb-ward-kpi-label">허가병상</span>
                        <span class="rb-ward-kpi-value" th:text="|${ward.licensedBeds}|">0</span>
                    </span>
                    <span class="rb-ward-kpi">
                        <span class="rb-ward-kpi-label">재원환자</span>
                        <span class="rb-ward-kpi-value" th:text="|${ward.occupiedBeds}|">0</span>
                    </span>
                    <span class="rb-ward-kpi">
                        <span class="rb-ward-kpi-label">입원 가능</span>
                        <span class="rb-ward-kpi-value" th:text="|${ward.availableBeds}|">0</span>
                    </span>
                    <span class="rb-ward-kpi">
                        <span class="rb-ward-kpi-label">가동률</span>
                        <span class="rb-ward-kpi-value" th:text="|${ward.occupancyRate}%|">0%</span>
                    </span>
                </div>
            </div>
        </div>
        <div class="rb-table-wrap">
            <table class="rb-table">
                <thead>
                <tr>
                    <th>병실</th>
                    <th>허가병상수</th>
                    <th>성별</th>
                    <th>재원환자 수</th>
                    <th>입원 T.O</th>
                    <th>가동률</th>
                    <th>간병 형태</th>
                    <th>예약 환자수</th>
                    <th>입원 예정자</th>
                    <th>상태구분</th>
                    <th>재원환자 명단</th>
                    <th>참고내용</th>
                    <th th:if="${popupMode}">선택</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="room : ${ward.rooms}">
                    <td><span class="rb-badge" th:text="|${room.roomName} (${room.licensedBeds}병상)|">101호 (8병상)</span></td>
                    <td th:text="|${room.licensedBeds} 병상|"></td>
                    <td th:text="${room.genderSummary}"></td>
                    <td th:text="|${room.occupiedCount} 명|"></td>
                    <td>
                        <span th:classappend="${room.availableCount > 0 ? 'rb-available-good' : 'rb-available-bad'}"
                              th:text="${room.availableCount > 0 ? room.availableCount + '명 입원 가능!' : '만실'}"></span>
                    </td>
                    <td th:text="|${room.occupancyRate}%|"></td>
                    <td th:text="${room.careType}"></td>
                    <td th:text="|${room.reservationCount} 명|"></td>
                    <td th:text="${room.reservationNames}"></td>
                    <td th:text="${room.statusLabel}"></td>
                    <td>
                        <div class="rb-slot-grid">
                            <div class="rb-slot"
                                 th:each="slot,slotStat : ${room.patientSlots}"
                                 th:if="${slotStat.index < room.licensedBeds}"
                                 th:classappend="${slot == '-'} ? ' rb-slot-empty rb-slot-to' : ''"
                                 th:text="${slot == '-' ? '' : slot}"></div>
                        </div>
                    </td>
                    <td th:text="${room.note}"></td>
                    <td th:if="${popupMode}">
                        <button type="button"
                                class="rb-btn rb-btn-select room-select-btn"
                                th:attr="data-room-name=${room.roomName}">
                            선택
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    window.ROOM_BOARD_POPUP_MODE = [[${popupMode}]];
</script>
<script th:replace="~{csm/Include/layout :: scripts}"></script>
<script th:src="@{/js/csm/counsel/roomBoard.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담예약 : SOSYGE EASY-CRM</title>
    <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
    <link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/style.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/button.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/header.css}">
    <link rel="stylesheet" th:href="@{/css/csm/Include/cate.css}">
    <link rel="stylesheet" th:href="@{/css/csm/counsel/reservation.css}">
</head>
<body>
<div th:replace="~{csm/Include/layout :: header(info=${info})}"></div>
<div th:replace="~{csm/Include/layout :: nav_section2('reservation', ${endVar}, ${st}, ${kw})}"></div>

<div class="main reservation-main">
    <div class="reservation-wrap orb-deco">
        <div class="reservation-head">
            <h1>상담 예약</h1>
            <p>전화 상담 예약을 우선순위로 관리하고 입원상담으로 바로 연계합니다.</p>
        </div>

        <div class="reservation-stats">
            <div class="stat-card">
                <span>전체</span>
                <strong th:text="${statusCounts['all']}">0</strong>
            </div>
            <div class="stat-card">
                <span>예약</span>
                <strong th:text="${statusCounts['reserved']}">0</strong>
            </div>
            <div class="stat-card">
                <span>완료</span>
                <strong th:text="${statusCounts['completed']}">0</strong>
            </div>
            <div class="stat-card">
                <span>취소</span>
                <strong th:text="${statusCounts['cancelled']}">0</strong>
            </div>
        </div>

        <div class="reservation-alert success" th:if="${message != null and !#strings.isEmpty(message)}" th:text="${message}">
            저장되었습니다.
        </div>
        <div class="reservation-alert error" th:if="${error != null and !#strings.isEmpty(error)}" th:text="${error}">
            오류가 발생했습니다.
        </div>

        <div class="reservation-grid">
            <section class="reservation-list-card">
                <div class="status-tabs">
                    <a th:href="@{/counsel/reservation(status='ALL')}"
                       th:classappend="${selectedStatus == 'ALL' ? ' active' : ''}">전체</a>
                    <a th:href="@{/counsel/reservation(status='RESERVED')}"
                       th:classappend="${selectedStatus == 'RESERVED' ? ' active' : ''}">예약</a>
                    <a th:href="@{/counsel/reservation(status='COMPLETED')}"
                       th:classappend="${selectedStatus == 'COMPLETED' ? ' active' : ''}">완료</a>
                    <a th:href="@{/counsel/reservation(status='CANCELLED')}"
                       th:classappend="${selectedStatus == 'CANCELLED' ? ' active' : ''}">취소</a>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>환자명</th>
                            <th>예약일시</th>
                            <th>우선순위</th>
                            <th>상태</th>
                            <th>연계</th>
                            <th>작업</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(reservations)}">
                            <td colspan="6" class="empty-row">등록된 상담 예약이 없습니다.</td>
                        </tr>
                        <tr th:each="item : ${reservations}"
                            th:classappend="${reservationForm.id != null and reservationForm.id == item.id ? 'selected' : ''}"
                            th:attr="data-edit-url=@{/counsel/reservation(status=${selectedStatus}, reservationId=${item.id})}">
                            <td>
                                <div class="patient-name" th:text="${item.patient_name}">홍길동</div>
                                <div class="patient-phone" th:text="${item.patient_phone}">010-0000-0000</div>
                            </td>
                            <td th:text="${item.reserved_at}">2026-04-14 10:00:00</td>
                            <td><span class="priority-badge" th:text="${item.priority}">3</span></td>
                            <td>
                                <span class="status-pill"
                                      th:classappend="${item.status == 'COMPLETED' ? ' completed' : (item.status == 'CANCELLED' ? ' cancelled' : ' reserved')}"
                                      th:text="${item.status == 'COMPLETED' ? '완료' : (item.status == 'CANCELLED' ? '취소' : '예약')}">예약</span>
                            </td>
                            <td th:text="${item.linked_cs_idx != null ? '상담#' + item.linked_cs_idx : '-'}">-</td>
                            <td>
                                <div class="row-actions">
                                    <a class="link-btn"
                                       th:href="@{/counsel/reservation(status=${selectedStatus}, reservationId=${item.id})}">수정</a>
                                    <a class="link-btn primary"
                                       th:href="@{/counsel/new(reservationId=${item.id})}">상담작성</a>

                                    <form th:if="${item.status != 'COMPLETED'}" th:action="@{/counsel/reservation/status}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="reservationId" th:value="${item.id}">
                                        <input type="hidden" name="status" value="COMPLETED">
                                        <input type="hidden" name="viewStatus" th:value="${selectedStatus}">
                                        <button type="submit" class="row-btn">완료</button>
                                    </form>
                                    <form th:if="${item.status != 'CANCELLED'}" th:action="@{/counsel/reservation/status}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="reservationId" th:value="${item.id}">
                                        <input type="hidden" name="status" value="CANCELLED">
                                        <input type="hidden" name="viewStatus" th:value="${selectedStatus}">
                                        <button type="submit" class="row-btn danger">취소</button>
                                    </form>
                                    <form th:if="${item.status != 'RESERVED'}" th:action="@{/counsel/reservation/status}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="reservationId" th:value="${item.id}">
                                        <input type="hidden" name="status" value="RESERVED">
                                        <input type="hidden" name="viewStatus" th:value="${selectedStatus}">
                                        <button type="submit" class="row-btn neutral">예약복귀</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="reservation-form-card">
                <h2 th:text="${reservationForm.id != null ? '상담예약 수정' : '상담예약 등록'}">상담예약 등록</h2>
                <form th:action="@{/counsel/reservation/save}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="id" th:value="${reservationForm.id}">
                    <div class="form-grid">
                        <label>
                            환자명 *
                            <input type="text" name="patientName" required th:value="${reservationForm.patient_name}">
                        </label>
                        <label>
                            연락처
                            <input type="text" name="patientPhone" th:value="${reservationForm.patient_phone}">
                        </label>
                        <label>
                            보호자명
                            <input type="text" name="guardianName" th:value="${reservationForm.guardian_name}">
                        </label>
                        <label>
                            우선순위
                            <select name="priority">
                                <option value="1" th:selected="${reservationForm.priority == 1}">1 (긴급)</option>
                                <option value="2" th:selected="${reservationForm.priority == 2}">2</option>
                                <option value="3" th:selected="${reservationForm.priority == 3 or reservationForm.priority == null}">3</option>
                                <option value="4" th:selected="${reservationForm.priority == 4}">4</option>
                                <option value="5" th:selected="${reservationForm.priority == 5}">5</option>
                            </select>
                        </label>
                        <label class="full">
                            예약일시
                            <input type="datetime-local" name="reservedAt" th:value="${reservationFormReservedAtInput}">
                        </label>
                        <label class="full">
                            통화내용
                            <textarea name="callSummary" rows="4" th:text="${reservationForm.call_summary}"></textarea>
                        </label>
                        <label>
                            상태
                            <select name="status">
                                <option value="RESERVED" th:selected="${reservationForm.status == 'RESERVED' or reservationForm.status == null}">예약</option>
                                <option value="COMPLETED" th:selected="${reservationForm.status == 'COMPLETED'}">완료</option>
                                <option value="CANCELLED" th:selected="${reservationForm.status == 'CANCELLED'}">취소</option>
                            </select>
                        </label>
                    </div>
                    <div class="form-actions">
                        <a class="ghost-btn" th:href="@{/counsel/reservation(status=${selectedStatus})}">신규입력</a>
                        <button type="submit" class="save-btn">예약 저장</button>
                        <a class="primary-btn"
                           th:if="${reservationForm.id != null}"
                           th:href="@{/counsel/new(reservationId=${reservationForm.id})}">상담작성 이동</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script th:replace="~{csm/Include/layout :: scripts}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('tr[data-edit-url]').forEach(function (row) {
            row.addEventListener('click', function (event) {
                if (event.target.closest('a, button, form')) {
                    return;
                }
                const url = row.getAttribute('data-edit-url');
                if (url) {
                    window.location.href = url;
                }
            });
        });
    });
</script>
</body>
</html>

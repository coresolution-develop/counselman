<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
	<title>layout</title>
</head>

<body>
	<div class="wrapper" th:fragment="header(info)"
	     th:with="u=${info != null ? info : session.userInfo}"
	     th:attr="data-inst=${u != null ? u.us_col_04 : ''}"
	     th:classappend="${headerMode == 'list' ? ' header-mode-list' : ''}">
		<link rel="stylesheet" th:href="@{/css/csm/Include/layout-modern-shell.css(v='20260419d')}">
		<div class="logo">
			<div class="home-icon">
				<button type="button" id="global-menu-toggle" class="menu-toggle-btn" aria-label="메뉴 열기" aria-expanded="false">
					<span class="menu-toggle-icon" aria-hidden="true">
						<span class="menu-toggle-bar"></span>
						<span class="menu-toggle-bar"></span>
						<span class="menu-toggle-bar"></span>
					</span>
				</button>
			</div>
			<div class="header-program-name">CounselMan</div>
			<div class="header-list-context" th:if="${headerMode == 'list'}" aria-label="상담리스트 헤더 컨텍스트">
				<form id="searchForm" class="header-list-filter-form" th:action="@{/counsel/list}" method="get">
					<input type="hidden" name="searchType" id="searchType"
					       th:value="${cri == null or #strings.isEmpty(cri.searchType) ? 'patient' : cri.searchType}">
					<div class="content-inner modern-filter-grid header-filter-grid">
						<div class="modern-filter-item date-filter-item">
							<label for="dateRange" class="visually-hidden">조회 기간</label>
							<select name="dateRange" id="dateRange">
								<option th:value="all" th:selected="${cri != null and cri.dateRange == 'all'}">전체기간</option>
								<option th:value="10" th:selected="${cri != null and cri.dateRange == '10'}">최근 10일</option>
								<option th:value="30" th:selected="${cri != null and cri.dateRange == '30'}">최근 30일</option>
								<option th:value="90" th:selected="${cri != null and cri.dateRange == '90'}">최근 90일</option>
								<option th:value="custom" th:selected="${cri != null and cri.dateRange == 'custom'}">직접 선택</option>
							</select>
							<div class="modern-date-range-inputs filter-item date-item" id="dateField">
								<div class="sh-date-input-wrap">
									<label class="visually-hidden" for="startDate">조회 시작일</label>
									<input type="text"
									       id="startDate"
									       name="startDate"
									       readonly
									       style="cursor:pointer;"
									       th:value="${cri != null ? cri.startDate : ''}">
									<button type="button" class="filter-cal-btn date-input-toggle" data-target="startDate" aria-label="조회 시작일 선택">
										<img th:src="@{/icon/calendar.png}" class="filter-icon" alt="">
									</button>
								</div>
								<span aria-hidden="true">~</span>
								<div class="sh-date-input-wrap">
									<label class="visually-hidden" for="endDate">조회 종료일</label>
									<input type="text"
									       id="endDate"
									       name="endDate"
									       readonly
									       style="cursor:pointer;"
									       th:value="${cri != null ? cri.endDate : ''}">
									<button type="button" class="filter-cal-btn date-input-toggle" data-target="endDate" aria-label="조회 종료일 선택">
										<img th:src="@{/icon/calendar.png}" class="filter-icon" alt="">
									</button>
								</div>
								<div class="sh-calendar" id="statusCalendar">
									<div class="sh-cal-week">
										<span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
									</div>
									<div class="sh-cal-head">
										<button type="button" class="sh-cal-nav" id="calPrev" aria-label="이전달">
											<img th:src="@{/icon/arrow(L).png}" alt="">
										</button>
										<div class="sh-cal-title" id="calTitle"></div>
										<button type="button" class="sh-cal-nav" id="calNext" aria-label="다음달">
											<img th:src="@{/icon/arrow.png}" alt="">
										</button>
									</div>
									<div class="sh-cal-grid" id="calGrid"></div>
								</div>
							</div>
						</div>
						<div class="modern-filter-item compact-filter-item">
							<label for="statusFilter" class="visually-hidden">상태</label>
							<select id="statusFilter" name="status">
								<option value="all" th:selected="${cri == null or #strings.isEmpty(cri.status) or cri.status == 'all'}">전체 상태</option>
								<option th:each="status : ${statusOptions}"
								        th:value="${status}"
								        th:text="${status}"
								        th:selected="${cri != null and cri.status == status}">
									상태
								</option>
							</select>
						</div>
						<div class="modern-filter-item compact-filter-item">
							<label for="pathTypeFilter" class="visually-hidden">상담유입경로</label>
							<select id="pathTypeFilter" name="pathType">
								<option value="all" th:selected="${cri == null or #strings.isEmpty(cri.pathType) or cri.pathType == 'all'}">전체 경로</option>
								<option th:each="path : ${pathTypeOptions}"
								        th:value="${path}"
								        th:text="${path}"
								        th:selected="${cri != null and cri.pathType == path}">
									경로
								</option>
							</select>
						</div>
						<div class="modern-filter-item keyword-filter-item">
							<label for="keywordInput" class="visually-hidden">검색어</label>
							<input id="keywordInput"
							       name="keyword"
							       type="text"
							       th:value="${cri != null ? cri.keyword : ''}"
							       placeholder="환자명, 보호자명, 전화번호, 상담내용 검색">
						</div>
						<div class="modern-filter-check">
							<input type="checkbox" name="end" id="end" th:checked="${cri != null and cri.end == 'on'}" />
							<label for="end"><span>완료 항목 포함</span></label>
						</div>
						<div class="modern-filter-action">
							<button type="button" id="setting" class="toolbar-icon-btn list-setting-btn" aria-label="리스트 항목 설정 열기">
								<img th:src="@{/icon/ev/fix-icon.png}" alt="">
							</button>
							<button type="button" class="btn search-box listBtn btnw100" id="searchBtn">검색</button>
						</div>
					</div>
				</form>
			</div>
            <div class="header-right">
                <div class="info-header">
                    <div class="info-header-row info-header-row-top">
                        <span class="info-header-item info-header-user"
                              th:text="${u != null ? u.us_col_02 : ''}">아이디</span>
                    </div>
                    <div class="info-header-row info-header-row-bottom">
                        <span class="info-header-item info-header-name" th:text="${u != null ? u.us_col_05 : ''}">기관명</span>
                        <span class="info-header-dot">·</span>
                        <span class="info-header-item info-header-position"
                              th:text="${u == null ? '' : ((u.us_col_08 == 0 or u.us_col_08 == 1) ? 'admin' : (u.us_col_08 == 2 ? 'supervisor' : (u.us_col_08 == 3 ? 'manager' : (u.us_col_08 == 4 ? 'viewer' : ''))))}">
                            등급
                        </span>
                    </div>
                </div>
                <div class="logout-img">
                    <a th:href="@{/logout}" class="logout-button">
                        <img th:src="@{/icon/ev/logout_new.png}">
                    </a>
                </div>
            </div>
		</div>
		<div class="global-mobile-menu-overlay" id="global-mobile-menu-overlay" hidden
			 th:if="${u != null and !#strings.equalsIgnoreCase(u.us_col_04, 'core')}">
			<div class="global-mobile-menu-sheet" role="dialog" aria-modal="true" aria-labelledby="global-mobile-menu-title">
				<div class="global-mobile-menu-head">
					<strong id="global-mobile-menu-title">메뉴</strong>
					<button type="button" id="global-mobile-menu-close" aria-label="메뉴 닫기">×</button>
				</div>
					<nav class="global-mobile-menu-list" aria-label="모바일 전체 메뉴">
						<a class="global-mobile-menu-item" th:href="@{/counsel/reservation(status='RESERVED')}">
							<span class="global-mobile-menu-item-icon icon-reservation" aria-hidden="true"></span>
							<span>상담 접수</span>
						</a>
					<a class="global-mobile-menu-item" th:href="@{/counsel/new}">
						<span class="global-mobile-menu-item-icon icon-new" aria-hidden="true"></span>
						<span>입원상담</span>
					</a>
					<a class="global-mobile-menu-item" th:href="@{/counsel/list(page=1, perPageNum=10, end='', searchType='', keyword='')}">
						<span class="global-mobile-menu-item-icon icon-list" aria-hidden="true"></span>
						<span>상담리스트</span>
					</a>
					<a class="global-mobile-menu-item" th:href="@{/notice}">
						<span class="global-mobile-menu-item-icon icon-notice" aria-hidden="true"></span>
						<span>공지사항</span>
					</a>
					<a class="global-mobile-menu-item"
					   th:if="${#authorization.expression('hasAuthority(''STATS:READ'')')}"
					   th:href="@{/statistics}">
						<span class="global-mobile-menu-item-icon icon-stat" aria-hidden="true"></span>
						<span>상담통계</span>
					</a>
					<span class="global-mobile-menu-item is-disabled"
						  th:unless="${#authorization.expression('hasAuthority(''STATS:READ'')')}">
						<span class="global-mobile-menu-item-icon icon-stat" aria-hidden="true"></span>
						<span>상담통계</span>
					</span>
					<a class="global-mobile-menu-item"
					   th:if="${#authorization.expression('hasAuthority(''ROOM_BOARD:READ'')')}"
					   th:href="@{/room-board}">
						<span class="global-mobile-menu-item-icon icon-roomboard" aria-hidden="true"></span>
						<span>병실현황판</span>
					</a>
					<span class="global-mobile-menu-item is-disabled"
						  th:unless="${#authorization.expression('hasAuthority(''ROOM_BOARD:READ'')')}">
						<span class="global-mobile-menu-item-icon icon-roomboard" aria-hidden="true"></span>
						<span>병실현황판</span>
					</span>
				</nav>
			</div>
		</div>
		<div class="global-notice-popup-overlay" id="global-notice-popup-overlay" hidden>
			<div class="global-notice-popup-card" role="dialog" aria-modal="true" aria-labelledby="global-notice-popup-title">
				<div class="global-notice-popup-head">
					<strong>공지사항</strong>
					<button type="button" id="global-notice-popup-close" aria-label="팝업 닫기">×</button>
				</div>
				<div class="global-notice-popup-meta">
					<span id="global-notice-popup-pin" hidden>고정</span>
					<span id="global-notice-popup-date"></span>
				</div>
				<h3 id="global-notice-popup-title"></h3>
				<div id="global-notice-popup-body" class="global-notice-popup-body"></div>
				<div class="global-notice-popup-foot">
					<label class="global-notice-popup-hide-today">
						<input type="checkbox" id="global-notice-popup-hide-today">
						오늘 하루 보지 않기
					</label>
					<div class="global-notice-popup-actions">
						<button type="button" id="global-notice-popup-read">읽음 처리</button>
						<button type="button" id="global-notice-popup-move">공지사항 이동</button>
					</div>
				</div>
			</div>
		</div>
		<link rel="stylesheet" th:href="@{/css/csm/notice/popup.css(v='20260414e')}">
		<script th:src="@{/js/csm/notice/popup.js(v='20260414e')}" defer></script>
	</div>
	<div id="user-nav" class="nav_section"
     th:fragment="nav_section2(activeMenu, end, searchType, keyword)"
     th:attr="data-active-menu=${activeMenu}">
  <th:block th:with="info=${session.userInfo}, isCore=${info != null and info.us_col_04 != null and #strings.equalsIgnoreCase(info.us_col_04, 'core')}">
  <ul th:if="${isCore}">
    <li class="nav_link menu1"
        data-menu="admin" data-content="all"
        th:classappend="${activeMenu == 'admin' ? ' on active' : ''}">
      <a th:href="@{/core/admin}" aria-label="기관 등록 페이지로 이동">기관 등록</a>
    </li>
    <li class="nav_link menu2"
        data-menu="setting" data-content="all"
        th:classappend="${activeMenu == 'setting' ? ' on active' : ''}">
      <a th:href="@{/core/setting}" aria-label="설정관리 페이지로 이동">상담일지관리</a>
    </li>
    <li class="nav_link menu3"
        data-menu="smssetting" data-content="all"
        th:classappend="${activeMenu == 'smssetting' ? ' on active' : ''}">
      <a th:href="@{/core/smssetting}" aria-label="문자관리 페이지로 이동">문자관리</a>
    </li>
    <li class="nav_link menu4"
        data-menu="notice" data-content="all"
        th:classappend="${activeMenu == 'notice' ? ' on active' : ''}">
      <a th:href="@{/core/notice}" aria-label="공지관리 페이지로 이동">공지관리</a>
    </li>
  </ul>

  <ul th:unless="${isCore}">
    <!-- 상담 접수 -->
    <li class="nav_link menu0"
        data-menu="reservation" data-content="all"
        th:classappend="${activeMenu == 'reservation' ? ' on active' : ''}"
        th:attr="data-base-url=@{/counsel/reservation(status='RESERVED')}"
        role="link" tabindex="0" aria-label="상담 접수 페이지로 이동">
      <span>상담 접수</span>
    </li>

    <!-- 입원상담 -->
    <li class="nav_link menu1"
        data-menu="new" data-content="all"
        th:classappend="${activeMenu == 'new' ? ' on active' : ''}"
        th:attr="data-base-url=@{/counsel/new}"
        role="link" tabindex="0" aria-label="입원상담 페이지로 이동">
      <span>입원상담</span>
    </li>

    <!-- 상담리스트 -->
    <li class="nav_link menu2"
        data-menu="list" data-content="all"
        th:classappend="${activeMenu == 'list' ? ' on active' : ''}"
        th:attr="data-base-url=@{/counsel/list(page=1, perPageNum=10, end=${end}, searchType=${searchType}, keyword=${keyword})}"
        role="link" tabindex="0" aria-label="상담리스트 페이지로 이동">
      <span>상담리스트</span>
    </li>

    <li class="nav_link menu7"
        data-menu="notice" data-content="all"
        th:classappend="${activeMenu == 'notice' ? ' on active' : ''}"
        th:attr="data-base-url=@{/notice}"
        role="link" tabindex="0" aria-label="공지사항 페이지로 이동">
      <span>공지사항</span>
    </li>

    <!-- 상담통계 -->
    <li class="nav_link menu3"
        data-menu="statistics" data-content="all"
        th:classappend="${activeMenu == 'statistics' ? ' on active' : ''}">
      <!-- 접근 가능 -->
      <div th:if="${#authorization.expression('hasAuthority(''STATS:READ'')')}"
           th:attr="data-base-url=@{/statistics}"
           role="link" tabindex="0" aria-label="상담통계 페이지로 이동">
        <span>상담통계</span>
      </div>
      <!-- 접근 불가 -->
      <div th:unless="${#authorization.expression('hasAuthority(''STATS:READ'')')}"
           class="disabled-link" aria-disabled="true">
        <span>상담통계</span>
      </div>
    </li>

    <!-- 상담일지관리(설정관리) -->
    <li class="nav_link menu4"
        data-menu="setting" data-content="all"
        th:classappend="${activeMenu == 'setting' ? ' on active' : ''}"
        th:attr="data-base-url=@{/setting}"
        role="link" tabindex="0" aria-label="설정관리 페이지로 이동">
      <span>상담일지관리</span>
    </li>

    <!-- 문자관리 -->
    <li class="nav_link menu5"
        data-menu="sms" data-content="all"
        th:classappend="${activeMenu == 'sms' ? ' on active' : ''}"
        th:attr="data-base-url=@{/smsSetting(page=1, perPageNum=10, comment='')}"
        role="link" tabindex="0" aria-label="상용구관리 페이지로 이동">
      <span>문자관리</span>
    </li>

    <!-- 병실현황판 -->
    <li class="nav_link menu8"
        data-menu="roomboard" data-content="all"
        th:if="${#authorization.expression('hasAuthority(''ROOM_BOARD:READ'')')}"
        th:classappend="${activeMenu == 'roomboard' ? ' on active' : ''}"
        th:attr="data-base-url=@{/room-board}"
        role="link" tabindex="0" aria-label="병실현황판 페이지로 이동">
      <span>병실현황판</span>
    </li>

    <!-- 입원 예약 관리 -->
    <li class="nav_link menu9"
        data-menu="admission-reservation" data-content="all"
        th:classappend="${activeMenu == 'admission-reservation' ? ' on active' : ''}"
        th:attr="data-base-url=@{/counsel/admission-reservation}"
        role="link" tabindex="0" aria-label="입원 예약 관리 페이지로 이동">
      <span>입원예약관리</span>
    </li>

    <!-- 관리자 -->
    <li class="nav_link menu6"
        data-menu="admin" data-content="all"
        th:if="${#authorization.expression('hasAuthority(''USER:READ'') or hasAuthority(''ROLE:READ'') or hasAuthority(''SETTINGS:READ'')')}"
        th:classappend="${activeMenu == 'admin' ? ' on active' : ''}"
        th:attr="data-base-url=@{/admin}"
        role="link" tabindex="0" aria-label="관리자 페이지로 이동">
      <span>관리자</span>
    </li>
  </ul>
  </th:block>
  <div class="nav-bottom-area">
    <div class="nav-bottom-logo" aria-label="브랜드 로고">
      <!-- <img th:src="@{/icon/ev/sosyge_logo_w.png}" alt="SOSYGE 로고"> -->
       MediPlat
    </div>
    <a th:href="@{/logout}" class="nav-bottom-logout" aria-label="로그아웃">
      <span class="nav-bottom-logout-icon" aria-hidden="true"></span>
      <span>로그아웃</span>
    </a>
    <div class="nav-bottom-copyright">Copyright by Coresolution</div>
  </div>
</div>


</body>

<script th:fragment="scripts">
	function initPage() {
        console.log("initPage() start");
        updateMenuLinksUser();
        return;
    }
function updateMenuLinksAdmin(year) {
    document.querySelectorAll('#admin-nav [data-base-url]').forEach(el => {
      el.removeAttribute('onclick');
      const baseUrl = el.dataset.baseUrl;
      if (!baseUrl) return;
      const url = new URL(baseUrl, window.location.origin);
      url.searchParams.set('year', year);
      el.setAttribute('onclick', 'location.href="' + url.pathname + '?' + url.searchParams.toString() + '"');
    });
  }
  function updateMenuLinksUser() {
    document.querySelectorAll('#user-nav [data-base-url]').forEach(el => {
      el.removeAttribute('onclick');
      const baseUrl = el.dataset.baseUrl;
      if (!baseUrl) return;
      el.setAttribute('onclick', 'location.href="' + baseUrl + '"'); // year 안 붙임
    });
  }

  // 페이지 로드 시 사용자용 메뉴에 클릭 바인딩
  document.addEventListener('DOMContentLoaded', function () {
    updateMenuLinksUser();

    // 서버에서 전달한 activeMenu를 기준으로 nav 활성화 일관성 보장
    const userNav = document.getElementById('user-nav');
    const activeMenu = userNav ? (userNav.dataset.activeMenu || '').trim() : '';
    if (userNav && activeMenu) {
      userNav.querySelectorAll('.nav_link').forEach(li => li.classList.remove('active', 'on'));
      const target = userNav.querySelector(`.nav_link[data-menu='${activeMenu}']`);
      if (target) {
        target.classList.add('active', 'on');
      }
    }

    // 접근성: 키보드로도 동작(Enter/Space)
    document.querySelectorAll('#user-nav [data-base-url]').forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
      });
      // 포커스 가능하도록 보장(이미 role="link" tabindex="0" 부여했지만 혹시 몰라서)
      if (!el.hasAttribute('tabindex')) el.setAttribute('tabindex', '0');
      if (!el.hasAttribute('role')) el.setAttribute('role', 'link');
    });

    const menuToggleBtn = document.getElementById('global-menu-toggle');
    const mobileMenuOverlay = document.getElementById('global-mobile-menu-overlay');
    const mobileMenuCloseBtn = document.getElementById('global-mobile-menu-close');
    const mobileMenuLinks = mobileMenuOverlay
      ? mobileMenuOverlay.querySelectorAll('a.global-mobile-menu-item')
      : [];

    const NAV_COLLAPSE_STORAGE_KEY = 'csm-nav-collapsed';
    const MOBILE_BREAKPOINT = 900;

    function isMobileViewport() {
      return window.innerWidth <= MOBILE_BREAKPOINT;
    }

    function setMobileMenuOpen(open) {
      if (!mobileMenuOverlay) return;
      mobileMenuOverlay.hidden = !open;
      document.body.classList.toggle('mobile-menu-open', !!open);
    }

    function setDesktopNavCollapsed(collapsed, persist) {
      if (!userNav) return;
      document.body.classList.toggle('nav-collapsed', !!collapsed);
      if (persist) {
        try {
          window.localStorage.setItem(NAV_COLLAPSE_STORAGE_KEY, collapsed ? '1' : '0');
        } catch (_) {
          // no-op
        }
      }
    }

    function syncMenuButtonAria() {
      if (!menuToggleBtn) return;
      if (isMobileViewport()) {
        menuToggleBtn.setAttribute('aria-expanded', mobileMenuOverlay && !mobileMenuOverlay.hidden ? 'true' : 'false');
      } else {
        menuToggleBtn.setAttribute('aria-expanded', document.body.classList.contains('nav-collapsed') ? 'false' : 'true');
      }
    }

    if (menuToggleBtn) {
      menuToggleBtn.addEventListener('click', function () {
        if (isMobileViewport()) {
          setMobileMenuOpen(true);
        } else {
          const collapsed = !document.body.classList.contains('nav-collapsed');
          setDesktopNavCollapsed(collapsed, true);
        }
        syncMenuButtonAria();
      });
    }

    if (mobileMenuCloseBtn) {
      mobileMenuCloseBtn.addEventListener('click', function () {
        setMobileMenuOpen(false);
        syncMenuButtonAria();
      });
    }

    if (mobileMenuOverlay) {
      mobileMenuOverlay.addEventListener('click', function (event) {
        if (event.target === mobileMenuOverlay) {
          setMobileMenuOpen(false);
          syncMenuButtonAria();
        }
      });
    }

    mobileMenuLinks.forEach((el) => {
      el.addEventListener('click', function () {
        setMobileMenuOpen(false);
      });
    });

    let storedCollapsed = false;
    try {
      storedCollapsed = window.localStorage.getItem(NAV_COLLAPSE_STORAGE_KEY) === '1';
    } catch (_) {
      storedCollapsed = false;
    }
    if (!isMobileViewport()) {
      setDesktopNavCollapsed(storedCollapsed, false);
    } else {
      setDesktopNavCollapsed(false, false);
    }
    syncMenuButtonAria();

    window.addEventListener('resize', function () {
      if (!isMobileViewport()) {
        setMobileMenuOpen(false);
      } else {
        setDesktopNavCollapsed(false, false);
      }
      syncMenuButtonAria();
    });
  });

/** 모든 메뉴의 active/아이콘 상태 초기화 */
  function resetMenu(nav) {
    nav.querySelectorAll('.nav_link, .nav_sub_link').forEach(li => li.classList.remove('active', 'on'));
    nav.querySelectorAll('[data-icon-on][data-icon-off]').forEach(li => {
      const img = li.querySelector('img.icon-image');
      if (img && li.dataset.iconOff) img.src = li.dataset.iconOff;
    });
  }

  /** 특정 메뉴(class) 활성화 + 아이콘 on */
  function setActiveMenu(menuClass) {
    const nav = document.getElementById('admin-nav') || document.getElementById('user-nav');
    if (!nav) return;

    resetMenu(nav);

    const li = nav.querySelector('.' + menuClass);
    if (!li) return;

    // 선택 항목 활성화
    li.classList.add('active', 'on');

    // 아이콘 on
    const img = li.querySelector('img.icon-image');
    if (img && li.dataset.iconOn) img.src = li.dataset.iconOn;

    // 하위 메뉴(subX)라면, 바로 위의 상위 메뉴(nav_link)도 on 처리
    if (li.classList.contains('nav_sub_link')) {
      let prev = li.previousElementSibling;
      while (prev && !prev.classList.contains('nav_link')) prev = prev.previousElementSibling;
      if (prev) {
        prev.classList.add('active', 'on');
        const pimg = prev.querySelector('img.icon-image');
        if (pimg && prev.dataset.iconOn) pimg.src = prev.dataset.iconOn;
      }
    }
  }

</script>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
<title>사용자등록 : SOSYGE EASY-CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
<link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
<link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">
<link rel="stylesheet" th:href="@{/css/csm/admin/newuser.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/spinner.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/modal.css}">
<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script th:src="@{/js/csm/admin/newUserPopup.js}"></script>
</head>
<body>
<form th:action="@{/newuser/post}" method="post">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
  <div class="user-header"><h3>새로운 사용자 정보를 입력해 주세요.</h3></div>
  <label>아이디 <font color="red">*</font></label>
  <input type="text" class="user-area" id="us_col_02" name="us_col_02" required />
  <label>이름 <font color="red">*</font></label>
  <input type="text" class="user-area" id="us_col_12" name="us_col_12" required />
  <label>부서 <font color="red">*</font></label>
  <input type="text" class="user-area" id="us_col_13" name="us_col_13" required />
  <label>직급 <font color="red">*</font></label>
  <input type="text" class="user-area" id="us_col_14" name="us_col_14" required />
  <label>Email <font color="red">*</font></label>
  <input type="text" class="user-area" id="us_col_11" name="us_col_11" required />
  <label>비고</label>
  <input type="text" class="user-area" id="us_col_06" name="us_col_06" />
  <label>권한 <font color="red">*</font></label>
  <div class="drop-down drop-down-1">
    <div class="options">
      <select class="user-area" name="us_col_08" id="us_col_08" required>
        <option value="">선택해주세요</option>
        <option value="1">admin(관리자)</option>
        <option value="2">supervisor(통계권한)</option>
        <option value="3">manager</option>
        <option value="4">viewer</option>
      </select>
    </div>
  </div>
  <input type="hidden" name="us_col_07" id="us_col_07" value="y">
  <input type="hidden" name="us_col_05" id="us_col_05" th:value="${instName}">

  <div class="btn-area">
    <button class="gray-btn" type="button" onclick="window.close()">취소</button>
    <button class="blue-btn" id="submit-btn" type="button">등록</button>
  </div>
</form>

<div id="spinner-overlay" style="display: none;">
  <div class="spinner-container">
    <div class="spinner"></div>
    <p>잠시만 기다려주세요</p>
  </div>
</div>
<div class="modal normal">
  <div class="modal_body">
    <div>
      <img class="menu_icon" th:src="@{/img/alert_img.png}">
      <div class="menu_msg" style="min-width: 300px;"></div>
      <div class="modal_footer">
        <div class="btn modal_btn" onclick="closePopup()" id="confirmBtn2">확인</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자페이지 : SOSYGE EASY-CRM</title>

<meta property="og:title" content="상담관리시스템">
<meta property="og:type" content="website">
<meta property="og:url" content="http://49.247.42.59:8090/csm/login">
<meta property="og:image" th:content="@{/icon/ev/core_icon_big.png}" content="/icon/ev/core_icon_big.png">
<meta property="og:description" content="병원상담관리시스템">

<link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
<link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
<link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">

<meta name="ctx-path" th:content="@{/}" content="/">
<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script th:src="@{/js/csm/admin/admin.js}"></script>

<link rel="stylesheet" th:href="@{/css/reset.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/style.css}">
<link rel="stylesheet" th:href="@{/css/csm/admin/style.css}">
<link rel="stylesheet" th:href="@{/css/csm/admin/admin.css}">
<link rel="stylesheet" th:href="@{/css/csm/popup/popup.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/spinner.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/button.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/header.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/cate.css}">

<link rel="stylesheet" th:href="@{/css/csm/admin/roles.css}">
<script th:src="@{/js/csm/admin/roles.js}" defer></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
.arrow { display: inline-block; width: 0; height: 0; margin-left: 5px; }
.up { border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 5px solid black; }
.down { border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid black; }
.selected-row { background-color: #f0f8ff !important; }
.selected-row * { background-color: #f0f8ff !important; }

/* 권한 없음 안내 박스 */
.no-access-box {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; padding: 60px 24px; text-align: center; color: #5a6b5e;
}
.no-access-icon { font-size: 48px; line-height: 1; }
.no-access-title { font-size: 18px; font-weight: 700; color: #2d3e33; }
.no-access-desc { font-size: 13px; color: #7a8b80; line-height: 1.6; }

/* 관리자 탭 */
.admin-tabs { display: flex; gap: 0; border-bottom: 2px solid #d0dfd6; margin-bottom: 18px; }
.admin-tab-btn {
  padding: 10px 24px; font-size: 14px; font-weight: 600; color: #7a8b80;
  background: none; border: none; border-bottom: 3px solid transparent;
  margin-bottom: -2px; cursor: pointer; transition: color .15s, border-color .15s;
}
.admin-tab-btn.active { color: #2d6a4f; border-bottom-color: #2d6a4f; }
.admin-tab-btn:hover:not(.active) { color: #3d7a5f; }
.admin-tab-panel { display: none; }
.admin-tab-panel.active { display: block; }
</style>
</head>
<body>
<div th:replace="~{csm/Include/layout :: header(info=${info})}"></div>
<div th:replace="~{csm/Include/layout :: nav_section2('admin', ${endVar}, ${st}, ${kw})}"></div>

<div class="main">
  <div class="section orb-deco">

    <!-- ① 권한 없음 안내 -->
    <div th:if="${noAdminAccess}" class="no-access-box">
      <div class="no-access-icon">🔒</div>
      <div class="no-access-title">관리자 권한이 필요합니다</div>
      <div class="no-access-desc">
        이 페이지는 기관 관리자(admin) 계정만 접근할 수 있습니다.<br>
        권한이 필요하시면 담당자에게 문의해 주세요.
      </div>
    </div>

    <!-- ② 관리자 화면 -->
    <div th:unless="${noAdminAccess}">

      <!-- 탭 바 -->
      <div class="admin-tabs">
        <button class="admin-tab-btn active" onclick="switchAdminTab('users', this)">사용자 관리</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('roles', this)">역할 관리</button>
      </div>

      <!-- ── 탭 1: 사용자 관리 ── -->
      <div id="admin-tab-users" class="admin-tab-panel active">
        <div class="content-mid content-mid-admin">
          <div class="section-mid">
            <div class="user-list">
              <div class="grid-header">
                <div onclick="sortGrid(0)">사번 <span id='arrow0' class="arrow"></span></div>
                <div onclick="sortGrid(1)">성명 <span id='arrow1' class="arrow"></span></div>
                <div onclick="sortGrid(2)">부서 <span id='arrow2' class="arrow"></span></div>
                <div onclick="sortGrid(3)">직급 <span id='arrow3' class="arrow"></span></div>
                <div onclick="sortGrid(4)">권한 <span id='arrow4' class="arrow"></span></div>
                <div onclick="sortGrid(5)">Email <span id='arrow5' class="arrow"></span></div>
                <div onclick="sortGrid(6)">상태 <span id='arrow6' class="arrow"></span></div>
              </div>
              <div class="grid-body" id="userGrid">
                <div class="grid-row" th:if="${#lists.isEmpty(user)}">
                  <div style="grid-column: 1 / -1;">사용자 데이터가 없습니다.</div>
                </div>
                <div class="grid-row" th:each="u : ${user}">
                  <div th:text="${u != null ? (u.us_col_02 ?: '') : ''}"></div>
                  <div th:text="${u != null ? (u.us_col_12 ?: '') : ''}"></div>
                  <div th:text="${u != null ? (u.us_col_13 ?: '') : ''}"></div>
                  <div th:text="${u != null ? (u.us_col_14 ?: '') : ''}"></div>
                  <div th:text="${u != null ? (u.us_col_08 == 1 ? 'admin' : (u.us_col_08 == 2 ? 'supervisor' : (u.us_col_08 == 3 ? 'manager' : (u.us_col_08 == 4 ? 'viewer' : '')))) : ''}"></div>
                  <div th:text="${u != null ? (u.us_col_11 ?: '') : ''}"></div>
                  <div>
                    <span th:text="${u != null && u.us_col_07 == 'y' ? '사용중' : '사용중지'}"></span>
                    <input type="hidden" name="us_col_01" th:value="${u != null ? u.us_col_01 : ''}">
                    <input type="hidden" name="us_col_02" th:value="${u != null ? u.us_col_02 : ''}">
                    <input type="hidden" name="us_col_04" th:value="${u != null ? u.us_col_04 : ''}">
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div></div>
        </div>

        <div class="section-bot">
          <div>
            <div class="search-status-area">
              <div><span>검색수 : <span class="count" th:text="|${count}건|"></span></span></div>
              <div class="status-area">
                <div class="section-btn">
                  <div class="btn counsel-btn" id="user-del">사용자삭제</div>
                  <div class="btn counsel-btn delBtn" id="user-modi">수정</div>
                  <div class="btn newBtn pop-btn counsel-btn" id="user-new" onclick="openUserPopup()">새사용자</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── 탭 2: 역할 관리 (Alpine.js) ── -->
      <div id="admin-tab-roles" class="admin-tab-panel rp-root"
           x-data="rolesManager()" x-init="init()">

        <!-- SVG sprite (역할 관리 전용 아이콘) -->
        <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
          <defs>
            <symbol id="rp-i-shield"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
            <symbol id="rp-i-key"       viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M10.85 12.15 19 4l3 3-3 3-2-2-2 2-2-2"/></symbol>
            <symbol id="rp-i-headset"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1v-6h3zM3 19a2 2 0 0 0 2 2h1v-6H3z"/></symbol>
            <symbol id="rp-i-clipboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></symbol>
            <symbol id="rp-i-building"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1"/><line x1="9" y1="7" x2="9.01" y2="7"/><line x1="15" y1="7" x2="15.01" y2="7"/><line x1="9" y1="11" x2="9.01" y2="11"/><line x1="15" y1="11" x2="15.01" y2="11"/><path d="M10 21v-4h4v4"/></symbol>
            <symbol id="rp-i-bed"       viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20v-8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8"/><path d="M3 16h18M7 10V7a2 2 0 0 1 2-2h5a2 2 0 0 1 2 2v3"/></symbol>
            <symbol id="rp-i-eye"       viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></symbol>
            <symbol id="rp-i-message"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></symbol>
            <symbol id="rp-i-users"     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
            <symbol id="rp-i-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></symbol>
            <symbol id="rp-i-plus"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"    stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
            <symbol id="rp-i-copy"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
            <symbol id="rp-i-edit"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></symbol>
            <symbol id="rp-i-trash"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></symbol>
            <symbol id="rp-i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
            <symbol id="rp-i-check"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"    stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
            <symbol id="rp-i-x"      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"    stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
            <symbol id="rp-i-sliders"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></symbol>
            <symbol id="rp-i-list"     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></symbol>
            <symbol id="rp-i-chart"    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></symbol>
            <symbol id="rp-i-bell"     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></symbol>
            <symbol id="rp-i-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></symbol>
          </defs>
        </svg>

        <div class="rp-shell">

          <!-- ===== 역할 목록 (좌) ===== -->
          <aside class="rp-panel">
            <div class="rp-panel__header">
              <span class="rp-panel__title">역할 목록</span>
              <span class="rp-panel__count" x-text="roles.length + '개'"></span>
            </div>
            <div class="rp-panel__body">
              <ul class="rp-role-list">
                <template x-if="listLoading">
                  <div>
                    <template x-for="i in 5" :key="i">
                      <li class="rp-role-skeleton" style="margin-bottom:4px"></li>
                    </template>
                  </div>
                </template>
                <template x-if="!listLoading && !roles.length">
                  <li class="rp-empty">역할이 없습니다.</li>
                </template>
                <template x-if="!listLoading">
                  <div>
                    <template x-for="(r, i) in roles" :key="r.role_id">
                      <li class="rp-role-item"
                          :class="{ 'is-active': r.role_id == selectedId }"
                          :style="{ animationDelay: i * 40 + 'ms' }"
                          @click="selectRole(r.role_id)">
                        <div class="rp-role-item__icon">
                          <svg width="20" height="20"><use :href="'#rp-i-' + _roleIcon(r)"/></svg>
                        </div>
                        <div>
                          <div class="rp-role-item__name" x-text="r.role_name"></div>
                          <div class="rp-role-item__meta" x-text="'사용자 ' + r.user_count + '명'"></div>
                        </div>
                        <svg class="rp-role-item__chevron" width="16" height="16"><use href="#rp-i-chevron-right"/></svg>
                      </li>
                    </template>
                  </div>
                </template>
              </ul>
              <button class="rp-role-list__add" @click="openModal()">
                <svg width="16" height="16"><use href="#rp-i-plus"/></svg>
                새 역할 만들기
              </button>
            </div>
          </aside>

          <!-- ===== 역할 상세 (우) ===== -->

          <!-- placeholder -->
          <div class="rp-placeholder" x-show="!selectedId">
            <div class="rp-placeholder__icon">🛡️</div>
            <div class="rp-placeholder__text">역할을 선택하면 권한 설정이 표시됩니다.</div>
          </div>

          <!-- 상세 -->
          <div class="rp-detail" x-show="selectedId">

            <!-- Hero 배너 -->
            <div class="rp-hero">
              <div class="rp-hero__icon">
                <svg width="28" height="28"><use :href="'#rp-i-' + _roleIcon(selectedRole)"/></svg>
              </div>
              <div class="rp-hero__meta">
                <div class="rp-hero__eyebrow">역할 세부 설정</div>
                <div class="rp-hero__name">
                  <span x-show="!editingMeta" x-text="editName"></span>
                  <input x-show="editingMeta" class="rp-hero__name-input"
                         x-model="editName" @input="dirty = true" maxlength="100" />
                  <span class="rp-badge" :class="isSystem ? 'rp-badge--gray' : 'rp-badge--brand'"
                        x-text="isSystem ? '시스템' : '활성'"></span>
                </div>
                <div x-show="!editingMeta" class="rp-hero__desc" x-text="editDesc || '설명 없음'"></div>
                <textarea x-show="editingMeta" class="rp-hero__desc-input"
                          x-model="editDesc" @input="dirty = true" rows="2"
                          placeholder="역할 설명"></textarea>
              </div>
              <div class="rp-hero__stats">
                <div class="rp-stat">
                  <div class="rp-stat__value" x-text="selectedMenuCount"></div>
                  <div class="rp-stat__label">권한 수</div>
                </div>
                <div class="rp-stat">
                  <div class="rp-stat__value" x-text="roleUsers.length"></div>
                  <div class="rp-stat__label">할당 인원</div>
                </div>
              </div>
              <div class="rp-hero__actions">
                <button class="rp-btn rp-btn--ghost" @click="copyRole()">
                  <svg width="14" height="14"><use href="#rp-i-copy"/></svg>복제
                </button>
                <button class="rp-btn rp-btn--outline" @click="editingMeta = !editingMeta" :disabled="isSystem"
                        x-text="editingMeta ? '취소' : '이름 변경'"></button>
                <button class="rp-btn rp-btn--danger-ghost" @click="deleteRole()" :disabled="isSystem">
                  <svg width="14" height="14"><use href="#rp-i-trash"/></svg>삭제
                </button>
              </div>
            </div>

            <!-- 권한 설정 패널 -->
            <div class="rp-panel">
              <div class="rp-panel__header">
                <span class="rp-panel__title">권한 설정</span>
                <span class="rp-panel__count">
                  <span x-text="selectedMenuCount"></span> / <span x-text="totalMenus"></span>
                </span>
                <div style="flex:1"></div>
                <div class="rp-perm-search">
                  <svg width="14" height="14"><use href="#rp-i-search"/></svg>
                  <input type="text" placeholder="권한 검색" x-model="search" />
                </div>
              </div>

              <template x-for="cat in permGroups" :key="cat.id">
                <div class="rp-perm-group" x-show="filteredMenus(cat).length > 0">
                  <div class="rp-perm-group__header">
                    <span class="rp-perm-group__title" x-text="cat.label"></span>
                    <span class="rp-perm-group__count">
                      <span x-text="categoryCount(cat.id)"></span>/<span x-text="cat.items.length"></span>
                    </span>
                    <button class="rp-perm-group__toggle-all"
                            @click="toggleCategory(cat.id)" :disabled="isSystem">
                      전체 <span x-text="cat.items.every(m => hasMenu(m.menu_key)) ? '해제' : '선택'"></span>
                    </button>
                  </div>
                  <div class="rp-perm-grid">
                    <template x-for="item in filteredMenus(cat)" :key="item.menu_key">
                      <label class="rp-perm-card"
                             :class="{ 'is-active': hasMenu(item.menu_key), 'is-partial': menuPartial(item.menu_key), 'is-system': isSystem }"
                             @click.prevent="toggleMenu(item.menu_key)">
                        <input type="checkbox"
                               :checked="hasMenu(item.menu_key)"
                               @change.stop="toggleMenu(item.menu_key)"
                               :disabled="isSystem" />
                        <span class="rp-perm-card__check">
                          <svg width="14" height="14"><use href="#rp-i-check"/></svg>
                        </span>
                        <span class="rp-perm-card__icon">
                          <svg width="18" height="18"><use :href="'#rp-i-' + item.icon"/></svg>
                        </span>
                        <span class="rp-perm-card__body">
                          <span class="rp-perm-card__label" x-text="item.label"></span>
                          <span class="rp-perm-card__desc" x-text="item.desc"></span>
                        </span>
                      </label>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <!-- 이 역할의 사용자 -->
            <div class="rp-panel">
              <div class="rp-panel__header">
                <span class="rp-panel__title">이 역할의 사용자</span>
                <span class="rp-panel__count" x-text="roleUsers.length + '명'"></span>
              </div>
              <div class="rp-users-body">
                <div class="rp-users-empty" x-show="!roleUsers.length">할당된 사용자가 없습니다</div>
                <div class="rp-user-chips" x-show="roleUsers.length > 0">
                  <template x-for="u in roleUsers" :key="u.user_id">
                    <div class="rp-user-chip">
                      <div class="rp-user-chip__avatar"
                           :style="{ background: _userColor(u.user_id) }"
                           x-text="(u.user_name||'?').charAt(0)"></div>
                      <span x-text="u.user_name || '-'"></span>
                      <span class="rp-user-chip__id" x-text="'(' + (u.user_login || '') + ')'"></span>
                      <button class="rp-user-chip__remove"
                              @click="removeUserFromRole(u.user_id)" aria-label="역할 해제">
                        <svg width="10" height="10"><use href="#rp-i-x"/></svg>
                      </button>
                    </div>
                  </template>
                </div>
                <select class="rp-user-add" x-model="addUserId"
                        @change="if(addUserId) addUserToRole()">
                  <option value="">＋ 사용자를 선택하면 바로 추가됩니다</option>
                  <template x-for="u in availableUsers" :key="u.user_id">
                    <option :value="u.user_id"
                            x-text="`${u.user_name || '-'} (${u.user_login})`"></option>
                  </template>
                </select>
              </div>
            </div>

            <!-- Save bar (변경사항 있을 때만 표시) -->
            <div class="rp-save-bar" x-show="dirty" style="display:none">
              <div class="rp-save-bar__dot"></div>
              <div class="rp-save-bar__msg">
                <strong x-text="editName"></strong> 역할에 저장되지 않은 변경사항이 있습니다
              </div>
              <button class="rp-save-bar__revert" @click="revertChanges()">되돌리기</button>
              <button class="rp-save-bar__save" @click="savePermissions()"
                      :disabled="saving"
                      x-text="saving ? '저장 중…' : '변경사항 저장'"></button>
            </div>

          </div>
        </div>

        <!-- 새 역할 생성 모달 -->
        <div class="rp-modal-overlay"
             x-show="showModal"
             @click.self="showModal = false"
             @keydown.escape.window="showModal = false"
             style="display:none;">
          <div class="rp-modal" @click.stop>
            <h3>새 역할 만들기</h3>
            <label>역할 이름 <span class="required">*</span></label>
            <input x-ref="newNameInput" x-model="newName" type="text"
                   placeholder="예: 야간 상담사" maxlength="100"
                   @keydown.enter="submitCreate()" />
            <label>설명</label>
            <textarea x-model="newDesc" rows="2" placeholder="이 역할에 대한 간단한 설명"></textarea>
            <div class="rp-modal-btns">
              <button class="rp-modal-cancel" @click="showModal = false">취소</button>
              <button class="rp-modal-confirm" @click="submitCreate()">만들기</button>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>
</div>

<div id="spinner-overlay" style="display: none;">
  <div class="spinner-container">
    <div class="spinner"></div>
    <p>잠시만 기다려주세요</p>
  </div>
</div>

<script th:replace="~{csm/Include/layout :: scripts}"></script>
<script>
let sortOrder = [0, 0, 0, 0, 0, 0, 0];
function sortGrid(n) {
  sortOrder[n] = (sortOrder[n] + 1) % 3;
  const grid = document.getElementById('userGrid');
  if (!grid) return;
  const rows = Array.from(grid.querySelectorAll('.grid-row'));
  rows.sort((a, b) => {
    const aText = a.children[n].innerText.trim().toLowerCase();
    const bText = b.children[n].innerText.trim().toLowerCase();
    if (sortOrder[n] === 1) return aText.localeCompare(bText, 'ko');
    if (sortOrder[n] === 2) return bText.localeCompare(aText, 'ko');
    return 0;
  });
  rows.forEach(r => grid.appendChild(r));
  for (let i = 0; i < 7; i++) {
    const arrow = document.getElementById('arrow' + i);
    if (!arrow) continue;
    arrow.className = 'arrow' + (sortOrder[i] === 1 ? ' up' : sortOrder[i] === 2 ? ' down' : '');
  }
}
</script>
</body>
</html>

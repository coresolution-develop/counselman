<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/csm/Include/common.css}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자페이지 : SOSYGE EASY-CRM</title>

<meta property="og:title" content="상담관리시스템">
<meta property="og:type" content="website">
<meta property="og:url" content="http://49.247.42.59:8090/csm/login">
<meta property="og:image" th:content="@{/icon/ev/core_icon_big.png}" content="/icon/ev/core_icon_big.png">
<meta property="og:description" content="병원상담관리시스템">

<link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
<link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
<link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">

<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script th:src="@{/js/csm/admin/admin.js}"></script>

<link rel="stylesheet" th:href="@{/css/reset.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/style.css}">
<link rel="stylesheet" th:href="@{/css/csm/admin/style.css}">
<link rel="stylesheet" th:href="@{/css/csm/admin/admin.css}">
<link rel="stylesheet" th:href="@{/css/csm/popup/popup.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/spinner.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/button.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/header.css}">
<link rel="stylesheet" th:href="@{/css/csm/Include/cate.css}">

<style>
.arrow { display: inline-block; width: 0; height: 0; margin-left: 5px; }
.up { border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 5px solid black; }
.down { border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid black; }
.selected-row { background-color: #f0f8ff !important; }
.selected-row * { background-color: #f0f8ff !important; }

/* 권한 없음 안내 박스 */
.no-access-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 60px 24px;
  text-align: center;
  color: #5a6b5e;
}
.no-access-icon {
  font-size: 48px;
  line-height: 1;
}
.no-access-title {
  font-size: 18px;
  font-weight: 700;
  color: #2d3e33;
}
.no-access-desc {
  font-size: 13px;
  color: #7a8b80;
  line-height: 1.6;
}
</style>
</head>
<body>
<div th:replace="~{csm/Include/layout :: header(info=${info})}"></div>
<div th:replace="~{csm/Include/layout :: nav_section2('admin', ${endVar}, ${st}, ${kw})}"></div>

<div class="main">
  <div class="section orb-deco">

    <!-- ① 권한 없음 안내 -->
    <div th:if="${noAdminAccess}" class="no-access-box">
      <div class="no-access-icon">🔒</div>
      <div class="no-access-title">관리자 권한이 필요합니다</div>
      <div class="no-access-desc">
        이 페이지는 기관 관리자(admin) 계정만 접근할 수 있습니다.<br>
        권한이 필요하시면 담당자에게 문의해 주세요.
      </div>
    </div>

    <!-- ② 관리자 화면 -->
    <div th:unless="${noAdminAccess}">
      <div class="content-mid content-mid-admin">
        <div class="section-mid">
          <div class="user-list">
            <div class="grid-header">
              <div onclick="sortGrid(0)">사번 <span id='arrow0' class="arrow"></span></div>
              <div onclick="sortGrid(1)">성명 <span id='arrow1' class="arrow"></span></div>
              <div onclick="sortGrid(2)">부서 <span id='arrow2' class="arrow"></span></div>
              <div onclick="sortGrid(3)">직급 <span id='arrow3' class="arrow"></span></div>
              <div onclick="sortGrid(4)">권한 <span id='arrow4' class="arrow"></span></div>
              <div onclick="sortGrid(5)">Email <span id='arrow5' class="arrow"></span></div>
              <div onclick="sortGrid(6)">상태 <span id='arrow6' class="arrow"></span></div>
            </div>
            <div class="grid-body" id="userGrid">
              <div class="grid-row" th:if="${#lists.isEmpty(user)}">
                <div style="grid-column: 1 / -1;">사용자 데이터가 없습니다.</div>
              </div>
              <div class="grid-row" th:each="u : ${user}">
                <div th:text="${u != null ? (u.us_col_02 ?: '') : ''}"></div>
                <div th:text="${u != null ? (u.us_col_12 ?: '') : ''}"></div>
                <div th:text="${u != null ? (u.us_col_13 ?: '') : ''}"></div>
                <div th:text="${u != null ? (u.us_col_14 ?: '') : ''}"></div>
                <div th:text="${u != null ? (u.us_col_08 == 1 ? 'admin' : (u.us_col_08 == 2 ? 'supervisor' : (u.us_col_08 == 3 ? 'manager' : (u.us_col_08 == 4 ? 'viewer' : '')))) : ''}"></div>
                <div th:text="${u != null ? (u.us_col_11 ?: '') : ''}"></div>
                <div>
                  <span th:text="${u != null && u.us_col_07 == 'y' ? '사용중' : '사용중지'}"></span>
                  <input type="hidden" name="us_col_01" th:value="${u != null ? u.us_col_01 : ''}">
                  <input type="hidden" name="us_col_02" th:value="${u != null ? u.us_col_02 : ''}">
                  <input type="hidden" name="us_col_04" th:value="${u != null ? u.us_col_04 : ''}">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div></div>
      </div>

      <div class="section-bot">
        <div>
          <div class="search-status-area">
            <div><span>검색수 : <span class="count" th:text="|${count}건|"></span></span></div>
            <div class="status-area">
              <div class="section-btn">
                <div class="btn counsel-btn" id="user-del">사용자삭제</div>
                <div class="btn counsel-btn delBtn" id="user-modi">수정</div>
                <div class="btn newBtn pop-btn counsel-btn" id="user-new" onclick="openUserPopup()">새사용자</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="spinner-overlay" style="display: none;">
  <div class="spinner-container">
    <div class="spinner"></div>
    <p>잠시만 기다려주세요</p>
  </div>
</div>

<script th:replace="~{csm/Include/layout :: scripts}"></script>
<script>
let sortOrder = [0, 0, 0, 0, 0, 0, 0];
function sortGrid(n) {
  sortOrder[n] = (sortOrder[n] + 1) % 3;
  const grid = document.getElementById('userGrid');
  if (!grid) return;
  const rows = Array.from(grid.querySelectorAll('.grid-row'));
  rows.sort((a, b) => {
    const aText = a.children[n].innerText.trim().toLowerCase();
    const bText = b.children[n].innerText.trim().toLowerCase();
    if (sortOrder[n] === 1) return aText.localeCompare(bText, 'ko');
    if (sortOrder[n] === 2) return bText.localeCompare(aText, 'ko');
    return 0;
  });
  rows.forEach(r => grid.appendChild(r));
  for (let i = 0; i < 7; i++) {
    const arrow = document.getElementById('arrow' + i);
    if (!arrow) continue;
    arrow.className = 'arrow' + (sortOrder[i] === 1 ? ' up' : sortOrder[i] === 2 ? ' down' : '');
  }
}
</script>
</body>
</html>

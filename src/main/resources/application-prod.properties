# prod profile settings
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.cache=true

spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=31536000
spring.web.resources.chain.cache=true

spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.thymeleaf=INFO
logging.level.com.coresolution.csm=INFO

# 운영 DB
spring.datasource.url=jdbc:mysql://csm.sosyge.net:3306/csm?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=csdev
spring.datasource.password=csdev1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

login.aes-key=${LOGIN_AES_KEY}

# 운영 업로드 저장 경로
app.counsel.audio.base-dir=${COUNSEL_AUDIO_BASE_DIR:/mnt/csm-audio}
app.counsel.file.base-dir=${COUNSEL_FILE_BASE_DIR:/mnt/csm-counsel-files}

# Bizppurio (PROD)
sms.bizppurio.token-url=${BIZPPURIO_TOKEN_URL:https://api.bizppurio.com/v1/token}
sms.bizppurio.message-url=${BIZPPURIO_MESSAGE_URL:https://dev-api.bizppurio.com/v3/message}
sms.bizppurio.account=${BIZPPURIO_PROD_ACCOUNT:${BIZPPURIO_ACCOUNT:counselman}}
sms.bizppurio.username=${BIZPPURIO_PROD_USERNAME:${BIZPPURIO_USERNAME:counselman}}
sms.bizppurio.password=${BIZPPURIO_PROD_PASSWORD:${BIZPPURIO_PASSWORD:core2468!!}}

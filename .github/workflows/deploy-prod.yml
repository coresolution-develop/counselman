name: Deploy PROD

# Push to `prod` → build + test on a GitHub-hosted runner, then a self-hosted
# runner ON the prod server deploys the artifact locally (no inbound SSH).
#
# SETUP: register a self-hosted runner on the prod server with the label `prod`
#   (Settings → Actions → Runners → New self-hosted runner; add `--labels prod`).
#   The runner user needs write access to the Tomcat webapps dir (run as root is
#   simplest). The `prod` branch should only ever receive reviewed/tested commits.

on:
  push:
    branches:
      - prod
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Test gate (abort prod deploy if red)
        run: ./gradlew test --console=plain -PexcludeIntegration
      - name: Build PROD war
        run: ./gradlew prodWar --console=plain
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-war
          path: build/libs/csm-prod.war
          retention-days: 1

  deploy:
    needs: build
    runs-on: [self-hosted, prod]
    # Gate: waits for a required reviewer to approve in the Actions UI before
    # the artifact touches the live prod server (GitHub Environment `prod`).
    environment: prod
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-war
          path: artifact
      - name: Deploy on prod server (local, with backup)
        run: |
          TS=$(date +%Y%m%d-%H%M%S)
          WEBAPPS=/opt/csm-next/tomcat/webapps
          cp -a "$WEBAPPS/csm.war" "$WEBAPPS/csm.war.bak-$TS" 2>/dev/null || true
          # copy to a temp file then atomically rename, so Tomcat never auto-deploys a half-written war
          cp artifact/csm-prod.war "$WEBAPPS/csm.war.new"
          mv -f "$WEBAPPS/csm.war.new" "$WEBAPPS/csm.war"
          echo "PROD deployed: csm.war (rollback: csm.war.bak-$TS). Tomcat auto-reloads."

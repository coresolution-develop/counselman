name: Deploy PROD

# Push to `prod` → build + test on a GitHub-hosted runner, then a self-hosted
# runner ON the prod server stages the artifact into /opt/csm-next/deploy/staging
# (no inbound SSH). The csm-next-deploy timer (02:30 KST) applies it at dawn.
#
# SETUP: register a self-hosted runner on the prod server with the label `prod`
#   (Settings → Actions → Runners → New self-hosted runner; add `--labels prod`).
#   The runner user needs write access to the Tomcat webapps dir (run as root is
#   simplest). The `prod` branch should only ever receive reviewed/tested commits.

on:
  push:
    branches:
      - prod
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Test gate (abort prod deploy if red)
        run: ./gradlew test --console=plain -PexcludeIntegration
      - name: Build PROD war
        run: ./gradlew prodWar --console=plain
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-war
          path: build/libs/csm-prod.war
          retention-days: 1

  deploy:
    needs: build
    runs-on: [self-hosted, prod]
    # Gate: waits for a required reviewer to approve in the Actions UI before
    # the artifact touches the live prod server (GitHub Environment `prod`).
    environment: prod
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-war
          path: artifact
      - name: Stage war for scheduled (dawn) deploy
        run: |
          STAGING=/opt/csm-next/deploy/staging
          # Do NOT deploy directly. Drop the war into the staging dir + deploy.ok
          # marker; the csm-next-deploy timer (02:30 KST) applies it and restarts
          # csm-next. Atomic rename so a timer never sees a half-written war.
          cp artifact/csm-prod.war "$STAGING/csm.war.new"
          mv -f "$STAGING/csm.war.new" "$STAGING/csm.war"
          touch "$STAGING/deploy.ok"
          echo "Staged csm.war -> $STAGING + deploy.ok. Scheduled deploy timer will apply it at the next window."

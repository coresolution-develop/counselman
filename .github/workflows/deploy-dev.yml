name: Deploy DEV

# Push to `dev` → build on a GitHub-hosted runner, then a self-hosted runner
# ON the dev server deploys the artifact locally (no inbound SSH needed, so the
# server firewall is a non-issue).
#
# SETUP: register a self-hosted runner on the dev server with the label `dev`
#   (Settings → Actions → Runners → New self-hosted runner; add `--labels dev`).
#   The runner user needs write access to the deploy paths and sudo for
#   systemctl (simplest: run the runner as root).

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Build DEV packages
        run: ./gradlew packageDevDeploy --console=plain
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-deploy
          path: |
            build/deploy/dev/csm-dev.war
            build/deploy/dev/mediplat-dev.jar
            build/deploy/dev/links-dev.jar
          retention-days: 1

  deploy:
    needs: build
    runs-on: [self-hosted, dev]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-deploy
          path: artifact
      - name: Deploy on dev server (local)
        run: |
          mkdir -p /opt/links/app
          cp artifact/csm-dev.war /usr/local/tomcat10/webapps/csm.war
          cp artifact/mediplat-dev.jar /opt/mediplat/app/mediplat.jar
          cp artifact/links-dev.jar /opt/links/app/links.jar
          sudo systemctl restart mediplat links
          echo "DEV deployed: csm.war (Tomcat auto-reload) + mediplat + links restarted"

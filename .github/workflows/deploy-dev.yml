name: Deploy DEV

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build DEV packages
        run: ./gradlew packageDevDeploy --console=plain

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 49.247.42.59 >> ~/.ssh/known_hosts

      - name: Upload WAR (CSM)
        run: scp build/deploy/dev/csm-dev.war root@49.247.42.59:/usr/local/tomcat10/webapps/csm.war

      - name: Upload JAR (MediPlat)
        run: scp build/deploy/dev/mediplat-dev.jar root@49.247.42.59:/opt/mediplat/app/mediplat.jar

      - name: Restart MediPlat
        run: ssh root@49.247.42.59 "sudo systemctl restart mediplat"

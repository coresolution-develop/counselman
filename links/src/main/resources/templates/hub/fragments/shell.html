<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
  <!--
    공통 다크 사이드바. 사용:
      <div th:replace="~{hub/fragments/shell :: sidebar('me', ${hubMember})}"></div>
    active: 'hub' | 'me' | 'account'  /  member: HubMemberSession 또는 null(공개 허브)
  -->
  <aside th:fragment="sidebar(active, member)" class="hub-sidebar">
    <div class="hub-brand">
      <span class="hub-brand__logo" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
      </span>
      <span class="hub-brand__name">링크 허브</span>
    </div>

    <nav class="hub-nav">
      <a th:href="@{/links}" class="hub-nav__item" th:classappend="${active == 'hub'} ? ' hub-nav__item--active'">
        <svg class="hub-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5" /><path d="M5 10v10h14V10" /></svg>
        <span>허브</span>
      </a>
      <a th:href="@{/hub/me}" class="hub-nav__item" th:classappend="${active == 'me'} ? ' hub-nav__item--active'">
        <svg class="hub-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
        <span>내 페이지</span>
      </a>
      <a th:href="@{/hub/me/account}" class="hub-nav__item" th:classappend="${active == 'account'} ? ' hub-nav__item--active'">
        <svg class="hub-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
        <span>계정 설정</span>
      </a>
    </nav>

    <div class="hub-sidebar__spacer"></div>

    <!-- 로그인 상태: 프로필 + 로그아웃 -->
    <div th:if="${member != null}" class="hub-profile">
      <span class="hub-profile__avatar" th:text="${#strings.substring(member.name, 0, 1)}">이</span>
      <div class="hub-profile__meta">
        <div class="hub-profile__name" th:text="|${member.name}님|">이수민님</div>
        <form th:action="@{/hub/logout}" method="post" class="hub-inline-form">
          <button type="submit" class="hub-profile__logout">로그아웃</button>
        </form>
      </div>
    </div>
    <!-- 비로그인: 로그인 버튼 -->
    <a th:if="${member == null}" th:href="@{/hub/login}" class="hub-profile__login">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" /><path d="M10 17l5-5-5-5" /><path d="M15 12H3" /></svg>
      <span>로그인</span>
    </a>
  </aside>
</body>
</html>

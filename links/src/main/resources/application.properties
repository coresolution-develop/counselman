spring.application.name=links
server.port=${LINKS_PORT:8085}
server.forward-headers-strategy=framework

# Shared CounselMan (csm) MySQL DB — same database as csm, so hub members and
# company links are shared between csm's hub and this standalone app. The hub
# tables (hub_member, hub_member_favorite, hub_member_custom_link,
# hub_member_link_history, hub_member_token) and company_link/company_link_category
# are auto-created on first use by the services. This app never runs schema.sql.
spring.datasource.url=${LINKS_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${DEV_DB_HOST:49.247.42.59}:${DEV_DB_PORT:3306}/${DEV_DB_NAME:csm}?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}}
spring.datasource.username=${LINKS_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:${DEV_DB_USERNAME:csdev}}}
spring.datasource.password=${LINKS_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${DEV_DB_PASSWORD:}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=never

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.web.resources.cache.cachecontrol.no-store=true

# Hub member personalization (same keys as csm so existing env carries over).
# Sessions are in-memory here; "remember me" (DB-backed token) survives restarts.
hub.signup.code=${HUB_SIGNUP_CODE:core}
hub.remember.days=${HUB_REMEMBER_DAYS:30}
# Secure cookies require HTTPS; set HUB_REMEMBER_COOKIE_SECURE=false for local http.
hub.remember.cookie-secure=${HUB_REMEMBER_COOKIE_SECURE:true}

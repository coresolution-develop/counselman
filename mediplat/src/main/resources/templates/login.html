<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPlat Login</title>
    <link rel="stylesheet" th:href="@{/css/mediplat.css}">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="brand-block">
            <p class="eyebrow">Integrated Healthcare Platform</p>
            <h1>MediPlat</h1>
            <p class="subtitle">기관코드/기관명 + 아이디로 기본 로그인하며, 병실현황판 전용 계정은 기관 입력 없이 로그인할 수 있습니다.</p>
        </div>
        <form method="post" th:action="@{/login}" class="login-form">
            <label for="instCode">기관코드 또는 기관명</label>
            <input id="instCode" name="instCode" type="text" placeholder="기관코드 또는 기관명 (전용계정은 비워두기)"
                   autocomplete="organization" th:value="${loginInstCode}">

            <label for="username">아이디</label>
            <input id="username" name="username" type="text" placeholder="아이디" autocomplete="username" required
                   th:value="${loginUsername}">

            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" placeholder="비밀번호" autocomplete="current-password" required>

            <p class="form-error" th:if="${error != null}" th:text="${error}">로그인 오류</p>

            <button type="submit">로그인</button>
        </form>
    </section>
</main>
<script th:src="@{/js/mediplat/login.js}"></script>
</body>
</html>

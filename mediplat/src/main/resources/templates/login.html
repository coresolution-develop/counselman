<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPlat Login</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/apple-touch-icon.png}">
    <link rel="stylesheet" th:href="@{/css/mediplat.css}">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="brand-block">
            <img class="brand-logo" th:src="@{/img/core_logo_hospital_w.png}" alt="CORE 병원전용 로고">
            <p class="eyebrow">Integrated Healthcare Platform</p>
            <h1>MediPlat</h1>
            <p class="subtitle">기관코드/기관명 + 아이디로 로그인하며, Mediplat 계정 우선 인증 후 미등록 계정은 CounselMan 계정으로 fallback 인증합니다.</p>
        </div>
        <form method="post" th:action="@{/login}" class="login-form">
            <label for="instCode">기관코드 또는 기관명</label>
            <input id="instCode" name="instCode" type="text" placeholder="기관코드 또는 기관명 (전용계정은 비워두기)"
                   autocomplete="organization" th:value="${loginInstCode}">

            <label for="username">아이디</label>
            <input id="username" name="username" type="text" placeholder="아이디" autocomplete="username" required
                   th:value="${loginUsername}">

            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" placeholder="비밀번호" autocomplete="current-password" required>

            <p class="form-error" th:if="${error != null}" th:text="${error}">로그인 오류</p>

            <button type="submit">로그인</button>
        </form>
    </section>
</main>
<script th:src="@{/js/mediplat/login.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'QR 인쇄 · ' + ${vehicle.plateNo}">QR 인쇄</title>
    <style>
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #1a2332; margin: 0; background: #f4f6f8; }
        .qr-sheet { max-width: 420px; margin: 24px auto; background: #fff; border: 1px solid #e3e8ee; border-radius: 12px; padding: 28px; text-align: center; }
        .qr-plate { font-size: 26px; font-weight: 700; margin: 0 0 2px; }
        .qr-name { color: #55606e; margin: 0 0 18px; }
        #qr { display: inline-block; padding: 12px; background: #fff; border: 1px solid #eef1f4; border-radius: 10px; }
        .qr-url { font-size: 12px; color: #55606e; word-break: break-all; margin: 14px 0 4px; }
        .qr-warn { color: #b4520a; font-size: 13px; font-weight: 600; margin: 8px 0 0; }
        .qr-guide { margin: 18px 0 0; font-size: 13px; color: #3a4552; line-height: 1.6; }
        .qr-actions { text-align: center; margin: 16px 0 40px; }
        .qr-btn { height: 44px; padding: 0 22px; font-size: 15px; font-weight: 600; color: #fff; background: #2f6df6; border: none; border-radius: 9px; cursor: pointer; }
        @media print {
            body { background: #fff; }
            .qr-sheet { border: none; margin: 0 auto; }
            .qr-actions, .qr-url, .qr-warn { display: none; }
        }
    </style>
</head>
<body>
<div class="qr-sheet" th:attr="data-qr-token=${vehicle.qrToken},data-plate=${vehicle.plateNo}">
    <p class="qr-plate" th:text="${vehicle.plateNo}">12가3456</p>
    <p class="qr-name" th:text="${vehicle.name}">스타렉스 1호</p>
    <div id="qr"></div>
    <p class="qr-url" id="qr-url"></p>
    <p class="qr-warn" id="qr-warn" hidden>이 주소는 휴대폰에서 접근할 수 없습니다. 실제 서비스 주소로 접속해 인쇄하세요.</p>
    <p class="qr-guide">차량 내부(대시보드 또는 글로브박스)에 부착하세요.<br>운전자가 개인 폰으로 스캔하면 운행 기록 화면이 열립니다.</p>
</div>
<div class="qr-actions">
    <button type="button" class="qr-btn" onclick="window.print()">인쇄</button>
</div>

<script th:src="@{/vendor/qrcode.min.js}"></script>
<script th:src="@{/js/fleet/qr-print.js}"></script>
</body>
</html>

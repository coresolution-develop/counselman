<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPlat</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/apple-touch-icon.png}">
    <link rel="stylesheet" th:href="@{/css/mediplat.css}">
</head>
<body class="services-page">
<header class="topbar">
    <div>
        <p class="eyebrow">MediPlat</p>
        <h1>MEDIPLAT</h1>
    </div>
    <div class="topbar-actions">
        <div class="user-meta">
            <strong th:text="${user.displayName}">Platform Admin</strong>
            <span th:text="${user.instCode + ' · ' + user.roleCode}">core · PLATFORM_ADMIN</span>
        </div>
        <a class="ghost-btn" th:if="${roomBoardViewerEnabled}" th:href="@{/room-board-viewer}">통합 병실현황판</a>
        <a class="ghost-btn" th:if="${user.platformAdmin or user.institutionAdmin}" th:href="@{/admin}">관리</a>
        <a class="ghost-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</header>

<main class="page-shell">
    <section class="mediplat-services-shell">
        <div class="mediplat-service-grid">
            <!-- 활성화된 서비스 먼저 -->
            <th:block th:each="service : ${availableServices}">
                <a class="mediplat-service-card"
                   th:href="@{/launch/{serviceCode}(serviceCode=${service.serviceCode})}"
                   th:text="${service.serviceName}">CounselMan</a>
            </th:block>
            <!-- 비활성화 서비스 뒤에 -->
            <th:block th:each="service : ${unavailableServices}">
                <div class="mediplat-service-card is-disabled"
                     th:text="${service.serviceName}">추가 시스템</div>
            </th:block>
            <div class="empty-card" th:if="${#lists.isEmpty(services)}">
                표시할 서비스가 없습니다.
            </div>
        </div>
    </section>
</main>
</body>
</html>

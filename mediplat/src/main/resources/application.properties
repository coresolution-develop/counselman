spring.application.name=mediplat
server.port=${MEDIPLAT_PORT:8082}
server.forward-headers-strategy=framework
# Behind a TLS-terminating proxy: emit relative redirect Location headers (no scheme/host) so the
# browser resolves them against the current https origin. Prevents "Mixed Content" blocks when the
# proxy does not forward X-Forwarded-Proto. Absolute redirects (e.g. SSO /launch) are unaffected.
server.tomcat.use-relative-redirects=true

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.cachecontrol.no-store=true
spring.datasource.url=${MEDIPLAT_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${LOCAL_DB_HOST:${DEV_DB_HOST:49.247.42.59}}:${LOCAL_DB_PORT:${DEV_DB_PORT:3306}}/${LOCAL_DB_NAME:${DEV_DB_NAME:csm}}?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}}
spring.datasource.username=${MEDIPLAT_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:${LOCAL_DB_USERNAME:${DEV_DB_USERNAME:csdev}}}}
spring.datasource.password=${MEDIPLAT_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${LOCAL_DB_PASSWORD:${DEV_DB_PASSWORD:Core0220!_!@@}}}}

platform.counselman.datasource.url=${PLATFORM_COUNSELMAN_DATASOURCE_URL:${spring.datasource.url}}
platform.counselman.datasource.username=${PLATFORM_COUNSELMAN_DATASOURCE_USERNAME:${spring.datasource.username}}
platform.counselman.datasource.password=${PLATFORM_COUNSELMAN_DATASOURCE_PASSWORD:${spring.datasource.password}}
platform.counselman.datasource.driver-class-name=${PLATFORM_COUNSELMAN_DATASOURCE_DRIVER_CLASS_NAME:}
platform.counselman.login.aes-key=${PLATFORM_COUNSELMAN_LOGIN_AES_KEY:${LOGIN_AES_KEY:This is key!!!!!}}

platform.bootstrap.admin-inst-code=${PLATFORM_ADMIN_INST_CODE:core}
platform.bootstrap.admin-inst-name=${PLATFORM_ADMIN_INST_NAME:MediPlat Platform}
platform.bootstrap.admin-username=${PLATFORM_ADMIN_USERNAME:coreadmin}
platform.bootstrap.admin-password=${PLATFORM_ADMIN_PASSWORD:123qwe}
platform.bootstrap.admin-name=${PLATFORM_ADMIN_NAME:Platform Admin}
platform.bootstrap.counselman-base-url=${COUNSELMAN_BASE_URL:http://localhost:8081/csm}
platform.bootstrap.cancer-treatment-base-url=${CANCER_TREATMENT_BASE_URL:http://localhost:8083/cancer-treatment}
platform.bootstrap.sms-base-url=${SMS_BASE_URL:http://localhost:8084/sms}
platform.runtime-env=${PLATFORM_RUNTIME_ENV:}

platform.counselman.sso-shared-secret=${COUNSELMAN_MEDIPLAT_SSO_SHARED_SECRET:change-me}
platform.counselman.sso-expire-seconds=${COUNSELMAN_MEDIPLAT_SSO_EXPIRE_SECONDS:60}

platform.newsletter.ai.enabled=${MEDIPLAT_NEWSLETTER_AI_ENABLED:false}
platform.newsletter.ai.api-key=${OPENAI_API_KEY:}
platform.newsletter.ai.model=${MEDIPLAT_NEWSLETTER_AI_MODEL:gpt-5.2}
platform.newsletter.ai.cache-hours=${MEDIPLAT_NEWSLETTER_AI_CACHE_HOURS:12}

platform.maintenance.file-path=${MAINTENANCE_FILE_PATH:/var/www/html/maintenance.html}

# ── 차량운행관리(fleet) ──────────────────────────────────────────────────
# 계기판 사진 저장 루트. 반드시 '일일 백업 대상 볼륨'과 일치시킬 것 — DB엔 경로만 있어
# 파일 유실 시 세무 증빙이 사라진다. 배포 체크리스트: docs/fleet-deploy-checklist.md
platform.fleet.photo.base-dir=${FLEET_PHOTO_BASE_DIR:${user.home}/mediplat-fleet-photos}
# 1회 주행 상한(km). 초과 시 차단하지 않고 경고 플래그만 세운다(관리자 검토용).
fleet.trip.max-km=${FLEET_MAX_TRIP_KM:1500}
# 운전자 기기 기억 쿠키 TTL(일) · 운영(HTTPS)은 secure=true 유지.
fleet.device.remember-days=${FLEET_DEVICE_REMEMBER_DAYS:90}
fleet.device.cookie-secure=${FLEET_DEVICE_COOKIE_SECURE:true}

# 계기판 사진 업로드 한도(폰 원본 대응). Spring 기본 1MB로는 부족.
spring.servlet.multipart.max-file-size=${FLEET_MULTIPART_MAX_FILE_SIZE:12MB}
spring.servlet.multipart.max-request-size=${FLEET_MULTIPART_MAX_REQUEST_SIZE:15MB}

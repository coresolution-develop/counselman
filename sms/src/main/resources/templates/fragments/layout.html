<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<nav class="topnav" th:fragment="topnav(user, activeMenu, mediplatPortalUrl)">
  <a class="nav-logo" href="#">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 3.5h14a1 1 0 011 1V13a1 1 0 01-1 1H6l-4 3V4.5a1 1 0 011-1z" fill="#5e6ad2" opacity="0.9"/>
      </svg>
    </div>
    <span class="logo-name">문자/SMS</span>
  </a>

  <div class="nav-links">
    <a th:href="@{/sms-send}" class="nav-link"
       th:classappend="${activeMenu == 'send'}    ? ' active' : ''">문자 전송</a>
    <a th:href="@{/sms-history}" class="nav-link"
       th:classappend="${activeMenu == 'history'} ? ' active' : ''">발송 내역</a>
    <a th:href="@{/sms-cost}" class="nav-link"
       th:classappend="${activeMenu == 'cost'}    ? ' active' : ''">요금·비용</a>
  </div>

  <div class="nav-actions">
    <div class="avatar"
         th:text="${user?.username != null ? user.username.substring(0,1).toUpperCase() : '?'}">?</div>
    <a class="btn-ghost" th:href="${mediplatPortalUrl}">MediPlat</a>
    <a class="btn-ghost" th:href="@{/logout}">로그아웃</a>
  </div>
</nav>

<aside class="sidebar" th:fragment="sidebar(activeMenu, isPlatformAdmin)">
  <div class="sidebar-section">메시지</div>
  <a th:href="@{/sms-send}" class="sb-item"
     th:classappend="${activeMenu == 'send'} ? ' active' : ''">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h12v8H5l-3 3V3z"/>
      </svg>
    </span>
    문자 전송
  </a>
  <a th:href="@{/sms-history}" class="sb-item"
     th:classappend="${activeMenu == 'history'} ? ' active' : ''">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/>
      </svg>
    </span>
    발송 내역
  </a>

  <div class="sb-divider"></div>
  <div class="sidebar-section">정산</div>
  <a th:href="@{/sms-cost}" class="sb-item"
     th:classappend="${activeMenu == 'cost'} ? ' active' : ''">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 13l3-4 3 2 3-5 3 2"/>
      </svg>
    </span>
    요금·비용
    <span th:if="${isPlatformAdmin}" class="pill ok" style="margin-left:auto;">관리자</span>
  </a>
</aside>

</body>
</html>

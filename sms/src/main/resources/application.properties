spring.application.name=sms
server.port=${SMS_PORT:8084}
server.servlet.context-path=/sms
server.forward-headers-strategy=framework

# Shared CounselMan (csm) MySQL DB — reuse SPRING_DATASOURCE_* like mediplat does.
# SMS history (transmission_history_<inst>) and pricing (inst_data_cs) already live here,
# so the cost view automatically includes CounselMan usage. This app NEVER creates/alters
# those tables (spring.sql.init.mode=never).
spring.datasource.url=${SMS_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${DEV_DB_HOST:49.247.42.59}:${DEV_DB_PORT:3306}/${DEV_DB_NAME:csm}?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SMS_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:${DEV_DB_USERNAME:csdev}}}
spring.datasource.password=${SMS_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${DEV_DB_PASSWORD:}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=never

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.web.resources.cache.cachecontrol.no-store=true

# SSO handshake from MediPlat portal (same shared secret as the other apps)
sms.sso.shared-secret=${COUNSELMAN_MEDIPLAT_SSO_SHARED_SECRET:change-me}
sms.sso.allowed-clock-skew-seconds=${SMS_SSO_ALLOWED_CLOCK_SKEW_SECONDS:60}
sms.sso.default-target=/sms-send
sms.mediplat-portal-url=${SMS_MEDIPLAT_PORTAL_URL:http://localhost:8082/portal}

# Bizppurio gateway — same property keys as csm so existing env carries over
sms.bizppurio.token-url=${BIZPPURIO_TOKEN_URL:https://api.bizppurio.com/v1/token}
sms.bizppurio.message-url=${BIZPPURIO_MESSAGE_URL:https://api.bizppurio.com/v3/message}
sms.bizppurio.account=${BIZPPURIO_ACCOUNT:}
sms.bizppurio.username=${BIZPPURIO_USERNAME:}
sms.bizppurio.password=${BIZPPURIO_PASSWORD:}
sms.bizppurio.token-check-ms=${BIZPPURIO_TOKEN_CHECK_MS:3600000}

# Institution code treated as the platform admin (sees cross-institution totals)
sms.platform-admin-inst=${SMS_PLATFORM_ADMIN_INST:core}

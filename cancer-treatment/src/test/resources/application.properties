# 테스트는 H2 인메모리(MySQL 호환 모드) + schema.sql 자동 적용
spring.datasource.url=jdbc:h2:mem:cancer_treatment_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/

cancer-treatment.sso.shared-secret=test-secret
cancer-treatment.sso.allowed-clock-skew-seconds=60
cancer-treatment.sso.default-target=/cancer-treatment-schedule
cancer-treatment.mediplat-portal-url=http://localhost:8082/portal

# local profile - 로컬 개발용 (file: 기반 정적/템플릿 핫리로드)
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.thymeleaf.cache=false

spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.web.resources.cache.cachecontrol.no-store=true

logging.level.root=INFO
logging.level.com.coresolution.cancertreatment=DEBUG

# 로컬 실행이지만 DB는 환경변수로 dev/prod/local 어디든 붙을 수 있게 구성
spring.datasource.url=${CANCER_TREATMENT_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${LOCAL_DB_HOST:${DEV_DB_HOST:49.247.42.59}}:${LOCAL_DB_PORT:${DEV_DB_PORT:3306}}/${LOCAL_DB_NAME:${DEV_DB_NAME:csm}}?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}}
spring.datasource.username=${CANCER_TREATMENT_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:${LOCAL_DB_USERNAME:${DEV_DB_USERNAME:csdev}}}}
spring.datasource.password=${CANCER_TREATMENT_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${LOCAL_DB_PASSWORD:${DEV_DB_PASSWORD:Core0220!_!@@}}}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.sql.init.mode=${CANCER_TREATMENT_SQL_INIT_MODE:never}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

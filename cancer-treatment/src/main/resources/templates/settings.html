<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설정 관리</title>
    <link rel="stylesheet" th:href="@{/css/treatment.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <script th:inline="javascript">window.__ctx = /*[[@{/}]]*/ '/';</script>
    <script th:src="@{/js/settings.js}" defer></script>
</head>
<body th:attr="data-user-role=${user?.role}">
<div class="layout">
    <aside th:replace="~{fragments/layout :: sidebar(${user}, ${activeMenu}, ${mediplatPortalUrl})}"></aside>
    <main class="main">
        <div class="page-header">
            <div>
                <div class="page-title">설정 관리</div>
                <div class="page-subtitle">치료 항목, 상태, 시간 슬롯, 병동/외래 구분을 관리합니다. (치료옵션은 별도 메뉴)</div>
            </div>
            <div class="header-right">
                <div class="segmented-control" id="settings-tabs" role="tablist">
                    <button type="button" data-tab="treatment" class="is-active">치료 설정</button>
                    <button type="button" data-tab="operation">운영 설정</button>
                </div>
            </div>
        </div>
        <div class="page-body">
            <p class="form-message" id="settings-message" role="status"></p>
            <div id="settings-groups">
                <div class="settings-grid" data-group="treatment">
                    <article class="settings-card" data-category="treatment-types">
                        <div class="settings-card-head">
                            <strong>치료 항목</strong>
                            <button type="button" class="secondary-button" data-action="add">추가</button>
                        </div>
                        <div class="settings-list"></div>
                    </article>
                    <article class="settings-card" data-category="treatment-statuses">
                        <div class="settings-card-head">
                            <strong>치료 상태</strong>
                            <button type="button" class="secondary-button" data-action="add">추가</button>
                        </div>
                        <div class="settings-list"></div>
                    </article>
                </div>
                <div class="settings-grid" data-group="operation" hidden>
                    <article class="settings-card" data-category="time-slots">
                        <div class="settings-card-head">
                            <strong>시간 슬롯</strong>
                            <button type="button" class="secondary-button" data-action="add">추가</button>
                        </div>
                        <div class="settings-list"></div>
                    </article>
                    <article class="settings-card" data-category="wards">
                        <div class="settings-card-head">
                            <strong>병동/외래 구분</strong>
                            <button type="button" class="secondary-button" data-action="add">추가</button>
                        </div>
                        <div class="settings-list"></div>
                    </article>
                </div>
            </div>
        </div>
    </main>
</div>

<dialog class="settings-dialog" id="settings-dialog">
    <form method="dialog" id="settings-form">
        <h3 id="settings-dialog-title">설정 추가</h3>
        <input type="hidden" id="settings-id">
        <input type="hidden" id="settings-category">
        <label data-field="code">
            <span id="settings-code-label">코드</span>
            <input type="text" id="settings-code">
        </label>
        <label data-field="name">
            <span id="settings-name-label">이름</span>
            <input type="text" id="settings-name">
        </label>
        <label data-field="detail">
            <span id="settings-detail-label">상세</span>
            <input type="text" id="settings-detail">
        </label>
        <label data-field="admissionType">
            <span id="settings-admission-type-label">입원/외래 구분</span>
            <select id="settings-admission-type">
                <option value="INPATIENT">입원(병동)</option>
                <option value="OUTPATIENT">외래</option>
            </select>
        </label>
        <label data-field="color">
            <span id="settings-color-label">표시 색상</span>
            <input type="color" id="settings-color" value="#1a74bf">
        </label>
        <label>
            <span>정렬 순서</span>
            <input type="number" id="settings-display-order" value="0">
        </label>
        <p class="form-message" id="settings-dialog-message" role="status"></p>
        <div class="form-actions">
            <button type="button" class="secondary-button" id="settings-cancel">취소</button>
            <button type="submit">저장</button>
        </div>
    </form>
</dialog>
<script th:src="@{/js/role-guard.js}" defer></script>
</body>
</html>

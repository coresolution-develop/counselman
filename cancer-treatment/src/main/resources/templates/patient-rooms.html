<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병실 설정</title>
    <link rel="stylesheet" th:href="@{/css/treatment.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <script th:inline="javascript">window.__ctx = /*[[@{/}]]*/ '/';</script>
    <script th:src="@{/js/patient-rooms.js}" defer></script>
</head>
<body th:attr="data-user-role=${user?.role}">
<div class="layout">
    <aside th:replace="~{fragments/layout :: sidebar(${user}, ${activeMenu}, ${mediplatPortalUrl})}"></aside>
    <main class="main">
        <div class="page-header">
            <div>
                <div class="page-title">병실 설정</div>
                <div class="page-subtitle">병실 코드/이름, 병동을 관리합니다. 입원/외래 구분은 병동(병동/외래 구분 설정)에서 가져옵니다.</div>
            </div>
            <div class="header-right">
                <button type="button" class="btn-primary" id="room-create-open">+ 병실 등록</button>
            </div>
        </div>
        <div class="page-body">
            <p class="form-message" id="room-message" role="status"></p>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>병실 코드</th>
                            <th>병실명</th>
                            <th>병동</th>
                            <th>입원/외래</th>
                            <th style="text-align:right">정렬</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="room-body">
                        <tr>
                            <td colspan="6" class="empty">병실 정보를 불러오는 중입니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<dialog class="settings-dialog" id="room-dialog">
    <form method="dialog" id="room-form">
        <h3 id="room-dialog-title">병실 등록</h3>
        <input type="hidden" id="room-id">
        <label>
            <span>병실 코드</span>
            <input type="text" id="room-code" maxlength="50" required placeholder="예: 201">
        </label>
        <label>
            <span>병실명</span>
            <input type="text" id="room-name" maxlength="100" required placeholder="예: 201호">
        </label>
        <label>
            <span>병동</span>
            <select id="room-ward">
                <option value="">선택 안함</option>
            </select>
        </label>
        <label>
            <span>정렬 순서</span>
            <input type="number" id="room-display-order" value="0">
        </label>
        <p class="form-message" id="room-dialog-message" role="status"></p>
        <div class="form-actions">
            <button type="button" class="secondary-button" id="room-cancel">취소</button>
            <button type="submit">저장</button>
        </div>
    </form>
</dialog>
<script th:src="@{/js/role-guard.js}" defer></script>
</body>
</html>

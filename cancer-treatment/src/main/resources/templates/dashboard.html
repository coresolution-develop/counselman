<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드</title>
    <link rel="stylesheet" th:href="@{/css/treatment.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <script th:inline="javascript">window.__ctx = /*[[@{/}]]*/ '/';</script>
    <script th:src="@{/js/dashboard.js}" defer></script>
</head>
<body th:attr="data-user-role=${user?.role}">
<nav th:replace="~{fragments/layout :: topnav(${user}, ${activeMenu}, ${mediplatPortalUrl})}"></nav>
<div class="layout">
    <aside th:replace="~{fragments/layout :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div class="page-header">
            <div>
                <div class="page-title">대시보드</div>
                <div class="page-subtitle">오늘의 치료 현황을 한눈에 확인합니다.</div>
            </div>
            <div class="header-right"></div>
        </div>
        <div class="page-body">
            <section class="summary-grid">
                <article class="summary-card">
                    <span>오늘 전체</span>
                    <strong id="dashboard-total" th:text="${summary.total}">0</strong>
                </article>
                <article class="summary-card is-reserved">
                    <span>예약</span>
                    <strong id="dashboard-reserved" th:text="${summary.reserved}">0</strong>
                </article>
                <article class="summary-card is-completed">
                    <span>치료완료</span>
                    <strong id="dashboard-completed" th:text="${summary.completed}">0</strong>
                </article>
                <article class="summary-card is-canceled">
                    <span>예약취소</span>
                    <strong id="dashboard-canceled" th:text="${summary.canceled}">0</strong>
                </article>
            </section>
            <section class="dashboard-grid">
                <article class="board-card">
                    <div class="board-head">
                        <div>
                            <h2>치료별 진행</h2>
                            <p>오늘 치료 항목별 예약 건수입니다.</p>
                        </div>
                    </div>
                    <div class="metric-list" id="dashboard-treatment-list"></div>
                </article>

                <article class="board-card">
                    <div class="board-head">
                        <div>
                            <h2>병동별 현황</h2>
                            <p>병동/외래 기준으로 오늘 일정을 집계합니다.</p>
                        </div>
                    </div>
                    <div class="metric-list" id="dashboard-ward-list"></div>
                </article>
            </section>

            <section class="board-card dashboard-recent-card">
                <div class="board-head">
                    <div>
                        <h2>오늘 일정 흐름</h2>
                        <p>시간순으로 가까운 치료 일정을 확인합니다.</p>
                    </div>
                    <div class="last-sync" id="dashboard-last-sync">마지막 갱신: -</div>
                </div>
                <div class="dashboard-recent-list" id="dashboard-recent-list">
                    <p class="empty">일정을 불러오는 중입니다.</p>
                </div>
            </section>
        </div>
    </main>
</div>
<script th:src="@{/js/role-guard.js}" defer></script>
</body>
</html>

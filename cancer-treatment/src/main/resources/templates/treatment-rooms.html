<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>치료실 현황</title>
    <link rel="stylesheet" th:href="@{/css/treatment.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <script th:inline="javascript">window.__ctx = /*[[@{/}]]*/ '/';</script>
    <script th:src="@{/js/treatment-rooms.js}" defer></script>
</head>
<body>
<nav th:replace="~{fragments/layout :: topnav(${user}, ${activeMenu}, ${mediplatPortalUrl})}"></nav>
<div class="layout">
    <aside th:replace="~{fragments/layout :: sidebar(${activeMenu})}"></aside>
    <main class="main">
        <div class="page-header">
            <div>
                <div class="page-title">치료실 관리</div>
                <div class="page-subtitle">관리번호, 치료실, 치료항목, 담당자, 비고를 관리합니다.</div>
            </div>
            <div class="header-right">
                <button type="button" class="btn-primary" id="room-create-open">+ 치료실 등록</button>
            </div>
        </div>
        <div class="page-body">
            <p class="form-message" id="room-message" role="status"></p>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>관리번호</th>
                            <th>치료실</th>
                            <th>치료항목</th>
                            <th>담당자</th>
                            <th>비고</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="room-body">
                        <tr>
                            <td colspan="6" class="empty">치료실 정보를 불러오는 중입니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<dialog class="settings-dialog" id="room-dialog">
    <form method="dialog" id="room-form">
        <h3 id="room-dialog-title">치료실 등록</h3>
        <input type="hidden" id="room-id">
        <label>
            <span>관리번호</span>
            <input type="text" id="room-management-no" maxlength="50" placeholder="예: 4-1">
        </label>
        <label>
            <span>치료실</span>
            <input type="text" id="room-name" maxlength="100" required placeholder="예: 고주파치료실">
        </label>
        <label>
            <span>치료항목</span>
            <textarea id="room-treatment-items" rows="4" placeholder="예: BSD&#10;EHY1&#10;EHY2&#10;통원"></textarea>
        </label>
        <label>
            <span>담당자</span>
            <input type="text" id="room-manager-name" maxlength="100">
        </label>
        <label>
            <span>비고</span>
            <textarea id="room-note" rows="3"></textarea>
        </label>
        <label>
            <span>정렬 순서</span>
            <input type="number" id="room-display-order" value="0">
        </label>
        <p class="form-message" id="room-dialog-message" role="status"></p>
        <div class="form-actions">
            <button type="button" class="secondary-button" id="room-cancel">취소</button>
            <button type="submit">저장</button>
        </div>
    </form>
</dialog>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>치료사 관리</title>
    <link rel="stylesheet" th:href="@{/css/treatment.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <script th:inline="javascript">window.__ctx = /*[[@{/}]]*/ '/';</script>
    <script th:src="@{/js/therapists.js}" defer></script>
</head>
<body th:attr="data-user-role=${user?.role}">
<div class="layout">
    <aside th:replace="~{fragments/layout :: sidebar(${user}, ${activeMenu}, ${mediplatPortalUrl})}"></aside>
    <main class="main">
        <div class="page-header">
            <div>
                <div class="page-title">치료사 관리</div>
                <div class="page-subtitle">기관 치료사 명부를 관리합니다. (치료실 담당자와는 별개)</div>
            </div>
            <div class="header-right">
                <a class="secondary-button" th:href="@{/treatment-rooms}">치료실 관리</a>
                <button type="button" class="btn-primary" id="th-create-open">+ 치료사 등록</button>
            </div>
        </div>
        <div class="page-body">
            <p class="form-message" id="th-message" role="status"></p>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>치료사명</th><th style="text-align:right">정렬</th><th>관리</th></tr>
                    </thead>
                    <tbody id="th-body">
                        <tr><td colspan="3" class="empty">치료사 정보를 불러오는 중입니다.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<dialog class="settings-dialog" id="th-dialog">
    <form method="dialog" id="th-form">
        <h3 id="th-dialog-title">치료사 등록</h3>
        <input type="hidden" id="th-id">
        <label>
            <span>치료사명</span>
            <input type="text" id="th-name" maxlength="100" required placeholder="예: 김치료">
        </label>
        <label>
            <span>정렬 순서</span>
            <input type="number" id="th-display-order" value="0">
        </label>
        <p class="form-message" id="th-dialog-message" role="status"></p>
        <div class="form-actions">
            <button type="button" class="secondary-button" id="th-cancel">취소</button>
            <button type="submit">저장</button>
        </div>
    </form>
</dialog>
<script th:src="@{/js/role-guard.js}" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<aside class="sidebar" th:fragment="sidebar(user, activeMenu, mediplatPortalUrl)">
  <a class="nav-logo" th:href="@{/cancer-treatment-schedule}">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.9"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.6"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.6"/>
        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.3"/>
      </svg>
    </div>
    <span class="logo-name">암센터</span>
  </a>

  <nav class="sb-nav" aria-label="주요 메뉴">
    <a th:href="@{/cancer-treatment-schedule}" class="sb-item"
       th:classappend="${activeMenu == 'schedule'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v2M11 1v2M2 7h12"/>
        </svg>
      </span>
      스케줄
      <span class="sb-badge" id="badge-today"
            th:text="${summary?.total != null ? summary.total : 0}">0</span>
    </a>
    <a th:href="@{/treatment-calendar}" class="sb-item"
       th:classappend="${activeMenu == 'calendar'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="1" y="3" width="14" height="11" rx="2"/><path d="M1 7h14M5 1v2M11 1v2"/>
        </svg>
      </span>
      캘린더
    </a>
    <a th:href="@{/patients}" class="sb-item"
       th:classappend="${activeMenu == 'patients'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M8 8a3 3 0 100-6 3 3 0 000 6zM2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
        </svg>
      </span>
      환자
    </a>
    <a th:href="@{/treatment-rooms}" class="sb-item"
       th:classappend="${activeMenu == 'rooms'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2.5" y="2" width="11" height="12" rx="1.5"/><path d="M2.5 6h11M6 14V9h4v5"/>
        </svg>
      </span>
      치료실
    </a>
    <a th:href="@{/treatment-packages}" class="sb-item"
       th:classappend="${activeMenu == 'packages'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M4 2h8v12l-2-1.2L8 14l-2-1.2L4 14V2z"/><path d="M6.5 6h3M6.5 8.5h3"/>
        </svg>
      </span>
      치료비
    </a>
    <a th:href="@{/dashboard}" class="sb-item"
       th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/>
          <rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/>
        </svg>
      </span>
      통계
    </a>
    <a th:href="@{/settings}" class="sb-item"
       th:classappend="${activeMenu == 'settings'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="2.2"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/>
        </svg>
      </span>
      설정
    </a>
  </nav>

  <div class="sb-footer">
    <div class="avatar"
         th:text="${user?.username != null ? user.username.substring(0,1).toUpperCase() : '?'}">?</div>
    <a class="btn-ghost" th:href="${mediplatPortalUrl}">MediPlat</a>
    <a class="btn-ghost" th:href="@{/logout}">로그아웃</a>
  </div>
</aside>

</body>
</html>

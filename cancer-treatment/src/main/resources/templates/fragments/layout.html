<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<aside class="sidebar" th:fragment="sidebar(user, activeMenu, mediplatPortalUrl)">
  <a class="nav-logo" th:href="@{/cancer-treatment-schedule}">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.9"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.6"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.6"/>
        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.3"/>
      </svg>
    </div>
    <span class="logo-name">암센터</span>
  </a>

  <nav class="sb-nav" aria-label="주요 메뉴">
    <div class="sidebar-section">환자정보</div>
    <a th:href="@{/treatment-status-by-room}" class="sb-item"
       th:classappend="${activeMenu == 'status-room'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M2 6h12M6 6v8"/>
        </svg>
      </span>
      치료현황(병실별)
    </a>
    <!-- 준비 중: 치료현황(리스트) -->
    <span class="sb-item is-disabled" aria-disabled="true" title="준비 중">
      <span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/></svg></span>
      치료현황(리스트)<span class="sb-soon">준비중</span>
    </span>
    <a th:href="@{/treatment-calendar}" class="sb-item"
       th:classappend="${activeMenu == 'calendar'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="1" y="3" width="14" height="11" rx="2"/><path d="M1 7h14M5 1v2M11 1v2"/>
        </svg>
      </span>
      치료현황(캘린더)
    </a>
    <a th:href="@{/patients}" class="sb-item"
       th:classappend="${activeMenu == 'patients'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M8 8a3 3 0 100-6 3 3 0 000 6zM2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
        </svg>
      </span>
      계약정보(환자 현황)
    </a>

    <div class="sidebar-section">치료실 관리</div>
    <a th:href="@{/schedule-register}" class="sb-item"
       th:classappend="${activeMenu == 'schedule-calendar'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="1" y="3" width="14" height="11" rx="2"/><path d="M1 7h14M5 1v2M11 1v2"/><path d="M11 10l-2 2-1-1"/>
        </svg>
      </span>
      치료스케줄관리(캘린더형)
    </a>
    <a th:href="@{/cancer-treatment-schedule}" class="sb-item"
       th:classappend="${activeMenu == 'schedule'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v2M11 1v2M2 7h12"/>
        </svg>
      </span>
      치료 운영
      <span class="sb-badge" id="badge-today"
            th:text="${summary?.total != null ? summary.total : 0}">0</span>
    </a>

    <div class="sidebar-section">치료스케줄관리</div>
    <a th:href="@{/schedule-by-patient}" class="sb-item"
       th:classappend="${activeMenu == 'sched-patient'} ? ' active' : ''">
      <span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zM2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg></span>
      환자별 치료스케줄
    </a>
    <a th:href="@{/schedule-by-ward}" class="sb-item"
       th:classappend="${activeMenu == 'sched-ward'} ? ' active' : ''">
      <span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2.5" y="2" width="11" height="12" rx="1.5"/><path d="M2.5 6h11M6 14V9h4v5"/></svg></span>
      병동별 치료스케줄
    </a>
    <a th:href="@{/schedule-by-doctor}" class="sb-item"
       th:classappend="${activeMenu == 'sched-doctor'} ? ' active' : ''">
      <span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zM2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M11 2.5l1.5 1.5"/></svg></span>
      의사별 치료스케줄
    </a>

    <div class="sidebar-section">설정관리</div>
    <a th:href="@{/treatment-rooms}" class="sb-item"
       th:classappend="${activeMenu == 'rooms'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2.5" y="2" width="11" height="12" rx="1.5"/><path d="M2.5 6h11M6 14V9h4v5"/>
        </svg>
      </span>
      치료실 관리
    </a>
    <a th:href="@{/settings}" class="sb-item"
       th:classappend="${activeMenu == 'settings'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="2.2"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/>
        </svg>
      </span>
      치료 설정
    </a>
    <a th:href="@{/treatment-packages}" class="sb-item"
       th:classappend="${activeMenu == 'packages'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M4 2h8v12l-2-1.2L8 14l-2-1.2L4 14V2z"/><path d="M6.5 6h3M6.5 8.5h3"/>
        </svg>
      </span>
      치료비 카탈로그
    </a>
    <!-- 준비 중: 사용자관리(SSO/MediPlat 소관 검토), 치료옵션(현재 '치료 설정' 탭 내), 병실설정(E단계) -->
    <span class="sb-item is-disabled" aria-disabled="true" title="준비 중 — SSO/MediPlat 소관 검토">
      <span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/></svg></span>
      사용자관리<span class="sb-soon">준비중</span>
    </span>
    <a th:href="@{/treatment-options}" class="sb-item"
       th:classappend="${activeMenu == 'options'} ? ' active' : ''">
      <span class="sb-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="5.5"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/></svg></span>
      치료옵션
    </a>
    <a th:href="@{/patient-rooms}" class="sb-item"
       th:classappend="${activeMenu == 'patient-rooms'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2.5" y="2" width="11" height="12" rx="1.5"/><path d="M2.5 6h11M6 14V9h4v5"/>
        </svg>
      </span>
      병실설정
    </a>

    <div class="sb-divider"></div>
    <a th:href="@{/dashboard}" class="sb-item"
       th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
      <span class="sb-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/>
          <rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/>
        </svg>
      </span>
      통계
    </a>
  </nav>

  <div class="sb-footer">
    <div class="avatar"
         th:text="${user?.username != null ? user.username.substring(0,1).toUpperCase() : '?'}">?</div>
    <a class="btn-ghost" th:href="${mediplatPortalUrl}">MediPlat</a>
    <a class="btn-ghost" th:href="@{/logout}">로그아웃</a>
  </div>
</aside>

</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<nav class="topnav" th:fragment="topnav(user, activeMenu, mediplatPortalUrl)">
  <a class="nav-logo" href="#">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.9"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.6"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.6"/>
        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="#5e6ad2" opacity="0.3"/>
      </svg>
    </div>
    <span class="logo-name">암센터</span>
  </a>

  <div class="nav-links">
    <a th:href="@{/cancer-treatment-schedule}" class="nav-link"
       th:classappend="${activeMenu == 'schedule'}   ? ' active' : ''">스케줄</a>
    <a th:href="@{/treatment-calendar}"        class="nav-link"
       th:classappend="${activeMenu == 'calendar'}   ? ' active' : ''">캘린더</a>
    <a th:href="@{/patients}"                  class="nav-link"
       th:classappend="${activeMenu == 'patients'}   ? ' active' : ''">환자</a>
    <a th:href="@{/treatment-rooms}"           class="nav-link"
       th:classappend="${activeMenu == 'rooms'}      ? ' active' : ''">치료실</a>
    <a th:href="@{/treatment-packages}"        class="nav-link"
       th:classappend="${activeMenu == 'packages'}   ? ' active' : ''">치료비</a>
    <a th:href="@{/dashboard}"                 class="nav-link"
       th:classappend="${activeMenu == 'dashboard'}  ? ' active' : ''">통계</a>
    <a th:href="@{/settings}"                  class="nav-link"
       th:classappend="${activeMenu == 'settings'}   ? ' active' : ''">설정</a>
  </div>

  <div class="nav-actions">
    <div class="avatar"
         th:text="${user?.username != null ? user.username.substring(0,1).toUpperCase() : '?'}">?</div>
    <a class="btn-ghost" th:href="${mediplatPortalUrl}">MediPlat</a>
    <a class="btn-ghost" th:href="@{/logout}">로그아웃</a>
  </div>
</nav>

<aside class="sidebar" th:fragment="sidebar(activeMenu)">
  <div class="sidebar-section">일정</div>
  <a th:href="@{/cancer-treatment-schedule}" class="sb-item"
     th:classappend="${activeMenu == 'schedule'} ? ' active' : ''">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 1v2M11 1v2M2 7h12"/>
      </svg>
    </span>
    오늘 일정
    <span class="sb-badge" id="badge-today"
          th:text="${summary?.total != null ? summary.total : 0}">0</span>
  </a>
  <a th:href="@{/treatment-calendar}" class="sb-item"
     th:classappend="${activeMenu == 'calendar'} ? ' active' : ''">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="1" y="3" width="14" height="11" rx="2"/><path d="M1 7h14M5 1v2M11 1v2"/>
      </svg>
    </span>
    이번 주
  </a>
  <a th:href="@{/treatment-calendar}" class="sb-item">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/>
      </svg>
    </span>
    이번 달
  </a>

  <div class="sb-divider"></div>
  <div class="sidebar-section">환자</div>
  <a th:href="@{/patients}" class="sb-item"
     th:classappend="${activeMenu == 'patients'} ? ' active' : ''">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M8 8a3 3 0 100-6 3 3 0 000 6zM2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
      </svg>
    </span>
    전체 환자
  </a>
  <a href="#" class="sb-item" onclick="filterByStatus('예약'); return false;">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6"/>
        <path d="M11 10l1.5 1.5L15 9" stroke-width="1.5"/>
      </svg>
    </span>
    진행 중
    <span class="sb-badge" id="badge-reserved" style="background:var(--success);"
          th:text="${summary?.reserved != null ? summary.reserved : 0}">0</span>
  </a>

  <div class="sb-divider"></div>
  <div class="sidebar-section">최근 환자</div>
  <div id="patient-list"></div>

  <div class="sb-divider"></div>
  <div class="sidebar-section">분석</div>
  <a th:href="@{/dashboard}" class="sb-item"
     th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/>
        <rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/>
      </svg>
    </span>
    대시보드
  </a>
  <a th:href="@{/dashboard}" class="sb-item">
    <span class="sb-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 13l3-4 3 2 3-5 3 2"/>
      </svg>
    </span>
    보고서
  </a>
</aside>

</body>
</html>

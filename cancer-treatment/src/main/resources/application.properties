spring.application.name=cancer-treatment
server.port=${CANCER_TREATMENT_PORT:8083}
server.servlet.context-path=/cancer-treatment
server.forward-headers-strategy=framework

spring.datasource.url=${CANCER_TREATMENT_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:cancer_treatment;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${CANCER_TREATMENT_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${CANCER_TREATMENT_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.sql.init.mode=${CANCER_TREATMENT_SQL_INIT_MODE:embedded}

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.web.resources.cache.cachecontrol.no-store=true

cancer-treatment.sso.shared-secret=${COUNSELMAN_MEDIPLAT_SSO_SHARED_SECRET:change-me}
cancer-treatment.sso.allowed-clock-skew-seconds=${CANCER_TREATMENT_SSO_ALLOWED_CLOCK_SKEW_SECONDS:60}
cancer-treatment.sso.default-target=/cancer-treatment-schedule
cancer-treatment.mediplat-portal-url=${CANCER_TREATMENT_MEDIPLAT_PORTAL_URL:http://localhost:8082/portal}

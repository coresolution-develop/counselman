# dev profile - 공유 dev MySQL (csm DB)
spring.thymeleaf.cache=false
spring.web.resources.cache.cachecontrol.no-store=true

logging.level.root=INFO
logging.level.com.coresolution.cancertreatment=DEBUG

spring.datasource.url=${CANCER_TREATMENT_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${DEV_DB_HOST:49.247.42.59}:${DEV_DB_PORT:3306}/${DEV_DB_NAME:csm}?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}}
spring.datasource.username=${CANCER_TREATMENT_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:${DEV_DB_USERNAME:csdev}}}
spring.datasource.password=${CANCER_TREATMENT_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${DEV_DB_PASSWORD:Core0220!_!@@}}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ct_* 테이블은 dev DB에 이미 존재. schema.sql은 IF NOT EXISTS라 안전하지만 기본은 never.
# 새 환경에서 스키마 초기화가 필요하면 CANCER_TREATMENT_SQL_INIT_MODE=always 로 오버라이드.
spring.sql.init.mode=${CANCER_TREATMENT_SQL_INIT_MODE:never}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
